[defaults]
inventory = inventory
roles_path = roles
remote_user = k8s_user
private_key_file = ~/.ssh/id_rsa
stdout_callback = default
callbacks_enabled = profile_tasks
host_key_checking = False
timeout = 300
display_skipped_hosts = no
force_valid_group_names = ignore

[privilege_escalation]
become = true
become_method = sudo
