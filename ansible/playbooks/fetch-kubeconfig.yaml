---
- name: Fetch kubeconfig from RKE2 cluster
  hosts: ctlpln1
  become: true
  tasks:
    - name: Wait for kubeconfig to exist
      wait_for:
        path: /etc/rancher/rke2/rke2.yaml
        state: present
        timeout: 300

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /etc/rancher/rke2/rke2.yaml
        dest: ~/.kube/rke2-config
        flat: true

- name: Configure local kubeconfig
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tasks:
    - name: Update server URL to VIP
      replace:
        path: ~/.kube/rke2-config
        regexp: '127.0.0.1'
        replace: '10.41.0.100'

    - name: Set secure permissions
      file:
        path: ~/.kube/rke2-config
        mode: '0600'

    - name: Display usage instructions
      debug:
        msg: |
          Kubeconfig saved to ~/.kube/rke2-config

          To use:
            export KUBECONFIG=~/.kube/rke2-config
            kubectl get nodes

          Or merge with existing config:
            KUBECONFIG=~/.kube/config:~/.kube/rke2-config kubectl config view --flatten > ~/.kube/config.new
            mv ~/.kube/config.new ~/.kube/config
