---
# Prerequisites
- name: Install required packages
  package:
    name:
      - curl
      - iptables
      - nfs-common
      - keepalived
      - open-iscsi
      - multipath-tools
    state: present

- name: Set kernel tuning for container workloads
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: true
    state: present
  loop:
    - { key: fs.inotify.max_user_instances, value: "1024" }
    - { key: fs.inotify.max_user_watches, value: "524288" }

- name: Enable and start iscsid
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: Configure multipath blacklist
  copy:
    src: multipath.conf
    dest: /etc/multipath.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart multipathd

- name: Enable and start multipathd
  systemd:
    name: multipathd
    enabled: true
    state: started

- name: Ensure /etc/rancher/rke2 directory exists
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Template RKE2 server config
  template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: '0644'

# Keepalived for HA VIP
- name: Copy API server health check script
  copy:
    src: check_apiserver.sh
    dest: /usr/local/bin/check_apiserver.sh
    owner: root
    group: root
    mode: '0755'

- name: Configure keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart keepalived

- name: Enable and start keepalived
  systemd:
    name: keepalived
    enabled: true
    state: started

- name: Install RKE2 server
  shell: curl -sfL https://get.rke2.io | sh -
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-server service
  systemd:
    name: rke2-server
    enabled: true
    state: started

- name: Wait for Kubernetes API server to be ready
  command: /var/lib/rancher/rke2/bin/kubectl get nodes --kubeconfig /etc/rancher/rke2/rke2.yaml
  register: result
  retries: 30
  delay: 10
  until: result.rc == 0
  changed_when: false

- name: Copy Cilium HelmChartConfig
  copy:
    src: rke2-cilium-config.yaml
    dest: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
    owner: root
    group: root
    mode: '0644'
  run_once: true


