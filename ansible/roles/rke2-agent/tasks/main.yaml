---
- name: Ensure /etc/rancher/rke2 directory exists
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Copy RKE2 agent config
  copy:
    src: config.yaml
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: '0644'

- name: Install RKE2 agent
  shell: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE="agent" sh -
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-agent service
  systemd:
    name: rke2-agent
    enabled: true
    state: started
