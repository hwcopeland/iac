---
# Prerequisites
- name: Install required packages
  package:
    name:
      - curl
      - iptables
      - nfs-common
      - open-iscsi
      - multipath-tools
    state: present

- name: Enable and start iscsid
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: Configure multipath blacklist
  copy:
    src: multipath.conf
    dest: /etc/multipath.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart multipathd

- name: Enable and start multipathd
  systemd:
    name: multipathd
    enabled: true
    state: started

- name: Ensure /etc/rancher/rke2 directory exists
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Template RKE2 agent config
  template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: '0644'

- name: Install RKE2 agent
  shell: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE="agent" sh -
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-agent service
  systemd:
    name: rke2-agent
    enabled: true
    state: started
