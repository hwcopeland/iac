---
# Build the Spotify → Prometheus exporter image on the arc-chem self-hosted
# runner (LAN access to zot.hwcopeland.net), push to zot, then deploy to the
# monitor namespace. Mirrors build-jarvis-edge.yml.
#
# Required GitHub Actions secrets:
#   ZOT_USERNAME / ZOT_PASSWORD   — zot.hwcopeland.net push creds
#   KUBECONFIG_BASE64             — base64 kubeconfig with apply rights in monitor
#
# Spotify credentials are NOT GitHub secrets — they come from Bitwarden via the
# external-secret.yaml ExternalSecret (item "spotify-exporter"). The live
# rotating token lives in the shared `spotify-token` Secret, co-owned with JARVIS.

name: Build Spotify Exporter

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/monitor/spotify-exporter/**'
      - '.github/workflows/build-spotify-exporter.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build exporter image
    runs-on: arc-chem
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Zot registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push exporter image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: rke2/monitor/spotify-exporter
          file: rke2/monitor/spotify-exporter/Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          # zot accepts only OCI manifest media types — a Docker schema-2
          # manifest is rejected with HTTP 415. Force OCI on push. (Do not add
          # cache-to type=registry: inline cache export reverts buildkit to
          # Docker media types and 415s.)
          outputs: type=image,oci-mediatypes=true,push=true
          tags: |
            zot.hwcopeland.net/monitor/spotify-exporter:${{ steps.tags.outputs.sha_tag }}
            zot.hwcopeland.net/monitor/spotify-exporter:latest

  deploy:
    name: Deploy to Kubernetes
    needs: [build]
    runs-on: arc-chem
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Apply manifests and roll out
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          SHA_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          set -euo pipefail

          KUBECTL_VERSION="v1.31.2"
          curl -fsSL -o /tmp/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_BASE64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          cd rke2/monitor/spotify-exporter

          # Credentials + zot pull creds come from Bitwarden via ExternalSecrets.
          /tmp/kubectl apply -f external-secret.yaml
          /tmp/kubectl apply -f zot-pull-secret.yaml
          /tmp/kubectl apply -f deployment.yaml
          /tmp/kubectl apply -f dashboard.yaml

          # Pin to the immutable sha tag and wait for rollout.
          /tmp/kubectl -n monitor set image deployment/spotify-exporter \
            spotify-exporter="zot.hwcopeland.net/monitor/spotify-exporter:${SHA_TAG}"
          /tmp/kubectl -n monitor rollout status deployment/spotify-exporter --timeout=180s
