---
# Build the theswamp demo-mcp image on the arc-chem self-hosted runner (LAN
# access to zot.hwcopeland.net), push to zot. Deployment is Flux's job (the
# theswamp Kustomization + image-automation ImagePolicy `demo-mcp` reflect the
# new :main digest) — no deploy step here.
#
# The MCP server SOURCE lives in the PUBLIC Florida-Man-Bioscience/demo-websites
# repo (mcp-server/Dockerfile) and is checked out anonymously — so the zot PUSH
# creds (ZOT_USERNAME/ZOT_PASSWORD) stay ONLY in this repo, never copied into the
# source repo. This replaces the broken build-demo-mcp.yml in demo-websites,
# which failed because that repo has no zot credentials.
#
# Required GitHub Actions secrets (already present on this repo):
#   ZOT_USERNAME / ZOT_PASSWORD — zot.hwcopeland.net push creds
#
# Trigger: manual, plus a nightly rebuild to pick up demo-websites source changes
# (Flux digest-reflection then rolls the deployment). Run on demand with:
#   gh workflow run build-demo-mcp.yml
name: Build demo-mcp

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: read

jobs:
  build:
    name: Build demo-mcp image
    runs-on: arc-chem
    steps:
      - name: Checkout demo-websites source (public)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: Florida-Man-Bioscience/demo-websites
          ref: main
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Zot registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push demo-mcp image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: mcp-server/Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          # zot accepts only OCI manifest media types (Docker schema-2 -> HTTP 415).
          outputs: type=image,oci-mediatypes=true,push=true
          tags: zot.hwcopeland.net/florida-man-bioscience/demo-mcp:main
