---
# Build and push the cs2-surf-server Docker image to local Zot registry.
#
# Runner: self-hosted ARC runner on the RKE2 cluster.
# Registry: 10.44.0.6:5000/cs2-surf-server (Zot on-cluster).
#
# Image tag format: sha-<sha7> + latest.
# GHA cache enabled (type=gha) for layer caching.
#
# Deploy job restarts the K8s deployment after a successful build so the
# cluster pulls the new :latest image.

name: Build and Deploy CS2 Surf Server

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/game-server/cs2/cs2-surf/**'
      - '.github/workflows/build-cs2-surf.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build cs2-surf-server image
    runs-on: [self-hosted, arc-chem]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: 10.44.0.6:5000/cs2-surf-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: rke2/game-server/cs2/cs2-surf
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: [self-hosted, arc-chem]

    steps:
      - name: Restart deployment
        uses: steebchen/kubectl@v2.0.0
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: rollout restart deployment/cs2-surf-server -n game-server

      - name: Wait for rollout
        uses: steebchen/kubectl@v2.0.0
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: rollout status deployment/cs2-surf-server -n game-server --timeout=300s
