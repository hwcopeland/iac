---
# Build and push the cs2-surf-server Docker image to Zot registry.
#
# Runner: self-hosted ARC runner on the RKE2 cluster.
# Registry: zot.hwcopeland.net/game-server/cs2-surf-server.
#
# Registry credentials stored as GitHub Actions encrypted secrets:
#   ZOT_USERNAME / ZOT_PASSWORD (from Bitwarden).
#
# Cache strategy: registry-based layer cache (type=registry) with mode=max.
# type=gha does not work from on-cluster runners.
#
# Deploy job restarts the K8s deployment after a successful build so the
# cluster pulls the new :latest image.

name: Build and Deploy CS2 Surf Server

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/game-server/cs2/cs2-surf/**'
      - '.github/workflows/build-cs2-surf.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build cs2-surf-server image
    runs-on: arc-chem

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Zot registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          SHA_TAG="sha-${SHORT_SHA}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Building cs2-surf-server with tag: ${SHA_TAG}"

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: rke2/game-server/cs2/cs2-surf
          platforms: linux/amd64
          push: true
          tags: |
            zot.hwcopeland.net/game-server/cs2-surf-server:${{ steps.tags.outputs.sha_tag }}
            zot.hwcopeland.net/game-server/cs2-surf-server:latest
          cache-from: type=registry,ref=zot.hwcopeland.net/game-server/cs2-surf-server:cache
          cache-to: type=registry,ref=zot.hwcopeland.net/game-server/cs2-surf-server:cache,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: arc-chem

    steps:
      - name: Restart deployment
        uses: steebchen/kubectl@v2.0.0
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: rollout restart deployment/cs2-surf-server -n game-server

      - name: Wait for rollout
        uses: steebchen/kubectl@v2.0.0
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: rollout status deployment/cs2-surf-server -n game-server --timeout=300s
