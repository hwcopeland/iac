---
# Build the Terra++ 1:1 Earth Minecraft server image on the arc-chem self-hosted
# runner (LAN access to zot.hwcopeland.net + internet for the Jenkins mod jars),
# then push to zot. Mirrors build-spotify-exporter.yml.
#
# Required GitHub Actions secrets:
#   ZOT_USERNAME / ZOT_PASSWORD   — zot.hwcopeland.net push creds
#
# NOTE: there is intentionally NO deploy job. Bringing up mc-earth (and the
# mc-router LoadBalancer that fronts it on tcp/25565) changes routing for the
# already-running atm9skies / island servers, so the apply is left for human
# review. See rke2/game-server/mc/earth/README.md for the cutover plan.

name: Build MC Earth

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/game-server/mc/earth/Dockerfile'
      - '.github/workflows/build-mc-earth.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mc-earth image
    runs-on: arc-chem
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Zot registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push mc-earth image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: rke2/game-server/mc/earth
          file: rke2/game-server/mc/earth/Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          # zot accepts only OCI manifest media types — a Docker schema-2
          # manifest is rejected with HTTP 415. Force OCI on push. (Do not add
          # cache-to type=registry: inline cache export reverts buildkit to
          # Docker media types and 415s.)
          outputs: type=image,oci-mediatypes=true,push=true
          tags: |
            zot.hwcopeland.net/game-server/mc-earth:${{ steps.tags.outputs.sha_tag }}
            zot.hwcopeland.net/game-server/mc-earth:latest
