name: secret-scan

# Blocks credential leaks before they land. Runs on GitHub-hosted runners
# (NOT the in-cluster arc-chem runners) so it is safe on untrusted fork PRs.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  no-inline-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Block inline kind:Secret manifests
        run: bash scripts/check-no-inline-secrets.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run gitleaks (pinned binary)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
          # Scan the working tree (--no-git) so this gate blocks NEW leaks without
          # failing forever on old values still in history. Purge history once with
          # `git filter-repo` after rotation (see docs/SECURITY.md); it is not a
          # per-PR concern.
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose
