---
# Build and push only the Khemeia Docker images whose sources changed.
#
# Runner: self-hosted runner labeled arc-chem running on the RKE2 cluster.

name: Build and Push Chem Images

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/chem/khemeia/api/**'
      - 'rke2/chem/khemeia/web/**'
      - 'rke2/chem/khemeia/result-writer/**'
      - 'rke2/chem/khemeia/containers/**'
      - 'rke2/chem/khemeia/plugins/**'
      - '.github/workflows/build-chem-images.yml'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all images regardless of changes'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed images
    runs-on: [self-hosted, arc-chem]
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      count: ${{ steps.filter.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
          BUILD_ALL: ${{ github.event.inputs.build_all }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          images = [
              {
                  "key": "controller",
                  "name": "khemeia-controller",
                  "image": "zot.hwcopeland.net/chem/khemeia-controller",
                  "dockerfile": "rke2/chem/khemeia/api/Dockerfile",
                  "context": "rke2/chem/khemeia/api/",
                  "prefixes": [
                      "rke2/chem/khemeia/api/",
                      "rke2/chem/khemeia/plugins/",
                  ],
              },
              {
                  "key": "vina",
                  "name": "autodock-vina",
                  "image": "zot.hwcopeland.net/chem/autodock-vina",
                  "dockerfile": "rke2/chem/khemeia/containers/autodock-vina/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/autodock-vina/",
                  "prefixes": ["rke2/chem/khemeia/containers/autodock-vina/"],
              },
              {
                  "key": "result-writer",
                  "name": "khemeia-result-writer",
                  "image": "zot.hwcopeland.net/chem/khemeia-result-writer",
                  "dockerfile": "rke2/chem/khemeia/result-writer/Dockerfile",
                  "context": "rke2/chem/khemeia/result-writer/",
                  "prefixes": ["rke2/chem/khemeia/result-writer/"],
              },
              {
                  "key": "dfratom",
                  "name": "dfratom",
                  "image": "zot.hwcopeland.net/chem/dfratom",
                  "dockerfile": "rke2/chem/khemeia/containers/dfratom/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/dfratom/",
                  "prefixes": ["rke2/chem/khemeia/containers/dfratom/"],
              },
              {
                  "key": "nwchem",
                  "name": "nwchem",
                  "image": "zot.hwcopeland.net/chem/nwchem",
                  "dockerfile": "rke2/chem/khemeia/containers/nwchem/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/nwchem/",
                  "prefixes": ["rke2/chem/khemeia/containers/nwchem/"],
              },
              {
                  "key": "psi4",
                  "name": "psi4",
                  "image": "zot.hwcopeland.net/chem/psi4",
                  "dockerfile": "rke2/chem/khemeia/containers/psi4/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/psi4/",
                  "prefixes": ["rke2/chem/khemeia/containers/psi4/"],
              },
              {
                  "key": "prolif-runner",
                  "name": "prolif-runner",
                  "image": "zot.hwcopeland.net/chem/prolif-runner",
                  "dockerfile": "rke2/chem/khemeia/containers/prolif-runner/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/prolif-runner/",
                  "prefixes": ["rke2/chem/khemeia/containers/prolif-runner/"],
              },
              {
                  "key": "target-prep",
                  "name": "target-prep",
                  "image": "zot.hwcopeland.net/chem/target-prep",
                  "dockerfile": "rke2/chem/khemeia/containers/target-prep/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/target-prep/",
                  "prefixes": ["rke2/chem/khemeia/containers/target-prep/"],
              },
              {
                  "key": "fpocket",
                  "name": "fpocket",
                  "image": "zot.hwcopeland.net/chem/fpocket",
                  "dockerfile": "rke2/chem/khemeia/containers/fpocket/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/fpocket/",
                  "prefixes": ["rke2/chem/khemeia/containers/fpocket/"],
              },
              {
                  "key": "p2rank",
                  "name": "p2rank",
                  "image": "zot.hwcopeland.net/chem/p2rank",
                  "dockerfile": "rke2/chem/khemeia/containers/p2rank/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/p2rank/",
                  "prefixes": ["rke2/chem/khemeia/containers/p2rank/"],
              },
              {
                  "key": "library-prep",
                  "name": "library-prep",
                  "image": "zot.hwcopeland.net/chem/library-prep",
                  "dockerfile": "rke2/chem/khemeia/containers/library-prep/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/library-prep/",
                  "prefixes": ["rke2/chem/khemeia/containers/library-prep/"],
              },
              {
                  "key": "web",
                  "name": "khemeia-web",
                  "image": "zot.hwcopeland.net/chem/khemeia-web",
                  "dockerfile": "rke2/chem/khemeia/web/Dockerfile",
                  "context": "rke2/chem/khemeia/web/",
                  "prefixes": ["rke2/chem/khemeia/web/"],
              },
              {
                  "key": "vina-1-2",
                  "name": "vina-1.2",
                  "image": "zot.hwcopeland.net/chem/vina",
                  "dockerfile": "rke2/chem/khemeia/containers/vina-1.2/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/vina-1.2/",
                  "prefixes": ["rke2/chem/khemeia/containers/vina-1.2/"],
              },
              {
                  "key": "gnina",
                  "name": "gnina",
                  "image": "zot.hwcopeland.net/chem/gnina",
                  "dockerfile": "rke2/chem/khemeia/containers/gnina/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/gnina/",
                  "prefixes": ["rke2/chem/khemeia/containers/gnina/"],
              },
              {
                  "key": "admet",
                  "name": "admet",
                  "image": "zot.hwcopeland.net/chem/admet",
                  "dockerfile": "rke2/chem/khemeia/containers/admet/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/admet/",
                  "prefixes": ["rke2/chem/khemeia/containers/admet/"],
              },
              {
                  "key": "vina-gpu",
                  "name": "vina-gpu",
                  "image": "zot.hwcopeland.net/chem/vina-gpu",
                  "dockerfile": "rke2/chem/khemeia/containers/vina-gpu/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/vina-gpu/",
                  "prefixes": ["rke2/chem/khemeia/containers/vina-gpu/"],
              },
              {
                  "key": "diffdock",
                  "name": "diffdock",
                  "image": "zot.hwcopeland.net/chem/diffdock",
                  "dockerfile": "rke2/chem/khemeia/containers/diffdock/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/diffdock/",
                  "prefixes": ["rke2/chem/khemeia/containers/diffdock/"],
              },
              {
                  "key": "gromacs",
                  "name": "gromacs",
                  "image": "zot.hwcopeland.net/chem/gromacs",
                  "dockerfile": "rke2/chem/khemeia/containers/gromacs/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/gromacs/",
                  "prefixes": ["rke2/chem/khemeia/containers/gromacs/"],
              },
              {
                  "key": "resp",
                  "name": "resp",
                  "image": "zot.hwcopeland.net/chem/resp",
                  "dockerfile": "rke2/chem/khemeia/containers/resp/Dockerfile",
                  "context": "rke2/chem/khemeia/containers/resp/",
                  "prefixes": ["rke2/chem/khemeia/containers/resp/"],
              },
          ]

          def run(cmd):
              return subprocess.check_output(cmd, text=True).strip()

          event_name = os.environ["EVENT_NAME"]
          build_all = os.environ.get("BUILD_ALL", "").lower() == "true"
          changed = []
          selected = []

          if build_all:
              selected = [
                  {"name": i["name"], "image": i["image"], "dockerfile": i["dockerfile"], "context": i["context"]}
                  for i in images
              ]
          else:
              if event_name == "push":
                  before = os.environ.get("PUSH_BEFORE", "")
                  after = os.environ.get("PUSH_SHA", "HEAD")
                  if before and before != "0000000000000000000000000000000000000000":
                      diff_cmd = ["git", "diff", "--name-only", before, after]
                  else:
                      diff_cmd = ["git", "diff-tree", "--no-commit-id", "--name-only", "-r", after]
              else:
                  run(["git", "fetch", "--no-tags", "origin", "main"])
                  base = run(["git", "merge-base", "origin/main", "HEAD"])
                  diff_cmd = ["git", "diff", "--name-only", f"{base}...HEAD"]

              output = run(diff_cmd)
              if output:
                  changed = [line for line in output.splitlines() if line]

              for image in images:
                  if any(path.startswith(prefix) for path in changed for prefix in image["prefixes"]):
                      selected.append({
                          "name": image["name"],
                          "image": image["image"],
                          "dockerfile": image["dockerfile"],
                          "context": image["context"],
                      })

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"count={len(selected)}\n")
              fh.write(f"matrix={json.dumps(selected, separators=(',', ':'))}\n")

          print("Changed paths:")
          if changed:
              print("\n".join(changed))
          else:
              print("(none)")
          print("\nSelected images:")
          if selected:
              for image in selected:
                  print(f"- {image['name']}")
          else:
              print("(none)")
          PY

  build-and-push:
    name: Build ${{ matrix.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.count != '0'
    runs-on: [self-hosted, arc-chem]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Zot registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_NUM=$(printf '%06d' "${{ github.run_number }}")
          BUILD_TAG="build-${RUN_NUM}-${SHORT_SHA}"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          outputs: type=image,push=true,oci-mediatypes=true
          tags: |
            ${{ matrix.image }}:${{ steps.tags.outputs.build_tag }}
            ${{ matrix.image }}:latest

  rollout:
    name: Rollout restart deployments
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.count != '0' && needs.build-and-push.result == 'success'
    runs-on: [self-hosted, arc-chem]
    steps:
      - name: Restart changed long-running deployments
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        run: |
          # Only long-running deployments need a rollout restart.
          # Worker images (autodock-vina, gromacs, etc.) are ephemeral Jobs — no action needed.
          KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          KUBE_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          KUBE_API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
          NAMESPACE=chem
          RESTART_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PATCH="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"${RESTART_TIME}\"}}}}}"

          # image name → deployment name mapping (only long-running services)
          get_deploy() {
            case "$1" in
              khemeia-controller)    echo "khemeia-controller" ;;
              khemeia-web)           echo "khemeia-web" ;;
              khemeia-result-writer) echo "result-writer" ;;
              admet)                 echo "admet" ;;
            esac
          }

          NAMES=$(python3 -c "import json,sys; [print(i['name']) for i in json.loads(sys.argv[1])]" "$MATRIX")
          RESTARTED=0
          while IFS= read -r name; do
            deploy=$(get_deploy "$name")
            [ -z "$deploy" ] && continue
            echo "Patching deployment/${deploy} in ${NAMESPACE}..."
            HTTP=$(curl -s -o /tmp/kube_resp.json -w "%{http_code}" \
              --cacert "$KUBE_CA" \
              -H "Authorization: Bearer $KUBE_TOKEN" \
              -H "Content-Type: application/strategic-merge-patch+json" \
              -X PATCH \
              "${KUBE_API}/apis/apps/v1/namespaces/${NAMESPACE}/deployments/${deploy}" \
              -d "$PATCH")
            if [ "$HTTP" = "200" ]; then
              echo "  OK"
              RESTARTED=$((RESTARTED + 1))
            else
              echo "  FAILED (HTTP ${HTTP}):"
              cat /tmp/kube_resp.json
              exit 1
            fi
          done <<< "$NAMES"

          if [ "$RESTARTED" -eq 0 ]; then
            echo "No long-running deployments in this build — no rollout needed."
          else
            echo "Triggered rollout restart for ${RESTARTED} deployment(s)."
          fi
