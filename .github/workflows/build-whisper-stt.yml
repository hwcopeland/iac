---
# Two-image build strategy to avoid rebuilding the deps layer on every push.
#
# whisper-stt-base  — faster-whisper + fastapi + scipy. Built only when
#                     Dockerfile.base changes. Takes ~2 min.
# whisper-stt       — FROM base + server.py. Built on every push. Takes ~10s.

name: Build Whisper STT

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/ai/whisper-stt/**'
      - '.github/workflows/build-whisper-stt.yml'
  workflow_dispatch:
    inputs:
      rebuild_base:
        description: 'Force rebuild the base image'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  base:
    name: Build base image (deps only)
    runs-on: arc-chem
    outputs:
      base_changed: ${{ steps.changed.outputs.base_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Check if Dockerfile.base changed
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'rke2/ai/whisper-stt/Dockerfile.base'; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.rebuild_base }}" = "true" ]; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "base_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Zot registry
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push base image
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: rke2/ai/whisper-stt
          file: rke2/ai/whisper-stt/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: zot.hwcopeland.net/ai/whisper-stt-base:latest
          cache-from: type=registry,ref=zot.hwcopeland.net/ai/whisper-stt-base:cache
          cache-to: type=registry,ref=zot.hwcopeland.net/ai/whisper-stt-base:cache,mode=max

  build:
    name: Build server image
    runs-on: arc-chem
    needs: base

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Zot registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: rke2/ai/whisper-stt
          file: rke2/ai/whisper-stt/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            zot.hwcopeland.net/ai/whisper-stt:${{ steps.tags.outputs.sha_tag }}
            zot.hwcopeland.net/ai/whisper-stt:latest

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: arc-chem

    steps:
      - name: Restart deployment and wait for rollout
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          set -euo pipefail

          KUBECTL_VERSION="v1.31.2"
          curl -fsSL -o /tmp/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_BASE64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          /tmp/kubectl -n ai rollout restart deployment/jarvis-stack
          /tmp/kubectl -n ai rollout status deployment/jarvis-stack --timeout=600s
