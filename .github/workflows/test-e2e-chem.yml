---
# End-to-end test for the docking-controller job cycle.
#
# Runner: self-hosted arc-chem runner inside the RKE2 cluster.
# Direct ClusterIP access to docking-controller — no kubectl, no kubeconfig needed.
#
# Prerequisites (one-time setup, not per-run):
#   pvc-autodock must exist with test_tiny.sdf at /data/claim-jovyan/test_tiny.sdf.
#   Run: kubectl apply -f k8s-jobs/config/pvc-autodock.yaml
#   Seed: see k8s-jobs/tests/fixtures/README.md
#
# Triggers:
#   workflow_run — fires automatically after Build and Push Chem Images succeeds.
#   workflow_dispatch — manual on-demand run.

name: E2E Test — Chem Job Cycle

on:
  workflow_run:
    workflows: ["Build and Push Chem Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-test:
    name: Job cycle smoke test
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, arc-chem]
    timeout-minutes: 45

    steps:
      - name: Verify controller health
        run: curl -sf http://docking-controller.chem.svc.cluster.local/health

      - name: Submit test DockingJob
        id: submit
        run: |
          RESPONSE=$(curl -sf -X POST \
            http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs \
            -H "Content-Type: application/json" \
            -d '{
              "ligand_db":          "test-tiny",
              "pdbid":              "7jrn",
              "native_ligand":      "TTT",
              "ligands_chunk_size": 100,
              "jupyter_user":       "jovyan"
            }')
          echo "$RESPONSE"
          JOB_NAME=$(echo "$RESPONSE" \
            | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
            | tr -d '\r\n')
          [ -z "$JOB_NAME" ] && echo "ERROR: no job name in response" && exit 1
          echo "Submitted: $JOB_NAME"
          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Poll until Completed or Failed
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          echo "Polling $JOB_NAME every 30s (45m max)..."
          for i in $(seq 1 90); do
            RESP=$(curl -sf \
              "http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME" \
              || echo '{"status":"Unknown"}')
            STATUS=$(echo "$RESP" \
              | sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
              | tr -d '\r\n')
            echo "[$i/90] $STATUS"
            [ "$STATUS" = "Completed" ] && echo "SUCCESS" && exit 0
            if [ "$STATUS" = "Failed" ]; then
              MSG=$(echo "$RESP" \
                | sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              echo "FAILED: $MSG"
              exit 1
            fi
            sleep 30
          done
          echo "TIMEOUT: job did not complete within 45 minutes"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          [ -n "$JOB_NAME" ] && \
            curl -sf -X DELETE \
              "http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME" \
            && echo "Deleted $JOB_NAME" || true
