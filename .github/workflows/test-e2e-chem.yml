---
# End-to-end test for the docking-controller job cycle.
#
# Runner: self-hosted arc-chem runner inside the RKE2 cluster.
# Direct ClusterIP access to docking-controller and docking-mysql.
#
# This test seeds 2 test ligands with pre-calculated PDBQTs into MySQL,
# submits a docking workflow, polls until completion, verifies results,
# and cleans up.
#
# Triggers:
#   workflow_run — fires automatically after Build and Push Chem Images succeeds.
#   workflow_dispatch — manual on-demand run.

name: E2E Test — Chem Job Cycle

on:
  workflow_run:
    workflows: ["Build and Push Chem Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  CONTROLLER_URL: http://docking-controller.chem.svc.cluster.local

jobs:
  e2e-test:
    name: Job cycle smoke test
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, arc-chem]
    timeout-minutes: 45

    steps:
      - name: Wait for Flux rollout
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Auto-triggered: sleeping 7 minutes for Flux to deploy new image..."
            sleep 420
          else
            echo "Manual dispatch: skipping Flux rollout wait"
          fi
          echo "Verifying controller health..."
          for i in $(seq 1 24); do
            if curl -sf $CONTROLLER_URL/health > /dev/null 2>&1; then
              echo "Controller healthy"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: controller not healthy"
          exit 1

      - name: Verify controller and result-writer health
        run: |
          curl -sf $CONTROLLER_URL/health
          curl -sf http://result-writer.chem.svc.cluster.local/health || echo "result-writer health check failed (may not have /health)"

      - name: Seed test ligands via controller API
        run: |
          echo "Seeding 2 test ligands with fake PDBQTs via /api/v1/ligands..."
          # Minimal PDBQT stubs — enough for Vina to attempt parsing.
          # Docking results are meaningless but that's fine for E2E smoke testing.
          ASPIRIN_PDBQT=$(printf 'ATOM      1  C   LIG A   1       1.400   0.000   0.000  1.00  0.00     0.000 C\nATOM      2  C   LIG A   1       0.700   1.212   0.000  1.00  0.00     0.000 C\nATOM      3  O   LIG A   1       3.530   1.050   0.000  1.00  0.00     0.000 OA\nEND\n' | base64 -w0)
          IBUPROFEN_PDBQT=$(printf 'ATOM      1  C   LIG A   1       0.000   0.000   0.000  1.00  0.00     0.000 C\nATOM      2  C   LIG A   1       1.400   0.000   0.000  1.00  0.00     0.000 C\nATOM      3  O   LIG A   1       6.300  -1.050   0.000  1.00  0.00     0.000 OA\nEND\n' | base64 -w0)
          RESP=$(curl -sf -X POST \
            $CONTROLLER_URL/api/v1/ligands \
            -H "Content-Type: application/json" \
            -d "[
              {\"compound_id\": \"TEST:aspirin\", \"smiles\": \"CC(=O)Oc1ccccc1C(=O)O\", \"pdbqt_b64\": \"${ASPIRIN_PDBQT}\", \"source_db\": \"test-tiny\"},
              {\"compound_id\": \"TEST:ibuprofen\", \"smiles\": \"CC(C)Cc1ccc(cc1)C(C)C(=O)O\", \"pdbqt_b64\": \"${IBUPROFEN_PDBQT}\", \"source_db\": \"test-tiny\"}
            ]")
          echo "Import response: $RESP"
          IMPORTED=$(echo "$RESP" | sed -n 's/.*"imported"[[:space:]]*:[[:space:]]*\([0-9]*\).*/\1/p' | tr -d '\r\n')
          [ "${IMPORTED:-0}" -ge 2 ] || { echo "ERROR: expected 2 imports, got ${IMPORTED:-0}"; exit 1; }

      - name: Dump existing workflows (pre-run state)
        run: |
          echo "=== existing docking workflows ==="
          curl -sf $CONTROLLER_URL/api/v1/dockingjobs 2>/dev/null || echo "(list failed)"

      - name: Submit test DockingJob
        id: submit
        run: |
          RESPONSE=$(curl -sf -X POST \
            $CONTROLLER_URL/api/v1/dockingjobs \
            -H "Content-Type: application/json" \
            -d '{
              "ligand_db":          "test-tiny",
              "pdbid":              "7jrn",
              "native_ligand":      "TTT",
              "ligands_chunk_size": 100
            }')
          echo "$RESPONSE"
          JOB_NAME=$(echo "$RESPONSE" \
            | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
            | tr -d '\r\n')
          [ -z "$JOB_NAME" ] && echo "ERROR: no job name in response" && exit 1
          echo "Submitted: $JOB_NAME"
          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Poll until Completed or Failed
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          echo "Polling $JOB_NAME every 30s (45m max)..."
          for i in $(seq 1 90); do
            RESP=$(curl -sf \
              "$CONTROLLER_URL/api/v1/dockingjobs/$JOB_NAME" \
              || echo '{"status":"Unknown"}')
            STATUS=$(echo "$RESP" \
              | sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
              | tr -d '\r\n')
            echo "[$i/90] $STATUS"
            if [ "$STATUS" = "Completed" ]; then
              MSG=$(echo "$RESP" \
                | sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
                | tr -d '\r\n')
              echo "Completed. Result: ${MSG:-(none)}"
              exit 0
            fi
            if [ "$STATUS" = "Failed" ]; then
              MSG=$(echo "$RESP" \
                | sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              echo "FAILED: $MSG"
              exit 1
            fi
            sleep 30
          done
          echo "TIMEOUT: job did not complete within 45 minutes"
          exit 1

      - name: Dump pipeline logs
        if: always()
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          [ -z "$JOB_NAME" ] && exit 0
          BASE="$CONTROLLER_URL/api/v1/dockingjobs/$JOB_NAME"
          for TASK in prepare-receptor dock-batch; do
            echo "=== logs: $TASK ==="
            curl -sf "$BASE/logs?task=$TASK" 2>/dev/null || echo "(no logs or job gone)"
          done
          echo "=== job status ==="
          curl -sf "$BASE" 2>/dev/null || true

      - name: Verify docking results
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          echo "Checking /results endpoint for workflow $JOB_NAME..."
          for i in $(seq 1 24); do
            RESP=$(curl -sf \
              "$CONTROLLER_URL/api/v1/dockingjobs/$JOB_NAME/results" \
              || echo '{"result_count":0}')
            COUNT=$(echo "$RESP" \
              | sed -n 's/.*"result_count"[[:space:]]*:[[:space:]]*\([0-9]*\).*/\1/p' \
              | tr -d '\r\n')
            if [ "${COUNT:-0}" -gt 0 ]; then
              echo "SUCCESS: $COUNT docking result rows for workflow $JOB_NAME"
              echo "$RESP"
              exit 0
            fi
            echo "[$i/24] count=${COUNT:-0}, waiting for result-writer to drain staging..."
            sleep 5
          done
          echo "ERROR: no docking results found for workflow $JOB_NAME after 120s"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          # Delete workflow via API (cleans up K8s Jobs, staging, results, workflow row)
          [ -n "$JOB_NAME" ] && \
            curl -sf -X DELETE "$CONTROLLER_URL/api/v1/dockingjobs/$JOB_NAME" \
            && echo "Deleted workflow $JOB_NAME" || true
          # Test ligands remain in DB (idempotent via ON DUPLICATE KEY UPDATE)
