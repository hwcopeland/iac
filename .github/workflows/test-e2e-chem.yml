---
# End-to-end test for the docking-controller job cycle.
#
# Runner: self-hosted arc-chem runner inside the RKE2 cluster.
# Direct ClusterIP access to docking-controller — no kubectl, no kubeconfig needed.
#
# Prerequisites (one-time setup, not per-run):
#   MySQL must have test ligands imported into the `ligands` table for source_db='test-tiny'.
#   The result-writer pod must be running in the chem namespace.
#
# Triggers:
#   workflow_run — fires automatically after Build and Push Chem Images succeeds.
#   workflow_dispatch — manual on-demand run.

name: E2E Test — Chem Job Cycle

on:
  workflow_run:
    workflows: ["Build and Push Chem Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-test:
    name: Job cycle smoke test
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, arc-chem]
    timeout-minutes: 45

    steps:
      - name: Wait for Flux rollout
        # When triggered by workflow_run (automatic after a build), Flux needs time to
        # detect the new image in Zot (5m poll interval), commit the tag update, and
        # roll out the new pod. We sleep 7 minutes to cover this window.
        # workflow_dispatch (manual) skips the wait — the user controls timing.
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Auto-triggered: sleeping 7 minutes for Flux to deploy new image..."
            sleep 420
          else
            echo "Manual dispatch: skipping Flux rollout wait"
          fi
          echo "Verifying controller health..."
          for i in $(seq 1 24); do
            if curl -sf http://docking-controller.chem.svc.cluster.local/health > /dev/null 2>&1; then
              echo "Controller healthy"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: controller not healthy"
          exit 1

      - name: Verify controller health
        run: curl -sf http://docking-controller.chem.svc.cluster.local/health

      - name: Dump existing workflows (pre-run state)
        run: |
          echo "=== existing docking workflows ==="
          curl -sf http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs \
            2>/dev/null || echo "(list failed)"
          echo ""
          echo "=== controller health + time ==="
          curl -sf http://docking-controller.chem.svc.cluster.local/health \
            2>/dev/null || echo "(health failed)"

      - name: Submit test DockingJob
        id: submit
        run: |
          RESPONSE=$(curl -sf -X POST \
            http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs \
            -H "Content-Type: application/json" \
            -d '{
              "ligand_db":          "test-tiny",
              "pdbid":              "7jrn",
              "native_ligand":      "TTT",
              "ligands_chunk_size": 100
            }')
          echo "$RESPONSE"
          JOB_NAME=$(echo "$RESPONSE" \
            | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
            | tr -d '\r\n')
          [ -z "$JOB_NAME" ] && echo "ERROR: no job name in response" && exit 1
          echo "Submitted: $JOB_NAME"
          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Poll until Completed or Failed
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          echo "Polling $JOB_NAME every 30s (45m max)..."
          for i in $(seq 1 90); do
            RESP=$(curl -sf \
              "http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME" \
              || echo '{"status":"Unknown"}')
            STATUS=$(echo "$RESP" \
              | sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
              | tr -d '\r\n')
            echo "[$i/90] $STATUS"
            if [ "$STATUS" = "Completed" ]; then
              MSG=$(echo "$RESP" \
                | sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
                | tr -d '\r\n')
              echo "Completed. Postprocessing result: ${MSG:-(none)}"
              exit 0
            fi
            if [ "$STATUS" = "Failed" ]; then
              MSG=$(echo "$RESP" \
                | sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              echo "FAILED: $MSG"
              exit 1
            fi
            sleep 30
          done
          echo "TIMEOUT: job did not complete within 45 minutes"
          exit 1

      - name: Dump pipeline logs
        if: always()
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          [ -z "$JOB_NAME" ] && exit 0
          BASE="http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME"
          for TASK in prepare-receptor dock-batch; do
            echo "=== logs: $TASK ==="
            curl -sf "$BASE/logs?task=$TASK" 2>/dev/null || echo "(no logs or job gone)"
          done
          echo "=== job status ==="
          curl -sf "$BASE" 2>/dev/null || true

      - name: Verify MySQL export
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          echo "Checking /results endpoint for workflow $JOB_NAME..."
          for i in $(seq 1 12); do
            RESP=$(curl -sf \
              "http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME/results" \
              || echo '{"result_count":0}')
            COUNT=$(echo "$RESP" \
              | sed -n 's/.*"result_count"[[:space:]]*:[[:space:]]*\([0-9]*\).*/\1/p' \
              | tr -d '\r\n')
            if [ "${COUNT:-0}" -gt 0 ]; then
              echo "SUCCESS: $COUNT ligand energy rows for workflow $JOB_NAME"
              echo "$RESP"
              exit 0
            fi
            echo "[$i/12] count=${COUNT:-0}, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: no MySQL rows found for workflow $JOB_NAME after 60s"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          [ -n "$JOB_NAME" ] && \
            curl -sf -X DELETE \
              "http://docking-controller.chem.svc.cluster.local/api/v1/dockingjobs/$JOB_NAME" \
            && echo "Deleted $JOB_NAME" || true
