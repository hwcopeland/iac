---
# Two-image build mirroring chatterbox-tts / whisper-stt pattern.
# jarvis-edge-base — deps layer (audio libs, openwakeword model download,
#                    silero-vad, soco, scipy, etc.). Rebuilt only when
#                    Dockerfile.base changes (~2 min).
# jarvis-edge      — FROM base + edge.py. Rebuilt every push (~10s).

name: Build JARVIS Edge

on:
  push:
    branches:
      - main
    paths:
      - 'rke2/ai/jarvis-edge/**'
      - '.github/workflows/build-jarvis-edge.yml'
  workflow_dispatch:
    inputs:
      rebuild_base:
        description: 'Force rebuild the base image'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  base:
    name: Build base image (deps only)
    runs-on: arc-chem
    outputs:
      base_changed: ${{ steps.changed.outputs.base_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - name: Check if Dockerfile.base changed
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'rke2/ai/jarvis-edge/Dockerfile.base'; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.rebuild_base }}" = "true" ]; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "base_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Zot registry
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push base image
        if: steps.changed.outputs.base_changed == 'true'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: rke2/ai/jarvis-edge
          file: rke2/ai/jarvis-edge/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: zot.hwcopeland.net/ai/jarvis-edge-base:latest
          cache-from: type=registry,ref=zot.hwcopeland.net/ai/jarvis-edge-base:cache
          cache-to: type=registry,ref=zot.hwcopeland.net/ai/jarvis-edge-base:cache,mode=max

  build:
    name: Build edge image
    runs-on: arc-chem
    needs: base

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Zot registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push edge image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: rke2/ai/jarvis-edge
          file: rke2/ai/jarvis-edge/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            zot.hwcopeland.net/ai/jarvis-edge:${{ steps.tags.outputs.sha_tag }}
            zot.hwcopeland.net/ai/jarvis-edge:latest

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: arc-chem

    steps:
      - name: Restart deployment and wait for rollout
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          set -euo pipefail

          KUBECTL_VERSION="v1.31.2"
          curl -fsSL -o /tmp/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_BASE64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          /tmp/kubectl -n ai rollout restart deployment/jarvis-stack
          /tmp/kubectl -n ai rollout status deployment/jarvis-stack --timeout=300s
