apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Using the :latest image tag is mutable and can lead to unexpected changes.
      This policy flags images using :latest in audit mode only.
      Known violations to pin in follow-up: ollama/ollama:latest,
      homepage:latest, oauth2-proxy:latest.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Image '{{ element.image }}' uses ':latest' tag. Pin to a specific version."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Contains
                    value: ":latest"
