---
# PostgreSQL credentials for the flockmap-postgres instance.
# Bitwarden-backed ExternalSecret. Username is static ("flockmap");
# only the password is pulled from Bitwarden.
#
# ACTION REQUIRED before apply: create a NEW Bitwarden login item for the
# flockmap Postgres password and replace the placeholder UUID below with its
# item id. (Mirror khemeia-postgres-secret.yaml — that one reuses an existing
# item; flockmap gets its own new item.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flockmap-postgres-secret
  namespace: flockmap
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: flockmap-postgres-secret
    creationPolicy: Owner
    template:
      data:
        username: "flockmap"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        # TODO(secret): replace with the NEW Bitwarden item UUID for the
        # flockmap Postgres password before applying.
        key: REPLACE-WITH-NEW-BITWARDEN-ITEM-UUID
        property: password
