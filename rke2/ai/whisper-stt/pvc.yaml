---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: whisper-models
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-whisper
  hostPath:
    path: /var/lib/whisper
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - nixos-gpu
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-models
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-whisper
  volumeName: whisper-models
  resources:
    requests:
      storage: 20Gi
