---
# Privacy policy page for the Jarvis-IG Meta app.
# Meta requires a publicly reachable HTTPS Privacy Policy URL before an
# app can be flipped from Development to Live mode. We host a single
# static HTML page served by nginx, exposed at:
#     https://ai.hwcopeland.net/privacy
# via an additional rule on the jarvis-ig HTTPRoute.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-privacy
  namespace: ai
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>JARVIS — Privacy Policy</title>
      <style>
        :root { color-scheme: light dark; }
        body { font: 16px/1.6 system-ui, sans-serif; max-width: 720px;
               margin: 3rem auto; padding: 0 1.25rem; }
        h1 { margin-top: 0; } h2 { margin-top: 2rem; }
        small { opacity: .7; }
        code { background: rgba(127,127,127,.18); padding: 0 .25rem;
               border-radius: 3px; }
      </style>
    </head>
    <body>
      <h1>JARVIS — Privacy Policy</h1>
      <p><small>Last updated: 2026-05-25</small></p>

      <p>JARVIS is a personal voice / messaging assistant operated by
      Hampton Copeland (<a href="mailto:hampton888@gmail.com">hampton888@gmail.com</a>)
      for personal use. This page describes what data the system collects
      via its Instagram integration and how it is handled.</p>

      <h2>What we collect</h2>
      <ul>
        <li>Direct messages you send to the <code>@hmlbjarvis</code>
            Instagram account, and any media you share in those DMs.</li>
        <li>Public mentions of <code>@hmlbjarvis</code> in posts or
            comments.</li>
        <li>The Instagram user ID and display name of the sender,
            provided by Meta in the webhook payload.</li>
      </ul>

      <h2>What we do not collect</h2>
      <ul>
        <li>We do not read DMs sent to or from other Instagram accounts.</li>
        <li>We do not scrape your followers, following list, posts, or
            stories.</li>
        <li>We do not sell, share, or syndicate any data to advertisers
            or third-party data brokers.</li>
      </ul>

      <h2>How we use it</h2>
      <p>Messages sent to <code>@hmlbjarvis</code> are forwarded to
      Anthropic's Claude API to generate a response, which is then sent
      back to the same Instagram conversation. Messages may briefly
      transit Meta's, Anthropic's, and our own infrastructure during
      this round-trip. No human besides the operator (Hampton Copeland)
      reads them.</p>

      <h2>Retention</h2>
      <p>Message bodies are processed in memory and not persisted to
      durable storage. Aggregate timing and error metrics (no message
      content) are retained for up to 30 days for debugging.</p>

      <h2>Third parties</h2>
      <ul>
        <li><strong>Meta / Instagram</strong> — delivers webhook events
            to us under their platform terms.</li>
        <li><strong>Anthropic</strong> — generates the assistant's
            replies. See
            <a href="https://www.anthropic.com/legal/privacy">Anthropic's
            privacy policy</a>.</li>
      </ul>

      <h2>Your choices</h2>
      <p>To stop the assistant from processing your messages, simply
      stop sending DMs to <code>@hmlbjarvis</code>. To request deletion
      of any retained logs that mention your account, email
      <a href="mailto:hampton888@gmail.com">hampton888@gmail.com</a>.</p>

      <h2>Changes</h2>
      <p>This policy may be updated; the most recent version is always
      at <a href="https://ai.hwcopeland.net/privacy">https://ai.hwcopeland.net/privacy</a>.</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-privacy
  namespace: ai
  labels:
    app: jarvis-privacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jarvis-privacy
  template:
    metadata:
      labels:
        app: jarvis-privacy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: html
          configMap:
            name: jarvis-privacy
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-privacy
  namespace: ai
spec:
  type: ClusterIP
  selector:
    app: jarvis-privacy
  ports:
    - name: http
      port: 80
      targetPort: 80
