---
# Discord selfbot credentials for jarvis-edge.
#
# Pattern mirrors external-secret-ig.yaml in this directory — sources
# from the `bitwarden-fields` ClusterSecretStore (rke2/external-secrets/
# bitwarden-fields-store.yaml), which reads Bitwarden item custom fields
# via the local bitwarden-cli sidecar at bitwarden-cli:8087.
#
# ClusterSecretStore reference:
#   url:      http://bitwarden-cli:8087/object/item/{{ .remoteRef.key }}
#   jsonPath: $.data.fields[?@.name==<property>].value
#
# Bitwarden item: "Discord — JARVIS"
#   UUID: ce926095-35be-4c16-a3b9-d0bf7a39beaf
#   Custom fields consumed here:
#     user_token            — Discord user token (selfbot, NOT a bot token)
#     user_id               — numeric Discord ID of the @hmlbjarvis account
#                              (1508644034401271949) used for the
#                              "is this message from me?" self-loop guard
#     owner_user_id         — Hampton's main account ID
#                              (321477012713635841); always allowed to DM
#     whitelist_server_ids  — comma-separated guild IDs the selfbot is
#                              allowed to react in (184315303323238400)
#   Informational-only fields not pulled here: email, username, password.
#
# Selfbot risk: Discord's ToS technically prohibits user-token automation.
# Hampton accepted the risk on a low-volume, mention-only, owner-DM-only
# selfbot. Mitigations live in jarvis_discord.py (invisible status, no
# scraping, no programmatic guild join/leave, retry backoff on auth
# failure). Apply order:
#   1. kubectl apply -f rke2/ai/jarvis-stack/external-secret-discord.yaml
#   2. kubectl get secret -n ai jarvis-discord-credentials \
#        -o jsonpath='{.data}' — confirm the 4 keys appear.
#   3. kubectl apply -f rke2/ai/jarvis-stack/deployment.yaml
#   4. kubectl rollout restart deploy/jarvis-stack -n ai
#
# Downstream wiring: deployment.yaml → containers[jarvis-edge].env
# (secretKeyRef onto jarvis-discord-credentials, four DISCORD_* vars).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jarvis-discord-credentials
  namespace: ai
  labels:
    external-secrets.io/type: selfbot
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: jarvis-discord-credentials
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_USER_TOKEN
      remoteRef:
        key: ce926095-35be-4c16-a3b9-d0bf7a39beaf
        property: user_token
    - secretKey: DISCORD_USER_ID
      remoteRef:
        key: ce926095-35be-4c16-a3b9-d0bf7a39beaf
        property: user_id
    - secretKey: DISCORD_OWNER_USER_ID
      remoteRef:
        key: ce926095-35be-4c16-a3b9-d0bf7a39beaf
        property: owner_user_id
    - secretKey: DISCORD_WHITELIST_SERVER_IDS
      remoteRef:
        key: ce926095-35be-4c16-a3b9-d0bf7a39beaf
        property: whitelist_server_ids
