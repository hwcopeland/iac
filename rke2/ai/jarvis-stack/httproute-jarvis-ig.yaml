---
# Public ingress for Meta's Instagram webhook callbacks.
#
# Meta only POSTs to a single configured URL per app; we use
# https://ai.hwcopeland.net/ig/webhook . Path prefix /ig/ leaves room for
# future sibling endpoints (/ig/health, /ig/replay) without another route.
#
# The parent Gateway is the same one that fronts every other
# *.hwcopeland.net app — kube-system/hwcopeland-gateway, listener
# `https` (wildcard cert on *.hwcopeland.net).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jarvis-ig
  namespace: ai
spec:
  hostnames:
    - ai.hwcopeland.net
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ig/
      backendRefs:
        - kind: Service
          name: jarvis-edge
          port: 8088
---
# Cloudflare DNS record for ai.hwcopeland.net. Proxied (orange-cloud) so
# the public IP is hidden and the wildcard cert path works the same as
# every other subdomain. Pattern lifted from rke2/web-server/excalidraw/
# dnsrecord.yaml.
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: ai-hwcopeland-net
  namespace: ai
spec:
  name: ai.hwcopeland.net
  type: CNAME
  content: hwcopeland.net
  proxied: true
  ttl: 1
  interval: 5m
