---
# NodePort service for the edge container's audio HTTP server.
# Sonos fetches synthesized WAVs from http://<node-LAN-IP>:30088/turn-*.wav.
# Using NodePort (not hostPort) because Cilium-on-RKE2 doesn't honor
# hostPort chaining by default; NodePort is the cluster-native primitive
# that always works.
apiVersion: v1
kind: Service
metadata:
  name: jarvis-edge-audio
  namespace: ai
spec:
  type: NodePort
  selector:
    app: jarvis-stack
  ports:
    - name: audio-http
      port: 8088
      targetPort: 8088
      nodePort: 30088
      protocol: TCP
