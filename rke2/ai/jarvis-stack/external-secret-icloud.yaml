# iCloud credentials for jarvis-edge.
#
# Pattern matches rke2/monitor/external-secret.yaml (grafana-admin-secret)
# and rke2/longhorn-system/authentik-outpost-secret.yaml — both source
# from the `bitwarden-login` ClusterSecretStore by Bitwarden item ID
# and pull the `.login.username` / `.login.password` fields.
#
# ClusterSecretStore reference:
#   rke2/external-secrets/external-secrets-operator/secretstore.yaml
#   spec.provider.webhook.result.jsonPath = "$.data.login.{{ .remoteRef.property }}"
#
# # TODO: replace the Bitwarden item ID below with the actual ID once
# Hampton creates the "iCloud — JARVIS" login item.
#   Steps for the operator:
#     1. bw create item from a JSON template with:
#          login.username = <Apple ID email>           # # TODO: fill
#          login.password = <iCloud app-specific password>     # generate at appleid.apple.com
#        (or use the Bitwarden web UI — easier)
#     2. Copy the item's UUID into ITEM_ID below.
#     3. kubectl apply -f this file.
#     4. kubectl get secret -n ai jarvis-icloud-credentials   # confirm
#        keys `username` and `password` are populated.
#
# Downstream wiring (NOT in this file — owned by the jarvis-edge agent):
#   deployment.yaml > containers[jarvis-edge].env: add ICLOUD_USERNAME
#   and ICLOUD_PASSWORD using secretKeyRef:{name: jarvis-icloud-credentials,
#   key: username|password}.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jarvis-icloud-credentials
  namespace: ai
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: jarvis-icloud-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        # # TODO: replace with the Bitwarden item UUID. Format is
        # `xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx`. Hampton's existing
        # items can be listed with `bw list items --search jarvis`.
        key: TODO-bitwarden-item-uuid-for-icloud-jarvis
        property: username
    - secretKey: password
      remoteRef:
        key: TODO-bitwarden-item-uuid-for-icloud-jarvis
        property: password
