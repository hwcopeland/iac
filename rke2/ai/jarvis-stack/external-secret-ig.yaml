---
# Instagram / Meta webhook credentials for jarvis-edge.
#
# Pattern matches rke2/game-server/cs2/cs2-server/cs2-secret-external.yaml
# — sources from the `bitwarden-fields` ClusterSecretStore (which reads
# Bitwarden item custom fields via the local bitwarden-cli sidecar at
# bitwarden-cli:8087).
#
# ClusterSecretStore reference:
#   rke2/external-secrets/bitwarden-fields-store.yaml
#   url:      http://bitwarden-cli:8087/object/item/{{ .remoteRef.key }}
#   jsonPath: $.data.fields[?@.name==<property>].value
#
# # TODO: replace the Bitwarden item UUID below with the actual ID once
# Hampton creates the "Instagram — JARVIS" item with these CUSTOM FIELDS:
#     verify_token  = <opaque random hex, shared with Meta webhook config>
#     app_secret    = <from Meta dashboard → App Settings → Basic → App Secret>
#     page_token    = <from Meta dashboard → IG product → Generate Token>
#     meta_app_id   = <numeric Meta App ID>
#     ig_app_id     = <numeric IG Business Account ID>
#     ig_username   = IG account username (e.g. "hmlbjarvis") for the
#                     instagrapi private-mobile-API poller
#     ig_password   = IG account password for the poller
#   Steps:
#     1. bw create item (or use the Bitwarden web UI). Add the fields
#        ABOVE the password section as Custom Fields (type: Text; mark
#        ig_password as "Hidden").
#     2. Copy the item's UUID into ITEM_ID below.
#     3. kubectl apply -f this file.
#     4. kubectl get secret -n ai jarvis-ig-credentials -o jsonpath='{.data}'
#        — confirm all seven keys appear.
#
# Downstream wiring lives in deployment.yaml > containers[jarvis-edge].env
# (secretKeyRef onto jarvis-ig-credentials).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jarvis-ig-credentials
  namespace: ai
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: jarvis-ig-credentials
    creationPolicy: Owner
  data:
    - secretKey: IG_VERIFY_TOKEN
      remoteRef:
        # # TODO: replace with the Bitwarden item UUID for "Instagram — JARVIS".
        # List with: `bw list items --search instagram`.
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: verify_token
    - secretKey: IG_APP_SECRET
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: app_secret
    - secretKey: IG_PAGE_TOKEN
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: page_token
    - secretKey: META_APP_ID
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: meta_app_id
    - secretKey: IG_APP_ID
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: ig_app_id
    # Private-mobile-API credentials for the instagrapi poller
    # (jarvis_ig_polling.py). Separate from the Meta App credentials
    # above — these are the account login for @hmlbjarvis itself.
    - secretKey: IG_USERNAME
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: ig_username
    - secretKey: IG_PASSWORD
      remoteRef:
        key: eedbc61a-cbeb-410a-88ab-01c0cbae19c4
        property: ig_password
