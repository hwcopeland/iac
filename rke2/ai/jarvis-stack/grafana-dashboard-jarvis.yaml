# Dashboard ConfigMap for the JARVIS voice + IG pipeline.
#
# Picked up by the kube-prometheus-stack Grafana sidecar via the
# `grafana_dashboard: "1"` label (searchNamespace: ALL — see
# rke2/monitor/kube-prometheus-stack-values.yaml). Lives in the
# `Voice` Grafana folder via the `grafana_folder` annotation.
#
# Datasources:
#   - prometheus uid "prometheus" — scraped via PodMonitor
#     rke2/ai/jarvis-stack/podmonitor-jarvis-edge.yaml (port 9090, /metrics)
#   - tempo uid "tempo" — Tempo OTLP receiver at
#     tempo.monitor.svc.cluster.local:4317, datasource provisioned
#     by rke2/monitor/tempo/tempo-grafana-datasource.yaml
#
# Sidecar auto-discovers updates to the data: block on each ConfigMap
# update — no Grafana restart needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-voice-pipeline-dashboard
  namespace: ai
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Voice
data:
  jarvis-voice-pipeline.json: |-
    {
      "uid": "jarvis-voice-pipeline",
      "title": "JARVIS — Voice + IG Pipeline",
      "tags": ["voice", "jarvis", "ig", "traces"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": {"from": "now-1h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {
          "type": "row",
          "id": 100,
          "title": "Voice latency at a glance",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Turns (last 1h)",
          "description": "Total voice turns processed in the last hour (sum across all outcome labels).",
          "gridPos": {"x": 0, "y": 1, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_turns_total[1h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "blue"}}}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Per-turn duration — p50 / p95 / p99",
          "description": "Full voice-turn wall clock from jarvis_turn_total_duration_seconds histogram.",
          "gridPos": {"x": 6, "y": 1, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(jarvis_turn_total_duration_seconds_bucket[$__rate_interval])))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(jarvis_turn_total_duration_seconds_bucket[$__rate_interval])))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(jarvis_turn_total_duration_seconds_bucket[$__rate_interval])))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"fillOpacity": 10, "lineWidth": 2}, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 3}, {"color": "red", "value": 5}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Addressed vs ambient drops (1h)",
          "description": "Split of jarvis_turns_total by outcome over the last hour. Addressed = handled, ambient_drop = filtered as background, echo_drop = TTS feedback.",
          "gridPos": {"x": 18, "y": 1, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(increase(jarvis_turns_total{addressed=\"true\"}[1h]))", "legendFormat": "addressed", "refId": "A"},
            {"expr": "sum(increase(jarvis_turns_total{ambient_drop=\"true\"}[1h]))", "legendFormat": "ambient_drop", "refId": "B"},
            {"expr": "sum(increase(jarvis_turns_total{echo_drop=\"true\"}[1h]))", "legendFormat": "echo_drop", "refId": "C"}
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Stage averages — STT / brain / TTS / first-audio",
          "description": "Mean duration per stage computed from histogram sum/count over rate windows. Stacked to show where per-turn budget goes.",
          "gridPos": {"x": 0, "y": 6, "w": 18, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(jarvis_stt_duration_seconds_sum[$__rate_interval])) / clamp_min(sum(rate(jarvis_stt_duration_seconds_count[$__rate_interval])), 1)", "legendFormat": "STT", "refId": "A"},
            {"expr": "sum(rate(jarvis_brain_duration_seconds_sum[$__rate_interval])) / clamp_min(sum(rate(jarvis_brain_duration_seconds_count[$__rate_interval])), 1)", "legendFormat": "Brain", "refId": "B"},
            {"expr": "sum(rate(jarvis_tts_segment_duration_seconds_sum[$__rate_interval])) / clamp_min(sum(rate(jarvis_tts_segment_duration_seconds_count[$__rate_interval])), 1)", "legendFormat": "TTS per segment", "refId": "C"},
            {"expr": "sum(rate(jarvis_sonos_first_audio_seconds_sum[$__rate_interval])) / clamp_min(sum(rate(jarvis_sonos_first_audio_seconds_count[$__rate_interval])), 1)", "legendFormat": "Sonos first-audio", "refId": "D"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"fillOpacity": 30, "lineWidth": 1, "stacking": {"mode": "normal"}}}}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Echo + unknown-speaker drops (1h)",
          "description": "Defensive drops — echo guard catches TTS feedback, unknown-speaker drops are voices that failed enrollment match.",
          "gridPos": {"x": 18, "y": 6, "w": 6, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(increase(jarvis_echo_drops_total[1h]))", "legendFormat": "echo drops", "refId": "A"},
            {"expr": "sum(increase(jarvis_unknown_speaker_drops_total[1h]))", "legendFormat": "unknown speaker", "refId": "B"}
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "orientation": "vertical"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "orange"}}}
        },
        {
          "type": "row",
          "id": 101,
          "title": "IG comment path",
          "gridPos": {"x": 0, "y": 14, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Comment replies (last 24h)",
          "description": "Comment-tag replies sent by the IG comment consumer.",
          "gridPos": {"x": 0, "y": 15, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_ig_comments_replied_total[24h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "purple"}}}
        },
        {
          "id": 11,
          "type": "piechart",
          "title": "DM consumer drop reasons (24h)",
          "description": "Reasons DMs were dropped instead of replied to — unauthenticated, self, non-text, error.",
          "gridPos": {"x": 6, "y": 15, "w": 6, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (reason) (increase(jarvis_ig_consumer_drops_total[24h]))",
            "legendFormat": "{{reason}}",
            "refId": "A"
          }],
          "options": {"legend": {"showLegend": true, "displayMode": "list", "placement": "right"}, "pieType": "donut", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "DM enqueue vs replies — gap = drop rate",
          "description": "Polling messages (DMs enqueued) vs consumer replies. Divergence indicates drops (see drop reasons panel).",
          "gridPos": {"x": 12, "y": 15, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(jarvis_ig_polling_messages_total[$__rate_interval]))", "legendFormat": "enqueued (polling)", "refId": "A"},
            {"expr": "sum(rate(jarvis_ig_consumer_replies_total[$__rate_interval]))", "legendFormat": "replied (consumer)", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 10, "lineWidth": 2}}}
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Authenticated vs unauthenticated comment replies (24h)",
          "description": "Split of jarvis_ig_comments_replied_total by authentication state.",
          "gridPos": {"x": 0, "y": 20, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(increase(jarvis_ig_comments_replied_total{authenticated=\"true\"}[24h]))", "legendFormat": "authenticated", "refId": "A"},
            {"expr": "sum(increase(jarvis_ig_comments_replied_total{authenticated=\"false\"}[24h]))", "legendFormat": "unauthenticated", "refId": "B"}
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "orientation": "horizontal"},
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "type": "row",
          "id": 102,
          "title": "IG DM path",
          "gridPos": {"x": 0, "y": 24, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 20,
          "type": "stat",
          "title": "DMs received (last 1h)",
          "description": "DMs enqueued from polling cycles in the last hour.",
          "gridPos": {"x": 0, "y": 25, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_ig_polling_messages_total[1h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "purple"}}}
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "DM poll cycles by outcome",
          "description": "Rate of polling cycles broken down by outcome label (success / empty / error).",
          "gridPos": {"x": 6, "y": 25, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (outcome) (rate(jarvis_ig_polling_cycles_total[$__rate_interval]))",
            "legendFormat": "{{outcome}}",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "normal"}}}}
        },
        {
          "id": 22,
          "type": "bargauge",
          "title": "DM polling errors by reason (1h)",
          "description": "Count of polling errors grouped by reason label.",
          "gridPos": {"x": 18, "y": 25, "w": 6, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (reason) (increase(jarvis_ig_polling_errors_total[1h]))",
            "legendFormat": "{{reason}}",
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "horizontal", "displayMode": "gradient"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "red"}}}
        },
        {
          "type": "row",
          "id": 103,
          "title": "Brain health",
          "gridPos": {"x": 0, "y": 33, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 30,
          "type": "stat",
          "title": "Brain errors (last 1h)",
          "description": "Total claude CLI errors across all reasons in the last hour.",
          "gridPos": {"x": 0, "y": 34, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_brain_errors_total[1h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}, "color": {"mode": "thresholds"}}}
        },
        {
          "id": 31,
          "type": "barchart",
          "title": "Brain errors by reason (1h)",
          "description": "jarvis_brain_errors_total grouped by reason label — typical reasons: timeout, parse, exit_code, exception.",
          "gridPos": {"x": 6, "y": 34, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (reason) (increase(jarvis_brain_errors_total[1h]))",
            "legendFormat": "{{reason}}",
            "refId": "A"
          }],
          "options": {"legend": {"showLegend": true, "displayMode": "list", "placement": "right"}, "orientation": "horizontal", "xTickLabelRotation": 0},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 32,
          "type": "text",
          "title": "TODO — Local brain fallback rate",
          "description": "Placeholder until jarvis_local_brain_fallbacks_total counter is wired.",
          "gridPos": {"x": 18, "y": 34, "w": 6, "h": 8},
          "options": {
            "mode": "markdown",
            "content": "## TODO\n\nWire `jarvis_local_brain_fallbacks_total` counter in `edge.py` to track how often the brain falls back from cloud claude to a local model.\n\nOnce wired, replace this panel with:\n```\nsum(rate(jarvis_local_brain_fallbacks_total[$__rate_interval]))\n  /\nclamp_min(sum(rate(jarvis_brain_duration_seconds_count[$__rate_interval])), 1)\n```\n\nDisplayed as a percent ratio."
          }
        },
        {
          "type": "row",
          "id": 104,
          "title": "Media + song-id",
          "gridPos": {"x": 0, "y": 42, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 40,
          "type": "stat",
          "title": "Reels downloaded (24h)",
          "description": "DM-shared reels saved successfully in the last 24h (result=\"ok\").",
          "gridPos": {"x": 0, "y": 43, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_ig_media_downloads_total{result=\"ok\"}[24h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "blue"}}}
        },
        {
          "id": 41,
          "type": "stat",
          "title": "Songs identified (24h)",
          "description": "Shazam fingerprint hits in the last 24h.",
          "gridPos": {"x": 6, "y": 43, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_ig_song_id_total{result=\"hit\"}[24h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "green"}}}
        },
        {
          "id": 42,
          "type": "piechart",
          "title": "Song-id outcomes (24h)",
          "description": "Distribution of jarvis_ig_song_id_total result labels — hit / miss / error.",
          "gridPos": {"x": 12, "y": 43, "w": 6, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (result) (increase(jarvis_ig_song_id_total[24h]))",
            "legendFormat": "{{result}}",
            "refId": "A"
          }],
          "options": {"legend": {"showLegend": true, "displayMode": "list", "placement": "right"}, "pieType": "donut", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 43,
          "type": "timeseries",
          "title": "Media downloads by type + result",
          "description": "Rate of jarvis_ig_media_downloads_total split by media_type and result.",
          "gridPos": {"x": 18, "y": 43, "w": 6, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (media_type, result) (rate(jarvis_ig_media_downloads_total[$__rate_interval]))",
            "legendFormat": "{{media_type}} / {{result}}",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 20, "lineWidth": 1}}}
        },
        {
          "id": 44,
          "type": "stat",
          "title": "Webhook signature failures (24h)",
          "description": "Webhook events that failed Meta signature verification. Currently inert (webhook not active) but wired for when it goes live.",
          "gridPos": {"x": 0, "y": 48, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(increase(jarvis_ig_webhook_signature_failures_total[24h]))",
            "instant": true,
            "refId": "A"
          }],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "red", "value": 1}]}, "color": {"mode": "thresholds"}}}
        },
        {
          "id": 45,
          "type": "timeseries",
          "title": "Webhook events by type + status",
          "description": "jarvis_ig_webhook_events_total split by event type and processing status. Inert until webhook is live.",
          "gridPos": {"x": 6, "y": 48, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (type, status) (rate(jarvis_ig_webhook_events_total[$__rate_interval]))",
            "legendFormat": "{{type}} / {{status}}",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 10, "lineWidth": 1}}}
        },
        {
          "type": "row",
          "id": 105,
          "title": "Tempo trace search",
          "gridPos": {"x": 0, "y": 52, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "id": 50,
          "type": "table",
          "title": "Recent jarvis.turn traces",
          "description": "TraceQL search for the most recent voice-turn root spans. Click a row to open the trace in Tempo.",
          "gridPos": {"x": 0, "y": 53, "w": 12, "h": 10},
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{
            "refId": "A",
            "queryType": "traceqlSearch",
            "filters": [
              {"id": "span-name", "tag": "name", "operator": "=", "scope": "span", "value": ["jarvis.turn"], "valueType": "string"}
            ],
            "limit": 20,
            "tableType": "traces"
          }]
        },
        {
          "id": 51,
          "type": "table",
          "title": "Recent jarvis.ig.comment.reply traces",
          "description": "TraceQL search for the most recent IG comment-reply spans.",
          "gridPos": {"x": 12, "y": 53, "w": 12, "h": 10},
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{
            "refId": "A",
            "queryType": "traceqlSearch",
            "filters": [
              {"id": "span-name", "tag": "name", "operator": "=", "scope": "span", "value": ["jarvis.ig.comment.reply"], "valueType": "string"}
            ],
            "limit": 20,
            "tableType": "traces"
          }]
        }
      ]
    }
