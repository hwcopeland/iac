---
# Combined STT + edge daemon on nixos-gpu — single pod, two containers.
# Scaling and rollouts move both together; the edge container hits STT
# over localhost (zero LB hop), Sonos still reaches the audio HTTP
# server via hostPort 8088 on nixos-gpu's LAN interface.
#
# Why one pod, not two:
#   - Both must run on nixos-gpu (whisper-stt = GPU, jarvis-edge = local Yeti).
#   - Tied lifecycle: if STT goes down, the edge can't transcribe anyway.
#   - Avoid the LB round-trip for the highest-traffic call path.
#
# Why not hostNetwork (vs hostPort): keeps whisper-stt reachable via its
# existing LB Service for external callers (the Mac daemon) AND lets the
# edge container expose just :8088 to the host for Sonos. Best of both.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-stack
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate                       # hostPort 8088 prevents 2-on-1-node
  selector:
    matchLabels:
      app: jarvis-stack
  template:
    metadata:
      labels:
        app: jarvis-stack
        # Keep the legacy label so the existing `whisper-stt` Service
        # selector (app: whisper-stt) still picks this pod up.
        app.kubernetes.io/component: jarvis-stack
    spec:
      nodeSelector:
        gpu: rtx3070
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      imagePullSecrets:
        - name: zot-pull-secret
      # hostNetwork so the audio HTTP server (jarvis-edge) binds on the
      # host's enp15s0 (LAN IP 10.0.0.190) — that's the only address
      # Sonos at 10.0.0.187 can route to. Cilium NodePort only binds on
      # the cluster InternalIP (10.41.0.10), unreachable from the LAN.
      # Services for whisper-stt + chatterbox still work because k8s
      # routes Services to hostNetwork pods via their host IP endpoints.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Read-only k8s access (no secrets). See rbac.yaml in this dir.
      serviceAccountName: jarvis-readonly
      initContainers:
        # Seed-only init: if /dst/.credentials.json doesn't exist yet
        # (fresh PVC / first boot / Hampton wiped it), copy from the
        # Secret. Otherwise leave the file alone — claude CLI's OAuth
        # auto-refresh writes back to this same path in-pod, and we
        # want those refreshed tokens to SURVIVE pod restarts. The
        # /dst mount is now PVC-backed (jarvis-state subPath '.claude')
        # so writes persist. No more 8-hour re-auth hell.
        - name: claude-creds-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # The /dst dir lives on jarvis-state (subPath .claude).
              # persona-state-init chowns the parent /state but not this
              # subPath, so we do it here.
              chown 1000:100 /dst || true
              chmod 0700 /dst || true
              if [ -s /dst/.credentials.json ]; then
                echo "claude creds: existing credentials.json found ($(wc -c </dst/.credentials.json) bytes) — preserving in-pod refreshes"
              else
                install -m 0600 /src/claude_credentials.json /dst/.credentials.json
                chown 1000:100 /dst/.credentials.json
                echo "claude creds: seeded from Secret (first boot or post-wipe)"
              fi
          # Run as root so we can chown the kubelet-created PVC subPath
          # to uid 1000. The main container still runs as uid 1000.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: claude-creds-src
              mountPath: /src
              readOnly: true
            - name: jarvis-state
              mountPath: /dst
              subPath: .claude

        # Seed /state/persona.json with the factory defaults on first
        # boot. Idempotent — if a persona.json already exists we leave
        # it alone so user-tuned values survive pod restarts. Runs as
        # uid 1000 so the file is writable by jarvis-edge later.
        - name: persona-state-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # kubelet creates /state owned by root:root; chown so the
              # main container (uid 1000) can write OAuth-refreshed state,
              # speaker-id embeddings, persona tuning, etc.
              chown 1000:100 /state
              chmod 0775 /state
              mkdir -p /state/voices /state/users
              chown 1000:100 /state/voices /state/users
              if [ ! -f /state/persona.json ]; then
                cat > /state/persona.json <<'EOF'
              {
                "humor": 0.5,
                "formality": 0.7,
                "terseness": 0.9,
                "sass": 0.3,
                "tts_exaggeration": 0.7,
                "tts_cfg": 0.4,
                "sonos_volume": 30
              }
              EOF
                chown 1000:100 /state/persona.json
                chmod 0664 /state/persona.json
                echo "persona.json seeded with defaults"
              else
                echo "persona.json already exists — preserving user-tuned values"
              fi
          # Run as root to chown the kubelet-created mountpoint. The
          # main jarvis-edge container still runs as uid 1000 (no
          # elevation there).
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: jarvis-state
              mountPath: /state

      containers:
        # ── STT: GPU faster-whisper ────────────────────────────────
        - name: whisper-stt
          image: zot.hwcopeland.net/ai/whisper-stt:latest
          imagePullPolicy: Always
          ports:
            - name: stt
              containerPort: 8766
          env:
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib:/usr/local/lib/python3.11/site-packages/nvidia/cublas/lib:/usr/local/lib/python3.11/site-packages/nvidia/cudnn/lib"
            - name: HF_HOME
              value: "/models"
            - name: PORT
              value: "8766"
            - name: WHISPER_MODEL
              value: "deepdml/faster-whisper-large-v3-turbo-ct2"
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: WHISPER_COMPUTE
              value: "float16"
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: 3Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 6Gi
          volumeMounts:
            - name: models
              mountPath: /models
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; r=urllib.request.urlopen('http://localhost:8766/health',timeout=5); import json; d=json.loads(r.read()); exit(0 if d.get('model_loaded') else 1)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8766/health',timeout=5)"
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

        # ── TTS: GPU Chatterbox ───────────────────────────────────
        - name: chatterbox-tts
          image: zot.hwcopeland.net/ai/chatterbox-tts:latest
          ports:
            - name: tts
              containerPort: 8765
          env:
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib"
            - name: HF_HOME
              value: "/models-chatterbox"   # separate dir from whisper-stt's /models
            - name: PORT
              value: "8765"
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: 4Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: chatterbox-models
              mountPath: /models-chatterbox
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; r=urllib.request.urlopen('http://localhost:8765/health',timeout=5); import json; d=json.loads(r.read()); exit(0 if d.get('model_loaded') else 1)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8765/health',timeout=5)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

        # Ollama is no longer an in-pod sidecar — it ran as a second
        # ollama on the same GPU as whisper-stt + chatterbox-tts and
        # starved them of VRAM. The local-brain fallback now talks to
        # the standalone Deployment/ollama in this namespace (see
        # rke2/ai/ollama/), which is the same instance Open WebUI uses.

        # ── Edge daemon: wake → cluster STT → TTS → Sonos ─────────
        - name: jarvis-edge
          image: zot.hwcopeland.net/ai/jarvis-edge:latest
          imagePullPolicy: Always
          # HOME=/tmp is ephemeral, so claude's config (~/.claude.json) is lost
          # on every restart and the brain errors "config not found" → "I lost
          # my connection" until restored. The .claude DIR (incl. backups) IS
          # PVC-backed, so restore the newest backup SYNCHRONOUSLY here, before
          # edge.py serves a single turn (a postStart hook races the first turn).
          command: ["sh", "-c"]
          args:
            - |
              BK=$(ls -t /tmp/.claude/backups/.claude.json.backup.* 2>/dev/null | head -1)
              [ -n "$BK" ] && [ ! -s /tmp/.claude.json ] && cp "$BK" /tmp/.claude.json
              exec python -u edge.py
          ports:
            - name: audio-http
              containerPort: 8088
              protocol: TCP
              # No hostPort — Cilium-on-RKE2 doesn't honor it reliably.
              # Exposed to the LAN via the jarvis-edge-audio NodePort
              # Service (nodePort 30088 → containerPort 8088).
            - name: metrics
              # edge.py binds prometheus_client.start_http_server(9090).
              # Declaring the port (named) lets the jarvis-edge PodMonitor
              # target it by name so the prometheus-operator generates a
              # scrape endpoint (a numeric-only targetPort with no matching
              # containerPort yields dropped targets under hostNetwork).
              containerPort: 9090
              protocol: TCP
          securityContext:
            # Run as the user that owns /run/user/1000 (PipeWire socket).
            # The pulse socket at /run/user/1000/pulse/native is
            # world-writable per host briefing, so no extra group needed.
            runAsUser: 1000
            runAsGroup: 100
          env:
            # Claude Max headless token (1yr). Value lives ONLY in the
            # jarvis-claude-token cluster Secret (ESO/Vaultwarden) — never here.
            # Without this the brain 401s on every turn.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jarvis-claude-token
                  key: token
            # iCloud CalDAV (Calendar + Reminders). Values ONLY in the
            # jarvis-icloud-credentials cluster Secret. Names must match
            # jarvis_personal.py _caldav() (ICLOUD_APPLE_ID / ICLOUD_APP_PASSWORD).
            - name: ICLOUD_CALDAV_URL
              value: "https://caldav.icloud.com"
            - name: ICLOUD_APPLE_ID
              valueFrom:
                secretKeyRef:
                  name: jarvis-icloud-credentials
                  key: username
            - name: ICLOUD_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-icloud-credentials
                  key: password
            # Local timezone so the SONOS day/night volume schedule resolves
            # against local hours (else the container is UTC).
            - name: TZ
              value: "America/Chicago"
            - name: TTS_CFG
              value: "0.4"
            # STT hits the sibling container over the shared pod localhost.
            - name: STT_URL
              value: "http://localhost:8766"
            - name: TTS_URL
              value: "http://localhost:8765"     # sibling container in same pod
            - name: SONOS_IP
              value: "10.0.0.187"          # Bedroom Play:1
            - name: SONOS_VOLUME
              value: "30"
            # Time-of-day volume: 45 during the day, 30 at night (8pm-7am local).
            - name: SONOS_VOLUME_DAY
              value: "45"
            - name: SONOS_VOLUME_NIGHT
              value: "30"
            - name: SONOS_NIGHT_START_HOUR
              value: "20"
            - name: SONOS_NIGHT_END_HOUR
              value: "7"
            - name: EDGE_HTTP_PORT
              value: "8088"
            # With hostNetwork the listener binds on the host's interfaces
            # directly, so the URL we hand Sonos uses the same port (8088).
            - name: EDGE_ADVERTISED_PORT
              value: "8088"
            # nixos-gpu's LAN IP (true IP, not the 10.41.0.10 cluster VIP)
            # — Sonos is on 10.0.0.0/24 and can only route to this one.
            - name: EDGE_HOST_IP
              value: "10.0.0.190"
            # Shared secret for the /voice/ingest mesh endpoint (Mac thin
            # client → edge gate). optional:true so the pod starts without it;
            # the endpoint 403s (inert) until the secret exists. Activate with:
            #   kubectl -n ai create secret generic jarvis-edge-ingest \
            #     --from-literal=token=$(openssl rand -hex 32)
            # then put the SAME token in the Mac's ~/.openjarvis/config.toml
            # under [edge] token (+ ingest_url = http://10.0.0.190:8088/voice/ingest).
            - name: EDGE_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jarvis-edge-ingest
                  key: token
                  optional: true
            - name: XDG_RUNTIME_DIR
              value: "/run/user/1000"
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            - name: MIC_NAME
              value: "yeti"
            - name: BRAIN_MODE
              value: "claude"
            - name: HOME
              value: "/tmp"           # so ~/.openjarvis/config.toml + ~/.claude/.credentials.json resolve
            # No ANTHROPIC_API_KEY env — we run claude in SUBSCRIPTION
            # mode (Claude Max). claude CLI reads ~/.claude/.credentials.json
            # which the init container populates from the jarvis-secrets
            # Secret. The Mac daemon's _claude_brain explicitly pops this
            # env var; we just don't set it.

            # ── Local brain (Ollama) fallback ────────────────────────
            # When Claude refuses or fails, _local_brain_fallback falls
            # back to this. Standalone ollama Deployment in this namespace (same
            # instance Open WebUI uses). Model picked from what's
            # locally pulled and supported by the installed ollama
            # binary — gemma-4 was unsupported (unknown arch 'gemma4')
            # so we use qwen3:8b which loads cleanly on the 3070.
            - name: LOCAL_BRAIN_URL
              value: "http://ollama.ai.svc.cluster.local:11434"
            - name: LOCAL_BRAIN_MODEL
              value: "qwen3:8b"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: user-runtime
              mountPath: /run/user/1000
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
            # config.toml from the Secret — jarvis_personal et al. read
            # ~/.openjarvis/config.toml for their settings.
            - name: jarvis-config
              mountPath: /tmp/.openjarvis
              readOnly: true
            # Claude subscription creds — writable AND durable. Backed
            # by the jarvis-state PVC via subPath so OAuth-refreshed
            # tokens survive pod restarts (no more 8h re-auth grind).
            - name: jarvis-state
              mountPath: /tmp/.claude
              subPath: .claude
            # Persistent persona state — humor/formality/terseness/sass/
            # TTS/Sonos knobs, live-tunable by voice via the persona MCP.
            - name: jarvis-state
              mountPath: /state
            # TODO: re-enable jarvis-media volume once Synology CSI driver
            # is deployed on nixos-gpu (currently only present on the
            # plex-system / game-server nodes). For now, reels download
            # to /state/reels (hostPath PVC) via subPath so we don't
            # block the pod start. Saves to /state instead of /media/reels.
            - name: jarvis-state
              mountPath: /media/reels
              subPath: reels

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: whisper-models
        - name: chatterbox-models
          persistentVolumeClaim:
            claimName: chatterbox-models
        - name: opengl-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
        - name: user-runtime
          hostPath:
            path: /run/user/1000
            type: Directory
        - name: jarvis-config
          secret:
            secretName: jarvis-secrets
            items:
              - key: config.toml
                path: config.toml
                mode: 0444   # readable by uid 1000 (Secret default owner is root)
        # Read-only source for the init container; main container never
        # mounts this directly (uses claude-home / emptyDir instead).
        - name: claude-creds-src
          secret:
            secretName: jarvis-secrets
            items:
              - key: claude_credentials.json
                path: claude_credentials.json
                mode: 0444   # readable by uid 1000 (Secret default owner is root)
        # (claude-home emptyDir removed — claude CLI's creds now live on
        # jarvis-state PVC at subPath '.claude' so OAuth-refreshed tokens
        # survive pod restarts.)
        # Persistent state on nixos-gpu hostPath (see pvc.yaml). Survives
        # pod restarts so persona tuning ("less humor", "volume 45") stays.
        - name: jarvis-state
          persistentVolumeClaim:
            claimName: jarvis-state
        # (jarvis-media Synology volume removed — Synology CSI driver
        # isn't deployed on nixos-gpu. Reels temporarily co-locate on
        # jarvis-state PVC under subPath 'reels'. See pvc-jarvis-media.yaml
        # — PVC still exists, just not mounted.)
