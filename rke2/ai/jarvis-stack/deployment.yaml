---
# Combined STT + edge daemon on nixos-gpu — single pod, two containers.
# Scaling and rollouts move both together; the edge container hits STT
# over localhost (zero LB hop), Sonos still reaches the audio HTTP
# server via hostPort 8088 on nixos-gpu's LAN interface.
#
# Why one pod, not two:
#   - Both must run on nixos-gpu (whisper-stt = GPU, jarvis-edge = local Yeti).
#   - Tied lifecycle: if STT goes down, the edge can't transcribe anyway.
#   - Avoid the LB round-trip for the highest-traffic call path.
#
# Why not hostNetwork (vs hostPort): keeps whisper-stt reachable via its
# existing LB Service for external callers (the Mac daemon) AND lets the
# edge container expose just :8088 to the host for Sonos. Best of both.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-stack
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate                       # hostPort 8088 prevents 2-on-1-node
  selector:
    matchLabels:
      app: jarvis-stack
  template:
    metadata:
      labels:
        app: jarvis-stack
        # Keep the legacy label so the existing `whisper-stt` Service
        # selector (app: whisper-stt) still picks this pod up.
        app.kubernetes.io/component: jarvis-stack
    spec:
      nodeSelector:
        gpu: rtx3070
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      imagePullSecrets:
        - name: zot-pull-secret
      # hostNetwork so the audio HTTP server (jarvis-edge) binds on the
      # host's enp15s0 (LAN IP 10.0.0.190) — that's the only address
      # Sonos at 10.0.0.187 can route to. Cilium NodePort only binds on
      # the cluster InternalIP (10.41.0.10), unreachable from the LAN.
      # Services for whisper-stt + chatterbox still work because k8s
      # routes Services to hostNetwork pods via their host IP endpoints.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Read-only k8s access (no secrets). See rbac.yaml in this dir.
      serviceAccountName: jarvis-readonly
      initContainers:
        # Copy the (read-only) Secret-mounted credentials.json into a
        # writable emptyDir so claude CLI can refresh its OAuth tokens
        # in place. The Secret stays the source of truth; we re-init
        # from it on every pod start. If claude refreshes during a
        # pod's lifetime, those refreshed tokens are lost on next
        # restart — acceptable trade-off for a homelab.
        - name: claude-creds-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              install -m 0600 /src/claude_credentials.json /dst/.credentials.json
              echo "claude creds installed to /dst/.credentials.json"
          securityContext:
            runAsUser: 1000
            runAsGroup: 100
          volumeMounts:
            - name: claude-creds-src
              mountPath: /src
              readOnly: true
            - name: claude-home
              mountPath: /dst

      containers:
        # ── STT: GPU faster-whisper ────────────────────────────────
        - name: whisper-stt
          image: zot.hwcopeland.net/ai/whisper-stt:latest
          imagePullPolicy: Always
          ports:
            - name: stt
              containerPort: 8766
          env:
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib:/usr/local/lib/python3.11/site-packages/nvidia/cublas/lib:/usr/local/lib/python3.11/site-packages/nvidia/cudnn/lib"
            - name: HF_HOME
              value: "/models"
            - name: PORT
              value: "8766"
            - name: WHISPER_MODEL
              value: "deepdml/faster-whisper-large-v3-turbo-ct2"
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: WHISPER_COMPUTE
              value: "float16"
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: 3Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 6Gi
          volumeMounts:
            - name: models
              mountPath: /models
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; r=urllib.request.urlopen('http://localhost:8766/health',timeout=5); import json; d=json.loads(r.read()); exit(0 if d.get('model_loaded') else 1)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8766/health',timeout=5)"
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

        # ── TTS: GPU Chatterbox ───────────────────────────────────
        - name: chatterbox-tts
          image: zot.hwcopeland.net/ai/chatterbox-tts:latest
          ports:
            - name: tts
              containerPort: 8765
          env:
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib"
            - name: HF_HOME
              value: "/models-chatterbox"   # separate dir from whisper-stt's /models
            - name: PORT
              value: "8765"
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: 4Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: chatterbox-models
              mountPath: /models-chatterbox
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; r=urllib.request.urlopen('http://localhost:8765/health',timeout=5); import json; d=json.loads(r.read()); exit(0 if d.get('model_loaded') else 1)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8765/health',timeout=5)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

        # ── Edge daemon: wake → cluster STT → TTS → Sonos ─────────
        - name: jarvis-edge
          image: zot.hwcopeland.net/ai/jarvis-edge:latest
          imagePullPolicy: Always
          ports:
            - name: audio-http
              containerPort: 8088
              protocol: TCP
              # No hostPort — Cilium-on-RKE2 doesn't honor it reliably.
              # Exposed to the LAN via the jarvis-edge-audio NodePort
              # Service (nodePort 30088 → containerPort 8088).
          securityContext:
            # Run as the user that owns /run/user/1000 (PipeWire socket).
            # The pulse socket at /run/user/1000/pulse/native is
            # world-writable per host briefing, so no extra group needed.
            runAsUser: 1000
            runAsGroup: 100
          env:
            # STT hits the sibling container over the shared pod localhost.
            - name: STT_URL
              value: "http://localhost:8766"
            - name: TTS_URL
              value: "http://localhost:8765"     # sibling container in same pod
            - name: SONOS_IP
              value: "10.0.0.187"          # Bedroom Play:1
            - name: SONOS_VOLUME
              value: "40"
            - name: EDGE_HTTP_PORT
              value: "8088"
            # With hostNetwork the listener binds on the host's interfaces
            # directly, so the URL we hand Sonos uses the same port (8088).
            - name: EDGE_ADVERTISED_PORT
              value: "8088"
            # nixos-gpu's LAN IP (true IP, not the 10.41.0.10 cluster VIP)
            # — Sonos is on 10.0.0.0/24 and can only route to this one.
            - name: EDGE_HOST_IP
              value: "10.0.0.190"
            - name: XDG_RUNTIME_DIR
              value: "/run/user/1000"
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            - name: MIC_NAME
              value: "yeti"
            - name: BRAIN_MODE
              value: "claude"
            - name: HOME
              value: "/tmp/jarvis-home"           # so ~/.openjarvis/config.toml + ~/.claude/.credentials.json resolve
            # No ANTHROPIC_API_KEY env — we run claude in SUBSCRIPTION
            # mode (Claude Max). claude CLI reads ~/.claude/.credentials.json
            # which the init container populates from the jarvis-secrets
            # Secret. The Mac daemon's _claude_brain explicitly pops this
            # env var; we just don't set it.
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: user-runtime
              mountPath: /run/user/1000
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
            # config.toml from the Secret — jarvis_tv.py reads ~/.openjarvis/
            - name: jarvis-config
              mountPath: /tmp/jarvis-home/.openjarvis
              readOnly: true
            # Claude subscription creds — writable so OAuth refresh works.
            - name: claude-home
              mountPath: /tmp/jarvis-home/.claude

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: whisper-models
        - name: chatterbox-models
          persistentVolumeClaim:
            claimName: chatterbox-models
        - name: opengl-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
        - name: user-runtime
          hostPath:
            path: /run/user/1000
            type: Directory
        - name: jarvis-config
          secret:
            secretName: jarvis-secrets
            items:
              - key: config.toml
                path: config.toml
                mode: 0444   # readable by uid 1000 (Secret default owner is root)
              - key: spotify_tokens.json
                path: spotify_tokens.json
                mode: 0444   # readable by uid 1000 (Secret default owner is root)
        # Read-only source for the init container; main container never
        # mounts this directly (uses claude-home / emptyDir instead).
        - name: claude-creds-src
          secret:
            secretName: jarvis-secrets
            items:
              - key: claude_credentials.json
                path: claude_credentials.json
                mode: 0444   # readable by uid 1000 (Secret default owner is root)
        # Writable home for claude CLI's creds + cache; OAuth refresh
        # writes back here in-pod. Lost on pod restart — init container
        # re-seeds from the Secret.
        - name: claude-home
          emptyDir: {}
