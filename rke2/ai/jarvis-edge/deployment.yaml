---
# JARVIS edge satellite on nixos-gpu.
# Uses the host's user-PipeWire (uid 1000) for the Yeti USB mic and serves
# WAV bytes to the LAN Sonos Play:1 (Bedroom = 10.0.0.187) over the host's
# LAN interface via hostNetwork.
#
# No /dev/snd mount — that takes the exclusive ALSA lock and breaks
# Discord on the host. We go through pipewire-pulse (libpulse → unix
# socket at /run/user/1000/pulse/native), which mixes with any other
# host user (Discord, etc.) cleanly.
#
# No GPU — STT runs in whisper-stt (separate service), brain stub is
# local echo, openWakeWord is CPU-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-edge
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate  # hostNetwork pod can't run two at once on the same node
  selector:
    matchLabels:
      app: jarvis-edge
  template:
    metadata:
      labels:
        app: jarvis-edge
    spec:
      nodeSelector:
        kubernetes.io/hostname: nixos-gpu
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostNetwork: true                 # so Sonos can fetch http://10.0.0.190:8088/turn-*.wav
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: zot-pull-secret
      securityContext:
        # Run as the user that owns /run/user/1000 (PipeWire socket).
        # 'users' group (gid 100) is the default NixOS user group.
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        supplementalGroups: [29]        # 'audio' on Debian; harmless if absent
      containers:
        - name: jarvis-edge
          image: zot.hwcopeland.net/ai/jarvis-edge:latest
          imagePullPolicy: Always
          ports:
            - name: audio-http
              containerPort: 8088
              hostPort: 8088
              protocol: TCP
          env:
            - name: STT_URL
              value: "http://10.44.0.20:8766"
            - name: TTS_URL
              value: "http://10.44.0.8:8765"
            - name: SONOS_IP
              value: "10.0.0.187"        # Bedroom Play:1
            - name: SONOS_VOLUME
              value: "60"
            - name: EDGE_HTTP_PORT
              value: "8088"
            # Auto-detect (kernel route to Sonos) gives the host's LAN IP
            # since we're on hostNetwork — should pick enp15s0 / 10.0.0.190.
            # Override here if it picks the wrong interface.
            # - name: EDGE_HOST_IP
            #   value: "10.0.0.190"
            - name: XDG_RUNTIME_DIR
              value: "/run/user/1000"
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            # Optional: MIC_NAME=yeti to disambiguate if multiple USB
            # audio devices show up on the host.
            - name: MIC_NAME
              value: "yeti"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            # PipeWire user-session runtime dir — socket lives here.
            # Read-write because libpulse writes its session cookie.
            - name: user-runtime
              mountPath: /run/user/1000
            # NixOS shared library loader needs /nix/store mounted RO
            # so /run/opengl-driver/lib/* (referenced by some host libs)
            # can resolve. Not strictly needed for pure-Python edge but
            # cheap insurance for any C extension that ldd's into nix.
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
      volumes:
        - name: user-runtime
          hostPath:
            path: /run/user/1000
            type: Directory
        - name: nix-store
          hostPath:
            path: /nix/store
            type: Directory
