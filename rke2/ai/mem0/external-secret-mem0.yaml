---
# NO ExternalSecret / dedicated key for mem0 extraction anymore.
#
# mem0's extraction LLM is now xAI Grok (grok-3-mini), and it REUSES the xAI key
# that already exists in this same `ai` namespace: the `homelab-bot-credentials`
# Secret's `XAI_API_KEY` field (see rke2/ai/homelab-bot/deployment.yaml, which
# runs grok-3-mini off that same key). There is exactly ONE xAI key in the
# cluster — no new key, no new Bitwarden item, no new spend.
#
# Consequences:
#   * This file no longer defines an object. The mem0 Deployment pulls
#     XAI_API_KEY straight from `homelab-bot-credentials` via secretKeyRef
#     (same namespace, so no cross-namespace mirroring is needed).
#   * The old `mem0-anthropic-credentials` ExternalSecret/Secret is GONE. If a
#     previous deploy created it, delete it: `kubectl -n ai delete secret
#     mem0-anthropic-credentials externalsecret/mem0-anthropic-credentials
#     --ignore-not-found`.
#
# How `homelab-bot-credentials` is provisioned (today): it is a MANUAL/static
# Secret created by hand, NOT ESO-managed (see rke2/ai/homelab-bot/README.md).
# It is NOT backed by a Bitwarden item, so there is no Bitwarden UUID to
# reference here. The live Secret must carry the `XAI_API_KEY` key:
#
#     kubectl -n ai create secret generic homelab-bot-credentials \
#         --from-literal=DISCORD_BOT_TOKEN='<bot-token>' \
#         --from-literal=XAI_API_KEY='<xai-grok-key>' \
#         --from-literal=OWNER_USER_ID='<your-discord-user-id>'
#
# If/when homelab-bot's secret is migrated to a Bitwarden-backed ExternalSecret,
# mem0 will keep working unchanged — it just consumes the resulting Secret.
#
# FUTURE (optional) — if you ever want mem0's xAI key isolated from homelab-bot
# (separate rotation / separate spend visibility), recreate an ExternalSecret
# here that targets a Bitwarden item exposing `api_key` as `XAI_API_KEY`, then
# repoint the Deployment's secretKeyRef.name back at it. Not done now: the whole
# point of this change was to consolidate onto the single existing xAI key.
