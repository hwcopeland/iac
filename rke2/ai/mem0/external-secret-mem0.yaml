---
# Anthropic API key for mem0's extraction LLM (see phase6-mem0.md "Extraction
# LLM decision"). This is a DEDICATED, scoped API key used ONLY by the mem0
# server to run fact-extraction on each add() — it is NOT the subscription
# OAuth the edge brain uses. The edge brain stays on ~/.claude/.credentials.json;
# mem0 cannot consume that, so it gets its own key.
#
# Cost: extraction runs on Haiku 4.5. At ~50 owner turns/day this is ~$4/mo;
# at 200 turns/day ~$16/mo. Trivial vs. the value of persistent memory.
#
# Sources from the `bitwarden-fields` ClusterSecretStore (custom-field reader),
# same pattern as jarvis-stack/external-secret-ig.yaml.
#
# # TODO: Hampton — create a Bitwarden item "Anthropic — JARVIS mem0" with a
# CUSTOM FIELD:
#     api_key = <a NEW Anthropic Console API key, scoped/named "jarvis-mem0">
# Then paste its UUID into ITEM_ID below and apply. Keep this key separate from
# any other ANTHROPIC_API_KEY so it can be rotated/revoked independently and so
# its spend shows up isolated in the Anthropic Console.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0-anthropic-credentials
  namespace: ai
  labels:
    component: jarvis-mem0
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: mem0-anthropic-credentials
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        # # TODO: replace with the Bitwarden item UUID for "Anthropic — JARVIS mem0".
        # List with: `bw list items --search "Anthropic"`.
        key: REPLACE-WITH-BITWARDEN-ITEM-UUID
        property: api_key
