---
# Cluster-internal Service for Qdrant. ClusterIP only — Qdrant is never
# exposed via LoadBalancer/HTTPRoute. The only client is the mem0 server,
# reaching it at qdrant.ai.svc.cluster.local:6333.
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: ai
  labels:
    app: qdrant
    component: jarvis-mem0
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
