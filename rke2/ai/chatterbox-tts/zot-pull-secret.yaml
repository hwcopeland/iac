---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-pull-secret
  namespace: ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: zot-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"zot.hwcopeland.net":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: username
    - secretKey: password
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: password
