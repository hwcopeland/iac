---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatterbox-tts
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatterbox-tts
  template:
    metadata:
      labels:
        app: chatterbox-tts
    spec:
      nodeSelector:
        gpu: rtx3070
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: chatterbox-tts
          image: zot.hwcopeland.net/ai/chatterbox-tts:latest
          ports:
            - containerPort: 8765
          env:
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib"
            - name: HF_HOME
              value: "/models"
            - name: PORT
              value: "8765"
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: 4Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /models
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: chatterbox-models
        - name: opengl-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
