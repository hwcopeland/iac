---
# ImageUpdateAutomation for kai.
# Watches all ImagePolicies in the kai namespace and commits updated image tags
# back to main via the tooling GitRepository. The [ci skip] prefix prevents
# the CI build-kai.yml workflow from triggering on the automation commit.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: kai
  namespace: kai
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: tooling
    namespace: tooling
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        [ci skip] auto-update kai
    push:
      branch: main
  update:
    path: ./rke2/kai/flux/k8s-jobs
    strategy: Setters
