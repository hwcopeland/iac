---
# ExternalSecret: kai-secrets
# Pulls application secrets from Bitwarden via ClusterSecretStore bitwarden-login.
# Replace remoteRef.key values with real Bitwarden item UUIDs before first apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kai-secrets
  namespace: kai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: kai-secrets
    creationPolicy: Owner
  data:
    # DATABASE_URL: full postgres DSN — Bitwarden item: kai-db-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: kai-db-url          # TODO: replace with Bitwarden item UUID
        property: password
    # AUTH_CLIENT_ID: Authentik OIDC client_id — Bitwarden item: kai-auth-client-id
    - secretKey: AUTH_CLIENT_ID
      remoteRef:
        key: kai-auth-client-id  # TODO: replace with Bitwarden item UUID
        property: password
    # AUTH_CLIENT_SECRET: Authentik OIDC client_secret — Bitwarden item: kai-auth-client-secret
    - secretKey: AUTH_CLIENT_SECRET
      remoteRef:
        key: kai-auth-client-secret  # TODO: replace with Bitwarden item UUID
        property: password
    # SESSION_SECRET: random 256-bit session signing key — Bitwarden item: kai-session-secret
    - secretKey: SESSION_SECRET
      remoteRef:
        key: kai-session-secret  # TODO: replace with Bitwarden item UUID
        property: password
