---
# ExternalSecret: kai-secrets
# Pulls application secrets from Bitwarden via ClusterSecretStore bitwarden-login.
# Replace remoteRef.key values with real Bitwarden item UUIDs before first apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kai-secrets
  namespace: kai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: kai-secrets
    creationPolicy: Owner
  data:
    # DATABASE_URL: full postgres DSN — Bitwarden item: kai-db-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: a3be6f29-ff58-4cf1-b279-00b8159080db
        property: password
    # AUTH_CLIENT_ID: Authentik OIDC client_id — Bitwarden item: kai-auth-client-id
    - secretKey: AUTH_CLIENT_ID
      remoteRef:
        key: 43fb83b6-356a-49e3-a44c-3f6830e1ade2
        property: password
    # AUTH_CLIENT_SECRET: Authentik OIDC client_secret — Bitwarden item: kai-auth-client-secret
    - secretKey: AUTH_CLIENT_SECRET
      remoteRef:
        key: f577801b-6432-4449-a4f7-20add9e8ceb2
        property: password
    # XAI_API_KEY: xAI API key for Grok models — Bitwarden item: kai-xai-api-key
    - secretKey: XAI_API_KEY
      remoteRef:
        key: ae2fa172-7f02-41e6-aed5-340eb43e94a6
        property: password
