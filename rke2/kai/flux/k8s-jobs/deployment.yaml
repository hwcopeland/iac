# Deployment for kai-api — Go backend for the Kai multi-agent platform.
# Image tag is managed by Flux ImageUpdateAutomation (policy: kai:kai-api).
# Env vars split between ConfigMap kai-config (non-sensitive) and
# Secret kai-secrets (sensitive, synced via ExternalSecret).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kai-api
  namespace: kai
  labels:
    app.kubernetes.io/name: kai-api
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kai-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kai-api
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: kai
      imagePullSecrets:
        - name: zot-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kai-api
          image: zot.hwcopeland.net/kai/kai-api:build-000009-7cb2941 # {"$imagepolicy": "kai:kai-api"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kai-secrets
                  key: DATABASE_URL
            - name: AUTH_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: kai-config
                  key: AUTH_ISSUER_URL
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kai-secrets
                  key: AUTH_CLIENT_ID
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kai-secrets
                  key: AUTH_CLIENT_SECRET
            - name: AUTH_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  name: kai-config
                  key: AUTH_REDIRECT_URL
            - name: LISTEN_ADDR
              valueFrom:
                configMapKeyRef:
                  name: kai-config
                  key: LISTEN_ADDR
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: kai-secrets
                  key: SESSION_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
