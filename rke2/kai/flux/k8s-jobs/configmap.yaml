---
# Non-sensitive configuration for kai-api.
# Sensitive values (DATABASE_URL, AUTH_CLIENT_ID, AUTH_CLIENT_SECRET, SESSION_SECRET)
# are in the kai-secrets ExternalSecret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kai-config
  namespace: kai
data:
  AUTH_ISSUER_URL: "https://auth.hwcopeland.net/application/o/kai/"
  AUTH_CALLBACK_URL: "https://kai.hwcopeland.net/api/auth/callback"
  LISTEN_ADDR: ":8080"
