# Flux kustomize-controller uses --load-restrictor LoadRestrictionsNone, which allows
# references to resources outside this directory (e.g. ../../crd/). Running
# `kubectl kustomize .` locally requires the same flag:
#   kubectl kustomize --load-restrictor LoadRestrictionsNone .
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CRD first — operator and RBAC that reference AgentSandbox must come after
  - ../../crd/agentsandbox-crd.yaml
  # Namespace
  - namespace.yaml
  # RBAC — ServiceAccount, ClusterRole, ClusterRoleBinding
  - rbac.yaml
  # Configuration
  - configmap.yaml
  # Secrets (ExternalSecret → bitwarden-login ClusterSecretStore)
  - external-secret.yaml
  - postgres-secret.yaml
  # Registry pull secret — managed here; omit if image-automation Kustomization
  # owns zot-pull-secret in kai ns to avoid ExternalSecret owner conflict.
  - zot-pull-secret.yaml
  # Data layer
  - postgres.yaml
  # Application
  - deployment.yaml
  - service.yaml
  # Ingress
  - httproute.yaml
  # DNS
  - dnsrecord.yaml
