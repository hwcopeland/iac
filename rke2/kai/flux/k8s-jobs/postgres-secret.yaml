---
# ExternalSecret: kai-postgres-secret
# Provides POSTGRES_PASSWORD from Bitwarden; POSTGRES_DB and POSTGRES_USER
# are injected as literals via the ExternalSecret template engine.
# Replace remoteRef.key with the real Bitwarden item UUID before first apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kai-postgres-secret
  namespace: kai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: kai-postgres-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_DB: "kai"
        POSTGRES_USER: "kai"
        POSTGRES_PASSWORD: "{{ .pgPassword }}"
  data:
    # Bitwarden item: kai-db-password — password field holds the PostgreSQL superuser password
    - secretKey: pgPassword
      remoteRef:
        key: kai-db-password    # TODO: replace with Bitwarden item UUID
        property: password
