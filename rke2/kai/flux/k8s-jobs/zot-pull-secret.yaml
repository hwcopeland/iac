---
# ExternalSecret: zot-pull-secret (kai namespace)
# Provides kubernetes.io/dockerconfigjson credentials for zot.hwcopeland.net.
# Uses the same Bitwarden item as chem/image-automation (UUID: 766ec5c7-6aa8-419d-bb27-e5982872bc5b).
# Managed independently so the image-automation Kustomization controls it without
# conflicting with the k8s-jobs Kustomization owner. If deploying k8s-jobs standalone
# (without Flux), add this file back to kustomization.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-pull-secret
  namespace: kai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: zot-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"zot.hwcopeland.net":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: username
    - secretKey: password
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: password
