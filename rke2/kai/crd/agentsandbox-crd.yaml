# AgentSandbox CRD — Kai AI Agent Platform
# Phase: Pending → Running → Terminating → Terminated
# Follows the DockingJob CRD pattern at rke2/chem/flux/k8s-jobs/crd/dockingjob-crd.yaml.
# Source of truth: docs/tdd/kai-sandbox-crd.md §2
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentsandboxes.kai.hwcopeland.net
spec:
  group: kai.hwcopeland.net
  names:
    kind: AgentSandbox
    listKind: AgentSandboxList
    plural: agentsandboxes
    singular: agentsandbox
    shortNames:
      - asb
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}           # enables status sub-resource (patch status without full update)
      additionalPrinterColumns:
        - name: Role
          type: string
          jsonPath: .spec.agentRole
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image, agentRole, runId, teamId]
              properties:
                image:
                  type: string
                  description: "Agent container image, e.g. zot.hwcopeland.net/kai/kai-agent:build-000042-abc1234"
                agentRole:
                  type: string
                  enum: [planner, researcher, coder_1, coder_2, reviewer]
                runId:
                  type: string
                  description: "UUID of the parent team_run"
                teamId:
                  type: string
                  description: "UUID of the owning team"
                timeoutSeconds:
                  type: integer
                  default: 1800
                  minimum: 60
                  maximum: 86400
                workspaceClaimName:
                  type: string
                  description: "Name of the shared workspace PVC for this run"
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:    { type: string, default: "500m" }
                        memory: { type: string, default: "1Gi" }
                    limits:
                      type: object
                      properties:
                        cpu:    { type: string, default: "2" }
                        memory: { type: string, default: "4Gi" }
                env:
                  type: array
                  items:
                    type: object
                    required: [name, value]
                    properties:
                      name:  { type: string }
                      value: { type: string }
                envFrom:
                  type: array
                  description: "SecretRef sources for env vars (e.g. LiteLLM API key)"
                  items:
                    type: object
                    properties:
                      secretRef:
                        type: object
                        properties:
                          name: { type: string }
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Terminating, Terminated]
                  default: Pending
                podRef:
                  type: string
                  description: "Name of the managed Pod"
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                message:
                  type: string
                  description: "Human-readable status or error message"
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:               { type: string }
                      status:             { type: string, enum: [True, False, Unknown] }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
