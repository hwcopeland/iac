apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # NOTE: rbac.yaml and deployment.yaml were removed — those resources migrated to
  # rke2/chem/khemeia/deploy/ (khemeia-controller in the chem namespace).
  # The legacy docking-controller manifests that used to live here targeted the
  # default namespace and are no longer valid.
  - config/result-writer-deployment.yaml
  - config/mysql.yaml
  - config/mysql-secret.yaml
  - config/flux-webhook-secret.yaml
  - config/flux-webhook-receiver.yaml
  # zot-pull-secret is managed by the image-automation Kustomization (zot-image-pull-secret.yaml).
  # It is present in this directory as a reference copy but not listed here to avoid a
  # duplicate ExternalSecret owner conflict between the two Kustomizations.
  # If you deploy k8s-jobs standalone (without Flux), add zot-pull-secret.yaml back.
