---
# Flux webhook receiver token for triggering reconciliation from CI.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-webhook-token
  namespace: tooling
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: flux-webhook-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: 974dc716-ba79-4eb2-bed8-a505ad66d6f7
        property: password
