---
# MySQL root password for the docking-mysql instance.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docking-mysql-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: docking-mysql-secret
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: 03b6c89e-ce61-4240-8328-4ab6b3239272
        property: password
