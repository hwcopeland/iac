# Deployment for the Result Writer (drains staging table)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-writer
  namespace: chem
  labels:
    app: result-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-writer
  template:
    metadata:
      labels:
        app: result-writer
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: result-writer
          image: zot.hwcopeland.net/chem/result-writer:build-000047-e84155c # {"$imagepolicy": "chem:result-writer"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: MYSQL_HOST
              value: "docking-mysql.chem.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_DATABASE
              value: "docking"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docking-mysql-secret
                  key: root-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Service for the Result Writer
apiVersion: v1
kind: Service
metadata:
  name: result-writer
  namespace: chem
  labels:
    app: result-writer
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: result-writer
