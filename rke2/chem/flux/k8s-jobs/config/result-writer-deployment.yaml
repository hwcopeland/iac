# Deployment for the Result Writer (drains staging table)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-writer
  namespace: chem
  labels:
    app: result-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-writer
  template:
    metadata:
      labels:
        app: result-writer
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: result-writer
          image: zot.hwcopeland.net/chem/khemeia-result-writer:build-000420-c9a8ee1 # {"$imagepolicy": "chem:khemeia-result-writer"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: "khemeia-postgres.chem.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "khemeia"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Service for the Result Writer
apiVersion: v1
kind: Service
metadata:
  name: result-writer
  namespace: chem
  labels:
    app: result-writer
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: result-writer
