---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-test-fixture
  namespace: chem
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /data/claim-jovyan
              if grep -qF '$$$$' /data/claim-jovyan/test-tiny.sdf 2>/dev/null; then
                echo "test-tiny.sdf already contains valid SDF records, skipping"
              else
                cp /fixture/test-tiny.sdf /data/claim-jovyan/test-tiny.sdf
                echo "Seeded test-tiny.sdf ($(wc -c < /data/claim-jovyan/test-tiny.sdf) bytes)"
              fi
          volumeMounts:
            - name: autodock-pvc
              mountPath: /data
            - name: fixture
              mountPath: /fixture
      volumes:
        - name: autodock-pvc
          persistentVolumeClaim:
            claimName: pvc-autodock
        - name: fixture
          configMap:
            name: test-tiny-sdf
