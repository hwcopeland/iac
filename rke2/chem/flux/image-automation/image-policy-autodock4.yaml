---
# Selects the latest image tag matching ^sha-[a-f0-9]+ format.
# Matches tags produced by the CI workflow (sha-<short-sha>).
# Alphabetical ordering on sha- prefixed hex strings provides consistent selection.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: autodock4
  namespace: chem
spec:
  imageRepositoryRef:
    name: autodock4
  filterTags:
    pattern: '^sha-[a-f0-9]+'
    extract: "$0"
  policy:
    alphabetical:
      order: asc
