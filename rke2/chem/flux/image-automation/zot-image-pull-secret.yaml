---
# Zot registry credentials for Flux image-reflector-controller (chem namespace).
# image-reflector-controller uses this secret to poll zot.hwcopeland.net/chem/* for new tags.
# Same Bitwarden item UUID as k8s-jobs/zot-pull-secret.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-pull-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: zot-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"zot.hwcopeland.net":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: username
    - secretKey: password
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: password
