---
# Selects the latest image tag matching ^build-[0-9]+ format.
# Tags are produced by CI as build-<NNNNNN>-<sha7> where NNNNNN is the
# zero-padded GitHub Actions run_number. This ensures alphabetical order ==
# chronological order, so the newest build is always selected.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: autodock-vina
  namespace: chem
spec:
  imageRepositoryRef:
    name: autodock-vina
  filterTags:
    pattern: '^build-[0-9]+'
    extract: "$0"
  policy:
    alphabetical:
      order: asc
