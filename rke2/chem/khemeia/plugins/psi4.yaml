name: psi4
slug: psi4
version: "1.0"
image: zot.hwcopeland.net/chem/psi4:latest
type: job
database: psi4

input:
  - name: input_file
    type: text
    required: true
    description: "Psi4 input file content (Python-like syntax)"
  - name: num_threads
    type: int
    default: 1
    max: 20
    description: "Number of threads for Psi4"
  - name: memory_gb
    type: int
    default: 2
    max: 32
    description: "Memory in GB"

output:
  - name: total_energy
    type: float
    parse: '(?:@(?:RHF|UHF|RKS|UKS|ROHF) Final Energy:|Total Energy\s*=)\s+([-\d.]+)'
  - name: scf_energies
    type: float
    parse: '@R(?:HF|KS|OHF|UHF|UKS) iter\s+\d+:\s+([-\d.]+)'
    reduce: all
  - name: wall_time_sec
    type: float
    optional: true
    parse: '(?:Psi4 wall time for execution:|Total time:)\s+([\d.]+)\s+seconds?'
  - name: output_file
    type: text

artifacts:
  - name: cube_files
    pattern: "*.cube"
    content_type: "chemical/x-cube"
    description: "Gaussian cube files for orbital/density visualization"
  - name: molden_files
    pattern: "*.molden"
    content_type: "chemical/x-molden"
    description: "Molden files for orbital and geometry visualization"
  - name: json_data
    pattern: "*.json"
    content_type: "application/json"
    description: "Psi4 JSON output data"

resources:
  cpu: "{{ .num_threads }}"
  memory: "{{ .memory_gb }}Gi"
  timeout: 4h

command: |
  export PATH="/opt/conda/bin:$PATH" &&
  cd /scratch && cp /input/* . &&
  echo "memory {{ .memory_gb }} gb" | cat - input.in > full_input.in &&
  psi4 -n {{ .num_threads }} full_input.in -o output.dat 2>&1;
  PSI4_RC=$?;
  echo "Psi4 exit code: $PSI4_RC";
  cat output.dat 2>/dev/null || echo "No output.dat produced";
  echo "=== Done ==="
