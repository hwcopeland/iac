name: dfratom
slug: dfratom
version: "1.0"
image: zot.hwcopeland.net/chem/dfratom:latest
type: job
database: atomic
visible: false

input:
  - name: input_file
    type: text
    required: true
    description: "DFRATOM input file (includes basis set exponents and occupation numbers)"

output:
  - name: total_energy
    type: float
    parse: 'TOTAL\s+(-?\d+\.\d+E[+-]\d+)'
    reduce: last
  - name: scf_energies
    type: float
    parse: 'TOTAL ENERGY = ([-\d.E+-]+)'
    reduce: all
  - name: converged
    type: string
    parse: 'CONVERGED ON (.+)'
  - name: iterations
    type: int
    parse: 'SCF ITERATION NO\s+(\d+)'
    reduce: last
  - name: kinetic_energy
    type: float
    parse: 'KINETIC <T>\s*([-\d.E+-]+)'
    description: "Kinetic energy <T> in Hartree"
  - name: potential_energy
    type: float
    parse: 'POTENTIAL <V>\s*([-\d.E+-]+)'
    description: "Potential energy <V> in Hartree"
  - name: virial_ratio
    type: float
    parse: 'VIRIAL\s+.*\s+([-\d.E+-]+)'
    description: "Virial ratio <V>/<T> (point nucleus) or (<V>+correction)/<T> (finite nucleus)"
  - name: rest_mass_energy
    type: float
    parse: 'REST MASS\s*([-\d.E+-]+)'
    description: "Rest mass energy in Hartree"
  - name: log
    type: text

artifacts:
  - name: dat_files
    pattern: "*.dat"
    content_type: "text/plain"
    description: "DFRATOM output data files"

resources:
  cpu: "2"
  memory: "4096Mi"
  timeout: 1h

command: |
  cd /scratch &&
  cp /input/input.in input.dat &&
  echo "=== DFRATOM OUTPUT ===" &&
  /opt/dfratom/DFRATOM.exe < input.dat 2>&1 |
  sed 's/D+/E+/g; s/D-/E-/g';
  # Artifact collection
  for f in /scratch/*.dat; do
    [ -f "$f" ] && [ "$f" != "/scratch/input.dat" ] || continue;
    fn=$(basename "$f");
    echo "===ARTIFACT:${fn}===";
    base64 "$f";
    echo "===END_ARTIFACT===";
  done
