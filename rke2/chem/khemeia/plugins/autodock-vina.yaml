name: autodock-vina
slug: docking
version: "1.0"
image: zot.hwcopeland.net/chem/autodock-vina:latest
type: job
database: docking

input:
  - name: pdbid
    type: string
    required: true
    description: "PDB ID of target protein"
  - name: ligand_db
    type: string
    required: true
    description: "Ligand source database name"
  - name: native_ligand
    type: string
    default: "TTT"
  - name: chunk_size
    type: int
    default: 10000

output:
  - name: result_count
    type: int
    parse: 'Batch complete: (\d+) ligands processed'
  - name: best_affinity
    type: float
    parse: 'affinity=([-\d.]+)'
    reduce: min
  - name: log
    type: text

artifacts:
  - name: docked_poses
    pattern: "*.pdbqt"
    content_type: "chemical/x-pdbqt"
    description: "Docked ligand poses in PDBQT format"

resources:
  cpu: "1"
  memory: "2048Mi"
  timeout: 168h

command: |
  cd /autodock &&
  export SOURCE_DB="{{ .ligand_db }}" &&
  export BATCH_OFFSET=0 &&
  export BATCH_LIMIT={{ .chunk_size }} &&
  echo "=== Protein Prep ===" &&
  python3 scripts/proteinprepv2.py --protein_id {{ .pdbid }} --ligand_id {{ .native_ligand }} 2>&1 &&
  echo "=== Register Workflow ===" &&
  python3 -c "
  import psycopg2, os
  conn = psycopg2.connect(host=os.environ['POSTGRES_HOST'], port=int(os.environ.get('POSTGRES_PORT','5432')),
    user=os.environ['POSTGRES_USER'], password=os.environ['POSTGRES_PASSWORD'], dbname=os.environ.get('POSTGRES_DB','khemeia'))
  cur = conn.cursor()
  with open('grid_center.txt') as f: gx,gy,gz = [float(x) for x in f.read().strip().split()]
  with open('{{ .pdbid }}.pdbqt') as f: pdbqt = f.read()
  cur.execute('INSERT INTO docking_workflows (name, pdbid, source_db, native_ligand, chunk_size, image, receptor_pdbqt, grid_center_x, grid_center_y, grid_center_z, phase) VALUES (%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s) ON CONFLICT (name) DO UPDATE SET receptor_pdbqt=EXCLUDED.receptor_pdbqt, grid_center_x=EXCLUDED.grid_center_x, grid_center_y=EXCLUDED.grid_center_y, grid_center_z=EXCLUDED.grid_center_z',
    (os.environ['WORKFLOW_NAME'], '{{ .pdbid }}', '{{ .ligand_db }}', '{{ .native_ligand }}', {{ .chunk_size }}, 'generic', pdbqt, gx, gy, gz, 'Running'))
  conn.commit(); conn.close()
  print('Workflow registered')
  " 2>&1 &&
  echo "=== Ligand Prep ===" &&
  python3 scripts/prep_ligands.py 2>&1 || echo "Ligand prep skipped (all ligands already prepped)" ;
  echo "=== Docking ===" &&
  python3 scripts/dock_batch.py 2>&1 ;
  DOCK_RC=$? ;
  echo "Dock exit code: $DOCK_RC" ;
  echo "=== Done ==="
