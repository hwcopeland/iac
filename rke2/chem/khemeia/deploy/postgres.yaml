---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-khemeia-postgres
  namespace: chem
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 80Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khemeia-postgres
  namespace: chem
spec:
  selector:
    matchLabels:
      app: khemeia-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: khemeia-postgres
    spec:
      initContainers:
        - name: download-chembl
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              CHEMBL_VERSION="36"
              DUMP_DIR="/chembl-dump"
              MARKER="$DUMP_DIR/.chembl_${CHEMBL_VERSION}_downloaded"

              if [ -f "$MARKER" ]; then
                echo "ChEMBL ${CHEMBL_VERSION} dump already downloaded, skipping."
                exit 0
              fi

              apk add --no-cache wget tar
              mkdir -p "$DUMP_DIR"
              cd "$DUMP_DIR"

              echo "Downloading ChEMBL ${CHEMBL_VERSION} PostgreSQL dump (~3GB)..."
              wget -q --show-progress \
                "https://ftp.ebi.ac.uk/pub/databases/chembl/ChEMBLdb/latest/chembl_${CHEMBL_VERSION}_postgresql.tar.gz" \
                -O "chembl_${CHEMBL_VERSION}_postgresql.tar.gz"

              echo "Extracting..."
              tar xzf "chembl_${CHEMBL_VERSION}_postgresql.tar.gz"
              rm "chembl_${CHEMBL_VERSION}_postgresql.tar.gz"

              touch "$MARKER"
              echo "Download complete."
              find "$DUMP_DIR" -name "*.dmp" | head -5
          volumeMounts:
            - name: chembl-dump
              mountPath: /chembl-dump

        - name: import-chembl
          image: postgres:16
          command:
            - /bin/bash
            - -c
            - |
              set -e
              CHEMBL_VERSION="36"
              PGDATA="${PGDATA:-/var/lib/postgresql/data/pgdata}"
              MARKER="${PGDATA}/.chembl_${CHEMBL_VERSION}_imported"
              PGUSER="${POSTGRES_USER}"

              if [ -f "$MARKER" ]; then
                echo "ChEMBL ${CHEMBL_VERSION} already imported, skipping."
                exit 0
              fi

              DUMP_FILE=$(find /chembl-dump -name "*.dmp" 2>/dev/null | head -1)
              if [ -z "$DUMP_FILE" ]; then
                echo "WARNING: No ChEMBL dump found, skipping import."
                echo "ChEMBL search will be unavailable until the dump is imported manually."
                exit 0
              fi

              # Initialize PGDATA if this is a fresh volume.
              if [ ! -f "$PGDATA/PG_VERSION" ]; then
                echo "Initializing PostgreSQL data directory..."
                initdb -D "$PGDATA" -U "$PGUSER" \
                  --auth-local=trust \
                  --auth-host=md5 \
                  --no-locale --encoding=UTF8
                echo "Initialization complete."
              fi

              # Start postgres temporarily on unix socket only (no TCP).
              echo "Starting temporary PostgreSQL for ChEMBL import..."
              pg_ctl -D "$PGDATA" -w start -o "-h '' -k /tmp"

              # Set password for network auth (may already be set on re-runs).
              psql -h /tmp -U "$PGUSER" postgres \
                -c "ALTER USER \"$PGUSER\" PASSWORD '$POSTGRES_PASSWORD'" 2>/dev/null || true

              # Create khemeia database if not present.
              psql -h /tmp -U "$PGUSER" postgres \
                -tc "SELECT 1 FROM pg_database WHERE datname='khemeia'" | grep -q 1 || \
                psql -h /tmp -U "$PGUSER" postgres -c "CREATE DATABASE khemeia"

              # Drop + recreate chembl database to handle partial previous imports.
              psql -h /tmp -U "$PGUSER" postgres \
                -tc "SELECT 1 FROM pg_database WHERE datname='chembl_${CHEMBL_VERSION}'" | grep -q 1 && \
                dropdb -h /tmp -U "$PGUSER" "chembl_${CHEMBL_VERSION}" || true
              createdb -h /tmp -U "$PGUSER" "chembl_${CHEMBL_VERSION}"
              echo "Database chembl_${CHEMBL_VERSION} created."

              echo "Restoring ${DUMP_FILE} (this takes 20-40 minutes)..."
              pg_restore -h /tmp -U "$PGUSER" \
                -d "chembl_${CHEMBL_VERSION}" \
                --no-owner --no-acl --jobs=2 \
                "$DUMP_FILE" 2>&1 | tail -20 || true

              TABLE_COUNT=$(psql -h /tmp -U "$PGUSER" -d "chembl_${CHEMBL_VERSION}" -tc \
                "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'" | tr -d ' ')
              echo "=== Import complete: $TABLE_COUNT tables in chembl_${CHEMBL_VERSION} ==="

              if [ "$TABLE_COUNT" -lt 50 ]; then
                echo "ERROR: Only $TABLE_COUNT tables found, import likely failed."
                pg_ctl -D "$PGDATA" -w stop || true
                exit 1
              fi

              touch "$MARKER"
              pg_ctl -D "$PGDATA" -w stop
              echo "ChEMBL import done."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: chembl-dump
              mountPath: /chembl-dump
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 4Gi

      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: khemeia
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "khemeia"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "khemeia"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-khemeia-postgres
        - name: chembl-dump
          emptyDir:
            sizeLimit: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: khemeia-postgres
  namespace: chem
spec:
  selector:
    app: khemeia-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
