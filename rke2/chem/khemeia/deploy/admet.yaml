# Deployment for the ADMET prediction sidecar service (WP-4)
# Serves Stanford Chemprop-D models (admet_ai) for full ADMET endpoint prediction.
# Runs as a persistent Deployment (not a per-job Job) to avoid model loading
# overhead on every request. Model load takes 30-60s at startup.
# Scheduled on nixos-gpu (RTX 3070) for GPU-accelerated Chemprop inference.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admet
  namespace: chem
  labels:
    app: admet
    khemeia.io/component: admet
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: admet
  template:
    metadata:
      labels:
        app: admet
        khemeia.io/component: admet
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      nodeSelector:
        gpu: "rtx3070"
      tolerations:
        - key: "gpu"
          value: "true"
          effect: "NoSchedule"
      volumes:
        - name: nvidia-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
      containers:
        - name: admet
          image: zot.hwcopeland.net/chem/admet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LD_LIBRARY_PATH
              value: /run/opengl-driver/lib
          volumeMounts:
            - name: nvidia-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            exec:
              command: ["python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            exec:
              command: ["python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
---
# Service for the ADMET sidecar
# Reachable at admet.chem.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: admet
  namespace: chem
  labels:
    app: admet
    khemeia.io/component: admet
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: admet
