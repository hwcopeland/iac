apiVersion: apps/v1
kind: Deployment
metadata:
  name: khemeia-web
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: khemeia-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: khemeia-web
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: web
          image: zot.hwcopeland.net/chem/khemeia-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: khemeia-web
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-web
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: khemeia-web
