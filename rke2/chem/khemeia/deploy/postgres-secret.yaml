---
# PostgreSQL credentials for the khemeia-postgres instance.
# Reuses the same Bitwarden password as the MySQL instance; username is static.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: khemeia-postgres-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: khemeia-postgres-secret
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: 03b6c89e-ce61-4240-8328-4ab6b3239272
        property: password
