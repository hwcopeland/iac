---
# PostgreSQL credentials for the khemeia-postgres instance.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: khemeia-postgres-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: khemeia-postgres-secret
    creationPolicy: Owner
  # FIXME: create a Bitwarden login item for Postgres creds and replace the UUID below.
  data:
    - secretKey: username
      remoteRef:
        key: 00000000-0000-0000-0000-000000000000  # replace with Bitwarden item UUID
        property: username
    - secretKey: password
      remoteRef:
        key: 00000000-0000-0000-0000-000000000000  # replace with Bitwarden item UUID
        property: password
