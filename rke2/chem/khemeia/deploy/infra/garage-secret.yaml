---
# Garage credentials synced from Bitwarden via External Secrets Operator.
# Creates the garage-secret Kubernetes Secret with:
#   - rpc-secret: inter-node RPC authentication (required even for single-node)
#   - access-key-id: S3 API access key
#   - secret-access-key: S3 API secret key
#
# NOTE: Replace <bitwarden-item-id-for-garage-rpc> and <bitwarden-item-id-for-garage-s3>
# with actual Bitwarden item UUIDs after creating the entries in Bitwarden.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: garage-secret
    creationPolicy: Owner
  data:
    - secretKey: rpc-secret
      remoteRef:
        key: <bitwarden-item-id-for-garage-rpc>
        property: password
    - secretKey: access-key-id
      remoteRef:
        key: <bitwarden-item-id-for-garage-s3>
        property: username
    - secretKey: secret-access-key
      remoteRef:
        key: <bitwarden-item-id-for-garage-s3>
        property: password
