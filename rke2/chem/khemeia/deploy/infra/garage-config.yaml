---
# Garage S3-compatible object store configuration.
# Mounted into the Garage StatefulSet at /etc/garage.toml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: chem
  labels:
    app.kubernetes.io/name: garage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"

    replication_factor = 1  # single-node homelab layout

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.local"

    [s3_web]
    bind_addr = "[::]:3903"
    root_domain = ".web.garage.local"

    [admin]
    api_bind_addr = "[::]:3902"

    [rpc]
    bind_addr = "[::]:3901"
