---
# Garage S3-compatible object store — single-node StatefulSet.
# Provides artifact storage for the Khemeia platform.
# Internal only: garage.chem.svc.cluster.local:3900 (S3), :3902 (admin).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: chem
  labels:
    app.kubernetes.io/name: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      containers:
        - name: garage
          image: dxflrs/garage:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3900
              name: s3
              protocol: TCP
            - containerPort: 3902
              name: admin
              protocol: TCP
            - containerPort: 3901
              name: rpc
              protocol: TCP
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: rpc-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/garage/data
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3900
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3900
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: garage-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 200Gi
    - metadata:
        name: meta
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
