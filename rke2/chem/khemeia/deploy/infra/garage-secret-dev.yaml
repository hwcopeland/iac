---
# DEV-ONLY: Plain Kubernetes Secret standing in for the Bitwarden ExternalSecret.
# Provides the same garage-secret keys that garage-statefulset.yaml,
# garage-buckets-job.yaml, and garage-lifecycle-cronjob.yaml expect.
#
# Replace with the ExternalSecret (garage-secret.yaml) once the Bitwarden
# item UUIDs are populated. Do NOT use this manifest in production.
apiVersion: v1
kind: Secret
metadata:
  name: garage-secret
  namespace: chem
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: dev-overlay
type: Opaque
data:
  # 32-char hex: openssl rand -hex 16
  rpc-secret: YjdkYzVkMTI4MTA2MjJiYmVjZWNkZDBjNTA2NzE1ZGE=
  # "khemeia-dev"
  access-key-id: a2hlbWVpYS1kZXY=
  # 32-char hex: openssl rand -hex 16
  secret-access-key: OTE4MjdmYTM3OTIyYWNkYzFlMGMwMDQ3MTg4MjFmZDg=
