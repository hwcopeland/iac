# Deployment + Service for the Smina docking engine sidecar.
# CPU-only engine — Vina fork with custom scoring and flexible residue support.
# Exposes POST /dock for the docking orchestrator to submit work.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smina
  namespace: chem
  labels:
    app: smina
    khemeia.io/component: docking-engine
    khemeia.io/engine: smina
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: smina
  template:
    metadata:
      labels:
        app: smina
        khemeia.io/engine: smina
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: smina
          image: zot.hwcopeland.net/chem/smina:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: smina
  namespace: chem
  labels:
    app: smina
    khemeia.io/component: docking-engine
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: smina
