apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-khemeia
  namespace: chem
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Khemeia"
data:
  khemeia-overview.json: |-
    {
      "uid": "khemeia-overview",
      "title": "Khemeia Overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "tags": ["khemeia", "chem"],
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Controller",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background" },
          "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "kube_deployment_status_replicas_available{namespace=\"chem\",deployment=\"khemeia-controller\"}" }]
        },
        {
          "id": 2, "type": "stat", "title": "Jobs Completed (24h)",
          "gridPos": { "x": 4, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background" },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "count_over_time({namespace=\"chem\"} |= \"completed successfully\" [$__range])", "queryType": "instant" }]
        },
        {
          "id": 3, "type": "stat", "title": "Jobs Failed (24h)",
          "gridPos": { "x": 9, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }, "color": { "mode": "thresholds" } } },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background" },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "count_over_time({namespace=\"chem\"} |= \"FAILED:\" [$__range])", "queryType": "instant" }]
        },
        {
          "id": 4, "type": "stat", "title": "Critical Errors (24h)",
          "gridPos": { "x": 14, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }, "color": { "mode": "thresholds" } } },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background" },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "count_over_time({namespace=\"chem\"} |= \"CRITICAL:\" [$__range])", "queryType": "instant" }]
        },
        {
          "id": 5, "type": "stat", "title": "Docking Workers Running",
          "gridPos": { "x": 19, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(kube_pod_status_ready{namespace=\"chem\",pod=~\"dockv2-.*\",condition=\"true\"}) or vector(0)" }]
        },
        {
          "id": 10, "type": "row", "title": "API Performance", "collapsed": true,
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "panels": [
            {
              "id": 11, "type": "timeseries", "title": "Request Rate (req/s)",
              "gridPos": { "x": 0, "y": 5, "w": 8, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } } },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum by (http_route) (rate(http_server_request_duration_seconds_count{job=\"khemeia-controller\"}[$__rate_interval]))", "legendFormat": "{{http_route}}" }]
            },
            {
              "id": 12, "type": "timeseries", "title": "Latency p50 / p99 (ms)",
              "gridPos": { "x": 8, "y": 5, "w": 8, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "ms", "custom": { "lineWidth": 2 } } },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"khemeia-controller\"}[$__rate_interval]))) * 1000", "legendFormat": "p50" },
                { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"khemeia-controller\"}[$__rate_interval]))) * 1000", "legendFormat": "p99" }
              ]
            },
            {
              "id": 13, "type": "stat", "title": "5xx Error Rate",
              "gridPos": { "x": 16, "y": 5, "w": 8, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "percentunit", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.01 }] }, "color": { "mode": "thresholds" } } },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"khemeia-controller\",http_response_status_code=~\"5..\"}[$__rate_interval])) / sum(rate(http_server_request_duration_seconds_count{job=\"khemeia-controller\"}[$__rate_interval]))" }]
            }
          ]
        },
        {
          "id": 20, "type": "row", "title": "Traces", "collapsed": true,
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 1 },
          "panels": [
            {
              "id": 21, "type": "traces", "title": "Recent Traces — khemeia-controller",
              "gridPos": { "x": 0, "y": 13, "w": 24, "h": 10 },
              "datasource": { "type": "tempo", "uid": "tempo" },
              "targets": [{ "refId": "A", "datasource": { "type": "tempo", "uid": "tempo" }, "queryType": "search", "filters": [{ "id": "service-name", "tag": "service.name", "operator": "=", "value": ["khemeia-controller"], "type": "static" }] }]
            }
          ]
        },
        {
          "id": 30, "type": "row", "title": "Docking Performance", "collapsed": false,
          "gridPos": { "x": 0, "y": 23, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 31, "type": "timeseries", "title": "Ligands/sec per Batch",
          "gridPos": { "x": 0, "y": 24, "w": 8, "h": 7 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "drawStyle": "points", "pointSize": 6 } } },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "avg_over_time({namespace=\"chem\"} |= `\"event\":\"batch_complete\"` | regexp `\"lig_per_sec\":(?P<value>[0-9.]+)` | unwrap value | __error__=\"\" [$__interval])", "legendFormat": "lig/sec" }]
        },
        {
          "id": 32, "type": "timeseries", "title": "Best Affinity per Batch (kcal/mol)",
          "gridPos": { "x": 8, "y": 24, "w": 8, "h": 7 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "drawStyle": "points", "pointSize": 6 } } },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "min_over_time({namespace=\"chem\"} |= `\"event\":\"batch_complete\"` | regexp `\"best_affinity\":(?P<value>-?[0-9.]+)` | unwrap value | __error__=\"\" [$__interval])", "legendFormat": "best affinity" }]
        },
        {
          "id": 33, "type": "timeseries", "title": "Failed Ligands per Batch",
          "gridPos": { "x": 16, "y": 24, "w": 8, "h": 7 },
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "drawStyle": "points", "pointSize": 6 } } },
          "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "sum_over_time({namespace=\"chem\"} |= `\"event\":\"batch_complete\"` | regexp `\"failed\":(?P<value>[0-9]+)` | unwrap value | __error__=\"\" [$__interval])", "legendFormat": "failed" }]
        },
        {
          "id": 40, "type": "row", "title": "System Resources", "collapsed": true,
          "gridPos": { "x": 0, "y": 31, "w": 24, "h": 1 },
          "panels": [
            {
              "id": 41, "type": "timeseries", "title": "Controller CPU",
              "gridPos": { "x": 0, "y": 32, "w": 6, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2 } } },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(container_cpu_usage_seconds_total{namespace=\"chem\",container=\"khemeia-controller\"}[5m])", "legendFormat": "CPU cores" }]
            },
            {
              "id": 42, "type": "timeseries", "title": "Controller Memory",
              "gridPos": { "x": 6, "y": 32, "w": 6, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 2 } } },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "container_memory_working_set_bytes{namespace=\"chem\",container=\"khemeia-controller\"}", "legendFormat": "memory" }]
            },
            {
              "id": 43, "type": "timeseries", "title": "Docking Pod Phases",
              "gridPos": { "x": 12, "y": 32, "w": 6, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "custom": { "lineWidth": 2 } } },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count by(phase) (kube_pod_status_phase{namespace=\"chem\",pod=~\"dockv2-.*\"})", "legendFormat": "{{phase}}" }]
            },
            {
              "id": 44, "type": "stat", "title": "Container Restarts (chem, 24h)",
              "gridPos": { "x": 18, "y": 32, "w": 6, "h": 7 },
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 3 }, { "color": "red", "value": 10 }] }, "color": { "mode": "thresholds" } } },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
              "targets": [{ "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"chem\"}[24h]))" }]
            }
          ]
        },
        {
          "id": 50, "type": "row", "title": "Log Viewer", "collapsed": true,
          "gridPos": { "x": 0, "y": 39, "w": 24, "h": 1 },
          "panels": [
            {
              "id": 51, "type": "logs", "title": "Errors & Failures",
              "gridPos": { "x": 0, "y": 40, "w": 24, "h": 8 },
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "options": { "showTime": true, "showLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "{namespace=\"chem\"} |~ \"FAILED:|CRITICAL:\"" }]
            },
            {
              "id": 52, "type": "logs", "title": "Batch Completions",
              "gridPos": { "x": 0, "y": 48, "w": 24, "h": 8 },
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "options": { "showTime": true, "showLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [{ "refId": "A", "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" }, "expr": "{namespace=\"chem\"} |= \"batch_complete\"" }]
            }
          ]
        }
      ]
    }
