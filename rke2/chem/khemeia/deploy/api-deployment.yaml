# Deployment for the Khemeia Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khemeia-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: khemeia-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: khemeia-controller
    spec:
      serviceAccountName: khemeia-controller
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: controller
          image: zot.hwcopeland.net/chem/khemeia-controller:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: NAMESPACE
              value: "chem"
            - name: PLUGINS_DIR
              value: "/app/plugins"
            - name: POSTGRES_HOST
              value: "khemeia-postgres.chem.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "khemeia"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khemeia-postgres-secret
                  key: password
            - name: AUTH_ENABLED
              value: "true"
            - name: OIDC_ISSUER_URL
              value: "https://auth.hwcopeland.net/application/o/khemeia/"
            # Garage S3 — endpoint points at the shared garage-system namespace
            # (migrated from chem on 2026-05-20). Credentials are loaded from
            # the local copy of garage-secret in this namespace so we don't
            # depend on cross-namespace secret resolution.
            - name: GARAGE_ENABLED
              value: "true"
            - name: GARAGE_ENDPOINT
              value: "http://garage.garage-system.svc.cluster.local:3900"
            - name: GARAGE_REGION
              value: "garage"
            - name: GARAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: access-key-id
            - name: GARAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: secret-access-key
            # OTEL → Tempo. telemetry.go is already instrumented; these
            # env vars just point the exporter at the in-cluster Tempo
            # OTLP gRPC endpoint. parentbased_traceidratio sampler with
            # 0.1 keeps trace volume sane on a home cluster.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "tempo.monitor.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "khemeia-controller"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"
          volumeMounts:
            - name: plugins
              mountPath: /app/plugins
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: plugins
          configMap:
            name: khemeia-plugins
---
# Service for the Khemeia Controller
apiVersion: v1
kind: Service
metadata:
  name: khemeia-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-controller
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: khemeia-controller
