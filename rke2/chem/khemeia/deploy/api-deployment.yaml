# Deployment for the Khemeia Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khemeia-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: khemeia-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: khemeia-controller
    spec:
      serviceAccountName: khemeia-controller
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: controller
          image: zot.hwcopeland.net/chem/khemeia-controller:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: NAMESPACE
              value: "chem"
            - name: PLUGINS_DIR
              value: "/app/plugins"
            - name: MYSQL_HOST
              value: "docking-mysql.chem.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_DATABASE
              value: "docking"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docking-mysql-secret
                  key: root-password
            - name: AUTH_ENABLED
              value: "true"
            - name: OIDC_ISSUER_URL
              value: "https://auth.hwcopeland.net/application/o/khemeia/"
          volumeMounts:
            - name: plugins
              mountPath: /app/plugins
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: plugins
          configMap:
            name: khemeia-plugins
---
# Service for the Khemeia Controller
apiVersion: v1
kind: Service
metadata:
  name: khemeia-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia-controller
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: khemeia-controller
