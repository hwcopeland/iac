apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - crds/
  - rbac.yaml
  - rbac-crds.yaml
  - compute-classes.yaml
  - vina-gpu-kernel-cache-pvc.yaml
  - esmfold-weights-pvc.yaml
  - esmfold-weights-warm-job.yaml
  - plugins-configmap.yaml
  - api-deployment.yaml
  - web-deployment.yaml
  - result-writer.yaml
  - prolif-runner.yaml
  - library-prep.yaml
  - library-prep-keda.yaml
  - admet.yaml
  - postgres.yaml
  - postgres-secret.yaml
  - httproute.yaml
  - flux-webhook-secret.yaml
  - flux-webhook-receiver.yaml
  - servicemonitor.yaml
  - servicemonitor-result-writer.yaml
  - grafana-dashboard-khemeia.yaml
  # Garage moved to rke2/garage-system/ on 2026-05-20 — see that kustomization.
  # The S3 credentials are ExternalSecret-managed (sourced from Bitwarden
  # item 'garage-khemeia') and rendered into a `garage-secret` Secret in
  # the chem namespace. The plain garage-secret.yaml file is retained for
  # bootstrap / disaster recovery only — the runtime path is the
  # ExternalSecret. If both are applied, ESO's creationPolicy: Owner
  # takes ownership of the Secret object on first sync.
  - garage-externalsecret.yaml
  - garage-secret.yaml
