apiVersion: v1
kind: ConfigMap
metadata:
  name: khemeia-plugins
  namespace: chem
data:
  nwchem.yaml: |
    name: nwchem
    slug: nwchem
    version: "1.0"
    image: zot.hwcopeland.net/chem/nwchem:latest
    type: job
    database: nwchem
    visible: false
    input:
      - name: input_file
        type: text
        required: true
        description: "NWChem input file content"
      - name: num_cpus
        type: int
        default: 1
        max: 20
      - name: memory_mb
        type: int
        default: 2048
        max: 32768
    output:
      - name: total_energy
        type: float
        parse: 'Total (?:DFT|SCF) energy\s+=\s+([-\d.]+)'
      - name: scf_energies
        type: float
        parse: 'Total (?:DFT|SCF) energy\s+=\s+([-\d.]+)'
        reduce: all
      - name: wall_time_sec
        type: float
        parse: 'wall:\s+([\d.]+)s'
      - name: ir_frequencies
        type: array
        parse: 'P\.Frequency\s+([\d.]+)'
        reduce: all
      - name: ir_intensities
        type: array
        parse: 'Infrared Intensity\s+([\d.]+)'
        reduce: all
      - name: output_file
        type: text
    artifacts:
      - name: molden_files
        pattern: "*.molden"
        content_type: "chemical/x-molden"
        description: "Molden files for orbital and geometry visualization"
      - name: hessian_files
        pattern: "*.hess"
        content_type: "application/octet-stream"
        description: "Hessian matrix files from frequency calculations"
    resources:
      cpu: "{{ .num_cpus }}"
      memory: "{{ .memory_mb }}Mi"
      timeout: 4h
    command: |
      cd /scratch && cp /input/* . &&
      if [ {{ .num_cpus }} -gt 1 ]; then
        mpirun --allow-run-as-root -np {{ .num_cpus }} nwchem input.in 2>&1;
      else
        nwchem input.in 2>&1;
      fi;
      # Artifact collection
      for f in /scratch/*.molden /scratch/*.hess /scratch/*.cube; do
        [ -f "$f" ] || continue;
        fn=$(basename "$f");
        echo "===ARTIFACT:${fn}===";
        base64 "$f";
        echo "===END_ARTIFACT===";
      done

  psi4.yaml: |
    name: psi4
    slug: psi4
    version: "1.0"
    image: zot.hwcopeland.net/chem/psi4:latest
    type: job
    database: psi4
    visible: false
    input:
      - name: input_file
        type: text
        required: true
        description: "Psi4 input file content (Python-like syntax)"
      - name: num_threads
        type: int
        default: 1
        max: 20
        description: "Number of threads for Psi4"
      - name: memory_gb
        type: int
        default: 2
        max: 32
        description: "Memory in GB"
    output:
      - name: total_energy
        type: float
        parse: '(?:@(?:RHF|UHF|RKS|UKS|ROHF) Final Energy:|Total Energy\s*=)\s+([-\d.]+)'
      - name: scf_energies
        type: float
        parse: '@R(?:HF|KS|OHF|UHF|UKS) iter\s+\d+:\s+([-\d.]+)'
        reduce: all
      - name: wall_time_sec
        type: float
        optional: true
        parse: '(?:Psi4 wall time for execution:|Total time:)\s+([\d.]+)\s+seconds?'
      - name: ir_frequencies
        type: array
        parse: 'Frequency:\s+([\d.]+)'
        reduce: all
      - name: ir_intensities
        type: array
        parse: 'IR Intensity:\s+([\d.]+)'
        reduce: all
      - name: nmr_shieldings
        type: array
        parse: 'Isotropic:\s+([-\d.]+)'
        reduce: all
      - name: output_file
        type: text
    artifacts:
      - name: cube_files
        pattern: "*.cube"
        content_type: "chemical/x-cube"
        description: "Gaussian cube files for orbital/density visualization"
      - name: molden_files
        pattern: "*.molden"
        content_type: "chemical/x-molden"
        description: "Molden files for orbital and geometry visualization"
      - name: json_data
        pattern: "*.json"
        content_type: "application/json"
        description: "Psi4 JSON output data"
    resources:
      cpu: "{{ .num_threads }}"
      memory: "{{ .memory_gb }}Gi"
      timeout: 4h
    command: |
      export PATH="/opt/conda/bin:$PATH" &&
      cd /scratch && cp /input/* . &&
      echo "memory {{ .memory_gb }} gb" | cat - input.in > full_input.in &&
      psi4 -n {{ .num_threads }} full_input.in -o output.dat 2>&1;
      PSI4_RC=$?;
      echo "Psi4 exit code: $PSI4_RC";
      cat output.dat 2>/dev/null || echo "No output.dat produced";
      echo "=== Done ===";
      # Artifact collection
      for f in /scratch/*.cube /scratch/*.molden /scratch/*.dat; do
        [ -f "$f" ] || continue;
        fn=$(basename "$f");
        echo "===ARTIFACT:${fn}===";
        base64 "$f";
        echo "===END_ARTIFACT===";
      done

  dfratom.yaml: |
    name: dfratom
    slug: dfratom
    version: "1.0"
    image: zot.hwcopeland.net/chem/dfratom:latest
    type: job
    database: atomic
    visible: false
    input:
      - name: input_file
        type: text
        required: true
        description: "DFRATOM input file (includes basis set exponents and occupation numbers)"
    output:
      - name: total_energy
        type: float
        parse: 'TOTAL\s+(-?\d+\.\d+E[+-]\d+)'
        reduce: last
      - name: scf_energies
        type: float
        parse: 'TOTAL ENERGY = ([-\d.E+-]+)'
        reduce: all
      - name: converged
        type: string
        parse: 'CONVERGED ON (.+)'
      - name: iterations
        type: int
        parse: 'SCF ITERATION NO\s+(\d+)'
        reduce: last
      - name: kinetic_energy
        type: float
        parse: 'KINETIC <T>\s*([-\d.E+-]+)'
        description: "Kinetic energy <T> in Hartree"
      - name: potential_energy
        type: float
        parse: 'POTENTIAL <V>\s*([-\d.E+-]+)'
        description: "Potential energy <V> in Hartree"
      - name: virial_ratio
        type: float
        parse: 'VIRIAL\s+.*\s+([-\d.E+-]+)'
        description: "Virial ratio <V>/<T>"
      - name: rest_mass_energy
        type: float
        parse: 'REST MASS\s*([-\d.E+-]+)'
        description: "Rest mass energy in Hartree"
      - name: log
        type: text
    artifacts:
      - name: dat_files
        pattern: "*.dat"
        content_type: "text/plain"
        description: "DFRATOM output data files"
    resources:
      cpu: "1"
      memory: "4096Mi"
      timeout: 1h
    command: |
      cd /scratch &&
      cp /input/input.in input.dat &&
      echo "=== DFRATOM OUTPUT ===" &&
      /opt/dfratom/DFRATOM.exe < input.dat 2>&1 |
      sed 's/D+/E+/g; s/D-/E-/g';
      # Artifact collection
      for f in /scratch/*.dat; do
        [ -f "$f" ] && [ "$f" != "/scratch/input.dat" ] || continue;
        fn=$(basename "$f");
        echo "===ARTIFACT:${fn}===";
        base64 "$f";
        echo "===END_ARTIFACT===";
      done

  quantum-espresso.yaml: |
    name: quantum-espresso
    slug: qe
    version: "1.0"
    image: costrouc/quantum-espresso:latest
    type: job
    database: qe
    visible: false
    input:
      - name: input_file
        type: text
        required: true
        description: "QE input file content"
      - name: executable
        type: string
        default: "pw.x"
        description: "QE executable"
      - name: num_cpus
        type: int
        default: 1
        max: 20
      - name: memory_mb
        type: int
        default: 2048
        max: 32768
    output:
      - name: output_file
        type: text
      - name: total_energy
        type: float
        parse: '!\s+total\s+energy\s+=\s+([-\d.]+)\s+Ry'
      - name: scf_energies
        type: float
        parse: 'total energy\s+=\s+([-\d.]+)\s+Ry'
        reduce: all
      - name: wall_time_sec
        type: float
        parse: 'PWSCF\s+:\s+[\d.]+s CPU\s+([\d.]+)s WALL'
    artifacts:
      - name: cube_files
        pattern: "*.cube"
        content_type: "chemical/x-cube"
        description: "Gaussian cube files for charge density and orbital visualization"
      - name: dos_data
        pattern: "*.dat"
        content_type: "text/plain"
        description: "Density of states and charge density data files"
    resources:
      cpu: "{{ .num_cpus }}"
      memory: "{{ .memory_mb }}Mi"
      timeout: 4h
    command: |
      cd /scratch && cp /input/* . &&
      for pp in $(grep -i '\.UPF' input.in | awk '{print $NF}'); do
        [ -f "$pp" ] || curl -sfL "https://pseudopotentials.quantum-espresso.org/upf_files/$pp" -o "$pp" 2>/dev/null || true;
      done &&
      if [ {{ .num_cpus }} -gt 1 ]; then
        mpirun --allow-run-as-root -np {{ .num_cpus }} {{ .executable }} -in input.in 2>&1 || true;
      else
        {{ .executable }} -in input.in 2>&1;
      fi;
      # Artifact collection
      for f in /scratch/*.cube /scratch/*.dat; do
        [ -f "$f" ] || continue;
        fn=$(basename "$f");
        echo "===ARTIFACT:${fn}===";
        base64 "$f";
        echo "===END_ARTIFACT===";
      done

  autodock-vina.yaml: |
    name: autodock-vina
    slug: docking
    version: "1.0"
    image: zot.hwcopeland.net/chem/autodock-vina:latest
    type: job
    database: docking
    input:
      - name: pdbid
        type: string
        required: true
        description: "PDB ID of target protein"
      - name: ligand_db
        type: string
        required: true
        description: "Ligand source database name"
      - name: native_ligand
        type: string
        default: "TTT"
      - name: chunk_size
        type: int
        default: 10000
    output:
      - name: result_count
        type: int
        parse: 'Batch complete: (\d+) ligands processed'
      - name: best_affinity
        type: float
        parse: 'affinity=([-\d.]+)'
        reduce: min
      - name: log
        type: text
    artifacts:
      - name: docked_poses
        pattern: "*.pdbqt"
        content_type: "chemical/x-pdbqt"
        description: "Docked ligand poses in PDBQT format"
    resources:
      cpu: "1"
      memory: "2048Mi"
      timeout: 168h
    command: |
      cd /autodock &&
      export SOURCE_DB="{{ .ligand_db }}" &&
      export BATCH_OFFSET=0 &&
      export BATCH_LIMIT={{ .chunk_size }} &&
      echo "=== Protein Prep ===" &&
      python3 scripts/proteinprepv2.py --protein_id {{ .pdbid }} --ligand_id {{ .native_ligand }} 2>&1 &&
      echo "=== Register Workflow ===" &&
      python3 -c "
      import psycopg2, os
      conn = psycopg2.connect(host=os.environ['POSTGRES_HOST'], port=int(os.environ.get('POSTGRES_PORT','5432')),
        user=os.environ['POSTGRES_USER'], password=os.environ['POSTGRES_PASSWORD'], dbname=os.environ.get('POSTGRES_DB','khemeia'))
      cur = conn.cursor()
      with open('grid_center.txt') as f: gx,gy,gz = [float(x) for x in f.read().strip().split()]
      with open('{{ .pdbid }}.pdbqt') as f: pdbqt = f.read()
      cur.execute('INSERT INTO docking_workflows (name, pdbid, source_db, native_ligand, chunk_size, image, receptor_pdbqt, grid_center_x, grid_center_y, grid_center_z, phase) VALUES (%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s) ON CONFLICT (name) DO UPDATE SET receptor_pdbqt=EXCLUDED.receptor_pdbqt, grid_center_x=EXCLUDED.grid_center_x, grid_center_y=EXCLUDED.grid_center_y, grid_center_z=EXCLUDED.grid_center_z',
        (os.environ['WORKFLOW_NAME'], '{{ .pdbid }}', '{{ .ligand_db }}', '{{ .native_ligand }}', {{ .chunk_size }}, 'generic', pdbqt, gx, gy, gz, 'Running'))
      conn.commit(); conn.close()
      print('Workflow registered')
      " 2>&1 &&
      echo "=== Ligand Prep ===" &&
      python3 scripts/prep_ligands.py 2>&1 || echo "Ligand prep skipped (all ligands already prepped)" ;
      echo "=== Docking ===" &&
      python3 scripts/dock_batch.py 2>&1 ;
      DOCK_RC=$? ;
      echo "Dock exit code: $DOCK_RC" ;
      echo "=== Done ==="

  esmfold.yaml: |
    name: esmfold
    slug: esmfold
    version: "1.0"
    image: zot.hwcopeland.net/chem/esmfold:latest
    type: job
    database: khemeia
    visible: false
    input:
      - name: resolution_id
        type: string
        required: true
        description: "ResolvedVariant id (variant_resolutions.resolution_id) to fold"
      - name: group_name
        type: string
        required: true
        description: "Owning genome group name"
      - name: variant_key
        type: string
        required: true
        description: "Per-variant key within the group"
      - name: model
        type: string
        default: "wt_and_mut"
        description: "Folding mode: wt_and_mut (calc) | wt_only (resolve fallback)"
      - name: role
        type: string
        default: "calc"
        description: "Worker sub-role: calc | resolve_fallback"
      - name: relax
        type: string
        default: "false"
        description: "Run an optional OpenMM relax pass on the predicted structures"
      - name: local_window
        type: int
        default: 5
        description: "Residue half-window for the per-site pLDDT delta at the mutation"
    output:
      - name: rmsd_ang
        type: float
        parse: 'metric:.*"rmsd_ang":([-\d.]+)'
      - name: mut_plddt
        type: float
        parse: 'metric:.*"mut_plddt":([-\d.]+)'
      - name: log
        type: text
    artifacts:
      - name: structures
        pattern: "*.pdb"
        content_type: "chemical/x-pdb"
        description: "ESMFold WT and mutant predicted structures"
    resources:
      computeClass: gpu
      timeout: 2h
    command: |
      cd /opt/esmfold && python3 scripts/fold.py 2>&1

  ddg.yaml: |
    name: ddg-stability
    slug: ddg_stability
    version: "1.0"
    image: zot.hwcopeland.net/chem/ddg:latest
    type: job
    database: khemeia
    visible: false

    input:
      - name: resolution_id
        type: string
        required: true
        description: "ResolvedVariant id (variant_resolutions.resolution_id) to score"
      - name: group_name
        type: string
        required: true
        description: "Owning genome group name"
      - name: variant_key
        type: string
        required: true
        description: "Per-variant key within the group"
      - name: engine
        type: string
        default: "thermompnn"
        # T1: enum widened from foldx|rosetta to thermompnn|ddgun|foldx|rosetta.
        # thermompnn (MIT, default) + ddgun (GPL) are baked in and shippable.
        # foldx/rosetta are license-gated, mounted-binary-only — selecting them
        # without a mounted binary returns E_PARAMS_INVALID.
        enum: ["thermompnn", "ddgun", "foldx", "rosetta"]
        description: "ddG engine: thermompnn (default, MIT) | ddgun | foldx | rosetta"

    output:
      - name: ddg_fold
        type: float
        parse: 'metric:.*"ddg_fold_kcal_mol":([-\d.]+)'
      - name: log
        type: text

    artifacts:
      - name: report
        pattern: "*.json"
        content_type: "application/json"
        description: "Full ddG report (engine, per-term breakdown, stability class)"

    resources:
      computeClass: cpu-high-mem
      timeout: 6h

    command: |
      cd /opt/ddg && python3 scripts/ddg_run.py 2>&1

  pocket-proximity.yaml: |
    name: pocket-proximity
    slug: pocket_proximity
    version: "1.0"
    # REUSES the existing P2Rank image — no new image is built (GEN-31). The
    # pocket_proximity worker ships in this image's next build of zot/chem/p2rank
    # alongside the unchanged Flask sidecar; the command override below selects the
    # worker entrypoint instead of gunicorn.
    image: zot.hwcopeland.net/chem/p2rank:latest
    type: job
    database: khemeia
    visible: false

    input:
      - name: resolution_id
        type: string
        required: true
        description: "ResolvedVariant id (variant_resolutions.resolution_id) to analyze"
      - name: group_name
        type: string
        required: true
        description: "Owning genome group name"
      - name: variant_key
        type: string
        required: true
        description: "Per-variant key within the group"
      - name: detector
        type: string
        default: "p2rank"
        description: "Pocket detector: p2rank (fpocket is a documented alt, not wired here)"
      - name: cutoff_ang
        type: float
        default: 6.0
        description: "Proximity cutoff (Angstrom) for pocket_proximity_flag"

    output:
      - name: distance_ang
        type: float
        parse: 'metric:.*"distance_ang":([-\d.]+)'
      - name: in_pocket
        type: string
        parse: 'metric:.*"in_pocket":(true|false)'
      - name: log
        type: text

    artifacts:
      - name: pockets
        pattern: "*.csv"
        content_type: "text/csv"
        description: "p2rank pocket set (pocket_proximity/{rid}/pockets.csv)"

    resources:
      computeClass: cpu
      timeout: 1h

    command: |
      cd /opt/p2rank && python3 scripts/pocket_proximity.py 2>&1

  pgx-docking.yaml: |
    name: pgx-docking
    slug: pgx_docking
    version: "1.0"
    # REUSED image — pgx_docking is an orchestrator that ships in the existing gnina
    # container (gnina is the default docking engine). No new compute image
    # (workers TDD §7.2 / GEN-40). Ships in gnina's next build-* tag.
    image: zot.hwcopeland.net/chem/gnina:latest
    type: job
    database: khemeia
    visible: false

    input:
      - name: resolution_id
        type: string
        required: true
        description: "ResolvedVariant id (variant_resolutions.resolution_id) to dock"
      - name: group_name
        type: string
        required: true
        description: "Owning genome group name"
      - name: variant_key
        type: string
        required: true
        description: "Per-variant key within the group"
      - name: drugs
        type: list
        required: true
        description: "Explicit drug list — names | SMILES | library refs (core R4: no implicit panel)"
      - name: engine
        type: string
        default: "gnina"
        description: "Docking engine: gnina (default, in-image) | vina | diffdock (separate images)"
      - name: pocket_strategy
        type: string
        default: "p2rank"
        description: "Pocket boxing strategy on WT+mutant: p2rank (default) | fpocket | explicit"
      - name: exhaustiveness
        type: int
        default: 32
        description: "Docking search exhaustiveness per pose"

    output:
      - name: ddg_bind
        type: float
        parse: 'metric:.*"ddg_bind_kcal_mol":([-\d.]+)'
        reduce: max
      - name: tanimoto
        type: float
        parse: 'metric:.*"tanimoto":([-\d.]+)'
        reduce: min
      - name: log
        type: text

    artifacts:
      - name: poses
        pattern: "*pose*.pdbqt"
        content_type: "chemical/x-pdbqt"
        description: "WT and mutant docked drug poses"
      - name: fingerprints
        pattern: "*ifp*.json"
        content_type: "application/json"
        description: "ProLIF interaction fingerprints (WT, mutant) and the delta"

    resources:
      computeClass: gpu
      timeout: 24h

    command: |
      cd /scripts && python3 pgx_docking.py 2>&1
