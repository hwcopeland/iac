apiVersion: v1
kind: ConfigMap
metadata:
  name: khemeia-plugins
  namespace: chem
data:
  quantum-espresso.yaml: |
    name: quantum-espresso
    slug: qe
    version: "1.0"
    image: costrouc/quantum-espresso:latest
    type: job
    database: qe
    input:
      - name: input_file
        type: text
        required: true
        description: "QE input file content"
      - name: executable
        type: string
        default: "pw.x"
        description: "QE executable"
      - name: num_cpus
        type: int
        default: 1
        max: 20
      - name: memory_mb
        type: int
        default: 2048
        max: 32768
    output:
      - name: output_file
        type: text
      - name: total_energy
        type: float
        parse: '!\s+total\s+energy\s+=\s+([-\d.]+)\s+Ry'
      - name: wall_time_sec
        type: float
        parse: 'PWSCF\s+:\s+[\d.]+s CPU\s+([\d.]+)s WALL'
    resources:
      cpu: "{{ .num_cpus }}"
      memory: "{{ .memory_mb }}Mi"
      timeout: 4h
    command: |
      cd /scratch && cp /input/* . &&
      for pp in $(grep -i '\.UPF' input.in | awk '{print $NF}'); do
        [ -f "$pp" ] || curl -sfL "https://pseudopotentials.quantum-espresso.org/upf_files/$pp" -o "$pp" 2>/dev/null || true;
      done &&
      if [ {{ .num_cpus }} -gt 1 ]; then
        mpirun --allow-run-as-root -np {{ .num_cpus }} {{ .executable }} -in input.in 2>&1 || true;
      else
        {{ .executable }} -in input.in 2>&1;
      fi

  autodock-vina.yaml: |
    name: autodock-vina
    slug: docking
    version: "1.0"
    image: zot.hwcopeland.net/chem/autodock-vina:latest
    type: job
    database: docking
    input:
      - name: pdbid
        type: string
        required: true
        description: "PDB ID of target protein"
      - name: ligand_db
        type: string
        required: true
        description: "Ligand source database name"
      - name: native_ligand
        type: string
        default: "TTT"
      - name: chunk_size
        type: int
        default: 10000
    output:
      - name: result_count
        type: int
      - name: best_affinity
        type: float
      - name: avg_affinity
        type: float
    resources:
      cpu: "1"
      memory: "2048Mi"
      timeout: 1h
