# Deployment for the library-prep sidecar service (WP-2)
# Handles compound standardization (RDKit MolStandardize, ChEMBL Structure Pipeline),
# pre-filter annotation (Lipinski, Veber, PAINS, Brenk, REOS),
# and 3D conformer generation (ETKDGv3 + MMFF94).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-prep
  namespace: chem
  labels:
    app: library-prep
    khemeia.io/component: library-prep
spec:
  replicas: 1  # managed by KEDA ScaledObject — do not set manually
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: library-prep
  template:
    metadata:
      labels:
        app: library-prep
        khemeia.io/component: library-prep
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: library-prep
          image: zot.hwcopeland.net/chem/library-prep:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2000m"
              memory: 2Gi
            limits:
              cpu: "2000m"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
# Service for the library-prep sidecar
# Reachable at library-prep.chem.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: library-prep
  namespace: chem
  labels:
    app: library-prep
    khemeia.io/component: library-prep
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: library-prep
