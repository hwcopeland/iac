---
# Compute class definitions for the Khemeia CRD job controller.
# The controller reads this ConfigMap at startup and merges the resolved class
# into each K8s Job pod spec (nodeSelector, tolerations, resources, volumes, env).
# See docs/tdd/wp-9-infrastructure.md section 10 for design rationale.
apiVersion: v1
kind: ConfigMap
metadata:
  name: khemeia-compute-classes
  namespace: chem
  labels:
    app.kubernetes.io/name: khemeia
    app.kubernetes.io/component: compute-classes
data:
  classes.yaml: |
    classes:
      cpu:
        description: "Standard CPU workloads"
        resources:
          cpu: "2"
          memory: "4Gi"
        nodeSelector: {}
        tolerations: []
        volumes: []
        volumeMounts: []
        env: []

      cpu-high-mem:
        description: "Memory-intensive CPU workloads (MD analysis, large libraries)"
        resources:
          cpu: "4"
          memory: "16Gi"
        nodeSelector: {}
        tolerations: []
        volumes: []
        volumeMounts: []
        env: []

      gpu-parallel:
        description: "GPU workloads that run in parallel via time-slicing (gnina: CNN rescoring only, brief GPU use)"
        resources:
          cpu: "2"
          memory: "2Gi"
          nvidia.com/gpu: "1"
        nodeSelector:
          gpu: "rtx3070"
        tolerations:
          - key: "gpu"
            value: "true"
            effect: "NoSchedule"
        volumes:
          - name: nvidia-driver
            hostPath:
              path: /run/opengl-driver
          - name: nix-store
            hostPath:
              path: /nix/store
          - name: dri
            hostPath:
              path: /dev/dri
        volumeMounts:
          - name: nvidia-driver
            mountPath: /run/opengl-driver
            readOnly: true
          - name: nix-store
            mountPath: /nix/store
            readOnly: true
          - name: dri
            mountPath: /dev/dri
        env:
          - name: LD_LIBRARY_PATH
            value: /run/opengl-driver/lib:/opt/boost/lib:/usr/lib/x86_64-linux-gnu

      gpu:
        description: "GPU workloads on NixOS node (nixos-gpu, RTX 3070)"
        resources:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        nodeSelector:
          gpu: "rtx3070"
        tolerations:
          - key: "gpu"
            value: "true"
            effect: "NoSchedule"
        # NixOS uses non-FHS paths for NVIDIA driver libraries.
        # /run/opengl-driver contains the userspace driver (libcuda, libnvidia-ml, etc.)
        # /nix/store is needed because some driver libs are symlinked into the store.
        # /dev/dri is required for NVIDIA OpenCL compute on Ampere — the OpenCL runtime
        # uses the DRM render node (renderD128) for GPU buffer allocation.
        volumes:
          - name: nvidia-driver
            hostPath:
              path: /run/opengl-driver
          - name: nix-store
            hostPath:
              path: /nix/store
          - name: dri
            hostPath:
              path: /dev/dri
          - name: vina-gpu-kernel-cache
            hostPath:
              path: /var/cache/vina-gpu-kernels
        volumeMounts:
          - name: nvidia-driver
            mountPath: /run/opengl-driver
            readOnly: true
          - name: nix-store
            mountPath: /nix/store
            readOnly: true
          - name: dri
            mountPath: /dev/dri
          - name: vina-gpu-kernel-cache
            mountPath: /opt/vina-gpu/kernels
        env:
          - name: LD_LIBRARY_PATH
            value: /run/opengl-driver/lib:/opt/boost/lib:/usr/lib/x86_64-linux-gnu
          - name: OCL_ICD_VENDORS
            value: /run/opengl-driver/etc/OpenCL/vendors
          - name: VINA_GPU_KERNEL_CACHE_DIR
            value: /opt/vina-gpu/kernels

      gpu-exclusive:
        description: "Exclusive GPU workloads (diffdock): requests all 10 time-slice replicas so only 1 pod runs at a time with full GPU access"
        resources:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "10"
        nodeSelector:
          gpu: "rtx3070"
        tolerations:
          - key: "gpu"
            value: "true"
            effect: "NoSchedule"
        volumes:
          - name: nvidia-driver
            hostPath:
              path: /run/opengl-driver
          - name: nix-store
            hostPath:
              path: /nix/store
          - name: dri
            hostPath:
              path: /dev/dri
        volumeMounts:
          - name: nvidia-driver
            mountPath: /run/opengl-driver
            readOnly: true
          - name: nix-store
            mountPath: /nix/store
            readOnly: true
          - name: dri
            mountPath: /dev/dri
        env:
          - name: LD_LIBRARY_PATH
            value: /run/opengl-driver/lib:/usr/lib/x86_64-linux-gnu
