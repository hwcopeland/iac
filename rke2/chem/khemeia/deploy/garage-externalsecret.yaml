# ExternalSecret for khemeia's Garage S3 creds — supersedes the
# plain-Secret pattern in garage-secret.yaml (which is left in place for
# bootstrap compatibility; ESO takes ownership on first sync).
#
# Source: Bitwarden item 'garage-khemeia' (UUID
# a6e9d68e-a214-4c02-aaaa-150d54a5851f) with username = Garage access key
# ID, password = Garage secret access key. Maps to the secret keys
# khemeia-controller's env block reads via secretKeyRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secret
  namespace: chem
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: garage-secret
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: "a6e9d68e-a214-4c02-aaaa-150d54a5851f"
        property: username
    - secretKey: secret-access-key
      remoteRef:
        key: "a6e9d68e-a214-4c02-aaaa-150d54a5851f"
        property: password
