    khemeia.io/component: fpocket
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: fpocket
  template:
    metadata:
      labels:
        app: fpocket
        khemeia.io/component: fpocket
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: fpocket
          image: zot.hwcopeland.net/chem/fpocket:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
