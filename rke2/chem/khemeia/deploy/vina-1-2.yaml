# Deployment + Service for the AutoDock Vina 1.2 docking engine sidecar.
# CPU-only engine — the default fast docking backend for WP-3.
# Exposes POST /dock for the docking orchestrator to submit work.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vina-1-2
  namespace: chem
  labels:
    app: vina-1-2
    khemeia.io/component: docking-engine
    khemeia.io/engine: vina-1-2
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: vina-1-2
  template:
    metadata:
      labels:
        app: vina-1-2
        khemeia.io/engine: vina-1-2
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: vina-1-2
          image: zot.hwcopeland.net/chem/vina:1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: khemeia-mysql-secret
                  key: host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: khemeia-mysql-secret
                  key: port
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: khemeia-mysql-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khemeia-mysql-secret
                  key: password
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vina-1-2
  namespace: chem
  labels:
    app: vina-1-2
    khemeia.io/component: docking-engine
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: vina-1-2
