# Garage S3 credentials for khemeia-controller (chem namespace) — externalized
# via ESO. Kubernetes has no cross-namespace secretKeyRef, so chem gets its own
# ExternalSecret pointing at the SAME Bitwarden item as
# rke2/garage-system/garage-secret-dev.yaml (single source of truth — no more
# "keep both in sync" plaintext duplication).
#
# SECURITY: previously a plaintext `kind: Secret` on a public repo → rotate the
# key. Use the same Bitwarden UUID you wired into garage-secret-dev.yaml.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secret
  namespace: chem
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: garage-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        access-key-id: "{{ .access_key_id | trim }}"
        secret-access-key: "{{ .secret_access_key | trim }}"
  data:
    - secretKey: access_key_id
      remoteRef:
        key: 92d9ae0b-0af3-4420-9824-12a099c90531
        property: access-key-id
    - secretKey: secret_access_key
      remoteRef:
        key: 92d9ae0b-0af3-4420-9824-12a099c90531
        property: secret-access-key
