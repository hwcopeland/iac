---
# Local copy of Garage S3 credentials for khemeia-controller in the chem
# namespace. Source of truth lives in rke2/garage-system/garage-secret-dev.yaml
# (same access-key-id / secret-access-key values). Keep both manifests in
# sync if rotating credentials.
#
# We don't read the secret directly from garage-system because Kubernetes
# does not support cross-namespace secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: garage-secret
  namespace: chem
  labels:
    app.kubernetes.io/name: garage
type: Opaque
data:
  access-key-id: R0s4MDlhNGUyYzFmMzg0Mzc0OGIyMTRkYjc=
  secret-access-key: M2ZkOTAyMjNkOTNmMmRlMTRmYWI2OWUzMmI5ZDBiZDY1ODBkMGM4YzEzZjFlMjdjZjc1YTZhMjYzZjdmNDE1OA==
