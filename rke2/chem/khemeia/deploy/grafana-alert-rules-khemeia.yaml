apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules-khemeia
  namespace: chem
  labels:
    grafana_alert: "1"
data:
  khemeia-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Khemeia Jobs
        folder: Khemeia
        interval: 1m
        rules:

          - uid: khemeia-job-failed
            title: Khemeia Job Failed
            condition: A
            data:
              - refId: A
                datasourceUid: P8E80F9AEF21F6940
                queryType: range
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: 'count_over_time({namespace="chem"} |= "FAILED:" [5m])'
                  queryType: range
                  maxLines: 100
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 0s
            annotations:
              summary: "A Khemeia job has failed"
              description: "kubectl logs -n chem deployment/khemeia-controller --tail=50"
            labels:
              severity: critical

          - uid: khemeia-critical-error
            title: Khemeia Critical Error
            condition: A
            data:
              - refId: A
                datasourceUid: P8E80F9AEF21F6940
                queryType: range
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: 'count_over_time({namespace="chem"} |= "CRITICAL:" [5m])'
                  queryType: range
                  maxLines: 100
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 0s
            annotations:
              summary: "Khemeia CRITICAL error (likely DB loss)"
              description: "kubectl logs -n chem deployment/khemeia-controller --tail=50"
            labels:
              severity: critical

          - uid: khemeia-job-completed
            title: Khemeia Job Completed
            condition: A
            data:
              - refId: A
                datasourceUid: P8E80F9AEF21F6940
                queryType: range
                relativeTimeRange:
                  from: 120
                  to: 0
                model:
                  expr: 'count_over_time({namespace="chem"} |= "completed successfully" [2m])'
                  queryType: range
                  maxLines: 10
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 0s
            annotations:
              summary: "A Khemeia job completed successfully"
            labels:
              severity: info

          - uid: khemeia-controller-down
            title: Khemeia Controller Down
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: >-
                    kube_deployment_status_replicas_available{
                      namespace="chem",
                      deployment="khemeia-controller"
                    } == 0
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 2m
            annotations:
              summary: "khemeia-controller has 0 available replicas"
            labels:
              severity: critical
