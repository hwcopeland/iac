# RBAC Configuration for Khemeia Controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: khemeia-controller
  namespace: chem
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: khemeia-controller
  namespace: chem
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: khemeia-controller
  namespace: chem
subjects:
  - kind: ServiceAccount
    name: khemeia-controller
    namespace: chem
roleRef:
  kind: Role
  name: khemeia-controller
  apiGroup: rbac.authorization.k8s.io
