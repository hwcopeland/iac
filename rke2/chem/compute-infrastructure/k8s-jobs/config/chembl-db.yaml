---
# PVC for ChEMBL MySQL data storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-chembl-mysql
  namespace: chem
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi

---
# ChEMBL MySQL instance.
# Init containers: (1) download dump, (2) start MySQL + import dump.
# First boot: ~30-60 min. Restarts: seconds (import skips if tables exist).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chembl-mysql
  namespace: chem
  labels:
    app: chembl-mysql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chembl-mysql
  template:
    metadata:
      labels:
        app: chembl-mysql
    spec:
      initContainers:
        - name: download-chembl
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              CHEMBL_VERSION="36"
              DUMP_DIR="/chembl-dump"
              MARKER="$DUMP_DIR/.chembl_${CHEMBL_VERSION}_downloaded"

              if [ -f "$MARKER" ]; then
                echo "ChEMBL ${CHEMBL_VERSION} already downloaded, skipping."
                exit 0
              fi

              apk add --no-cache wget tar
              mkdir -p "$DUMP_DIR"
              cd "$DUMP_DIR"

              echo "Downloading ChEMBL ${CHEMBL_VERSION} MySQL dump (~1.9GB)..."
              wget -q --show-progress \
                "https://ftp.ebi.ac.uk/pub/databases/chembl/ChEMBLdb/latest/chembl_${CHEMBL_VERSION}_mysql.tar.gz" \
                -O "chembl_${CHEMBL_VERSION}_mysql.tar.gz"

              echo "Extracting..."
              tar xzf "chembl_${CHEMBL_VERSION}_mysql.tar.gz"
              rm "chembl_${CHEMBL_VERSION}_mysql.tar.gz"

              touch "$MARKER"
              echo "Download and extract complete."
              find "$DUMP_DIR" -name "*.dmp" -o -name "*.sql" | head -5
          volumeMounts:
            - name: chembl-dump
              mountPath: /chembl-dump

        - name: import-chembl
          image: mysql:8.0
          command:
            - /bin/bash
            - -c
            - |
              set -e
              CHEMBL_VERSION="36"
              DATADIR="/var/lib/mysql"
              IMPORT_MARKER="$DATADIR/.chembl_${CHEMBL_VERSION}_imported"

              if [ -f "$IMPORT_MARKER" ]; then
                echo "ChEMBL ${CHEMBL_VERSION} already imported, skipping."
                exit 0
              fi

              # Initialize MySQL data directory if empty
              if [ ! -d "$DATADIR/mysql" ]; then
                echo "Initializing MySQL data directory..."
                mysqld --initialize-insecure --user=mysql --datadir=$DATADIR
              fi

              echo "Starting temporary MySQL for import..."
              mysqld --user=mysql --datadir=$DATADIR \
                --innodb-buffer-pool-size=2G \
                --innodb-log-file-size=512M \
                --max-allowed-packet=256M \
                --skip-networking \
                --socket=/tmp/mysql.sock &
              MYSQL_PID=$!

              echo "Waiting for MySQL to be ready..."
              for i in $(seq 1 60); do
                if mysqladmin ping --socket=/tmp/mysql.sock --silent 2>/dev/null; then
                  echo "MySQL ready"
                  break
                fi
                [ "$i" -eq 60 ] && echo "TIMEOUT" && kill $MYSQL_PID && exit 1
                sleep 2
              done

              # Set root password
              mysql --socket=/tmp/mysql.sock -u root \
                -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '$MYSQL_ROOT_PASSWORD'; \
                    CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY '$MYSQL_ROOT_PASSWORD'; \
                    GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION; \
                    FLUSH PRIVILEGES;"

              # Check if already imported
              TABLE_COUNT=$(mysql --socket=/tmp/mysql.sock -u root -p"$MYSQL_ROOT_PASSWORD" -N \
                -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'chembl_${CHEMBL_VERSION}'" 2>/dev/null || echo "0")

              if [ "$TABLE_COUNT" -gt 100 ]; then
                echo "Already imported ($TABLE_COUNT tables). Marking done."
                touch "$IMPORT_MARKER"
                kill $MYSQL_PID 2>/dev/null; wait $MYSQL_PID 2>/dev/null
                exit 0
              fi

              mysql --socket=/tmp/mysql.sock -u root -p"$MYSQL_ROOT_PASSWORD" \
                -e "CREATE DATABASE IF NOT EXISTS chembl_${CHEMBL_VERSION} CHARACTER SET utf8mb4"

              DUMP_FILE=$(find /chembl-dump -name "*.dmp" -o -name "*.sql" 2>/dev/null | head -1)
              if [ -z "$DUMP_FILE" ]; then
                echo "ERROR: No dump file found"
                find /chembl-dump -type f | head -20
                kill $MYSQL_PID 2>/dev/null; wait $MYSQL_PID 2>/dev/null
                exit 1
              fi

              echo "Importing $DUMP_FILE (this takes 20-40 minutes)..."
              mysql --socket=/tmp/mysql.sock -u root -p"$MYSQL_ROOT_PASSWORD" \
                "chembl_${CHEMBL_VERSION}" < "$DUMP_FILE"

              TABLE_COUNT=$(mysql --socket=/tmp/mysql.sock -u root -p"$MYSQL_ROOT_PASSWORD" -N \
                -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'chembl_${CHEMBL_VERSION}'")
              COMPOUND_COUNT=$(mysql --socket=/tmp/mysql.sock -u root -p"$MYSQL_ROOT_PASSWORD" -N \
                -e "SELECT COUNT(*) FROM chembl_${CHEMBL_VERSION}.compound_structures" 2>/dev/null || echo "?")

              echo "=== Import complete ==="
              echo "Tables: $TABLE_COUNT"
              echo "Compounds: $COMPOUND_COUNT"

              touch "$IMPORT_MARKER"
              echo "Shutting down temporary MySQL..."
              kill $MYSQL_PID 2>/dev/null
              wait $MYSQL_PID 2>/dev/null || true
              echo "Done."
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docking-mysql-secret
                  key: root-password
          volumeMounts:
            - name: chembl-storage
              mountPath: /var/lib/mysql
            - name: chembl-dump
              mountPath: /chembl-dump
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 4Gi

      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docking-mysql-secret
                  key: root-password
          ports:
            - containerPort: 3306
          args:
            - --innodb-buffer-pool-size=2G
            - --innodb-log-file-size=512M
            - --max-allowed-packet=256M
          volumeMounts:
            - name: chembl-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 500m
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: chembl-storage
          persistentVolumeClaim:
            claimName: pvc-chembl-mysql
        - name: chembl-dump
          emptyDir:
            sizeLimit: 25Gi

---
# Service for ChEMBL MySQL
apiVersion: v1
kind: Service
metadata:
  name: chembl-mysql
  namespace: chem
  labels:
    app: chembl-mysql
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
  selector:
    app: chembl-mysql
