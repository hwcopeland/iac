# Deployment for the Docking Job Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docking-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: docking-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docking-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docking-controller
    spec:
      serviceAccountName: docking-controller
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: controller
          image: zot.hwcopeland.net/chem/docking-controller:latest # {"$imagepolicy": "chem:docking-controller"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: NAMESPACE
              value: "chem"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Service for the Docking Job Controller
apiVersion: v1
kind: Service
metadata:
  name: docking-controller
  namespace: chem
  labels:
    app.kubernetes.io/name: docking-controller
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: docking-controller
