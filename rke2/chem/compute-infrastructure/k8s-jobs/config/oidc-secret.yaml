---
# OIDC client credentials for docking controller JWT auth.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docking-oidc-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: docking-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: 125d0225-2cfc-4b0e-bc23-92ded665f97c
        property: username
    - secretKey: client-secret
      remoteRef:
        key: 125d0225-2cfc-4b0e-bc23-92ded665f97c
        property: password
