---
# ChEMBL MySQL root password.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chembl-mysql-secret
  namespace: chem
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: chembl-mysql-secret
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: 2eda30c2-5438-4f24-92bd-49565ea336ea
        property: password
