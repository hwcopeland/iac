version: "3.8"

# Self-contained test: generates 1000 mock Vina log files, exports them
# to MySQL via export_energies_mysql.py, then asserts 1000 rows landed.
#
# Run: docker-compose up --exit-code-from test-runner --abort-on-container-exit

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: TestPass2024
      MYSQL_DATABASE: docking
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-pTestPass2024"]
      interval: 5s
      timeout: 10s
      retries: 15
    networks:
      - docking-test

  test-runner:
    image: python:3.11-slim
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: TestPass2024
      MYSQL_DATABASE: docking
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Export script (read-only)
      - ../../docker/autodock-vina/scripts/export_energies_mysql.py:/scripts/export_energies_mysql.py:ro
      # Test utilities (read-only)
      - ./generate_mock_data.py:/scripts/generate_mock_data.py:ro
      - ./verify_mysql.py:/scripts/verify_mysql.py:ro
      - ./container_test.sh:/scripts/container_test.sh:ro
    command: ["bash", "/scripts/container_test.sh"]
    networks:
      - docking-test

networks:
  docking-test:
