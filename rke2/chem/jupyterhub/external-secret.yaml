---
# JupyterHub OIDC client credentials, sourced from Bitwarden via ESO.
# Bitwarden login item "jupyterhub-oidc" (username=client-id, password=client-secret).
# The hub consumes this Secret (jupyterhub-oidc) via hub.extraEnv in values.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jupyterhub-oidc
  namespace: chem
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: jupyterhub-oidc
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: 7c8baa14-2830-4a45-a6c9-8e6ee96bd353
        property: username
    - secretKey: client-secret
      remoteRef:
        key: 7c8baa14-2830-4a45-a6c9-8e6ee96bd353
        property: password
