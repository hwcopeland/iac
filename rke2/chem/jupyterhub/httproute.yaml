---
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: jupyter
  namespace: chem
spec:
  name: jupyter.hwcopeland.net
  type: CNAME
  content: hwcopeland.net
  proxied: true
  ttl: 1
  interval: 5m
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jupyterhub
  namespace: chem
  annotations:
    cert-manager.io/cluster-issuer: cf-issuer
spec:
  hostnames:
    - jupyter.hwcopeland.net
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: proxy-public
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
