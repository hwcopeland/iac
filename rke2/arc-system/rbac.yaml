---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arc-controller-sa
  namespace: arc-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-controller-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "configmaps", "secrets", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["actions.github.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arc-controller-rolebinding
subjects:
  - kind: ServiceAccount
    name: arc-controller-sa
    namespace: arc-system
roleRef:
  kind: ClusterRole
  name: arc-controller-role
  apiGroup: rbac.authorization.k8s.io
