---
# GitHub App credentials for ARC (Actions Runner Controller).
# ⚠ PLACEHOLDER: Create a Bitwarden item with fields: app_id, installation_id, private_key
# then replace REPLACE-WITH-BITWARDEN-UUID with the actual item UUID before deploying.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app-secret
  namespace: arc-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: arc-github-app-secret
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: app_id
    - secretKey: github_app_installation_id
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: installation_id
    - secretKey: github_app_private_key
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: private_key
