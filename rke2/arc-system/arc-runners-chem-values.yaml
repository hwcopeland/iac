# Helm values for the ARC runner scale-set targeting hwcopeland/iac.
#
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
# Controller chart: gha-runner-scale-set-controller (must be same version)
# Namespace: arc-system
#
# Workflow jobs that specify:
#   runs-on: [self-hosted, arc-chem]
# will be routed to these ephemeral runner pods.

githubConfigUrl: "https://github.com/hwcopeland/iac"
githubConfigSecret: arc-github-app-secret
runnerScaleSetName: "arc-chem"

# 1 warm runner always ready; scales up to 6 for parallel matrix builds.
minRunners: 1
maxRunners: 6

controllerServiceAccount:
  namespace: arc-system
  name: arc-gha-runner-scale-set-controller

# Runner pod template — DinD sidecar without TLS (all traffic is pod-local localhost).
# No TLS = no cert generation race condition; DinD ready immediately on start.
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.333.0
        imagePullPolicy: IfNotPresent
        env:
          - name: DOCKER_HOST
            value: tcp://localhost:2375
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 4000m
            memory: 4Gi

      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
          - name: DOCKER_TLS_CERTDIR
            value: ""
        args:
          - --host=tcp://0.0.0.0:2375
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 2000m
            memory: 2Gi

    volumes:
      - name: work
        emptyDir: {}
