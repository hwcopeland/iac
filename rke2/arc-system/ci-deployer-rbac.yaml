---
# ServiceAccount for the CI runner to perform rollout restarts in the chem namespace.
# Runner pods in arc-system are bound to this SA via arc-runners-chem-values.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: arc-system
---
# Minimal role: only patch/get on Deployments in chem.
# kubectl rollout restart patches spec.template.metadata.annotations — nothing more needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer
  namespace: chem
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer
  namespace: chem
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: arc-system
roleRef:
  kind: Role
  name: ci-deployer
  apiGroup: rbac.authorization.k8s.io
