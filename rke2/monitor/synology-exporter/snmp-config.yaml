apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
  namespace: monitor
data:
  snmp.yml: |
    auths:
      synology_v2:
        community: public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2
    modules:
      synology:
        walk:
          # MIB names don't resolve without the generator's MIB browser baked
          # into the binary. Use numeric OIDs (snmp-exporter v0.26 requires this).
          - 1.3.6.1.2.1.1.3       # sysUpTime
          - 1.3.6.1.2.1.31.1.1    # ifXTable
          - 1.3.6.1.4.1.6574.1
          - 1.3.6.1.4.1.6574.2
          - 1.3.6.1.4.1.6574.3
          - 1.3.6.1.2.1.25.3.3.1
          - 1.3.6.1.2.1.25.2.3.1
          - 1.3.6.1.2.1.25.2.2
        metrics:
          - name: syno_system_status
            oid: 1.3.6.1.4.1.6574.1.1
            type: gauge
            help: System status (1=normal)
          - name: syno_system_temperature
            oid: 1.3.6.1.4.1.6574.1.2
            type: gauge
            help: System temperature in Celsius
          - name: syno_system_power_status
            oid: 1.3.6.1.4.1.6574.1.3
            type: gauge
            help: Power status (1=normal)
          - name: syno_system_fan_status
            oid: 1.3.6.1.4.1.6574.1.4.1
            type: gauge
            help: System fan status (1=normal)
          - name: syno_system_cpu_fan_status
            oid: 1.3.6.1.4.1.6574.1.4.2
            type: gauge
            help: CPU fan status (1=normal)
          - name: syno_disk_temperature
            oid: 1.3.6.1.4.1.6574.2.1.1.3
            type: gauge
            help: Disk temperature in Celsius
            indexes:
              - labelname: disk_index
                type: Integer
          - name: syno_disk_status
            oid: 1.3.6.1.4.1.6574.2.1.1.5
            type: gauge
            help: Disk status (1=normal)
            indexes:
              - labelname: disk_index
                type: Integer
          - name: syno_disk_name
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString
            help: Disk model name
            indexes:
              - labelname: disk_index
                type: Integer
          - name: syno_raid_status
            oid: 1.3.6.1.4.1.6574.3.1.1.3
            type: gauge
            help: RAID status (1=normal)
            indexes:
              - labelname: raid_index
                type: Integer
          # hrStorageUsed/Size are in ALLOCATION UNITS, not bytes. Multiply
          # by syno_storage_allocation_units (hrStorageAllocationUnits) in the
          # dashboard to get bytes. hrStorage also lists RAM/swap segments —
          # filter on syno_storage_descr (=~"/volume.*") for real volumes.
          - name: syno_storage_used
            oid: 1.3.6.1.2.1.25.2.3.1.6
            type: gauge
            help: Storage allocation units used
            indexes:
              - labelname: storage_index
                type: Integer
          - name: syno_storage_total
            oid: 1.3.6.1.2.1.25.2.3.1.5
            type: gauge
            help: Storage total allocation units
            indexes:
              - labelname: storage_index
                type: Integer
          - name: syno_storage_allocation_units
            oid: 1.3.6.1.2.1.25.2.3.1.4
            type: gauge
            help: Bytes per allocation unit (multiply used/total by this for bytes)
            indexes:
              - labelname: storage_index
                type: Integer
          - name: syno_storage_descr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
            help: Storage mount description (e.g. /volume1, Physical memory)
            indexes:
              - labelname: storage_index
                type: Integer
          - name: syno_cpu_load
            oid: 1.3.6.1.2.1.25.3.3.1.2
            type: gauge
            help: CPU load percentage
            indexes:
              - labelname: cpu_index
                type: Integer
