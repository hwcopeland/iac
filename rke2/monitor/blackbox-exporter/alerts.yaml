# Alert rules for NAS/host reachability and Synology health. Routed to the
# existing Alertmanager `email-operator` receiver (→ hampton888@gmail.com).
# Labeled release: kube-prometheus-stack so the stack's ruleSelector loads it.
#
# The reachability rules need only the blackbox probes (no SNMP). The Synology
# disk/RAID rules stay inert until SNMP is enabled on the DSM, then activate.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nas-and-reachability
  namespace: monitor
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: reachability
      rules:
        - alert: SynologyNASUnreachable
          expr: probe_success{host="synology-nas"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Synology NAS is unreachable ({{ $labels.instance }})"
            description: >-
              Blackbox probe to the NAS has failed for >2m
              (job {{ $labels.job }}). iSCSI-backed PVCs will hang. This is the
              alert that was missing during the last outage.
        - alert: BlackboxProbeFailing
          expr: probe_success == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Blackbox probe failing: {{ $labels.instance }}"
            description: "probe_success=0 for >5m (job {{ $labels.job }})."

    - name: monitoring-targets
      rules:
        - alert: SnmpExporterTargetDown
          expr: up{job="snmp-exporter-synology"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Synology SNMP target is down"
            description: >-
              Prometheus cannot scrape the snmp-exporter for the NAS for >5m —
              either the exporter is down or SNMP is disabled/unreachable on the DSM.

    - name: synology-health
      rules:
        # Inert until SNMP is enabled on the DSM; activates automatically once
        # syno_* metrics start flowing.
        # diskStatus: 1=Normal 2=Initialized 3=NotInitialized(empty bay)
        # 4=SystemPartitionFailed 5=Crashed. Only 4/5 are real failures —
        # empty bays report 3 and must NOT alert.
        - alert: SynologyDiskFailed
          expr: syno_disk_status >= 4
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Synology disk failed (bay {{ $labels.disk_index }})"
            description: "syno_disk_status={{ $value }} (4=SystemPartitionFailed, 5=Crashed)."
        # raidStatus: 1=Normal; 2-8 are transient ops (repair/migrate/expand/
        # sync/parity-check) and benign; 11=Degraded 12=Crashed are failures.
        - alert: SynologyRaidDegraded
          expr: syno_raid_status >= 11
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Synology RAID degraded/crashed"
            description: "syno_raid_status={{ $value }} (11=Degraded, 12=Crashed)."
        # Catch a transient op that never finishes (stuck rebuild/parity check).
        - alert: SynologyRaidNotNormalProlonged
          expr: syno_raid_status != 1 and syno_raid_status < 11
          for: 24h
          labels:
            severity: warning
          annotations:
            summary: "Synology RAID busy >24h (status {{ $value }})"
            description: "A RAID background op (rebuild/parity check) has run >24h — may be stuck."
