apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules-platform
  namespace: monitor
  labels:
    grafana_alert: "1"
data:
  platform-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Platform Health
        folder: Platform
        interval: 1m
        rules:

          - uid: pod-crash-looping
            title: Pod CrashLooping
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 900
                  to: 0
                model:
                  expr: "rate(kube_pod_container_status_restarts_total[5m]) * 300 > 1"
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 5m
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            labels:
              severity: warning

          - uid: pod-oomkilled
            title: Pod OOMKilled
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: "kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"} == 1"
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 0s
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            labels:
              severity: critical

          - uid: node-not-ready
            title: Node NotReady
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: "kube_node_status_condition{condition=\"Ready\",status=\"true\"} == 0"
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 2m
            annotations:
              summary: "Node {{ $labels.node }} is NotReady"
            labels:
              severity: critical

          - uid: pvc-filling-up
            title: "PVC Filling Up (>85%)"
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: "kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15"
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 5m
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is over 85% full"
            labels:
              severity: warning

          - uid: deployment-replicas-mismatch
            title: Deployment Replicas Unavailable
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: "kube_deployment_spec_replicas - kube_deployment_status_replicas_available > 0"
                  refId: A
            noDataState: OK
            execErrState: OK
            for: 5m
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            labels:
              severity: warning
