grafana:
  service:
    type: ClusterIP
  persistence:
    enabled: true
    existingClaim: kube-prometheus-stack-grafana
    type: pvc
  envFromSecrets:
    - name: grafana-oidc-secret
      optional: false
  grafana.ini:
    server:
      root_url: https://grafana.hwcopeland.net
    auth:
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      allow_assign_grafana_admin: true
      client_id: ${client-id}
      client_secret: ${client-secret}
      scopes: openid email profile groups offline_access
      auth_url: https://auth.hwcopeland.net/application/o/authorize/
      token_url: https://auth.hwcopeland.net/application/o/token/
      api_url: https://auth.hwcopeland.net/application/o/userinfo/
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      groups_attribute_path: groups
      role_attribute_strict: false
      role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'GrafanaAdmin' || 'Viewer'"
      use_pkce: true
      use_refresh_token: true
      auto_login: true
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: http://loki-gateway.monitor.svc.cluster.local
          access: proxy
          isDefault: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
    alerts:
      enabled: true
      label: grafana_alert
      labelValue: "1"
      searchNamespace: ALL

prometheus:
  service:
    type: ClusterIP
