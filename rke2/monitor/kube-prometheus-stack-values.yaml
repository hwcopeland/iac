grafana:
  service:
    type: ClusterIP
  persistence:
    enabled: true
    existingClaim: kube-prometheus-stack-grafana
    type: pvc
  envFromSecrets:
    - name: grafana-oidc-secret
      optional: false
  # Clear the chart's GF_INSTALL_PLUGINS so Grafana 12.3+ uses the
  # GF_PLUGINS_PREINSTALL path below instead.
  plugins: []
  env:
    # appmana-storage-breakdown-panel — custom panel for the
    # AppMana storage-usage dashboard (monitor/storage-dashboard/).
    # Comma-separate to add more: <id>@<version>@<url> for external
    # .zip, bare <id> for Grafana catalog plugins.
    GF_PLUGINS_PREINSTALL: "appmana-storage-breakdown-panel@0.1.1@https://github.com/AppMana/kubernetes-storage-dashboard-grafana/releases/download/v0.1.1/appmana-storage-breakdown-panel-0.1.1.zip"
  grafana.ini:
    plugins:
      # v0.1.x of the AppMana panel ships unsigned. Comma-separate
      # additional unsigned plugin IDs as you add them.
      allow_loading_unsigned_plugins: appmana-storage-breakdown-panel
    server:
      root_url: https://grafana.hwcopeland.net
    security:
      # Allow embedding Grafana panels in iframes (the Home Assistant dashboard
      # MikroTik card). Without this, Grafana sends X-Frame-Options: deny.
      allow_embedding: true
      # ha.hwcopeland.net iframing grafana.hwcopeland.net is cross-site, so the
      # Grafana session cookie needs SameSite=None (over HTTPS) to be sent inside
      # the iframe — otherwise the embed hits a login wall.
      cookie_samesite: none
    auth:
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      allow_assign_grafana_admin: true
      client_id: ${client-id}
      client_secret: ${client-secret}
      scopes: openid email profile groups offline_access
      auth_url: https://auth.hwcopeland.net/application/o/authorize/
      token_url: https://auth.hwcopeland.net/application/o/token/
      api_url: https://auth.hwcopeland.net/application/o/userinfo/
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      groups_attribute_path: groups
      role_attribute_strict: false
      role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'GrafanaAdmin' || 'Viewer'"
      use_pkce: true
      use_refresh_token: true
      auto_login: true
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          # Direct to loki:3100 — chart's loki-gateway nginx was disabled
          # as part of Phase 3 (#21). SingleBinary Loki doesn't need it.
          url: http://loki.monitor.svc.cluster.local:3100
          access: proxy
          isDefault: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      # Sidecar reads the grafana_folder annotation on each ConfigMap and
      # places the dashboard in that folder. ConfigMaps without the
      # annotation fall back to defaultFolderName below.
      folderAnnotation: grafana_folder
      provider:
        # Allow the sidecar to write to subfolders (required when using
        # folderAnnotation).
        foldersFromFilesStructure: true
      # Chart-default dashboards (kube-prometheus-stack-*) don't carry a
      # grafana_folder annotation; this sends them to "Defaults" so they
      # don't clutter "General". Operator-curated dashboards (Platform,
      # Projects, Khemeia) set the annotation explicitly.
      defaultFolderName: Defaults
    alerts:
      enabled: true
      label: grafana_alert
      labelValue: "1"
      searchNamespace: ALL

prometheus:
  service:
    type: ClusterIP
  prometheusSpec:
    # Accept remote-write from in-cluster Tempo (metrics-generator emits
    # traces_spanmetrics_* + traces_service_graph_* here). Endpoint becomes
    # http://prometheus-operated.monitor.svc.cluster.local:9090/api/v1/write
    enableRemoteWriteReceiver: true

# Phase 1d/1e (#33, #34): Alertmanager email receiver via Gmail SMTP.
# Creds come from the alertmanager-smtp Secret (rendered from Bitwarden
# item "SMTP" by external-secret-mktxp-shape ExternalSecret in
# alertmanager-smtp-secret.yaml). _file references keep the password off
# the chart values surface.
alertmanager:
  alertmanagerSpec:
    # Mount the alertmanager-smtp Secret at /etc/alertmanager/secrets/<name>/.
    secrets:
      - alertmanager-smtp
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: smtp.gmail.com:587
      smtp_from: hampton888@gmail.com
      smtp_hello: hwcopeland.net
      smtp_require_tls: true
      # Username inline — it's the From: address, not a secret. Bundled
      # Alertmanager version in this chart (0.27.x range) doesn't recognize
      # smtp_auth_username_file even though Alertmanager main does.
      smtp_auth_username: hampton888@gmail.com
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp/smtp_password
    route:
      # Default = null. New/unknown alerts do NOT email until they've been
      # classified. This is the conservative posture after the 2026-05-23
      # flood incident: the cluster has ~18 pre-existing firing alerts that
      # the operator hasn't triaged yet (Phase 6 work). Only routes below
      # opt-in to email.
      receiver: "null"
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Null-route the always-on / inhibitor alerts up front.
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
        # Email-route only severity=critical (and only after Phase 6 silences
        # have classified the existing critical noise). Override per-alert
        # using continue:false child routes below if specific criticals are
        # too noisy to email.
        # Phase 6 silences — known firing tail that is not actionable from
        # email. Each has a "what to do instead" comment so future-us
        # remembers why these are null-routed.

        # longhorn DaemonSets show numberMisscheduled=3 because legacy
        # longhorn-manager / longhorn-csi-plugin / engine-image-ei-* pods
        # are running on ctlpln1/2/3 from before the DS spec dropped
        # control-plane tolerations. Pods are stable; controller marks
        # them misscheduled. To resolve permanently: either restore
        # tolerations in the longhorn helm release OR `kubectl delete pod`
        # the 3 ctlpln longhorn-manager pods. Tracked in #N (TODO).
        - receiver: "null"
          matchers:
            - alertname =~ "KubeDaemonSetMisScheduled|KubeDaemonSetRolloutStuck"
            - namespace = "longhorn-system"

        # nixos-gpu runs RKE2 v1.33.7 while the rest are v1.34.3 — drift
        # is known and tracked by [[project_gpu_node]] (NixOS-specific
        # upgrade path). Re-evaluate after the gpu node is upgraded.
        - receiver: "null"
          matchers:
            - alertname = "KubeVersionMismatch"

        - receiver: email-operator
          matchers:
            - severity = "critical"
          continue: false
        # PHASE 6 INTAKE: any *new* alert without explicit routing falls
        # through to "null" (the default receiver above). Once Phase 6
        # silences land and the firing tail is trusted-and-small, broaden
        # this routing (e.g. add severity=warning route) and re-evaluate
        # the always-on critical route.
    receivers:
      - name: "null"
      - name: email-operator
        email_configs:
          - to: hampton888@gmail.com
            send_resolved: true
            headers:
              Subject: "[{{ .Status | toUpper }}{{ if eq .Status \"firing\" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}"
    inhibit_rules:
      - target_matchers: [severity =~ warning|info]
        source_matchers: [severity = critical]
        equal: [namespace, alertname]
      - target_matchers: [severity = info]
        source_matchers: [severity = warning]
        equal: [namespace, alertname]
      - target_matchers: [severity = info]
        source_matchers: [alertname = InfoInhibitor]
        equal: [namespace]

# Phase 1a (#30): the chart's default ServiceMonitors for kube-proxy /
# kube-scheduler / kube-controller-manager / kube-etcd don't apply to RKE2:
# - kube-proxy is replaced by Cilium (no kube-proxy pods exist).
# - scheduler + controller-manager bind to localhost on RKE2 server nodes;
#   the chart's default 0.0.0.0 scrape target is unreachable.
# - etcd metrics live on a different port + require mTLS (re-enabled by
#   Phase 1b below).
# Disabling these SMs stops 3 permanent TargetDown alerts; absent-style
# rules are killed explicitly in defaultRules.disabled.
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeEtcd:
  # Enabled 2026-05-23 after operator added `etcd-expose-metrics: true`
  # to /etc/rancher/rke2/config.yaml on ctlpln1/2/3 and rolling-restarted
  # rke2-server (#31). Metrics endpoint binds 0.0.0.0:2381 (plaintext,
  # unauthenticated) — acceptable for the home LAN; see TDD §10.1 Q2 for
  # the trade-off and PRD for the threat model summary.
  enabled: true
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    enabled: true
    scheme: http

defaultRules:
  disabled:
    # absent()-style rules that fire even after SM removal — must disable
    # explicitly. etcd* rules get re-enabled in Phase 1b when there are
    # real targets to evaluate against.
    # Cilium replaces kube-proxy; scheduler + controller-manager bind to
    # localhost on RKE2 server nodes. These absent()-rules can't ever
    # resolve and stay disabled permanently.
    KubeProxyDown: true
    KubeSchedulerDown: true
    KubeControllerManagerDown: true
    # etcd alerts re-enabled 2026-05-23 — kubeEtcd is now scraping
    # ctlpln1/2/3 on port 2381 (see kubeEtcd block above). The full
    # chart-default etcd alert set is back in play; trim individual ones
    # here if any prove noisy.

# node-exporter overrides — folded in from the formerly-untracked
# rke2/monitor/node-exporter-values.yaml in Phase 0c (#28).
#
# runAsUser: 0 is required because /sys/devices/virtual/powercap/intel-rapl/.../
# energy_uj is mode 0400 root:root. Without root, --collector.rapl produces
# no metrics. This is documented upstream and is the standard pattern for
# RAPL power collection.
prometheus-node-exporter:
  # extraArgs REPLACES chart defaults — must include the chart's filesystem
  # excludes too, otherwise node-exporter scrapes every mount and floods
  # the registry. Keep this list in sync with chart 82.14.1's defaults
  # plus our RAPL collector.
  extraArgs:
    - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/containerd/.+|var/lib/docker/.+|var/lib/kubelet/.+)($|/)"
    - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs)$"
    - "--collector.rapl"
  securityContext:
    fsGroup: 0
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0
