# Grafana Postgres datasource for the Spotify analytics DB — externalized via ESO.
#
# Previously a `kind: Secret` whose stringData inlined the grafana_ro password in
# CLEARTEXT (public repo → compromised). Now an ExternalSecret renders the whole
# datasource file through target.template, injecting the password from the SAME
# Bitwarden item as spotify-postgres/secret.yaml (field: grafana-ro-password).
#
# The rendered Secret keeps label grafana_datasource=1 so the kube-prometheus-stack
# datasource sidecar (grafana-sc-datasources) still hot-loads it. Rotate by
# updating grafana-ro-password in Bitwarden — ESO re-renders on refreshInterval.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spotify-postgres-grafana-datasource
  namespace: monitor
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: spotify-postgres-grafana-datasource
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          grafana_datasource: "1"
      data:
        spotify-postgres-datasource.yaml: |
          apiVersion: 1
          datasources:
            - name: Spotify Postgres
              type: postgres
              uid: spotify-postgres
              url: spotify-postgres.monitor.svc.cluster.local:5432
              access: proxy
              user: grafana_ro
              jsonData:
                database: spotify
                sslmode: disable
                postgresVersion: 1600
                timescaledb: false
              secureJsonData:
                password: {{ .grafana_ro_password | trim }}
  data:
    - secretKey: grafana_ro_password
      remoteRef:
        key: 9be10e74-cbef-465c-baff-a11b2e27243a
        property: grafana-ro-password
