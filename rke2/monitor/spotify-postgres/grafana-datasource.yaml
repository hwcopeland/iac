# Grafana Postgres datasource for the Spotify analytics DB, provisioned via the
# kube-prometheus-stack grafana datasource sidecar (grafana-sc-datasources).
#
# The sidecar is configured with LABEL=grafana_datasource, LABEL_VALUE=1,
# RESOURCE=both — so it loads BOTH labelled ConfigMaps (like Tempo's) AND
# labelled Secrets, dropping their data into Grafana's provisioning dir and
# triggering a hot reload. NO helm upgrade / values edit required — this is the
# least-disruptive mechanism the cluster supports.
#
# We use a SECRET (not a ConfigMap like tempo-grafana-datasource.yaml) purely so
# the grafana_ro PASSWORD isn't stored in a plaintext ConfigMap. The provisioned
# datasource YAML format is otherwise identical to Tempo's.
#
# Connects as the read-only 'grafana_ro' role (SELECT-only) created by the
# migration Job — Grafana can never write to or alter this DB.
apiVersion: v1
kind: Secret
metadata:
  name: spotify-postgres-grafana-datasource
  namespace: monitor
  labels:
    grafana_datasource: "1"
stringData:
  spotify-postgres-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Spotify Postgres
        type: postgres
        uid: spotify-postgres
        url: spotify-postgres.monitor.svc.cluster.local:5432
        access: proxy
        user: grafana_ro
        jsonData:
          database: spotify
          sslmode: disable          # in-cluster traffic; no TLS on the pg svc
          postgresVersion: 1600
          timescaledb: false
        secureJsonData:
          # grafana_ro password (read-only role). Inlined here because the
          # datasource sidecar drops this file verbatim into Grafana's
          # provisioning dir — Grafana only expands ${VAR} if that env var is
          # set on the Grafana container, which we are NOT editing. Kept in a
          # Secret (not a ConfigMap) so it isn't plaintext-in-git as a CM.
          # Rotate alongside spotify-postgres/secret.yaml GRAFANA_RO_PASSWORD.
          password: Pc1twcwn26Co7ISlOUdZFbRSd4NfYw8v
