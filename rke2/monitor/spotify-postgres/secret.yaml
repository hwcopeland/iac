# Spotify analytics Postgres + pg-backup Garage credentials (monitor namespace)
# — externalized via ESO. Two ExternalSecrets, matching the two original Secrets.
#
# SECURITY: previously plaintext `kind: Secret` values on a public repo. Rotate:
#   1. ALTER ROLE spotify_app WITH PASSWORD '<new>';   (and grafana_ro)
#   2. garage key rotate spotify-pgbackup-app
# Store the new values in Bitwarden items with the custom fields referenced below.
# NOTE: keep grafana-ro-password in the SAME item this file references; the
# grafana datasource ExternalSecret reads it from there too.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spotify-postgres
  namespace: monitor
  labels:
    app: spotify-postgres
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: spotify-postgres
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        POSTGRES_PASSWORD: "{{ .postgres_password | trim }}"
        APP_PASSWORD: "{{ .app_password | trim }}"
        GRAFANA_RO_PASSWORD: "{{ .grafana_ro_password | trim }}"
  data:
    - secretKey: postgres_password
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-spotify-postgres-ITEM-UUID
        property: postgres-password
    - secretKey: app_password
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-spotify-postgres-ITEM-UUID
        property: app-password
    - secretKey: grafana_ro_password
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-spotify-postgres-ITEM-UUID
        property: grafana-ro-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spotify-pgbackup-garage
  namespace: monitor
  labels:
    app: spotify-postgres
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: spotify-pgbackup-garage
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID | trim }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY | trim }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-garage-spotify-pgbackup-key-ITEM-UUID
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-garage-spotify-pgbackup-key-ITEM-UUID
        property: AWS_SECRET_ACCESS_KEY
