# Spotify analytics Postgres credentials — direct (dev-overlay) Secret in the
# monitor namespace. This follows the SAME precedent as loki-garage-secret.yaml:
# self-contained storage credentials that this cluster mints itself live as a
# plain Secret in the consuming namespace (k8s has no cross-namespace
# secretKeyRef, so creds are replicated per namespace).
#
# These passwords were generated at deploy time (32 chars, [A-Za-z0-9]) and are
# NOT stored in Bitwarden. To rotate:
#   1. ALTER ROLE spotify_app   WITH PASSWORD '<new>';   (and grafana_ro)
#   2. base64 the new value here, re-apply this Secret
#   3. restart the consumers (exporter Deployment, Grafana datasource reload)
#
# OPTIONAL Bitwarden uplift (NOT required for this deploy): if you later want
# these under ESO like spotify-exporter/external-secret.yaml, create a
# Bitwarden login item "spotify-postgres" with login.password = the app
# password, then swap this file for an ExternalSecret referencing it. The
# schema/DDL and exporter contract are unaffected by that change.
#
# Keys:
#   POSTGRES_PASSWORD  — superpassword for the postgres:16 container init
#   APP_PASSWORD       — spotify_app role (read/write, owned by exporter)
#   GRAFANA_RO_PASSWORD— grafana_ro role (read-only, used by the datasource)
apiVersion: v1
kind: Secret
metadata:
  name: spotify-postgres
  namespace: monitor
  labels:
    app: spotify-postgres
    app.kubernetes.io/managed-by: dev-overlay
type: Opaque
data:
  # postgres superuser password == app password (container bootstraps as the
  # superuser 'postgres'; the migration Job then creates the least-priv roles).
  POSTGRES_PASSWORD: R3ZLaU5jak5meWhreUZZZHpYejVSU3gwS0xWSk4wcEI=
  APP_PASSWORD: R3ZLaU5jak5meWhreUZZZHpYejVSU3gwS0xWSk4wcEI=
  GRAFANA_RO_PASSWORD: UGMxdHdjd24yNkNvN0lTbE9VZFpGYlJTZDROZll3OHY=
---
# Garage S3 credentials for the weekly pg_dump CronJob. Mirrors
# loki-garage-secret.yaml: env-var-named keys so the aws-cli auto-discovers
# them. Source of truth: Garage key 'spotify-pgbackup-app' (created at deploy,
# RWO on bucket spotify-pgbackup). To rotate:
#   kubectl -n garage-system exec garage-0 -- /garage key rotate spotify-pgbackup-app
#   then base64 the new secret here and re-apply.
apiVersion: v1
kind: Secret
metadata:
  name: spotify-pgbackup-garage
  namespace: monitor
  labels:
    app: spotify-postgres
    app.kubernetes.io/managed-by: dev-overlay
type: Opaque
