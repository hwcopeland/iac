# Idempotent schema migration for the Spotify analytics DB. The DDL lives in a
# ConfigMap and is applied by a one-shot Job (psql in the postgres:16 image).
#
# Idempotency strategy:
#   * Every object uses CREATE ... IF NOT EXISTS.
#   * Roles are created via a DO-block guard (CREATE ROLE has no IF NOT EXISTS).
#   * The whole file is wrapped so re-running is a no-op: it records itself in
#     schema_migrations and short-circuits if version 1 is already present.
#   * Safe to run on every deploy / rollout-restart.
#
# Re-run after editing: bump the migration version, append a new guarded block.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spotify-postgres-migrations
  namespace: monitor
  labels:
    app: spotify-postgres
data:
  001_init.sql: |
    -- ============================================================== --
    --  Spotify analytics — schema migration 001 (initial)            --
    -- ============================================================== --
    BEGIN;

    -- ---- migration ledger ---------------------------------------- --
    CREATE TABLE IF NOT EXISTS schema_migrations (
        version      integer      PRIMARY KEY,
        description  text         NOT NULL,
        applied_at   timestamptz  NOT NULL DEFAULT now()
    );

    -- Short-circuit: if 001 is already applied, commit and stop here.
    DO $mig$
    BEGIN
      IF EXISTS (SELECT 1 FROM schema_migrations WHERE version = 1) THEN
        RAISE NOTICE 'migration 001 already applied; skipping';
      ELSE
        RAISE NOTICE 'applying migration 001';
      END IF;
    END
    $mig$;

    COMMIT;

    -- ---- least-privilege roles ----------------------------------- --
    -- spotify_app: read/write, used by the exporter writer.
    -- grafana_ro : read-only, used by the Grafana Postgres datasource.
    -- NOTE: psql client-side vars (:'app_pw') are substituted into the SQL TEXT
    -- before it reaches the server, so they CANNOT be used inside a server-side
    -- DO/plpgsql block. We therefore build the CREATE/ALTER ROLE statements at
    -- the psql layer with \gexec: the SELECT generates the statement string
    -- (with the password literal already substituted) only when needed, and
    -- \gexec runs it. CREATE ROLE has no IF NOT EXISTS, so we branch on
    -- pg_roles existence; ALTER keeps the password in sync on re-runs.
    SELECT format('CREATE ROLE spotify_app LOGIN PASSWORD %L', :'app_pw')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'spotify_app')
    \gexec
    SELECT format('ALTER ROLE spotify_app WITH LOGIN PASSWORD %L', :'app_pw')
    \gexec

    SELECT format('CREATE ROLE grafana_ro LOGIN PASSWORD %L', :'ro_pw')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'grafana_ro')
    \gexec
    SELECT format('ALTER ROLE grafana_ro WITH LOGIN PASSWORD %L', :'ro_pw')
    \gexec

    BEGIN;

    -- ============================================================== --
    --  DIMENSION: artists                                            --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS artists (
        artist_id    text         PRIMARY KEY,          -- Spotify artist ID
        name         text         NOT NULL,
        genres       text[]       NOT NULL DEFAULT '{}', -- raw Spotify genres
        popularity   smallint,                           -- 0-100, nullable
        followers    integer,                            -- nullable
        fetched_at   timestamptz  NOT NULL DEFAULT now(),
        updated_at   timestamptz  NOT NULL DEFAULT now()
    );

    -- ============================================================== --
    --  DIMENSION: albums                                             --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS albums (
        album_id      text         PRIMARY KEY,          -- Spotify album ID
        name          text         NOT NULL,
        album_type    text,                              -- album|single|compilation
        release_date  date,                              -- normalized to a date
        release_date_precision text,                     -- year|month|day
        total_tracks  smallint,
        label         text,
        fetched_at    timestamptz  NOT NULL DEFAULT now(),
        updated_at    timestamptz  NOT NULL DEFAULT now()
    );

    -- ============================================================== --
    --  DIMENSION: tracks (incl. nullable audio-feature columns)      --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS tracks (
        track_id      text         PRIMARY KEY,          -- Spotify track ID
        name          text         NOT NULL,
        artist_id     text         REFERENCES artists(artist_id),  -- primary artist
        album_id      text         REFERENCES albums(album_id),
        duration_ms   integer,
        explicit      boolean,
        popularity    smallint,                          -- 0-100, nullable
        isrc          text,                              -- recording identifier
        -- ---- audio features (nullable: fetched lazily / may be unavailable) --
        danceability      real,
        energy            real,
        track_key         smallint,                      -- pitch class 0-11 ('key' is reserved)
        loudness          real,
        mode              smallint,                      -- 0 minor / 1 major
        speechiness       real,
        acousticness      real,
        instrumentalness  real,
        liveness          real,
        valence           real,
        tempo             real,
        time_signature    smallint,
        audio_features_fetched_at timestamptz,           -- NULL = features not yet fetched
        fetched_at    timestamptz  NOT NULL DEFAULT now(),
        updated_at    timestamptz  NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS tracks_artist_id_idx ON tracks (artist_id);
    CREATE INDEX IF NOT EXISTS tracks_album_id_idx  ON tracks (album_id);
    -- Find tracks still missing audio features (partial, cheap).
    CREATE INDEX IF NOT EXISTS tracks_features_missing_idx
        ON tracks (track_id) WHERE audio_features_fetched_at IS NULL;

    -- ============================================================== --
    --  FACT: play_events (recently-played scrobbles)                 --
    --  PK (played_at, track_id): a track can recur; the timestamp is --
    --  the natural event key. BRIN on played_at (append-only, time-  --
    --  ordered) + btree on track_id for per-track lookups.           --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS play_events (
        played_at    timestamptz  NOT NULL,              -- Spotify played_at
        track_id     text         NOT NULL REFERENCES tracks(track_id),
        ms_played    integer,                            -- nullable (recently-played gives full track)
        context_type text,                               -- playlist|album|artist|...
        context_uri  text,
        PRIMARY KEY (played_at, track_id)
    );
    -- BRIN: tiny, ideal for the monotonic played_at on an append-only fact.
    CREATE INDEX IF NOT EXISTS play_events_played_at_brin
        ON play_events USING brin (played_at);
    -- btree for "all plays of track X" and join-back.
    CREATE INDEX IF NOT EXISTS play_events_track_id_idx
        ON play_events (track_id);

    -- ============================================================== --
    --  library_tracks — SCD snapshot of "saved" (liked) tracks.      --
    --  removed_at IS NULL  => currently saved (open row).            --
    --  removed_at IS NOT NULL => was removed at that time (closed).  --
    --  Partial-unique open-row index: at most ONE open row per track.--
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS library_tracks (
        id          bigint       GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        track_id    text         NOT NULL REFERENCES tracks(track_id),
        added_at    timestamptz  NOT NULL,               -- Spotify "added_at"
        observed_at timestamptz  NOT NULL DEFAULT now(), -- when our snapshot saw it
        removed_at  timestamptz                          -- NULL = still saved
    );
    -- Enforce a single open (saved) row per track.
    CREATE UNIQUE INDEX IF NOT EXISTS library_tracks_open_uidx
        ON library_tracks (track_id) WHERE removed_at IS NULL;
    CREATE INDEX IF NOT EXISTS library_tracks_track_id_idx
        ON library_tracks (track_id);

    -- ============================================================== --
    --  genre_rollup — maps a raw Spotify genre to a parent bucket.   --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS genre_rollup (
        raw_genre    text  PRIMARY KEY,                  -- e.g. 'melodic death metal'
        parent_genre text  NOT NULL                      -- e.g. 'metal'
    );
    CREATE INDEX IF NOT EXISTS genre_rollup_parent_idx
        ON genre_rollup (parent_genre);

    -- ============================================================== --
    --  top_snapshots — periodic "top tracks/artists" captures.       --
    -- ============================================================== --
    CREATE TABLE IF NOT EXISTS top_snapshots (
        id          bigint       GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        snapshot_at timestamptz  NOT NULL DEFAULT now(),
        entity_type text         NOT NULL,               -- 'track' | 'artist'
        time_range  text         NOT NULL,               -- short_term|medium_term|long_term
        rank        smallint     NOT NULL,               -- 1-based position
        entity_id   text         NOT NULL,               -- track_id or artist_id
        UNIQUE (snapshot_at, entity_type, time_range, rank)
    );
    CREATE INDEX IF NOT EXISTS top_snapshots_lookup_idx
        ON top_snapshots (entity_type, time_range, snapshot_at);

    -- ============================================================== --
    --  GRANTS                                                        --
    -- ============================================================== --
    -- App role: full DML on all tables + sequence usage (identity cols).
    GRANT USAGE ON SCHEMA public TO spotify_app;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO spotify_app;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO spotify_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO spotify_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT USAGE, SELECT ON SEQUENCES TO spotify_app;

    -- Read-only role for Grafana: SELECT only.
    GRANT USAGE ON SCHEMA public TO grafana_ro;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO grafana_ro;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT SELECT ON TABLES TO grafana_ro;

    -- ---- record the migration (idempotent) ----------------------- --
    INSERT INTO schema_migrations (version, description)
    VALUES (1, 'initial spotify analytics schema')
    ON CONFLICT (version) DO NOTHING;

    COMMIT;
  002_genre_enrichment.sql: |
    -- ============================================================== --
    --  Spotify analytics — schema migration 002 (genre enrichment)   --
    --                                                                 --
    --  Adds MusicBrainz external-ID resolution (NO third-party API    --
    --  signups — MusicBrainz needs only a descriptive User-Agent) and --
    --  per-track / per-artist fine sub-genre tagging, plus a UNION    --
    --  VIEW (track_genre_effective) that surfaces ALL fine sub-genre  --
    --  tags per track (Spotify + MusicBrainz), de-duped and NOT       --
    --  collapsed to coarse parents. The existing genre_rollup table   --
    --  is used ONLY for optional parent grouping / drill-down nav.    --
    --  Idempotent: every object is CREATE ... IF NOT EXISTS / guarded;--
    --  the whole block short-circuits once version 2 is recorded.     --
    -- ============================================================== --
    DO $mig2$
    BEGIN
      IF EXISTS (SELECT 1 FROM schema_migrations WHERE version = 2) THEN
        RAISE NOTICE 'migration 002 already applied; skipping';
        RETURN;
      END IF;
      RAISE NOTICE 'applying migration 002';

      -- ---- genre_rollup gains a provenance column ---------------- --
      -- Existing rows were all seeded from the curated Spotify-tag map,
      -- so they backfill to 'spotify'. The column is extensible, but only
      -- 'spotify' and 'musicbrainz' are used now. The rollup is for
      -- OPTIONAL parent grouping; the fine sub-genres are never replaced
      -- by their parent in the primary view.
      ALTER TABLE genre_rollup
        ADD COLUMN IF NOT EXISTS source text NOT NULL DEFAULT 'spotify';

      -- ---- music_ids — resolved MusicBrainz identifiers ---------- --
      -- One row per track: the durable cache of ISRC → MusicBrainz IDs.
      -- Resolved IDs are permanent (an ISRC never remaps), so the
      -- enrichment job writes once and skips already-resolved tracks.
      -- match_method records WHICH path resolved it (isrc, artist_year)
      -- so the coverage panels can distinguish ISRC-grade matches.
      CREATE TABLE IF NOT EXISTS music_ids (
          track_id            text PRIMARY KEY REFERENCES tracks(track_id),
          isrc                text,
          mb_recording_id     text,
          mb_artist_id        text,
          mb_releasegroup_id  text,
          match_method        text,                       -- isrc|artist_year
          match_score         real,                       -- 0..1 confidence
          match_status        text NOT NULL DEFAULT 'unmatched', -- unmatched|matched|nomatch|error
          resolved_at         timestamptz
      );
      CREATE INDEX IF NOT EXISTS music_ids_status_idx
          ON music_ids (match_status);
      CREATE INDEX IF NOT EXISTS music_ids_isrc_idx
          ON music_ids (isrc) WHERE isrc IS NOT NULL;
      CREATE INDEX IF NOT EXISTS music_ids_mb_recording_idx
          ON music_ids (mb_recording_id) WHERE mb_recording_id IS NOT NULL;

      -- ---- track_genres — per-track fine sub-genre tags ---------- --
      -- A track can carry many fine sub-genre tags from MusicBrainz
      -- (curated genres + folksonomy tags). PK (track_id, source,
      -- raw_tag) makes re-fetch idempotent via ON CONFLICT DO NOTHING.
      CREATE TABLE IF NOT EXISTS track_genres (
          track_id   text NOT NULL REFERENCES tracks(track_id),
          source     text NOT NULL,                       -- spotify|musicbrainz
          raw_tag    text NOT NULL,                       -- fine sub-genre, as returned
          tag_kind   text NOT NULL DEFAULT 'genre',       -- genre|tag
          weight     real,                                -- source vote count / score
          fetched_at timestamptz NOT NULL DEFAULT now(),
          PRIMARY KEY (track_id, source, raw_tag)
      );
      CREATE INDEX IF NOT EXISTS track_genres_track_idx
          ON track_genres (track_id);
      CREATE INDEX IF NOT EXISTS track_genres_source_idx
          ON track_genres (source);

      -- ---- artist_genres_enriched — same shape, keyed by artist -- --
      CREATE TABLE IF NOT EXISTS artist_genres_enriched (
          artist_id  text NOT NULL REFERENCES artists(artist_id),
          source     text NOT NULL,                       -- musicbrainz
          raw_tag    text NOT NULL,
          tag_kind   text NOT NULL DEFAULT 'genre',
          weight     real,
          fetched_at timestamptz NOT NULL DEFAULT now(),
          PRIMARY KEY (artist_id, source, raw_tag)
      );
      CREATE INDEX IF NOT EXISTS artist_genres_enriched_artist_idx
          ON artist_genres_enriched (artist_id);

      RAISE NOTICE 'migration 002 tables created';
    END
    $mig2$;

    -- ---- track_genre_effective — the fine sub-genre UNION VIEW --- --
    -- Surfaces the UNION of FINE sub-genre tags per track from every
    -- source (Spotify artist genres[] + MusicBrainz track/artist
    -- genres+tags), de-duped on (track_id, sub_genre). It does NOT
    -- collapse to coarse parents — "rock"/"pop" are meaningless across
    -- decades, so the hyper-specific tags (e.g. "yacht rock",
    -- "neurofunk", "permanent wave") are exactly what we keep. The
    -- OPTIONAL parent_genre column (from genre_rollup) is exposed only
    -- for drill-down navigation/grouping; it is never substituted for
    -- the sub_genre. `source` distinguishes Spotify- vs MusicBrainz-
    -- supplied tags so coverage panels can measure how much previously
    -- `untagged` (Spotify-empty) catalog music MusicBrainz filled in.
    CREATE OR REPLACE VIEW track_genre_effective AS
    WITH fine_tags AS (
        -- Spotify: the primary artist's hyper-specific genres[] tags.
        SELECT t.track_id,
               lower(g.raw)              AS sub_genre,
               'spotify'::text           AS source,
               1.0::real                 AS weight
        FROM tracks t
        JOIN artists a ON a.artist_id = t.artist_id
        CROSS JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw)
        WHERE g.raw <> ''

        UNION ALL
        -- MusicBrainz: per-track fine genres + folksonomy tags. These FILL
        -- the gap where Spotify returns no genre (old/catalog artists).
        SELECT tg.track_id,
               lower(tg.raw_tag)         AS sub_genre,
               'musicbrainz'::text       AS source,
               COALESCE(tg.weight, 1.0)  AS weight
        FROM track_genres tg
        WHERE tg.source = 'musicbrainz'

        UNION ALL
        -- MusicBrainz: artist-level fine tags, mapped onto EVERY track by that
        -- artist — not just the individually-resolved ones. This maximizes
        -- coverage: once one track by an old/untagged artist resolves an artist
        -- MBID, the whole catalog by that artist inherits the sub-genres.
        SELECT t.track_id,
               lower(age.raw_tag)        AS sub_genre,
               'musicbrainz'::text       AS source,
               COALESCE(age.weight, 1.0) AS weight
        FROM tracks t
        JOIN artist_genres_enriched age
          ON age.artist_id = t.artist_id AND age.source = 'musicbrainz'
        WHERE age.raw_tag <> ''
    )
    -- De-dupe on (track_id, sub_genre); keep the highest weight and a
    -- stable source preference (spotify first as the "native" tag) for
    -- the surviving row. The OPTIONAL parent is attached for drill-down.
    SELECT DISTINCT ON (ft.track_id, ft.sub_genre)
           ft.track_id,
           ft.sub_genre,
           initcap(ft.sub_genre)               AS sub_genre_display,
           ft.source,
           ft.weight,
           gr.parent_genre                      AS parent_genre   -- optional grouping only
    FROM fine_tags ft
    LEFT JOIN genre_rollup gr ON gr.raw_genre = ft.sub_genre
    WHERE ft.sub_genre <> ''
    ORDER BY ft.track_id, ft.sub_genre,
             (ft.source = 'spotify') DESC, ft.weight DESC NULLS LAST;

    -- ---- grants for the new tables/view ------------------------- --
    -- (idempotent; covered by ALTER DEFAULT PRIVILEGES from 001 for
    -- objects created AFTER it ran, but the migration Job runs as the
    -- superuser 'postgres', so default-priv inheritance does not apply —
    -- grant explicitly.)
    GRANT SELECT, INSERT, UPDATE, DELETE
        ON music_ids, track_genres, artist_genres_enriched TO spotify_app;
    GRANT SELECT
        ON music_ids, track_genres, artist_genres_enriched, track_genre_effective
        TO grafana_ro;

    -- ---- record the migration (idempotent) --------------------- --
    INSERT INTO schema_migrations (version, description)
    VALUES (2, 'genre enrichment (musicbrainz): music_ids, track_genres, artist_genres_enriched, track_genre_effective fine sub-genre view')
    ON CONFLICT (version) DO NOTHING;
---
apiVersion: batch/v1
kind: Job
metadata:
  # Renamed to -migrate-002 when migration 002 was added: a Job's pod template
  # is immutable, so re-applying a same-named Job after editing args fails. Bump
  # this suffix (-migrate-00N) each time a new migration key is added.
  name: spotify-postgres-migrate-002
  namespace: monitor
  labels:
    app: spotify-postgres
spec:
  backoffLimit: 3
  # ttl so re-applying with a new migration replaces cleanly; bump the Job name
  # (e.g. -migrate-002) when you add migrations so apply doesn't hit the
  # immutable-Job error.
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: spotify-postgres-migrate
    spec:
      restartPolicy: Never
      enableServiceLinks: false
      containers:
        - name: migrate
          image: postgres:16
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              echo "waiting for postgres to accept connections..."
              until pg_isready -h spotify-postgres -U postgres -d spotify; do
                sleep 2
              done
              echo "applying migrations..."
              psql -v ON_ERROR_STOP=1 \
                   -h spotify-postgres -U postgres -d spotify \
                   -v app_pw="$APP_PASSWORD" \
                   -v ro_pw="$GRAFANA_RO_PASSWORD" \
                   -f /migrations/001_init.sql
              # 002 is guarded (short-circuits if version 2 already recorded) and
              # uses no psql client vars, so it is safe on every re-run.
              psql -v ON_ERROR_STOP=1 \
                   -h spotify-postgres -U postgres -d spotify \
                   -f /migrations/002_genre_enrichment.sql
              echo "migration complete; current schema_migrations:"
              psql -h spotify-postgres -U postgres -d spotify \
                   -c "SELECT version, description, applied_at FROM schema_migrations ORDER BY version;"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: spotify-postgres
                  key: POSTGRES_PASSWORD
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spotify-postgres
                  key: APP_PASSWORD
            - name: GRAFANA_RO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spotify-postgres
                  key: GRAFANA_RO_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: migrations
          configMap:
            name: spotify-postgres-migrations
