# SMTP credentials for Alertmanager's email receiver.
# Pulls from existing Bitwarden item "SMTP" (hampton888@gmail.com +
# Gmail app-password) via the bitwarden-login ClusterSecretStore.
#
# Consumed by: alertmanager.alertmanagerSpec.secrets in kps values, mounted
# at /etc/alertmanager/secrets/alertmanager-smtp/{smtp_user,smtp_password}
# and referenced via global.smtp_auth_username_file / smtp_auth_password_file.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp
  namespace: monitor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: alertmanager-smtp
    creationPolicy: Owner
  data:
    - secretKey: smtp_user
      remoteRef:
        key: "a1ba9084-f041-4da6-aa90-ae98428b7cbb"
        property: username
    - secretKey: smtp_password
      remoteRef:
        key: "a1ba9084-f041-4da6-aa90-ae98428b7cbb"
        property: password
