# Renders mktxp.conf into the `mktxp-credentials` Secret, with the real
# RouterOS API password pulled from Bitwarden. The Deployment mounts this
# Secret at /mktxp_config so mktxp reads it as its config file.
#
# Bitwarden item layout:
#   - login.username: mktxp_user
#   - login.password: <RouterOS API password for mktxp_user>
# Both routers (CCR-2004, cAP) use the same credentials by design — they
# share a dedicated read-only RouterOS user.
#
# Replace 7518356e-151c-4cc3-8970-e7c718a4dedd with the UUID of the Bitwarden item before
# applying. Get the UUID with:  bw get item mktxp-routers | jq -r .id
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mktxp-credentials
  namespace: monitor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: mktxp-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # MKTXP process-level config (no secrets). Mirrored verbatim from
        # _mktxp.conf in this directory; kept in-template so the Secret
        # contains the full config dir mktxp expects.
        _mktxp.conf: |
          [MKTXP]
              listen = '0.0.0.0:49090'
              socket_timeout = 5

              initial_delay_on_failure = 120
              max_delay_on_failure = 900
              delay_inc_div = 5

              bandwidth = True
              bandwidth_test_interval = 600
              minimal_collect_interval = 5

              verbose_mode = False

              fetch_routers_in_parallel = False
              max_worker_threads = 5
              max_scrape_duration = 30
              total_max_scrape_duration = 90

              compact_default_conf_values = False

              probe_connection_pool_ttl = 300
              probe_connection_pool_max_size = 5
              http_server_threads = 3
              prometheus_headers_deduplication = False
              persistent_router_connection_pool = False
              probe_connection_pool = False
              persistent_dhcp_cache = False
              bandwidth_test_dns_server = ''
        mktxp.conf: |
          [CCR-2004]
              hostname = 10.0.0.1
              username = {{ .username }}
              password = {{ .password }}

              bgp = True
              poe = False
              dns = True
              routing_stats = True
              connections = True
              connection_stats = False

          # cAP at 10.0.0.254 not scraped directly: it is CAPsMAN-managed by
          # CCR-2004 and all its useful telemetry (wireless clients, signal,
          # rx/tx, registrations, cAP identity/version) flows via the
          # capsman/capsman_clients toggles already enabled on the CCR
          # through the [default] section. See mktxp.conf.example for the
          # full rationale.

          [default]
              enabled = True
              hostname = localhost
              port = 8728
              username = username
              password = password
              credentials_file = ""

              use_ssl = False
              no_ssl_certificate = False
              ssl_certificate_verify = False
              ssl_ca_file = ""
              plaintext_login = True

              health = True
              installed_packages = True
              dhcp = True
              dhcp_lease = True
              connections = True
              connection_stats = False
              interface = True
              route = True
              pool = True
              firewall = True
              neighbor = True
              dns = False
              ipv6_route = False
              ipv6_pool = False
              ipv6_firewall = False
              ipv6_neighbor = False
              poe = True
              monitor = True
              netwatch = True
              public_ip = True
              wireless = True
              wireless_clients = True
              capsman = True
              capsman_clients = True
              eoip = False
              gre = False
              ipip = False
              lte = False
              ipsec = False
              switch_port = False
              container = False
              module_only = False
              ssl_check_hostname = False
              w60g = False
              address_list = False
              ipv6_address_list = False
              custom_labels = {}
              kid_control_assigned = False
              kid_control_dynamic = False
              user = True
              queue = True
              bfd = False
              bgp = False
              routing_stats = False
              certificate = False
              remote_dhcp_entry = None
              remote_capsman_entry = None
              interface_name_format = 'comment'
              check_for_updates = False
  data:
    - secretKey: username
      remoteRef:
        key: "7518356e-151c-4cc3-8970-e7c718a4dedd"
        property: username
    - secretKey: password
      remoteRef:
        key: "7518356e-151c-4cc3-8970-e7c718a4dedd"
        property: password
