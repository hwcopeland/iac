# Platform-level PrometheusRule CRs — migrated from the legacy
# Grafana-native ConfigMap `grafana-alert-rules-platform` (deleted in the
# same change). See Phase 1c (#32) / TDD §10.1 Q3 — operator chose to
# unify alert routing under Alertmanager so silences and email delivery
# work uniformly across both chart-default rules and these custom ones.
#
# Severity labels are kept the same as the Grafana versions so the
# kube-prometheus-stack inhibit rules (critical inhibits warning for
# the same alertname) keep working.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-rules
  namespace: monitor
  labels:
    # kube-prometheus-stack Prometheus selects on this label to load the rules.
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform-health
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) * 300 > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: |
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
              has restarted >1 time in the last 5 minutes (rate of restarts averaged over 5m, scaled by 300s).

        - alert: PodOOMKilled
          # No `for:` — fire on the first scrape that observes the condition;
          # OOM events are one-shot terminations and won't persist long.
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: |
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
              was killed by the OOM killer. Check memory limits and recent allocations.

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: |
              Node {{ $labels.node }} has been NotReady for >2 minutes. Check kubelet,
              networking (Cilium), and node hardware (RAPL / dmesg).

        - alert: PVCFillingUp
          expr: kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is >85% full"
            description: |
              PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has <15%
              free space ({{ $value | humanizePercentage }}). Resize the PVC or clean up data.

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas - kube_deployment_status_replicas_available > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: |
              Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has
              {{ $value }} fewer available replicas than desired for >5 minutes.
              Check pod scheduling, image pulls, and readiness probes.

    - name: platform-thermal
      interval: 1m
      rules:
        # Same alertname at two severities on purpose — the chart's default
        # inhibit rule (critical inhibits warning for the same alertname)
        # suppresses the warning while the critical is firing.
        # Baseline (2026-07-19): hottest sensors are nixos nvme0 temp2 at
        # ~79.9C (pinned/chronic, watch it) and forum01 coretemp at ~75C.
        - alert: NodeComponentHot
          expr: >-
            (node_hwmon_temp_celsius
              * on(instance) group_left(nodename) node_uname_info) > 80
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.nodename }} {{ $labels.chip }}/{{ $labels.sensor }} sustained above 80C"
            description: |
              Sensor {{ $labels.chip }}/{{ $labels.sensor }} on node {{ $labels.nodename }}
              has been above 80C for 15 minutes (now {{ $value | humanize }}C).
              Check airflow/heatsinks; NVMe drives in particular throttle and age fast above 80C.

        - alert: NodeComponentHot
          expr: >-
            (node_hwmon_temp_celsius
              * on(instance) group_left(nodename) node_uname_info) > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.nodename }} {{ $labels.chip }}/{{ $labels.sensor }} above 90C"
            description: |
              Sensor {{ $labels.chip }}/{{ $labels.sensor }} on node {{ $labels.nodename }}
              has been above 90C for 5 minutes (now {{ $value | humanize }}C).
              Imminent thermal throttling or shutdown risk.

        - alert: GPUHot
          # RTX 3070 slowdown threshold is ~93C; alert well before that.
          expr: DCGM_FI_DEV_GPU_TEMP > 83
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "GPU {{ $labels.gpu }} ({{ $labels.modelName }}) sustained above 83C"
            description: |
              GPU temperature has been above 83C for 15 minutes (now {{ $value | humanize }}C).
              Check case airflow on nixos-gpu and GPU fan speed (DCGM_FI_DEV_FAN_SPEED).

        - alert: SynologyDiskHot
          # HDDs should stay under ~50C; alert on sustained 55C.
          expr: syno_disk_temperature > 55
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Synology disk {{ $labels.disk_index }} sustained above 55C"
            description: |
              Synology NAS disk (index {{ $labels.disk_index }}) has been above 55C
              for 15 minutes (now {{ $value | humanize }}C). Check NAS fans and airflow.
