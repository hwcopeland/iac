# Garage S3 credentials for Loki — dev-only plain Secret in monitor ns.
# Follows the same pattern as khemeia's chem/garage-secret.yaml: k8s
# doesn't support cross-namespace secretKeyRef so the credentials are
# replicated per consuming namespace.
#
# Keys are env-var-named (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) so
# loki-values.yaml can pull them via singleBinary.extraEnvFrom and Loki's
# AWS SDK picks them up automatically.
#
# Source of truth: Garage's `loki-app` access key (created 2026-05-23,
# granted rw+owner on bucket loki-chunks). To rotate:
#   kubectl -n garage-system exec garage-0 -- /garage key rotate loki-app
#   then base64-encode the new secret here and re-apply.
apiVersion: v1
kind: Secret
metadata:
  name: loki-garage-secret
  namespace: monitor
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/managed-by: dev-overlay
type: Opaque
data:
