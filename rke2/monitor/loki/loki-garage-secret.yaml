# Garage S3 credentials for Loki (monitor namespace) — externalized via ESO.
# Env-var-named keys (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) so Loki's AWS
# SDK auto-discovers them via singleBinary.extraEnvFrom.
#
# SECURITY: previously a plaintext `kind: Secret` on a public repo → rotate:
#   kubectl -n garage-system exec garage-0 -- /garage key rotate loki-app
# then store the new key in a Bitwarden item with custom fields
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY and set its UUID below.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-garage-secret
  namespace: monitor
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: loki-garage-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID | trim }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY | trim }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: ed340967-138b-44c0-a684-8123d08e124f
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: ed340967-138b-44c0-a684-8123d08e124f
        property: AWS_SECRET_ACCESS_KEY
