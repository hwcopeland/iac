          },
          "description": "Shannon entropy (log base 2) of the parent-genre distribution each month. Higher = more evenly spread across genres; lower = dominated by one.",
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "WITH pp AS (SELECT DISTINCT pe.played_at, pe.track_id, genre_parent(lower(g.raw)) AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE $__timeFilter(pe.played_at)), c AS (SELECT date_trunc('month', played_at) AS mon, parent, count(*) AS n FROM pp WHERE parent IS NOT NULL GROUP BY 1, 2), tot AS (SELECT mon, sum(n) AS t FROM c GROUP BY 1) SELECT c.mon AS time, round((-sum((c.n::numeric/tot.t) * ln(c.n::numeric/tot.t)) / ln(2))::numeric, 2) AS entropy_bits FROM c JOIN tot ON tot.mon = c.mon GROUP BY c.mon ORDER BY 1"
