          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "description": "Side-by-side top-15 artists by listening hours for calendar 2024 vs 2026 (full-history board ignores the picker for this fixed comparison). Artist identity is COALESCE(linked artists.name, GDPR-export artist_name).",
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH y24 AS (SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS name, round((sum(pe.ms_played)/3600000.0)::numeric,1) AS h FROM play_events pe JOIN tracks t ON t.track_id=pe.track_id LEFT JOIN artists a ON a.artist_id=t.artist_id WHERE pe.ms_played IS NOT NULL AND pe.played_at >= '2024-01-01' AND pe.played_at < '2025-01-01' GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY h DESC LIMIT 15), y26 AS (SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS name, round((sum(pe.ms_played)/3600000.0)::numeric,1) AS h FROM play_events pe JOIN tracks t ON t.track_id=pe.track_id LEFT JOIN artists a ON a.artist_id=t.artist_id WHERE pe.ms_played IS NOT NULL AND pe.played_at >= '2026-01-01' AND pe.played_at < '2027-01-01' GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY h DESC LIMIT 15), r24 AS (SELECT name, h, row_number() OVER (ORDER BY h DESC) AS rn FROM y24), r26 AS (SELECT name, h, row_number() OVER (ORDER BY h DESC) AS rn FROM y26) SELECT COALESCE(r24.rn, r26.rn) AS rank, r24.name AS \"2024 artist\", r24.h AS \"2024 h\", r26.name AS \"2026 artist\", r26.h AS \"2026 h\" FROM r24 FULL OUTER JOIN r26 ON r24.rn = r26.rn ORDER BY rank"
            }
          ],
