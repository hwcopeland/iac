              "refId": "A",
              "format": "table",
              "rawSql": "WITH pp AS (SELECT DISTINCT pe.played_at, pe.track_id, genre_parent(lower(g.raw)) AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true), y24 AS (SELECT parent, count(*) AS n FROM pp WHERE parent IS NOT NULL AND played_at >= '2024-01-01' AND played_at < '2025-01-01' GROUP BY 1), y26 AS (SELECT parent, count(*) AS n FROM pp WHERE parent IS NOT NULL AND played_at >= '2026-01-01' AND played_at < '2027-01-01' GROUP BY 1) SELECT COALESCE(y24.parent, y26.parent) AS genre, COALESCE(y24.n,0) AS \"2024 plays\", COALESCE(y26.n,0) AS \"2026 plays\" FROM y24 FULL OUTER JOIN y26 ON y24.parent = y26.parent ORDER BY \"2026 plays\" DESC, \"2024 plays\" DESC"
