          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, pe.skipped, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE pe.skipped IS NOT NULL AND $__timeFilter(pe.played_at)) SELECT parent AS genre, round((100.0 * avg(skipped::int))::numeric, 1) AS skip_pct FROM play_parent WHERE parent <> 'Other' GROUP BY parent HAVING count(*) >= 50 ORDER BY skip_pct DESC"
