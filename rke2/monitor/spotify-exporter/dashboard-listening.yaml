          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "description": "Stacked monthly share of each parent genre (per-play deduped). Shares can sum > 100% because a play can carry several parents; read it as relative attention, not a strict partition.",
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, genre_parent(lower(g.raw)) AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE $__timeFilter(pe.played_at)), m AS (SELECT date_trunc('month', played_at) AS mon, parent, count(*) AS n FROM play_parent WHERE parent IS NOT NULL GROUP BY 1, 2), tot AS (SELECT date_trunc('month', played_at) AS mon, count(DISTINCT (played_at, track_id)) AS t FROM play_parent WHERE parent IS NOT NULL GROUP BY 1) SELECT m.mon AS time, m.parent AS metric, round((100.0 * m.n / NULLIF(tot.t,0))::numeric, 1) AS pct FROM m JOIN tot ON tot.mon = m.mon ORDER BY 1"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 0,
                "stacking": {
                  "mode": "normal"
                }
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
