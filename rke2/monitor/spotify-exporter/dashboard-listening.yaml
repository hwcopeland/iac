# Grafana dashboard: Spotify — Listening.
# Consolidated play-event analytics (play_events / tracks / artists / genre_rollup).
# Loaded by the kube-prometheus stack Grafana sidecar (label grafana_dashboard="1"),
# placed in the "Spotify" folder. Postgres datasource uid "spotify-postgres" is
# registered by @data-engineer alongside the spotify-postgres deployment.
#
# Explicit top-level "uid" (spotify-listening) avoids the orphan-duplicate sidecar
# bug (each ConfigMap MUST carry a unique uid). This dashboard supersedes the old
# dashboard-trends-behavior + dashboard-wrapped-anytime + the listening half of the
# old single dashboard.yaml.
#
# Skip-rate is intentionally OMITTED: /me/player/recently-played carries no
# ms_played, so a play cannot be distinguished from a skip. Audio-feature "vibe"
# panels were dropped — /audio-features is 403 (Nov-2024 deprecation); revisit
# when AudioMuse lands.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-listening
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-listening.json: |-
    {
      "uid": "spotify-listening",
      "title": "Spotify — Listening",
      "schemaVersion": 38,
      "version": 3,
      "refresh": "1h",
      "time": { "from": "2024-09-01T00:00:00.000Z", "to": "now" },
      "tags": ["spotify", "music", "listening"],
      "panels": [
        {
          "id": 1, "type": "text", "title": "Data note",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 2 },
          "options": { "mode": "markdown", "content": "Play events come from two sources: the **GDPR Extended Streaming History export** (one-time backfill, ~54k rows, carries `ms_played` + behavioural fields) and the live `/me/player/recently-played` feed (trickle of new rows, `ms_played`/behaviour NULL). Hours panels use `ms_played`. **Skip-rate, intent, shuffle, device & geo live on the companion [Spotify — Listening Behavior](/d/spotify-listening-behavior) dashboard.** New-artist discovery counts only artists with a Spotify `artist_id` (export rows are name-only until the live exporter links them). Genres roll up to parent buckets via the keyword `genre_parent()` classifier (long-tail sub-genres mapped by substring; DnB & Country kept as their own parents). Non-genre tags (`2020s`, `top 100`, …) stay in **Other**." }
        },

        { "id": 9, "type": "row", "title": "Overview", "gridPos": { "x": 0, "y": 2, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "stat", "title": "Total plays recorded",
          "gridPos": { "x": 0, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(*) AS plays FROM play_events" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 11, "type": "stat", "title": "Distinct tracks played",
          "gridPos": { "x": 6, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT track_id) AS played FROM play_events" } ],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 12, "type": "stat", "title": "Longest listening streak (consecutive days)",
          "gridPos": { "x": 12, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH days AS (SELECT DISTINCT played_at::date AS d FROM play_events), grp AS (SELECT d, d - (row_number() OVER (ORDER BY d))::int AS g FROM days) SELECT max(streak) AS longest_streak FROM (SELECT count(*) AS streak FROM grp GROUP BY g) s" } ],
          "fieldConfig": { "defaults": { "unit": "d", "color": { "mode": "fixed", "fixedColor": "purple" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 13, "type": "stat", "title": "Current streak (days)",
          "gridPos": { "x": 18, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH days AS (SELECT DISTINCT played_at::date AS d FROM play_events), grp AS (SELECT d, d - (row_number() OVER (ORDER BY d))::int AS g FROM days) SELECT count(*) AS current_streak FROM grp WHERE g = (SELECT g FROM grp ORDER BY d DESC LIMIT 1) AND (SELECT max(d) FROM days) >= current_date - 1" } ],
          "fieldConfig": { "defaults": { "unit": "d" } },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 14, "type": "timeseries", "title": "Plays per week",
          "gridPos": { "x": 0, "y": 9, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', played_at) AS time, count(*) AS plays FROM play_events GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        },

        { "id": 19, "type": "row", "title": "Top tracks & artists", "gridPos": { "x": 0, "y": 17, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "table", "title": "Top tracks (all time)",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, count(*) AS plays, max(pe.played_at) AS last_played FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id GROUP BY t.name, a.name ORDER BY plays DESC LIMIT 50" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 21, "type": "table", "title": "Top artists (all time)",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT a.name AS artist, count(*) AS plays, count(DISTINCT pe.track_id) AS distinct_tracks FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id JOIN artists a ON a.artist_id = t.artist_id GROUP BY a.name ORDER BY plays DESC LIMIT 50" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 22, "type": "table", "title": "Weekly obsession — top tracks (last 7 days)",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, count(*) AS plays_7d FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.played_at > now() - interval '7 days' GROUP BY t.name, a.name ORDER BY plays_7d DESC LIMIT 25" } ],
          "options": { "showHeader": true }
        },

        { "id": 29, "type": "row", "title": "When do I listen?", "gridPos": { "x": 0, "y": 37, "w": 24, "h": 1 } },
        {
          "id": 30, "type": "heatmap", "title": "Plays by hour of day",
          "gridPos": { "x": 0, "y": 38, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT extract(hour FROM played_at)::int AS hour, count(*) AS plays FROM play_events GROUP BY 1 ORDER BY 1" } ],
          "options": { "calculate": false }
        },
        {
          "id": 31, "type": "bargauge", "title": "Plays by weekday",
          "gridPos": { "x": 12, "y": 38, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT to_char(played_at, 'Dy') AS weekday, count(*) AS plays FROM play_events GROUP BY to_char(played_at,'Dy'), extract(dow FROM played_at) ORDER BY extract(dow FROM played_at)" } ],
          "fieldConfig": { "defaults": { "min": 0, "color": { "mode": "continuous-BlPu" } } },
          "options": { "displayMode": "gradient", "orientation": "horizontal" }
        },

        { "id": 39, "type": "row", "title": "Genre mix & diversity", "gridPos": { "x": 0, "y": 47, "w": 24, "h": 1 } },
        {
          "id": 40, "type": "timeseries", "title": "Genre mix per week (parent buckets)",
          "gridPos": { "x": 0, "y": 48, "w": 24, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true) SELECT date_trunc('week', played_at) AS time, parent AS metric, count(*) AS plays FROM play_parent GROUP BY 1, 2 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 80 } } }
        },
        {
          "id": 41, "type": "timeseries", "title": "Genre-diversity index — distinct parent genres per week",
          "gridPos": { "x": 0, "y": 57, "w": 12, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', pe.played_at) AS time, count(DISTINCT COALESCE(genre_parent(lower(g.raw)),'Other')) AS distinct_parent_genres FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        },
        {
          "id": 42, "type": "timeseries", "title": "Genre-diversity index — Shannon entropy per week",
          "gridPos": { "x": 12, "y": 57, "w": 12, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, date_trunc('week', pe.played_at) AS w, COALESCE(genre_parent(lower(g.raw)),'Other') AS pg FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true), wk AS (SELECT w, pg, count(*) AS n FROM play_parent GROUP BY 1,2), tot AS (SELECT w, sum(n) AS total FROM wk GROUP BY w) SELECT wk.w AS time, -sum((wk.n::float/tot.total) * ln(wk.n::float/tot.total)) AS entropy FROM wk JOIN tot ON tot.w = wk.w GROUP BY wk.w ORDER BY wk.w" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "line", "fillOpacity": 15 } } }
        },

        { "id": 49, "type": "row", "title": "Discovery & mainstream-ness", "gridPos": { "x": 0, "y": 65, "w": 24, "h": 1 } },
        {
          "id": 50, "type": "timeseries", "title": "Discovery rate — first-ever plays per week (new tracks & artists)",
          "gridPos": { "x": 0, "y": 66, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [
            { "refId": "A", "format": "time_series", "rawSql":
              "SELECT date_trunc('week', first_play) AS time, 'new tracks' AS metric, count(*) AS n FROM (SELECT track_id, min(played_at) AS first_play FROM play_events GROUP BY track_id) f GROUP BY 1 ORDER BY 1" },
            { "refId": "B", "format": "time_series", "rawSql":
              "SELECT date_trunc('week', first_play) AS time, 'new artists' AS metric, count(*) AS n FROM (SELECT t.artist_id, min(pe.played_at) AS first_play FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.artist_id IS NOT NULL GROUP BY t.artist_id) f GROUP BY 1 ORDER BY 1" }
          ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        },
        {
          "id": 51, "type": "stat", "title": "Mainstream-ness (avg track popularity, all time)",
          "gridPos": { "x": 0, "y": 74, "w": 8, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT round(avg(t.popularity)::numeric, 1) AS avg_popularity FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.popularity IS NOT NULL" } ],
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 52, "type": "timeseries", "title": "Mainstream-ness over time (avg popularity / week)",
          "gridPos": { "x": 8, "y": 74, "w": 16, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', pe.played_at) AS time, avg(t.popularity) AS avg_popularity FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.popularity IS NOT NULL GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "custom": { "drawStyle": "line", "fillOpacity": 15 } } }
        },

        { "id": 69, "type": "row", "title": "Totals (time-weighted)", "gridPos": { "x": 0, "y": 80, "w": 24, "h": 1 } },
        {
          "id": 70, "type": "stat", "title": "Total listening hours",
          "gridPos": { "x": 0, "y": 91, "w": 8, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT SUM(ms_played)/3600000.0 AS hours FROM play_events WHERE $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "h", "decimals": 1, "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 71, "type": "stat", "title": "Distinct artists",
          "gridPos": { "x": 8, "y": 91, "w": 8, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT t.artist_id) AS artists FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.artist_id IS NOT NULL AND $__timeFilter(pe.played_at)" } ],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 72, "type": "stat", "title": "Distinct tracks",
          "gridPos": { "x": 16, "y": 91, "w": 8, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT track_id) AS tracks FROM play_events WHERE $__timeFilter(played_at)" } ],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },

        { "id": 79, "type": "row", "title": "Loyalty — TIME vs COUNT", "gridPos": { "x": 0, "y": 97, "w": 24, "h": 1 } },
        {
          "id": 80, "type": "text", "title": "What this shows",
          "gridPos": { "x": 0, "y": 98, "w": 24, "h": 2 },
          "options": { "mode": "markdown", "content": "Top-20 artists ranked two ways. **Hours rank** surfaces who you actually *listen* to (full plays) — your DnB favourites like BCee/Makoto climb. **Count rank** surfaces play *frequency*, inflated by skipped mainstream tracks. **rank_delta = count_rank − hours_rank**: large positive = you finish their tracks (loved); large negative = you start-and-skip (frequent but not committed)." }
        },
        {
          "id": 81, "type": "table", "title": "Artist loyalty — hours rank vs count rank (top 20 by hours)",
          "gridPos": { "x": 0, "y": 100, "w": 24, "h": 12 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH agg AS (SELECT a.name AS artist, SUM(pe.ms_played)/3600000.0 AS hours, count(*) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY a.name), ranked AS (SELECT artist, hours, plays, rank() OVER (ORDER BY hours DESC) AS hours_rank, rank() OVER (ORDER BY plays DESC) AS count_rank FROM agg) SELECT hours_rank, artist, round(hours::numeric, 1) AS hours, plays, count_rank, (count_rank - hours_rank) AS rank_delta FROM ranked ORDER BY hours_rank LIMIT 20" } ],
          "fieldConfig": { "defaults": {}, "overrides": [ { "matcher": { "id": "byName", "options": "rank_delta" }, "properties": [ { "id": "custom.cellOptions", "value": { "type": "color-background" } }, { "id": "color", "value": { "mode": "continuous-RdYlGr" } } ] } ] },
          "options": { "showHeader": true }
        },

        { "id": 89, "type": "row", "title": "Temporal (hours)", "gridPos": { "x": 0, "y": 112, "w": 24, "h": 1 } },
        {
          "id": 90, "type": "timeseries", "title": "Hours by hour of day",
          "gridPos": { "x": 0, "y": 113, "w": 12, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT extract(hour FROM played_at)::int AS hour_of_day, SUM(ms_played)/3600000.0 AS hours FROM play_events WHERE $__timeFilter(played_at) GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "custom": { "drawStyle": "bars", "fillOpacity": 70 } } }
        },
        {
          "id": 91, "type": "timeseries", "title": "Hours by day of week",
          "gridPos": { "x": 12, "y": 113, "w": 12, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT to_char(played_at, 'Dy') AS weekday, SUM(ms_played)/3600000.0 AS hours FROM play_events WHERE $__timeFilter(played_at) GROUP BY to_char(played_at,'Dy'), extract(dow FROM played_at) ORDER BY extract(dow FROM played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "h", "custom": { "drawStyle": "bars", "fillOpacity": 70 } } }
        },
        {
          "id": 92, "type": "timeseries", "title": "Listening hours per month",
          "gridPos": { "x": 0, "y": 121, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('month', played_at) AS time, SUM(ms_played)/3600000.0 AS hours FROM play_events WHERE $__timeFilter(played_at) GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        },

        { "id": 99, "type": "row", "title": "Geo travel trail", "gridPos": { "x": 0, "y": 129, "w": 24, "h": 1 } },
        {
          "id": 100, "type": "table", "title": "Travel trail — where I listened outside the US (first/last seen)",
          "gridPos": { "x": 0, "y": 130, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT conn_country, MIN(played_at) AS first_seen, MAX(played_at) AS last_seen, count(*) AS plays FROM play_events WHERE conn_country IS NOT NULL AND conn_country <> 'US' AND $__timeFilter(played_at) GROUP BY conn_country ORDER BY first_seen" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 101, "type": "geomap", "title": "Plays by country",
          "gridPos": { "x": 12, "y": 130, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT conn_country, count(*) AS plays FROM play_events WHERE conn_country IS NOT NULL AND $__timeFilter(played_at) GROUP BY conn_country ORDER BY plays DESC" } ],
          "options": { "view": { "id": "zero", "lat": 20, "lon": 0, "zoom": 1 }, "basemap": { "type": "default" }, "layers": [ { "type": "markers", "location": { "mode": "lookup", "lookup": "conn_country", "gazetteer": "countries" }, "config": { "style": { "size": { "field": "plays", "min": 4, "max": 30 }, "color": { "fixed": "green" } } } } ] }
        },

        { "id": 109, "type": "row", "title": "Devices & discovery", "gridPos": { "x": 0, "y": 139, "w": 24, "h": 1 } },
        {
          "id": 110, "type": "piechart", "title": "Plays by platform / device",
          "gridPos": { "x": 0, "y": 140, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(platform, 'unknown') AS platform, count(*) AS plays FROM play_events WHERE $__timeFilter(played_at) GROUP BY 1 ORDER BY plays DESC" } ],
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 111, "type": "timeseries", "title": "Discovery — new artists per month (first-ever play)",
          "gridPos": { "x": 12, "y": 140, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('month', first_play) AS time, count(*) AS new_artists FROM (SELECT t.artist_id, min(pe.played_at) AS first_play FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.artist_id IS NOT NULL GROUP BY t.artist_id) f WHERE $__timeFilter(first_play) GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        }
      ]
    }
