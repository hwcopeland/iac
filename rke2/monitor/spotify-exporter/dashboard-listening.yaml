# Grafana dashboard: Spotify — Listening (consolidated).
# THE single listening board: overview, top/loyalty, when, behavior, where, taste —
# organized into collapsible rows. Folds in the former spotify-overview, sessions,
# behavior, taste-evolution, and wrapped boards (now deleted). Library analytics live
# on the separate grafana-dashboard-spotify-library ConfigMap.
#
# Loaded by the kube-prometheus stack Grafana sidecar (label grafana_dashboard="1"),
# placed in the "Spotify" folder. Postgres datasource uid "spotify-postgres" is
# registered by @data-engineer alongside the spotify-postgres deployment; live
# Now-Playing panels use the in-cluster Prometheus datasource (uid "prometheus").
#
# Explicit top-level "uid" (spotify-listening) avoids the orphan-duplicate sidecar
# bug (each ConfigMap MUST carry a unique uid). Defaults to full history
# (2024-09-01 -> now); narrow with the time picker.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-listening
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Spotify
data:
  spotify-listening.json: |-
    {
      "uid": "spotify-listening",
      "title": "Spotify \u2014 Listening",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1h",
      "time": {
        "from": "2024-09-01T00:00:00.000Z",
        "to": "now"
      },
      "tags": [
        "listening",
        "music",
        "spotify"
      ],
      "panels": [
        {
          "type": "text",
          "title": "Data note",
          "id": 1,
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "Live **Now Playing** comes from Prometheus (`spotify_now_playing*`). Everything below is the **real ~54k-play listening record**: the GDPR **Extended Streaming History** export (one-time backfill, carries `ms_played` + behavioural fields `skipped`/`reason_start`/`reason_end`/`shuffle`/`platform`/`conn_country`) **plus** the live `/me/player/recently-played` trickle (`ms_played` + behaviour NULL, excluded from skip/intent/geo panels). Hours derive from `ms_played`. Genres use the keyword `genre_parent()` rollup with **per-play dedup**. Sessions = runs of plays with no gap > **30 min** (`LAG` window). On-repeat/biggest-day count distinct `(played_at, track_id)` rows. Defaults to full history (2024-09-01 -> now) \u2014 narrow with the time picker."
          }
        },
        {
          "type": "row",
          "title": "Overview",
          "collapsed": false,
          "id": 2,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "table",
          "title": "Now Playing",
          "gridPos": {
            "h": 5,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "spotify_now_playing_info",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true,
                  "job": true,
                  "instance": true,
                  "namespace": true,
                  "pod": true,
                  "container": true,
                  "endpoint": true,
                  "service": true,
                  "prometheus": true
                },
                "renameByName": {
                  "track": "Track",
                  "artist": "Artist",
                  "album": "Album"
                }
              }
            }
          ],
          "options": {
            "showHeader": true
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Playback",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "spotify_now_playing",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "Playing",
                      "color": "green"
                    },
                    "0": {
                      "text": "Paused / Idle",
                      "color": "orange"
                    }
                  }
                }
              ],
              "color": {
                "mode": "thresholds"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Track Progress",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "spotify_now_playing_progress_ratio",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Total plays",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 4
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT count(*) AS plays FROM play_events WHERE $__timeFilter(played_at)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Total hours",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT round((SUM(ms_played)/3600000.0)::numeric, 0) AS hours FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Distinct artists",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT count(DISTINCT COALESCE(a.name, t.artist_name)) AS artists FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE COALESCE(a.name, t.artist_name) IS NOT NULL AND $__timeFilter(pe.played_at)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Distinct tracks",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT count(DISTINCT track_id) AS tracks FROM play_events WHERE $__timeFilter(played_at)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Skip rate",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT round((100.0 * AVG(skipped::int))::numeric, 1) AS skip_rate FROM play_events WHERE skipped IS NOT NULL AND $__timeFilter(played_at)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "min": 0,
              "max": 100,
              "color": {
                "mode": "continuous-GrYlRd"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 11,
          "type": "stat",
          "title": "This month vs last (hours)",
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH m AS (SELECT round((SUM(ms_played) FILTER (WHERE played_at >= date_trunc('month', now()))/3600000.0)::numeric, 1) AS this_month, round((SUM(ms_played) FILTER (WHERE played_at >= date_trunc('month', now()) - interval '1 month' AND played_at < date_trunc('month', now()))/3600000.0)::numeric, 1) AS last_month FROM play_events WHERE ms_played IS NOT NULL) SELECT this_month, last_month, round((this_month - last_month)::numeric, 1) AS delta_h FROM m"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "/^this_month$/"
            },
            "textMode": "value_and_name"
          }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Longest listening streak (consecutive days)",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 20,
            "y": 9
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH days AS (SELECT DISTINCT played_at::date AS d FROM play_events), grp AS (SELECT d, d - (row_number() OVER (ORDER BY d))::int AS g FROM days) SELECT max(streak) AS longest_streak FROM (SELECT count(*) AS streak FROM grp GROUP BY g) s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              }
            }
          },
          "options": {
            "colorMode": "background",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Current streak (days)",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 0,
            "y": 15
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH days AS (SELECT DISTINCT played_at::date AS d FROM play_events), grp AS (SELECT d, d - (row_number() OVER (ORDER BY d))::int AS g FROM days) SELECT count(*) AS current_streak FROM grp WHERE g = (SELECT g FROM grp ORDER BY d DESC LIMIT 1) AND (SELECT max(d) FROM days) >= current_date - 1"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "d"
            }
          },
          "options": {
            "colorMode": "value",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Plays per week",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 4,
            "y": 15
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT date_trunc('week', played_at) AS time, count(*) AS plays FROM play_events GROUP BY 1 ORDER BY 1"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 60
              }
            }
          }
        },
        {
          "id": 15,
          "type": "piechart",
          "title": "Genre share by plays",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 23
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE $__timeFilter(pe.played_at)) SELECT parent AS genre, count(*) AS plays FROM play_parent GROUP BY parent ORDER BY plays DESC"
            }
          ],
          "fieldConfig": {
            "defaults": {}
          },
          "options": {
            "pieType": "donut",
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": [
                "value",
                "percent"
              ]
            },
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 16,
          "type": "bargauge",
          "title": "Genre hours (parent rollup)",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 23
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, pe.ms_played, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at)) SELECT parent AS genre, round((SUM(ms_played)/3600000.0)::numeric, 1) AS hours FROM play_parent GROUP BY parent ORDER BY hours DESC LIMIT 15"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "min": 0,
              "color": {
                "mode": "continuous-BlPu"
              }
            }
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "type": "row",
          "title": "Top & Loyalty",
          "collapsed": false,
          "id": 17,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 33
          },
          "panels": []
        },
        {
          "id": 18,
          "type": "table",
          "title": "Top artists",
          "gridPos": {
            "h": 11,
            "w": 12,
            "x": 0,
            "y": 34
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, count(*) AS plays, round((SUM(pe.ms_played)/3600000.0)::numeric, 1) AS hours, count(DISTINCT pe.track_id) AS distinct_tracks FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY plays DESC LIMIT 25"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "hours"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "h"
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true
          }
        },
        {
          "id": 19,
          "type": "table",
          "title": "Top tracks",
          "gridPos": {
            "h": 11,
            "w": 12,
            "x": 12,
            "y": 34
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT t.name AS track, COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, count(*) AS plays, round((SUM(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY t.name, COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY plays DESC LIMIT 25"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "hours"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "h"
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true
          }
        },
        {
          "id": 20,
          "type": "bargauge",
          "title": "Top artists by hours",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 45
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, round((SUM(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY hours DESC LIMIT 15"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "min": 0,
              "color": {
                "mode": "continuous-GrYlRd"
              }
            }
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 21,
          "type": "bargauge",
          "title": "Top tracks by hours",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 45
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT (t.name || ' - ' || COALESCE(a.name, t.artist_name, '?')) AS track, round((SUM(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY t.name, COALESCE(a.name, t.artist_name, '?') ORDER BY hours DESC LIMIT 15"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "min": 0,
              "color": {
                "mode": "continuous-BlPu"
              }
            }
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 22,
          "type": "table",
          "title": "Weekly obsession \u2014 top tracks (last 7 days)",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 54
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT t.name AS track, COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, count(*) AS plays_7d FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.played_at > now() - interval '7 days' GROUP BY t.name, COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY plays_7d DESC LIMIT 25"
            }
          ],
          "options": {
            "showHeader": true
          }
        },
        {
          "id": 23,
          "type": "table",
          "title": "Artist loyalty \u2014 hours rank vs count rank (top 20 by hours)",
          "gridPos": {
            "h": 12,
            "w": 12,
            "x": 12,
            "y": 54
          },
          "datasource": {
            "type": "postgres",
            "uid": "spotify-postgres"
          },
          "targets": [
            {
