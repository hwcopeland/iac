# Grafana dashboard: Spotify — Wrapped (any period) (Wave 4).
# A "Wrapped" for WHATEVER time range you pick — a year, a month, all-time.
# Unlike the other Spotify boards this has NO fixed default window: every panel
# respects $__timeFilter(played_at) and the dashboard time picker. Set the
# picker (top-right) to any period to recompute the whole board.
#
# Datasource: Postgres uid "spotify-postgres". Genre aggregation uses
# genre_parent() with PER-PLAY dedup (DISTINCT played_at, track_id, parent) —
# no unnest fan-out. Artist/discovery panels need a linked artist_id (GDPR
# name-only rows excluded).
#
# Loaded by the kube-prometheus Grafana sidecar (label grafana_dashboard="1"),
# placed in the "Spotify" folder. Explicit top-level uid (spotify-wrapped).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-wrapped
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-wrapped.json: |-
    {
      "uid": "spotify-wrapped",
      "title": "Spotify — Wrapped (any period)",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "",
      "time": { "from": "now-1y", "to": "now" },
      "tags": ["spotify", "music", "wrapped"],
      "panels": [
        {
          "id": 1, "type": "text", "title": "How to use",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 3 },
          "options": { "mode": "markdown", "content": "### Your Wrapped — for any period\nSet the **time range (top-right)** to whatever you want — a single year (e.g. 2025), a month, or *all-time* (`2024-09-01` → now). Every panel recomputes for that window. Data spans **2024-09-01 → present**. Genres use the deduped `genre_parent()` rollup; skip/hours fields come from the Extended Streaming History export. Artist & discovery panels count only artists with a linked Spotify ID." }
        },

        { "id": 9, "type": "row", "title": "Headline", "gridPos": { "x": 0, "y": 3, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "stat", "title": "Total plays",
          "gridPos": { "x": 0, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(*) AS plays FROM play_events WHERE $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "blue" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 11, "type": "stat", "title": "Total hours",
          "gridPos": { "x": 4, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT round((sum(ms_played)/3600000.0)::numeric, 0) AS hours FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "h", "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 12, "type": "stat", "title": "Distinct artists",
          "gridPos": { "x": 8, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "description": "Distinct artists played in the window (COALESCE linked name, GDPR artist_name).",
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT COALESCE(a.name, t.artist_name)) AS artists FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE COALESCE(a.name, t.artist_name) IS NOT NULL AND $__timeFilter(pe.played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "purple" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 13, "type": "stat", "title": "Distinct tracks",
          "gridPos": { "x": 12, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT track_id) AS tracks FROM play_events WHERE $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "orange" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 14, "type": "stat", "title": "Skip rate",
          "gridPos": { "x": 16, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT round((100.0 * avg(skipped::int))::numeric, 1) AS skip_rate FROM play_events WHERE skipped IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "color": { "mode": "continuous-GrYlRd" }, "min": 0, "max": 100 } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 15, "type": "stat", "title": "New artists discovered",
          "gridPos": { "x": 20, "y": 4, "w": 4, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "description": "Artists whose FIRST-ever play falls inside the window (COALESCE linked name, GDPR artist_name).",
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH firsts AS (SELECT COALESCE(a.name, t.artist_name) AS artist_key, min(pe.played_at) AS first_play FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE COALESCE(a.name, t.artist_name) IS NOT NULL GROUP BY COALESCE(a.name, t.artist_name)) SELECT count(*) AS new_artists FROM firsts WHERE $__timeFilter(first_play)" } ],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },

        { "id": 19, "type": "row", "title": "Your #1", "gridPos": { "x": 0, "y": 9, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "stat", "title": "Your #1 track (by hours)",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(t.name, pe.track_id) || COALESCE(' — ' || COALESCE(a.name, t.artist_name), '') AS hero, round((sum(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe LEFT JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY 1 ORDER BY hours DESC LIMIT 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "color": { "mode": "fixed", "fixedColor": "super-light-blue" } } },
          "options": { "colorMode": "background", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^hours$/" } }
        },
        {
          "id": 21, "type": "stat", "title": "Your #1 artist (by hours)",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "description": "Top artist by listening hours in the window. Artist identity is COALESCE(linked artists.name, GDPR-export artist_name), so name-only rows are included.",
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS hero, round((sum(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY hours DESC LIMIT 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "color": { "mode": "fixed", "fixedColor": "super-light-purple" } } },
          "options": { "colorMode": "background", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^hours$/" } }
        },

        { "id": 29, "type": "row", "title": "Top tracks & artists", "gridPos": { "x": 0, "y": 16, "w": 24, "h": 1 } },
        {
          "id": 30, "type": "table", "title": "Top tracks (by hours & plays)",
          "gridPos": { "x": 0, "y": 17, "w": 12, "h": 11 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(t.name, pe.track_id) AS track, COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, count(*) AS plays, round((sum(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe LEFT JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY 1, 2 ORDER BY hours DESC NULLS LAST, plays DESC LIMIT 20" } ],
          "fieldConfig": { "defaults": { "custom": { "align": "auto" } }, "overrides": [ { "matcher": { "id": "byName", "options": "hours" }, "properties": [ { "id": "unit", "value": "h" }, { "id": "custom.cellOptions", "value": { "type": "gauge", "mode": "gradient" } } ] } ] },
          "options": { "showHeader": true, "sortBy": [ { "displayName": "hours", "desc": true } ] }
        },
        {
          "id": 31, "type": "table", "title": "Top artists (by hours & plays)",
          "gridPos": { "x": 12, "y": 17, "w": 12, "h": 11 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "description": "Artist identity is COALESCE(linked artists.name, GDPR-export artist_name) — name-only rows are now included.",
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(a.name, t.artist_name, '(unknown artist)') AS artist, count(*) AS plays, round((sum(pe.ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY COALESCE(a.name, t.artist_name, '(unknown artist)') ORDER BY hours DESC NULLS LAST, plays DESC LIMIT 20" } ],
          "fieldConfig": { "defaults": { "custom": { "align": "auto" } }, "overrides": [ { "matcher": { "id": "byName", "options": "hours" }, "properties": [ { "id": "unit", "value": "h" }, { "id": "custom.cellOptions", "value": { "type": "gauge", "mode": "gradient" } } ] } ] },
          "options": { "showHeader": true, "sortBy": [ { "displayName": "hours", "desc": true } ] }
        },

        { "id": 39, "type": "row", "title": "Top genres & biggest day", "gridPos": { "x": 0, "y": 28, "w": 24, "h": 1 } },
        {
          "id": 40, "type": "barchart", "title": "Top parent genres (deduped plays)",
          "gridPos": { "x": 0, "y": 29, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "description": "Per-play deduped parent-genre play counts for the window (no unnest fan-out). 'Other' excluded.",
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE $__timeFilter(pe.played_at)) SELECT parent AS genre, count(*) AS plays FROM play_parent WHERE parent <> 'Other' GROUP BY parent ORDER BY plays DESC LIMIT 12" } ],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "continuous-BlPu" } } },
          "options": { "orientation": "horizontal", "xField": "genre", "showValue": "auto", "legend": { "showLegend": false } }
        },
        {
          "id": 41, "type": "stat", "title": "Biggest single day (by hours)",
          "gridPos": { "x": 12, "y": 29, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT to_char(played_at::date, 'YYYY-MM-DD') AS day, round((sum(ms_played)/3600000.0)::numeric, 1) AS hours FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at) GROUP BY 1 ORDER BY hours DESC LIMIT 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "color": { "mode": "fixed", "fixedColor": "yellow" } } },
          "options": { "colorMode": "background", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^hours$/" } }
        }
      ]
    }
