# Grafana dashboard: Spotify — Listening Behavior.
# Behavioural analytics built on the rich GDPR-export columns added in schema
# migration 003 (skipped / reason_start / reason_end / shuffle / platform /
# conn_country / offline / incognito_mode). These columns exist ONLY in
# Spotify's "Extended Streaming History" export — the live /recently-played feed
# leaves them NULL — so every panel here is fed by the one-time backfill. Future
# live rows simply don't contribute (NULL filtered out / counted as not-skipped).
#
# Loaded by the kube-prometheus Grafana sidecar (label grafana_dashboard="1"),
# placed in the "Spotify" folder. Postgres datasource uid "spotify-postgres".
# Explicit top-level uid (spotify-listening-behavior) avoids the sidecar
# orphan-duplicate bug. Companion to "Spotify — Listening" (uid spotify-listening).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-behavior
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-behavior.json: |-
    {
      "uid": "spotify-listening-behavior",
      "title": "Spotify — Listening Behavior",
      "schemaVersion": 38,
      "version": 3,
      "refresh": "1h",
      "time": { "from": "2024-09-01T00:00:00.000Z", "to": "now" },
      "tags": ["spotify", "music", "behavior"],
      "panels": [
        {
          "id": 1, "type": "text", "title": "Data note",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 2 },
          "options": { "mode": "markdown", "content": "Behavioural fields (`skipped`, `reason_start`, `reason_end`, `shuffle`, `platform`, `conn_country`, `offline`, `incognito_mode`) come **only** from the Extended Streaming History GDPR export (one-time backfill). Live `/recently-played` rows leave them NULL and are excluded from these panels." }
        },

        { "id": 9, "type": "row", "title": "Skip behaviour", "gridPos": { "x": 0, "y": 2, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "stat", "title": "Overall skip rate",
          "gridPos": { "x": 0, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT 100.0 * AVG(skipped::int) AS skip_rate FROM play_events WHERE skipped IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 11, "type": "stat", "title": "Completion rate (trackdone)",
          "gridPos": { "x": 6, "y": 3, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT 100.0 * AVG((reason_end = 'trackdone')::int) AS completion_rate FROM play_events WHERE reason_end IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100, "color": { "mode": "continuous-RdYlGr" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 12, "type": "piechart", "title": "Why plays end (reason_end)",
          "gridPos": { "x": 12, "y": 3, "w": 12, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(reason_end, 'unknown') AS reason_end, count(*) AS plays FROM play_events WHERE reason_end IS NOT NULL AND $__timeFilter(played_at) GROUP BY 1 ORDER BY plays DESC" } ],
          "options": { "pieType": "pie", "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 13, "type": "table", "title": "Most-skipped artists (>= 50 plays)",
          "gridPos": { "x": 0, "y": 9, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT a.name AS artist, count(*) AS plays, round((100.0 * AVG(pe.skipped::int))::numeric, 1) AS skip_pct FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id JOIN artists a ON a.artist_id = t.artist_id WHERE pe.skipped IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY a.name HAVING count(*) >= 50 ORDER BY skip_pct DESC LIMIT 25" } ],
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [ { "matcher": { "id": "byName", "options": "plays" }, "properties": [ { "id": "unit", "value": "short" } ] } ] },
          "options": { "showHeader": true }
        },
        {
          "id": 14, "type": "table", "title": "Least-skipped artists (>= 50 plays)",
          "gridPos": { "x": 12, "y": 9, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT a.name AS artist, count(*) AS plays, round((100.0 * AVG(pe.skipped::int))::numeric, 1) AS skip_pct FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id JOIN artists a ON a.artist_id = t.artist_id WHERE pe.skipped IS NOT NULL AND $__timeFilter(pe.played_at) GROUP BY a.name HAVING count(*) >= 50 ORDER BY skip_pct ASC LIMIT 25" } ],
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [ { "matcher": { "id": "byName", "options": "plays" }, "properties": [ { "id": "unit", "value": "short" } ] } ] },
          "options": { "showHeader": true }
        },
        {
          "id": 15, "type": "timeseries", "title": "Weekly completion rate (reason_end = trackdone)",
          "gridPos": { "x": 0, "y": 19, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', played_at) AS time, AVG((reason_end = 'trackdone')::int) AS completion_rate FROM play_events WHERE reason_end IS NOT NULL AND $__timeFilter(played_at) GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "drawStyle": "line", "fillOpacity": 20 } } }
        },

        { "id": 19, "type": "row", "title": "Intent & engagement", "gridPos": { "x": 0, "y": 27, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "stat", "title": "Median play length",
          "gridPos": { "x": 0, "y": 28, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT percentile_cont(0.5) WITHIN GROUP (ORDER BY ms_played) / 1000.0 AS median_seconds FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "s", "decimals": 1, "color": { "mode": "fixed", "fixedColor": "red" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 21, "type": "gauge", "title": "Shuffle %",
          "gridPos": { "x": 6, "y": 28, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT 100.0 * AVG(shuffle::int) AS shuffle_pct FROM play_events WHERE shuffle IS NOT NULL AND $__timeFilter(played_at)" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100, "color": { "mode": "continuous-BlPu" } } },
          "options": { "showThresholdLabels": false, "showThresholdMarkers": false, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 22, "type": "piechart", "title": "Deliberate vs passive starts",
          "gridPos": { "x": 12, "y": 28, "w": 12, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT CASE WHEN reason_start IN ('clickrow','playbtn','backbtn') THEN 'deliberate' ELSE 'passive' END AS intent, count(*) AS plays FROM play_events WHERE reason_start IS NOT NULL AND $__timeFilter(played_at) GROUP BY 1 ORDER BY plays DESC" } ],
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 23, "type": "piechart", "title": "Why plays start (reason_start)",
          "gridPos": { "x": 0, "y": 34, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(reason_start, 'unknown') AS reason_start, count(*) AS plays FROM play_events WHERE reason_start IS NOT NULL AND $__timeFilter(played_at) GROUP BY 1 ORDER BY plays DESC" } ],
          "options": { "pieType": "pie", "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 24, "type": "barchart", "title": "Play-length distribution",
          "gridPos": { "x": 12, "y": 34, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH b AS (SELECT width_bucket(ms_played, ARRAY[5000, 30000, 120000]) AS bk FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at)) SELECT (ARRAY['<5s','5-30s','30s-2m','>2m'])[bk + 1] AS bucket, count(*) AS plays FROM b GROUP BY bk ORDER BY bk" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-YlBl" } } },
          "options": { "orientation": "horizontal", "xField": "bucket" }
        },

        { "id": 29, "type": "row", "title": "Bingeing", "gridPos": { "x": 0, "y": 43, "w": 24, "h": 1 } },
        {
          "id": 30, "type": "table", "title": "Biggest listening days (by hours)",
          "gridPos": { "x": 0, "y": 44, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT played_at::date AS day, round((SUM(ms_played)/3600000.0)::numeric, 2) AS hours, count(*) AS plays FROM play_events WHERE ms_played IS NOT NULL AND $__timeFilter(played_at) GROUP BY played_at::date ORDER BY hours DESC LIMIT 25" } ],
          "fieldConfig": { "defaults": {}, "overrides": [ { "matcher": { "id": "byName", "options": "hours" }, "properties": [ { "id": "unit", "value": "h" } ] } ] },
          "options": { "showHeader": true }
        },
        {
          "id": 31, "type": "table", "title": "On-repeat champion — most plays of one track in a single day",
          "gridPos": { "x": 12, "y": 44, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT pe.played_at::date AS day, t.name AS track, a.name AS artist, count(*) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE $__timeFilter(pe.played_at) GROUP BY pe.played_at::date, t.name, a.name ORDER BY plays DESC LIMIT 25" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 32, "type": "text", "title": "On-repeat caveat",
          "gridPos": { "x": 12, "y": 54, "w": 12, "h": 3 },
          "options": { "mode": "markdown", "content": "**Counts distinct `(played_at, track_id)` rows, not raw export plays.** The fact table's PK is `(played_at, track_id)` at 1-second resolution, so rapid same-track replays that share a played_at *second* (this user skims tracks in ~2s) were de-duplicated at GDPR-import time — ~106 such plays were dropped (~0.2% of 54k, negligible overall). A heavy single-day repeat can therefore read low vs the raw export (e.g. SHY FX — *Risk It All*, 2025-07-06: 18 distinct-second rows here vs ~106 raw plays). The leaderboard *ranking* is unaffected; the absolute per-day count is a floor." }
        },

        { "id": 39, "type": "row", "title": "Genre rivalry — DnB vs Country", "gridPos": { "x": 0, "y": 57, "w": 24, "h": 1 } },
        {
          "id": 40, "type": "text", "title": "Rivalry note",
          "gridPos": { "x": 0, "y": 58, "w": 24, "h": 2 },
          "options": { "mode": "markdown", "content": "The long-running head-to-head. Classified by the keyword `genre_parent()` rollup with **per-play dedup** — a play is counted once for a parent even when the artist carries several matching sub-genre tags (so DnB reads its honest ~208h, not the ~477h tag-fanout double-count). DnB led for most of 2024-2025; Country has been closing the gap and edges ahead in 2026." }
        },
        {
          "id": 41, "type": "bargauge", "title": "Hours — DnB vs Country",
          "gridPos": { "x": 0, "y": 60, "w": 8, "h": 7 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, pe.ms_played, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at)) SELECT parent AS genre, round((SUM(ms_played)/3600000.0)::numeric, 1) AS hours FROM play_parent WHERE parent IN ('DnB','Country') GROUP BY parent ORDER BY hours DESC" } ],
          "fieldConfig": { "defaults": { "unit": "h", "min": 0, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "displayMode": "gradient", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 42, "type": "bargauge", "title": "Plays — DnB vs Country",
          "gridPos": { "x": 8, "y": 60, "w": 8, "h": 7 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE $__timeFilter(pe.played_at)) SELECT parent AS genre, count(*) AS plays FROM play_parent WHERE parent IN ('DnB','Country') GROUP BY parent ORDER BY plays DESC" } ],
          "fieldConfig": { "defaults": { "unit": "short", "min": 0, "color": { "mode": "continuous-BlPu" } } },
          "options": { "displayMode": "gradient", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 43, "type": "bargauge", "title": "Skip rate — DnB vs Country",
          "gridPos": { "x": 16, "y": 60, "w": 8, "h": 7 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, pe.skipped, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE pe.skipped IS NOT NULL AND $__timeFilter(pe.played_at)) SELECT parent AS genre, round((100.0 * AVG(skipped::int))::numeric, 1) AS skip_pct FROM play_parent WHERE parent IN ('DnB','Country') GROUP BY parent ORDER BY skip_pct DESC" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "displayMode": "gradient", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 44, "type": "timeseries", "title": "Hours per quarter — DnB vs Country (the rivalry narrowing in 2026)",
          "gridPos": { "x": 0, "y": 67, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "WITH play_parent AS (SELECT DISTINCT pe.played_at, pe.track_id, pe.ms_played, COALESCE(genre_parent(lower(g.raw)), 'Other') AS parent FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true WHERE pe.ms_played IS NOT NULL AND $__timeFilter(pe.played_at)) SELECT date_trunc('quarter', played_at) AS time, parent AS metric, round((SUM(ms_played)/3600000.0)::numeric, 1) AS hours FROM play_parent WHERE parent IN ('DnB','Country') GROUP BY 1, 2 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "unit": "h", "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "pointSize": 6, "showPoints": "always" } } },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        }
      ]
    }
