# Grafana dashboard: Spotify — Trends & Behavior.
# Genre mix over time (via genre_rollup), time-of-day & weekday heatmaps,
# discovery rate, weekly obsession. Postgres datasource uid "spotify-postgres".
#
# Skip-rate is intentionally OMITTED: recently-played carries no ms_played, so
# skips are not derivable. See the "Data note" text panel.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-trends-behavior
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-trends-behavior.json: |-
    {
      "uid": "spotify-trends-behavior",
      "title": "Spotify — Trends & Behavior",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1h",
      "time": { "from": "now-180d", "to": "now" },
      "tags": ["spotify", "music", "trends"],
      "panels": [
        {
          "id": 1, "type": "text", "title": "Data note",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 2 },
          "options": { "mode": "markdown", "content": "Skip-rate is **not available**: `/me/player/recently-played` returns no per-play listen duration (`ms_played` is NULL), so a play cannot be distinguished from a skip. Genres are rolled up via the `genre_rollup` table for readability." }
        },

        { "id": 9, "type": "row", "title": "Genre mix over time (rolled up)", "gridPos": { "x": 0, "y": 2, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "timeseries", "title": "Genre mix per week (parent buckets)",
          "gridPos": { "x": 0, "y": 3, "w": 24, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', pe.played_at) AS time, COALESCE(gr.parent_genre, 'Other') AS metric, count(*) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true LEFT JOIN genre_rollup gr ON gr.raw_genre = lower(g.raw) WHERE pe.played_at > now() - interval '180 days' GROUP BY 1, 2 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 80 } } }
        },

        { "id": 19, "type": "row", "title": "When do I listen?", "gridPos": { "x": 0, "y": 12, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "heatmap", "title": "Plays by hour of day",
          "gridPos": { "x": 0, "y": 13, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT extract(hour FROM played_at)::int AS hour, count(*) AS plays FROM play_events GROUP BY 1 ORDER BY 1" } ],
          "options": { "calculate": false }
        },
        {
          "id": 21, "type": "bargauge", "title": "Plays by weekday",
          "gridPos": { "x": 12, "y": 13, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT to_char(played_at, 'Dy') AS weekday, count(*) AS plays FROM play_events GROUP BY to_char(played_at,'Dy'), extract(dow FROM played_at) ORDER BY extract(dow FROM played_at)" } ],
          "fieldConfig": { "defaults": { "min": 0, "color": { "mode": "continuous-BlPu" } } },
          "options": { "displayMode": "gradient", "orientation": "horizontal" }
        },

        { "id": 29, "type": "row", "title": "Discovery & obsession", "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 } },
        {
          "id": 30, "type": "timeseries", "title": "Discovery rate — first-ever plays per week (new tracks & artists)",
          "gridPos": { "x": 0, "y": 23, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [
            { "refId": "A", "format": "time_series", "rawSql":
              "SELECT date_trunc('week', first_play) AS time, 'new tracks' AS metric, count(*) AS n FROM (SELECT track_id, min(played_at) AS first_play FROM play_events GROUP BY track_id) f GROUP BY 1 ORDER BY 1" },
            { "refId": "B", "format": "time_series", "rawSql":
              "SELECT date_trunc('week', first_play) AS time, 'new artists' AS metric, count(*) AS n FROM (SELECT t.artist_id, min(pe.played_at) AS first_play FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.artist_id IS NOT NULL GROUP BY t.artist_id) f GROUP BY 1 ORDER BY 1" }
          ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 60 } } }
        },
        {
          "id": 31, "type": "table", "title": "Weekly obsession — top tracks (last 7 days)",
          "gridPos": { "x": 0, "y": 31, "w": 24, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, count(*) AS plays_7d FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id WHERE pe.played_at > now() - interval '7 days' GROUP BY t.name, a.name ORDER BY plays_7d DESC LIMIT 25" } ],
          "options": { "showHeader": true }
        }
      ]
    }
