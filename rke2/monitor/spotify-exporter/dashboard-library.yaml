# Grafana dashboard: Spotify — Library.
# Consolidated saved-library analytics (library_tracks / play_events / tracks / artists).
# Loaded by the kube-prometheus stack Grafana sidecar (label grafana_dashboard="1"),
# placed in the "Spotify" folder. Postgres datasource uid "spotify-postgres" is
# registered by @data-engineer alongside the spotify-postgres deployment.
#
# Explicit top-level "uid" (spotify-library) avoids the orphan-duplicate sidecar
# bug (each ConfigMap MUST carry a unique uid). This dashboard supersedes the old
# dashboard-library-vs-listening (library half) and the library panels of the old
# single dashboard.yaml.
#
# library_tracks uses a partial open-row model: a saved track has removed_at IS
# NULL; an unsaved one has removed_at set. "Currently saved" => removed_at IS NULL.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-library
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-library.json: |-
    {
      "uid": "spotify-library",
      "title": "Spotify — Library",
      "schemaVersion": 38,
      "version": 3,
      "refresh": "1h",
      "time": { "from": "2024-09-01T00:00:00.000Z", "to": "now" },
      "tags": ["spotify", "music", "library"],
      "templating": {
        "list": [
          {
            "name": "dormant_months",
            "label": "Dormant if not played in (months)",
            "type": "custom",
            "query": "1,2,3,6,12",
            "current": { "text": "6", "value": "6" },
            "options": [
              { "text": "1", "value": "1" },
              { "text": "2", "value": "2" },
              { "text": "3", "value": "3" },
              { "text": "6", "value": "6", "selected": true },
              { "text": "12", "value": "12" }
            ]
          }
        ]
      },
      "panels": [
        { "id": 1, "type": "row", "title": "Coverage", "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 } },
        {
          "id": 2, "type": "stat", "title": "Saved tracks (current)",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(*) AS saved FROM library_tracks WHERE removed_at IS NULL" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 3, "type": "stat", "title": "Library coverage % (share of plays that are saved)",
          "gridPos": { "x": 6, "y": 1, "w": 10, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT 100.0 * count(*) FILTER (WHERE lt.track_id IS NOT NULL) / NULLIF(count(*),0) AS coverage_pct FROM play_events pe LEFT JOIN library_tracks lt ON lt.track_id = pe.track_id AND lt.removed_at IS NULL" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/coverage_pct/" } }
        },
        {
          "id": 4, "type": "timeseries", "title": "Library size over time (cumulative net saves)",
          "gridPos": { "x": 16, "y": 1, "w": 8, "h": 6 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT d::timestamptz AS time, sum(count(*)) OVER (ORDER BY d) AS net_saved FROM (SELECT date_trunc('week', added_at) AS d, 1 AS s FROM library_tracks UNION ALL SELECT date_trunc('week', removed_at), -1 FROM library_tracks WHERE removed_at IS NOT NULL) x GROUP BY d ORDER BY d" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "line", "fillOpacity": 20 } } }
        },
        {
          "id": 5, "type": "timeseries", "title": "Tracks added to library over time (per month)",
          "gridPos": { "x": 0, "y": 7, "w": 24, "h": 8 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('month', added_at) AS time, count(*) AS added FROM library_tracks WHERE added_at IS NOT NULL GROUP BY 1 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 70 } } }
        },

        { "id": 9, "type": "row", "title": "Library by sub-genre (Spotify + MusicBrainz)", "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "text", "title": "Note on genre classification",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 3 },
          "options": { "mode": "markdown", "content": "Genres here are the **fine sub-genres** themselves (e.g. *yacht rock*, *neurofunk*, *permanent wave*) — NOT coarse \"rock\"/\"pop\" buckets, which are meaningless across decades. Tags come from the `track_genre_effective` view: the de-duped **union** of Spotify artist genres **and** MusicBrainz genres/folksonomy tags. Older catalog music that Spotify leaves `untagged` is filled by the hourly MusicBrainz enrichment CronJob — the Coverage panels below track how much previously-untagged old music now has sub-genres. The optional parent grouping (from the keyword `genre_parent()` classifier, with `genre_rollup` overrides) is used only for drill-down, never to replace a sub-genre." }
        },
        {
          "id": 13, "type": "stat", "title": "Sub-genre coverage % of saved library (≥1 fine sub-genre)",
          "gridPos": { "x": 0, "y": 19, "w": 8, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT 100.0 * count(*) FILTER (WHERE EXISTS (SELECT 1 FROM track_genre_effective e WHERE e.track_id = lt.track_id)) / NULLIF(count(*),0) AS coverage_pct FROM library_tracks lt WHERE lt.removed_at IS NULL" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/coverage_pct/" } }
        },
        {
          "id": 14, "type": "stat", "title": "Old music rescued (Spotify-untagged tracks now MB-tagged)",
          "gridPos": { "x": 8, "y": 19, "w": 8, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT lt.track_id) AS rescued FROM library_tracks lt JOIN tracks t ON t.track_id = lt.track_id JOIN artists a ON a.artist_id = t.artist_id WHERE lt.removed_at IS NULL AND COALESCE(array_length(a.genres,1),0) = 0 AND EXISTS (SELECT 1 FROM track_genre_effective e WHERE e.track_id = lt.track_id AND e.source = 'musicbrainz')" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "purple" } } },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 15, "type": "stat", "title": "Sub-genre diversity (distinct sub-genres in saved library)",
          "gridPos": { "x": 16, "y": 19, "w": 8, "h": 5 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT count(DISTINCT e.sub_genre) AS sub_genres FROM library_tracks lt JOIN track_genre_effective e ON e.track_id = lt.track_id WHERE lt.removed_at IS NULL" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" } } },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 11, "type": "barchart", "title": "Top fine sub-genres in saved library (specific, not rolled up)",
          "gridPos": { "x": 0, "y": 24, "w": 14, "h": 12 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT e.sub_genre_display AS sub_genre, count(DISTINCT lt.track_id) AS saved FROM library_tracks lt JOIN track_genre_effective e ON e.track_id = lt.track_id WHERE lt.removed_at IS NULL GROUP BY 1 ORDER BY saved DESC LIMIT 30" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-BlPu" } } },
          "options": { "xField": "sub_genre", "orientation": "horizontal" }
        },
        {
          "id": 12, "type": "table", "title": "Sub-genre source split (how much MusicBrainz adds over Spotify)",
          "gridPos": { "x": 14, "y": 24, "w": 10, "h": 12 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT e.source, count(DISTINCT e.sub_genre) AS distinct_sub_genres, count(DISTINCT e.track_id) AS tracks FROM library_tracks lt JOIN track_genre_effective e ON e.track_id = lt.track_id WHERE lt.removed_at IS NULL GROUP BY e.source ORDER BY tracks DESC" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 16, "type": "barchart", "title": "Optional drill-down — saved tracks by parent genre (grouping only)",
          "gridPos": { "x": 0, "y": 36, "w": 24, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT COALESCE(e.parent_genre, 'ungrouped') AS parent_genre, count(DISTINCT lt.track_id) AS saved FROM library_tracks lt JOIN track_genre_effective e ON e.track_id = lt.track_id WHERE lt.removed_at IS NULL GROUP BY 1 ORDER BY saved DESC LIMIT 25" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "xField": "parent_genre", "orientation": "horizontal" }
        },

        { "id": 19, "type": "row", "title": "Save candidates — played a lot, not saved", "gridPos": { "x": 0, "y": 45, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "table", "title": "Save candidates (high play_count, no current library row)",
          "gridPos": { "x": 0, "y": 46, "w": 24, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, count(*) AS play_count, max(pe.played_at) AS last_played FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN library_tracks lt ON lt.track_id = pe.track_id AND lt.removed_at IS NULL WHERE lt.track_id IS NULL GROUP BY t.name, a.name HAVING count(*) >= 3 ORDER BY play_count DESC LIMIT 50" } ],
          "options": { "showHeader": true }
        },

        { "id": 29, "type": "row", "title": "Dormant library & forgotten favorites", "gridPos": { "x": 0, "y": 56, "w": 24, "h": 1 } },
        {
          "id": 30, "type": "table", "title": "Dormant library (saved, never/long-ago played)",
          "gridPos": { "x": 0, "y": 57, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, lt.added_at, max(pe.played_at) AS last_played FROM library_tracks lt LEFT JOIN tracks t ON t.track_id = lt.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN play_events pe ON pe.track_id = lt.track_id WHERE lt.removed_at IS NULL GROUP BY t.name, a.name, lt.added_at HAVING max(pe.played_at) IS NULL OR max(pe.played_at) < now() - make_interval(months => ${dormant_months}::int) ORDER BY last_played ASC NULLS FIRST LIMIT 50" } ],
          "options": { "showHeader": true }
        },
        {
          "id": 31, "type": "table", "title": "Forgotten favorites (once-heavy, gone quiet)",
          "gridPos": { "x": 12, "y": 57, "w": 12, "h": 10 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, a.name AS artist, count(*) AS lifetime_plays, max(pe.played_at) AS last_played, count(*) FILTER (WHERE pe.played_at > now() - interval '90 days') AS plays_90d FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id GROUP BY t.name, a.name HAVING count(*) >= 5 AND count(*) FILTER (WHERE pe.played_at > now() - interval '90 days') = 0 ORDER BY lifetime_plays DESC LIMIT 50" } ],
          "options": { "showHeader": true }
        }
      ]
    }
