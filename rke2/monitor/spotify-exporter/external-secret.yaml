# Pulls the Spotify bootstrap credentials from Bitwarden into the
# `spotify-exporter` Secret. The bitwarden-login ClusterSecretStore is a
# webhook to the in-cluster `bw serve`, which only exposes login fields
# ($.data.login.<property>) — so the item stores:
#   login.username = Spotify PKCE client_id
#   login.password = bootstrap refresh_token (cold-start seed only; the live
#                    rotating token lives in the shared `spotify-token` Secret)
#
# Bitwarden item: "spotify-exporter"  (8e8f830d-f56a-4e8a-9285-245fdc880a3b)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spotify-exporter
  namespace: monitor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: spotify-exporter
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: "8e8f830d-f56a-4e8a-9285-245fdc880a3b"
        property: username
    - secretKey: refresh_token
      remoteRef:
        key: "8e8f830d-f56a-4e8a-9285-245fdc880a3b"
        property: password
