# Grafana dashboard: Spotify — Vibe (proxy).
# A SUBSTITUTE for the blocked audio-features "mood" cluster. Spotify's
# /audio-features endpoint returns 403 (Nov-2024 deprecation) for our app, so
# energy/danceability/tempo/valence are unavailable. This view approximates
# "vibe" from genre family (energy proxy) and track popularity (mainstream vs
# niche). Every panel is explicitly labeled a PROXY.
# Postgres datasource uid "spotify-postgres".
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spotify-vibe-proxy
  namespace: monitor
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Spotify"
data:
  spotify-vibe-proxy.json: |-
    {
      "uid": "spotify-vibe-proxy",
      "title": "Spotify — Vibe (proxy)",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1h",
      "time": { "from": "now-180d", "to": "now" },
      "tags": ["spotify", "music", "vibe", "proxy"],
      "panels": [
        {
          "id": 1, "type": "text", "title": "About this view",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 3 },
          "options": { "mode": "markdown", "content": "**This is a PROXY, not true audio analysis.** Spotify's `/audio-features` (energy, danceability, tempo, valence) returns **403** under the Nov-2024 deprecation for this app, so real mood data is unavailable. Here, **energy is proxied by genre family** (e.g. DnB/Electronic = high-energy, Folk/Country = low-energy) and **mainstream-vs-niche by track popularity**. Treat as directional, not exact." }
        },

        { "id": 9, "type": "row", "title": "Energy proxy (by genre family)", "gridPos": { "x": 0, "y": 3, "w": 24, "h": 1 } },
        {
          "id": 10, "type": "piechart", "title": "Listening by energy band (genre proxy, all time)",
          "gridPos": { "x": 0, "y": 4, "w": 8, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT CASE WHEN gr.parent_genre IN ('DnB','Electronic','Hip-Hop','Rock') THEN 'High energy' WHEN gr.parent_genre IN ('Pop','R&B') THEN 'Mid energy' WHEN gr.parent_genre IN ('Folk','Country','Jazz') THEN 'Low energy' ELSE 'Unknown' END AS energy_band, count(DISTINCT (pe.played_at, pe.track_id)) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true LEFT JOIN genre_rollup gr ON gr.raw_genre = lower(g.raw) GROUP BY 1 ORDER BY plays DESC" } ],
          "options": { "pieType": "donut", "legend": { "displayMode": "table", "placement": "right", "values": ["value"] }, "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 11, "type": "timeseries", "title": "Energy-proxy mix per week",
          "gridPos": { "x": 8, "y": 4, "w": 16, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "time_series", "rawSql":
            "SELECT date_trunc('week', pe.played_at) AS time, CASE WHEN gr.parent_genre IN ('DnB','Electronic','Hip-Hop','Rock') THEN 'High energy' WHEN gr.parent_genre IN ('Pop','R&B') THEN 'Mid energy' WHEN gr.parent_genre IN ('Folk','Country','Jazz') THEN 'Low energy' ELSE 'Unknown' END AS metric, count(DISTINCT (pe.played_at, pe.track_id)) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true LEFT JOIN genre_rollup gr ON gr.raw_genre = lower(g.raw) GROUP BY 1, 2 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "stacking": { "mode": "percent" }, "fillOpacity": 80 } } }
        },

        { "id": 19, "type": "row", "title": "Mainstream vs niche (popularity proxy)", "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 } },
        {
          "id": 20, "type": "barchart", "title": "Play distribution by popularity band (mainstream vs niche)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT width_bucket(t.popularity, 0, 100, 5) AS bucket, CASE width_bucket(t.popularity,0,100,5) WHEN 1 THEN '0-20 niche' WHEN 2 THEN '20-40' WHEN 3 THEN '40-60' WHEN 4 THEN '60-80' ELSE '80-100 mainstream' END AS popularity_band, count(*) AS plays FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id WHERE t.popularity IS NOT NULL GROUP BY 1, 2 ORDER BY 1" } ],
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" } } },
          "options": { "xField": "popularity_band", "orientation": "horizontal" }
        },
        {
          "id": 21, "type": "scatter", "title": "Vibe map — energy proxy (genre) vs popularity, top tracks",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 9 },
          "datasource": { "type": "postgres", "uid": "spotify-postgres" },
          "targets": [ { "refId": "A", "format": "table", "rawSql":
            "SELECT t.name AS track, t.popularity, count(*) AS plays, CASE WHEN gr.parent_genre IN ('DnB','Electronic','Hip-Hop','Rock') THEN 3 WHEN gr.parent_genre IN ('Pop','R&B') THEN 2 WHEN gr.parent_genre IN ('Folk','Country','Jazz') THEN 1 ELSE 0 END AS energy_proxy FROM play_events pe JOIN tracks t ON t.track_id = pe.track_id LEFT JOIN artists a ON a.artist_id = t.artist_id LEFT JOIN LATERAL unnest(COALESCE(a.genres, ARRAY[]::text[])) AS g(raw) ON true LEFT JOIN genre_rollup gr ON gr.raw_genre = lower(g.raw) WHERE t.popularity IS NOT NULL GROUP BY t.name, t.popularity, energy_proxy ORDER BY plays DESC LIMIT 200" } ],
          "options": { "series": [ { "x": "popularity", "y": "energy_proxy" } ] }
        }
      ]
    }
