       "options": {
        "legend": {
         "displayMode": "list",
         "placement": "bottom",
         "calcs": [
          "lastNotNull"
         ]
        },
        "tooltip": {
         "mode": "multi"
        }
       },
       "fieldConfig": {
        "defaults": {
         "unit": "bytes",
         "custom": {
          "drawStyle": "line",
          "fillOpacity": 10,
          "lineWidth": 1
         }
        },
        "overrides": [
         {
          "matcher": {
           "id": "byName",
           "options": "capacity"
