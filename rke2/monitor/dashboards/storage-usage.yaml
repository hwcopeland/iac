       "options": {
        "reduceOptions": {
         "calcs": [
          "lastNotNull"
         ]
        },
        "textMode": "value",
        "colorMode": "value"
       },
       "fieldConfig": {
        "defaults": {
         "unit": "celsius",
         "color": {
          "mode": "thresholds"
         },
