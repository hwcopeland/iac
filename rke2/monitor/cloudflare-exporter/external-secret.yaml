# Pulls the Cloudflare GraphQL Analytics API token from Bitwarden into the
# `cloudflare-exporter` Secret (key: api-token). The exporter reads it as
# CF_API_TOKEN.
#
# This is a NEW, monitor-scoped token — do NOT reuse the kube-system
# `cloudflare-api-token` Secret (that one is DNS-scoped, owned by the
# cloudflare-operator, and lives in the wrong namespace).
#
# The bitwarden-login ClusterSecretStore is a webhook to the in-cluster
# `bw serve`, which only exposes login fields ($.data.login.<property>).
# So the Bitwarden item stores the token in the PASSWORD field:
#   login.password = <Cloudflare API token, scoped read-only analytics>
#   login.username = (unused; can be "cloudflare-exporter" for clarity)
#
# === MANUAL STEP (user) ===
# 1. In the Cloudflare dash create a custom API token with these scopes:
#      - Account · Account Analytics : Read
#      - Zone    · Analytics         : Read
#      - Zone    · Firewall Services : Read   (zone rule names for firewall events)
#      - Account · Account Rulesets  : Read   (account rule names for firewall events)
#    Account Resources: Include · <your account>
#    Zone Resources:    Include · All zones   (or pin the 3 zones below)
# 2. Create a Bitwarden login item named "cloudflare-exporter", paste the
#    token into the PASSWORD field, and grab its UUID:
#      bw get item cloudflare-exporter | jq -r .id
# 3. Replace REPLACE-WITH-BW-ITEM-UUID below with that UUID, then apply.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-exporter
  namespace: monitor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: cloudflare-exporter
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: "d3f7c144-47ae-4a7f-aa5d-b2a046f203b4"
        property: password
