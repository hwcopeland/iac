# Tempo — Helm chart values for the FUTURE migration to minio/S3 backend.
#
# ⚠️  NOT YET APPLIED. The cluster currently runs a hand-rolled Tempo
# StatefulSet (see tempo-deployment.yaml in this dir) with `backend: local`
# on a 20Gi Longhorn PVC. This file is staged for the eventual cutover to
# the upstream `grafana/tempo` Helm chart with object-storage backend so
# trace retention can grow past what a single PVC supports.
#
# Chart: grafana/tempo (single-binary mode — matches current footprint)
# Repo:  https://grafana.github.io/helm-charts
#
# # TODO: confirm backend with user before apply
#   - Default below is minio (loki-minio bucket reused for traces).
#     Alternative: dedicated bucket, or S3 via Garage at garage-system.
#   - Bucket name + credentials secret are placeholders — operator must
#     create the bucket and the `tempo-s3-credentials` Secret (or wire
#     an ExternalSecret) before `helm upgrade`.
#
# # TODO: confirm install strategy
#   - `helm install tempo grafana/tempo -n monitor -f tempo-minio-values.yaml`
#     stands up a NEW StatefulSet alongside the current one. Existing
#     traces in /var/tempo will NOT migrate — they expire on the 168h
#     retention window. Plan the cutover during a low-traffic window.
#   - The hand-rolled tempo-deployment.yaml + tempo-config.yaml ConfigMap
#     must be deleted AFTER the chart-managed Tempo is healthy. Don't
#     leave both running — port collision on 4317/4318.

# Single-binary mode matches the current StatefulSet topology. The
# distributed chart adds ingester/querier/compactor/distributor as
# separate workloads — overkill for a homelab.
tempo:
  # Pin a recent stable. Current hand-rolled deployment runs 2.6.1;
  # confirm chart appVersion matches (or is a clean step forward) before
  # apply. Check `helm search repo grafana/tempo --versions | head`.
  repository: grafana/tempo
  tag: 2.6.1
  pullPolicy: IfNotPresent

  # Mirror the existing receiver config — anything currently shipping
  # OTLP gRPC to tempo.monitor:4317 must keep working through the
  # cutover without per-client config changes.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # Same 7d retention as the hand-rolled deployment.
  retention: 168h

  # Metrics-generator: emits traces_spanmetrics_* + traces_service_graph_*
  # to Prometheus. The existing tempo-config.yaml has this wired; keep
  # the Service RED + service-graph dashboards working after cutover.
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://prometheus-operated.monitor.svc.cluster.local:9090/api/v1/write
    # Re-list service.namespace + k8s.namespace.name dims so the existing
    # tempo-service-red dashboard's templating variables resolve.
    processors:
      serviceGraphs:
        dimensions: [service.namespace, k8s.namespace.name]
      spanMetrics:
        dimensions: [service.namespace, k8s.namespace.name]

# Object-storage backend. minio/S3-compatible — confirm endpoint, bucket,
# and credentials with the operator BEFORE upgrade. The bucket below
# (`tempo`) does not exist yet; create via mc or minio console first.
storage:
  trace:
    backend: s3
    s3:
      # # TODO: confirm bucket name — default is `tempo` under the
      # existing loki-minio instance at rke2/monitor/loki/minio-compose.yaml
      bucket: tempo
      # # TODO: confirm endpoint — loki-minio is exposed as the
      # `loki-minio` Service; cross-cluster use the FQDN.
      endpoint: loki-minio.monitor.svc.cluster.local:9000
      # http (not https) for in-cluster minio; flip to true if pointing
      # at an external S3 endpoint with TLS.
      insecure: true
      # Credentials sourced from a Secret created out-of-band. See the
      # loki-garage-secret.yaml pattern in this repo
      # (rke2/monitor/loki/loki-garage-secret.yaml) for the ExternalSecret
      # template you'll want to copy.
      access_key: ${ACCESS_KEY}
      secret_key: ${SECRET_KEY}

# Persistence for the WAL only (object-store backend doesn't need a PVC
# for finalized blocks). Small PVC is enough.
persistence:
  enabled: true
  size: 5Gi
  storageClass: longhorn

# Service shape matches the existing one so consumers don't need to
# change OTEL_EXPORTER_OTLP_ENDPOINT (still tempo.monitor:4317).
service:
  type: ClusterIP

# ServiceMonitor: surface Tempo's own /metrics to kube-prometheus-stack.
# The existing hand-rolled deployment lacks this — adding it on cutover
# gives us self-monitoring for the trace pipeline (block flush rate,
# ingester memory, generator queue depth, etc.).
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
