apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitor
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # 7-day trace retention (operator decision Q8). Compactor deletes
    # blocks older than this on each compaction cycle.
    compactor:
      compaction:
        block_retention: 168h

    # Metrics-generator (Q7): produces span_metrics + service_graphs and
    # remote-writes them to Prometheus. Powers Grafana's Tempo Service
    # Graph + TraceQL dependency view. Per-tenant enable lives in overrides
    # below — without that the generator runs idle.
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus-operated.monitor.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      processor:
        service_graphs:
          dimensions: [service.namespace, k8s.namespace.name]
        span_metrics:
          dimensions: [service.namespace, k8s.namespace.name]

    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]

