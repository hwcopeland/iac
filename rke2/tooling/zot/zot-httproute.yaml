---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot
  namespace: tooling
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - "zot.hwcopeland.net"
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: zot
          port: 5000
---
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: zot
  namespace: tooling
spec:
  name: zot.hwcopeland.net
  type: CNAME
  content: hwcopeland.net
  proxied: false
  ttl: 1
  interval: 5m
