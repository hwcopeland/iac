---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: fmb-website
  namespace: tooling
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: tooling
    namespace: tooling
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        [ci skip] auto-update fmb-website
    push:
      branch: main
  update:
    path: ./rke2/tooling/flux/theswamp
    strategy: Setters
