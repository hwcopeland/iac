---
# Same digest-reflection pattern as demo-mcp: the "main" tag is stable,
# so track the digest behind it.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: demo-sites
  namespace: tooling
spec:
  imageRepositoryRef:
    name: demo-sites
  filterTags:
    pattern: '^main$'
  policy:
    alphabetical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m0s
