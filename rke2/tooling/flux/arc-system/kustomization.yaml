---
# Flux Kustomization: reconciles raw arc-system manifests (namespace, RBAC, secrets)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-system
  namespace: tooling
spec:
  interval: 5m
  path: ./rke2/arc-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: tooling
    namespace: tooling
---
# ARC controller Helm chart
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: arc-system
spec:
  interval: 5m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: tooling
  values:
    replicaCount: 1
    image:
      tag: "0.9.3"
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"
---
# ARC HelmRepository source
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: arc
  namespace: tooling
spec:
  interval: 1h
  url: https://actions-runner-controller.github.io/actions-runner-controller
---
# ARC runner scale set Helm chart
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: arc-system
spec:
  interval: 5m
  dependsOn:
    - name: arc-controller
      namespace: arc-system
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: tooling
  values:
    githubConfigUrl: "https://github.com/hwcopeland/iac"
    githubConfigSecret: arc-github-app-secret
    runnerScaleSetName: arc-runner-set
    minRunners: 0
    maxRunners: 4
    containerMode:
      type: "dind"
    template:
      spec:
        initContainers:
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:latest
            command: ["cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///run/docker/docker.sock
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
                readOnly: true
          - name: dind
            image: docker:dind
            args:
              - dockerd
              - --host=unix:///run/docker/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
              - name: dind-externals
                mountPath: /home/runner/externals
        volumes:
          - name: work
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 20Gi
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
