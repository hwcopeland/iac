---
# Static demo websites for Gainesville businesses at content-hashed paths
# (floridamanweb.online/<sha256(page)[:12]>/). nginx serving files baked into
# the image — stateless, no env, no volumes. Built by
# Florida-Man-Bioscience/demo-websites (hosting/Dockerfile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-sites
  namespace: theswamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-sites
  template:
    metadata:
      labels:
        app: demo-sites
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: demo-sites
          image: zot.hwcopeland.net/florida-man-bioscience/demo-sites:main # {"$imagepolicy": "tooling:demo-sites"}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
