apiVersion: apps/v1
kind: Deployment
metadata:
  name: u4u-engine-frontend
  namespace: theswamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: u4u-engine-frontend
  template:
    metadata:
      labels:
        app: u4u-engine-frontend
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: u4u-engine-frontend
          image: zot.hwcopeland.net/florida-man-bioscience/u4u-engine-frontend:main@sha256:b01bb5eae49e6d3f7975f10ede2a6963fb48705e8f8f1a7704278ff880ca280a # {"$imagepolicy": "tooling:u4u-engine-frontend"}
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
