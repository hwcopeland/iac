---
# API keys for the Twilio voice agent, from the Bitwarden item
# "voice-agent-keys" via the bitwarden-fields ClusterSecretStore: one custom
# field per env var, named exactly as below. Every listed field must exist on
# the item or the whole sync fails — set unused providers' keys to "unused".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: voice-agent-keys
  namespace: theswamp
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: voice-agent-keys
    creationPolicy: Owner
  data:
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: TWILIO_ACCOUNT_SID
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: TWILIO_AUTH_TOKEN
    - secretKey: TWILIO_PHONE_NUMBER
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: TWILIO_PHONE_NUMBER
    - secretKey: DEEPINFRA_API_KEY
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: DEEPINFRA_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: ANTHROPIC_API_KEY
    - secretKey: XAI_API_KEY
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-UUID
        property: XAI_API_KEY
