---
# Bearer token the xAI agent presents to mcp.flmanbiosci.net.
# Bitwarden Login item "demo-mcp-auth"; the password field is the token,
# and the username field holds the owner callback number (Twilio number).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-mcp-auth
  namespace: theswamp
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: demo-mcp-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MCP_AUTH_TOKEN: "{{ .password }}"
        OWNER_CALLBACK_NUMBER: "{{ .username }}"
  data:
    - secretKey: password
      remoteRef:
        key: f7be5c21-0773-4d6e-b088-a142d44f3eda
        property: password
    - secretKey: username
      remoteRef:
        key: f7be5c21-0773-4d6e-b088-a142d44f3eda
        property: username
