---
# Tracking app + API at app.flmanbiosci.net
#   /api/v1/*  → u4u-engine (FastAPI) with /api/v1 stripped
#   /          → u4u-engine-frontend (Next.js)
#
# Attached to the wildcard *.flmanbiosci.net listener on the shared gateway
# so the same cf-flmanbiosci-wildcard-cert covers it automatically.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: u4u-engine-app
  namespace: theswamp
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: flmanbiosci-https
  hostnames:
    - "app.flmanbiosci.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: u4u-engine
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: u4u-engine-frontend
          port: 3000
