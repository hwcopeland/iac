apiVersion: apps/v1
kind: Deployment
metadata:
  name: u4u-engine
  namespace: theswamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: u4u-engine
  template:
    metadata:
      labels:
        app: u4u-engine
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: u4u-engine
          image: zot.hwcopeland.net/florida-man-bioscience/u4u-engine:main@sha256:b92843d6d5527b2c46d7a44254b3522322cf8d38183c2475b9e04f9de6fc7b01 # {"$imagepolicy": "tooling:u4u-engine"}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: u4u-postgres-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "500m"
