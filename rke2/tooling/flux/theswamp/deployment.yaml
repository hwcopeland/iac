apiVersion: apps/v1
kind: Deployment
metadata:
  name: u4u-engine
  namespace: theswamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: u4u-engine
  template:
    metadata:
      labels:
        app: u4u-engine
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: u4u-engine
          image: zot.hwcopeland.net/florida-man-bioscience/u4u-engine:main@sha256:a3dadf8516cb0bfcc8f9bfd8ac9d5252f7b96b146e400f2f3ecdaca1cbd9a4d1 # {"$imagepolicy": "tooling:u4u-engine"}
          env:
            # Temporary demo escape hatch — pairs with NEXT_PUBLIC_AUTH_DISABLED=1
            # baked into the u4u-engine-frontend image. Remove (or set to "0")
            # to re-enable auth end-to-end.
            - name: ALLOW_INSECURE_NO_AUTH
              value: "1"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "500m"
