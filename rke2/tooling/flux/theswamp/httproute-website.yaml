---
# Marketing site at flmanbiosci.net (apex).
# Attached to the dedicated apex listener on the shared gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fmb-website
  namespace: theswamp
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: flmanbiosci-root-https
  hostnames:
    - "flmanbiosci.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fmb-website
          port: 80
