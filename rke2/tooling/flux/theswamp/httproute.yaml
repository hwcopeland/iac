---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: u4u-engine
  namespace: theswamp
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: flmanbiosci-root-https
  hostnames:
    - "flmanbiosci.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: u4u-engine
          port: 8000
