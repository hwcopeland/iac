apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-mcp
  namespace: theswamp
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO volume — old pod must release it first
  selector:
    matchLabels:
      app: demo-mcp
  template:
    metadata:
      labels:
        app: demo-mcp
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: demo-mcp
          image: zot.hwcopeland.net/florida-man-bioscience/demo-mcp:main@sha256:2fed443c8be3a620c2a2efa8f765f466ffad81279bbeaad2a649c8339503c2ab # {"$imagepolicy": "tooling:demo-mcp"}
          ports:
            - containerPort: 8036
          env:
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-mcp-auth
                  key: MCP_AUTH_TOKEN
            - name: OWNER_CALLBACK_NUMBER
              valueFrom:
                secretKeyRef:
                  name: demo-mcp-auth
                  key: OWNER_CALLBACK_NUMBER
            - name: CALL_LOG
              value: /data/call-log.csv
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8036
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8036
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-mcp-data
