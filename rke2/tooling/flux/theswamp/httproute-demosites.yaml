---
# Demo sites at the floridamanweb.online apex. Deliberately NO
# authentik.home.arpa/enabled annotation: these pages are handed to
# prospective customers — the unguessable content-hash path is the
# access control.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-sites
  namespace: theswamp
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: floridamanweb-root-https
  hostnames:
    - "floridamanweb.online"
  rules:
    - backendRefs:
        - name: demo-sites
          port: 80
