---
# Twilio webhooks + media-stream websocket for the voice sales agent.
# Attaches to the *.flmanbiosci.net wildcard listener. Deliberately NO
# authentik.home.arpa/enabled annotation: Twilio can't do OIDC — requests
# are authenticated in-app by X-Twilio-Signature validation.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: voice-agent
  namespace: theswamp
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: flmanbiosci-https
  hostnames:
    - "voice.flmanbiosci.net"
  rules:
    - backendRefs:
        - name: voice-agent
          port: 8035
