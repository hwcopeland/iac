---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surf-api
  namespace: game-server
  labels:
    app.kubernetes.io/name: surf-api
    app.kubernetes.io/part-of: surf-web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: surf-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surf-api
        app.kubernetes.io/part-of: surf-web
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: api
          image: zot.hwcopeland.net/game-server/surf-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SURFWEB_MYSQL_HOST
              valueFrom: { secretKeyRef: { name: surf-web-mysql, key: host } }
            - name: SURFWEB_MYSQL_PORT
              valueFrom: { secretKeyRef: { name: surf-web-mysql, key: port } }
            - name: SURFWEB_MYSQL_DATABASE
              valueFrom: { secretKeyRef: { name: surf-web-mysql, key: database } }
            - name: SURFWEB_MYSQL_USER
              valueFrom: { secretKeyRef: { name: surf-web-mysql, key: username } }
            - name: SURFWEB_MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: surf-web-mysql, key: password } }
            - name: SURFWEB_STEAM_API_KEY
              valueFrom: { secretKeyRef: { name: surf-web-steam, key: api_key } }
            - name: SURFWEB_CORS_ORIGINS
              value: "https://surf.hwcopeland.net"
            - name: SURFWEB_GAMESERVER_HOST
              value: "cs2-modded-service.game-server.svc.cluster.local"
            - name: SURFWEB_GAMESERVER_PORT
              value: "27015"
            # OpenTelemetry — auto-instrumented by FastAPIInstrumentor in
            # app/main.py when OTEL_EXPORTER_OTLP_ENDPOINT is set.
            # HTTP/protobuf to Tempo's 4318 port (gRPC requires a separate
            # client lib; HTTP is simpler for a small FastAPI service).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitor.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "surf-api"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.5"
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 384Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: surf-api
  namespace: game-server
  labels:
    app.kubernetes.io/name: surf-api
spec:
  selector:
    app.kubernetes.io/name: surf-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
