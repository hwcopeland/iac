          { "Name": "Minigames", "Config": "minigames.cfg", "DefaultMap": "3082120895", "MapGroups": ["mg_minigames"] },
          { "Name": "ScoutzKnivez", "Config": "scoutzknivez.cfg", "DefaultMap": "3073929825", "MapGroups": ["mg_scoutzknivez"] },
