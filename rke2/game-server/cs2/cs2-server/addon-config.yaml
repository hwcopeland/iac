          { "Name": "Hide N Seek", "Config": "hns.cfg", "DefaultMap": "3348038890", "MapGroups": ["mg_hns"] },
          { "Name": "Soccer", "Config": "soccer.cfg", "DefaultMap": "3293224257", "MapGroups": ["mg_soccer"] },
