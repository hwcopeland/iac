apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs2-modded-server
  namespace: game-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cs2-modded-server
  template:
    metadata:
      labels:
        app: cs2-modded-server
    spec:
      initContainers:
        - name: envsubst-config
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -ex
              apk add --no-cache gettext
              envsubst < /home/custom_files/cfg/SharpTimer/mysqlConfig.json > /tmp/mysqlConfig.json
              cp /tmp/mysqlConfig.json /home/custom_files/cfg/SharpTimer/mysqlConfig.json
              mkdir -p /home/custom_files/cfg/multiaddonmanager
              cp /addon-config/multiaddonmanager.cfg /home/custom_files/cfg/multiaddonmanager/multiaddonmanager.cfg
              echo "multiaddonmanager.cfg lines: $(wc -l < /home/custom_files/cfg/multiaddonmanager/multiaddonmanager.cfg)"
              mkdir -p /home/custom_files/addons/metamod
              cp /addon-config/multiaddonmanager.vdf /home/custom_files/addons/metamod/multiaddonmanager.vdf
              mkdir -p /home/custom_files/cfg/SharpTimer/MapData/MapExecs
              cp /addon-config/surf_mapexec.cfg /home/custom_files/cfg/SharpTimer/MapData/MapExecs/surf_.cfg
              mkdir -p /home/custom_files/addons/counterstrikesharp/configs/plugins/GameModeManager
              cp /addon-config/gamemodemanager.json /home/custom_files/addons/counterstrikesharp/configs/plugins/GameModeManager/GameModeManager.json
              grep -q "sharptimer_default_mode" /home/custom_files/cfg/SharpTimer/config.cfg || printf '\nsharptimer_default_mode 0\nsharptimer_enable_standard_mode true\nsharptimer_enable_source_mode false\nsharptimer_enable_bhop_mode false\nsharptimer_enable_85t_mode false\nsharptimer_enable_102t_mode false\nsharptimer_enable_128t_mode false\nsharptimer_enable_custom_mode false\nsharptimer_mode_custom_aa 150\nsharptimer_mode_custom_accel 6.5\nsharptimer_mode_custom_friction 5.2\nsharptimer_mode_custom_wishspeed 30\nsharptimer_mode_multiplier_standard 1.0\nsharptimer_mode_multiplier_source 1.0\nsharptimer_mode_multiplier_bhop 1.0\nsharptimer_mode_multiplier_85t 1.0\nsharptimer_mode_multiplier_102t 1.0\nsharptimer_mode_multiplier_128t 1.0\nsharptimer_max_bhop_block_time 1.0\nsharptimer_record_cache_interval 120\nsharptimer_remote_data_bhop false\nsharptimer_remote_data_surf false\nsharptimer_replays_use_binary true\nsharptimer_startzone_single_jump false\n' >> /home/custom_files/cfg/SharpTimer/config.cfg
              echo "SharpTimer cvars checked"
              echo "Downloading GameModeManager v1.0.63"
              wget -q -O /tmp/gmm.zip https://github.com/nickj609/GameModeManager/releases/download/v1.0.63/GameModeManager_v1.0.63.zip
              cd /tmp && unzip -qo gmm.zip -d gmm
              cp -r /tmp/gmm/addons/counterstrikesharp/plugins/GameModeManager /home/custom_files/addons/counterstrikesharp/plugins/
              cp -r /tmp/gmm/addons/counterstrikesharp/plugins/MenuManagerAPI /home/custom_files/addons/counterstrikesharp/plugins/
              cp -r /tmp/gmm/addons/counterstrikesharp/plugins/PlayerSettings /home/custom_files/addons/counterstrikesharp/plugins/
              cp -r /tmp/gmm/addons/counterstrikesharp/shared /home/custom_files/addons/counterstrikesharp/
              cp -r /tmp/gmm/addons/counterstrikesharp/plugins/CS2-CustomVotes /home/custom_files/addons/counterstrikesharp/plugins/
              echo "GameModeManager v1.0.63 installed"
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: MYSQL_PASS
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          volumeMounts:
            - name: custom
              mountPath: /home/custom_files
            - name: addon-config
              mountPath: /addon-config
      containers:
        - name: cs2-modded-server
          image: ghcr.io/kus/cs2-modded-server:latest
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
          ports:
            - containerPort: 27015
              protocol: TCP
              name: tcp-game
            - containerPort: 27015
              protocol: UDP
              name: udp-game
            - containerPort: 27020
              protocol: TCP
              name: tcp-sourcetv
            - containerPort: 27020
              protocol: UDP
              name: udp-sourcetv
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: cs2-secret
                  key: API_KEY
            - name: STEAM_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: cs2-secret
                  key: STEAM_ACCOUNT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: MYSQL_PASS
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cs2-rcon
                  key: password
            - name: SERVER_NAME
              value: "CS2 Modded Server"
            - name: PORT
              value: "27015"
            - name: CUSTOM_FOLDER
              value: "/home/custom_files/"
            - name: MAXPLAYERS
              value: "32"
            - name: TICKRATE
              value: "64"
            - name: GAME_MODE
              value: "0"
            - name: GAME_TYPE
              value: "0"
            - name: MAP
              value: "de_anubis"
          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
            limits:
              cpu: 6000m
              memory: 16Gi
          volumeMounts:
            - name: cs2-data
              mountPath: /home/steam/cs2
            - name: custom
              mountPath: /home/custom_files
            #- name: demo-storage
            #  mountPath: /home/steam/game/csgo/MatchZy_demos
      volumes:
        - name: cs2-data
          persistentVolumeClaim:
            claimName: cs2-modded-claim
        - name: custom
          persistentVolumeClaim:
            claimName: cs2-custom-files
        - name: addon-config
          configMap:
            name: cs2-addon-config
        #- name: demo-storage
        #  persistentVolumeClaim:
        #    claimName: demo-storage
---
apiVersion: v1
kind: Service
metadata:
  name: cs2-modded-service
  namespace: game-server
  annotations:
    io.cilium/lb-ipam-ips: "10.44.0.32"
spec:
  selector:
    app: cs2-modded-server
  ports:
    - name: tcp-27015
      protocol: TCP
      port: 27015
      targetPort: 27015
    - name: udp-27015
      protocol: UDP
      port: 27015
      targetPort: 27015
    - name: tcp-27020
      protocol: TCP
      port: 27020
      targetPort: 27020
    - name: udp-27020
      protocol: UDP
      port: 27020
      targetPort: 27020
  type: LoadBalancer
