---
# CS2 update watcher — state ConfigMap.
#
# A CronJob is stateless: each run is a fresh pod with no memory of prior runs.
# But the "keep restarting until actually up to date" loop needs to span
# multiple runs (a single steamcmd update can race the Steam CDN and a reboot
# can come up still-behind). We persist the cross-run state here:
#
#   attempts          how many restarts we've fired for the CURRENT stale build
#   target_version    the required_version we're chasing (resets attempts when it changes)
#   last_restart_ts   epoch seconds of the last restart we issued (for cooldown)
#
# The watcher reads + updates this object via the cs2-update-watcher SA
# (get/update on configmaps). It is created declaratively here so the SA never
# needs `create` permission.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cs2-update-watcher-state
  namespace: game-server
  labels:
    app.kubernetes.io/name: cs2-update-watcher
    app.kubernetes.io/part-of: cs2-surf
data:
  attempts: "0"
  target_version: "0"
  last_restart_ts: "0"
---
# CS2 update watcher — the check/restart script.
#
# Kept inline in a ConfigMap (mounted at /opt/watcher) rather than baked into a
# custom image: house rule is to avoid custom images, and the stock
# alpine/k8s:1.30.4 image already ships bash + kubectl + python3 + curl — every
# tool this script needs. No build, no push to zot.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cs2-update-watcher-script
  namespace: game-server
  labels:
    app.kubernetes.io/name: cs2-update-watcher
    app.kubernetes.io/part-of: cs2-surf
data:
  watch.sh: |
    #!/usr/bin/env bash
    # =========================================================================
    # CS2 update watcher
    #
    # One invocation = one decision. The CronJob schedule drives the loop; this
    # script is intentionally a single pass so a Steam API hiccup or a genuinely
    # unavailable update can never crash-loop the game server. Cross-run state
    # (attempts / cooldown / target build) lives in the
    # cs2-update-watcher-state ConfigMap.
    #
    # Flow:
    #   1. Discover the ACTIVE server deployment (whichever the Service selects
    #      AND has replicas>=1). Don't hardcode surf vs kus.
    #   2. Read the installed build from steam.inf on the shared PVC.
    #   3. Ask Steam UpToDateCheck whether that build is current.
    #   4. If up to date  -> reset state, exit 0 (idempotent: never restarts).
    #      If behind       -> maybe restart, subject to cooldown + max attempts.
    # =========================================================================
    set -euo pipefail

    NS="${NAMESPACE:-game-server}"
    SERVICE="${SERVICE_NAME:-cs2-modded-service}"
    STEAM_INF="${STEAM_INF_PATH:-/cs2/game/csgo/steam.inf}"
    STATE_CM="${STATE_CONFIGMAP:-cs2-update-watcher-state}"
    APPID="${APPID:-730}"
    MAX_ATTEMPTS="${MAX_ATTEMPTS:-5}"          # give up (alert, stop nudging) after this many
    COOLDOWN_SECONDS="${COOLDOWN_SECONDS:-900}" # min seconds between restarts (CDN settle + reboot)
    EMPTY_ONLY="${EMPTY_ONLY:-false}"          # if true, only restart when 0 human players
    A2S_HOST="${A2S_HOST:-cs2-modded-service.game-server.svc.cluster.local}"
    A2S_PORT="${A2S_PORT:-27015}"

    log()  { echo "[cs2-update-watcher] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }
    warn() { echo "[cs2-update-watcher] $(date -u '+%Y-%m-%dT%H:%M:%SZ') WARN: $*" >&2; }

    # ── 1. Discover the active deployment ────────────────────────────────────
    # The shared Service's selector `app` value tells us which family is live
    # (cs2-surf-server or cs2-modded-server). We then confirm that deployment
    # actually has replicas>=1 before doing anything.
    APP_LABEL=$(kubectl get svc "$SERVICE" -n "$NS" \
                  -o jsonpath='{.spec.selector.app}' 2>/dev/null || true)
    if [ -z "$APP_LABEL" ]; then
      warn "could not read selector app=... from service/$SERVICE; nothing to do"
      exit 0
    fi
    log "service/$SERVICE selects app=$APP_LABEL"

    DEPLOY=$(kubectl get deploy -n "$NS" -l "app=$APP_LABEL" \
               -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
    if [ -z "$DEPLOY" ]; then
      warn "no deployment matches app=$APP_LABEL; nothing to do"
      exit 0
    fi
    REPLICAS=$(kubectl get deploy "$DEPLOY" -n "$NS" \
                 -o jsonpath='{.spec.replicas}' 2>/dev/null || echo 0)
    if [ "${REPLICAS:-0}" -lt 1 ]; then
      log "deployment/$DEPLOY is scaled to ${REPLICAS:-0}; the active server is down — skipping"
      exit 0
    fi
    log "active deployment: $DEPLOY (replicas=$REPLICAS)"

    # ── 2. Read installed build from steam.inf ───────────────────────────────
    # steam.inf has PatchVersion=1.41.7.2 (dotted) and ClientVersion=2000877.
    # Valve's UpToDateCheck compares in "PatchVersion with dots stripped" space:
    # version=100 returns required_version=14172 / "Server version required:
    # 1.41.7.2" (verified 2026-07-23). So strip the dots before comparing.
    # ClientVersion would be WRONG here — it's always numerically far above
    # required_version, so UpToDateCheck would report a stale server as current.
    # If the file is missing the server hasn't finished its first install —
    # bail rather than guess.
    if [ ! -f "$STEAM_INF" ]; then
      warn "$STEAM_INF not found (server mid-install?); skipping this pass"
      exit 0
    fi
    CURRENT_VERSION=$(grep -E '^PatchVersion=' "$STEAM_INF" | head -1 | cut -d= -f2 | tr -d '.\r' || true)
    if ! printf '%s' "$CURRENT_VERSION" | grep -qE '^[0-9]+$'; then
      warn "could not parse a numeric PatchVersion from $STEAM_INF (got '$CURRENT_VERSION'); skipping"
      exit 0
    fi
    log "installed CS2 build (PatchVersion): $CURRENT_VERSION"

    # ── 3. UpToDateCheck (primary signal) ────────────────────────────────────
    # https://api.steampowered.com/ISteamApps/UpToDateCheck/v1/?appid=730&version=N
    # -> {response:{success,up_to_date,version_is_listable,required_version,message}}
    # No API key required. We treat any non-success / network failure as
    # "unknown" and do NOT restart — better a stale server than a flap.
    URL="https://api.steampowered.com/ISteamApps/UpToDateCheck/v1/?appid=${APPID}&version=${CURRENT_VERSION}&format=json"
    RESP=$(curl -fsS --max-time 15 "$URL" 2>/dev/null || true)
    if [ -z "$RESP" ]; then
      warn "UpToDateCheck request failed/empty; treating as unknown — NOT restarting"
      exit 0
    fi

    # Parse with python3 (ships in alpine/k8s). Emits: "<success> <up_to_date> <required_version>"
    PARSED=$(printf '%s' "$RESP" | python3 -c '
    import sys, json
    try:
        r = json.load(sys.stdin).get("response", {})
    except Exception:
        print("0 0 0"); sys.exit(0)
    success = 1 if r.get("success") else 0
    up = 1 if r.get("up_to_date") else 0
    req = int(r.get("required_version", 0) or 0)
    print(f"{success} {up} {req}")
    ' 2>/dev/null || echo "0 0 0")
    read -r SUCCESS UP_TO_DATE REQUIRED_VERSION <<<"$PARSED"

    if [ "$SUCCESS" != "1" ]; then
      warn "UpToDateCheck response not successful: $RESP — NOT restarting"
      exit 0
    fi

    # ── helper: read/write the cross-run state ConfigMap ─────────────────────
    state_get() { kubectl get cm "$STATE_CM" -n "$NS" -o jsonpath="{.data.$1}" 2>/dev/null || echo ""; }
    state_set() {
      # $1 key $2 value  — patch a single data key
      kubectl patch cm "$STATE_CM" -n "$NS" --type merge \
        -p "{\"data\":{\"$1\":\"$2\"}}" >/dev/null
    }

    ATTEMPTS=$(state_get attempts);        ATTEMPTS=${ATTEMPTS:-0}
    TARGET=$(state_get target_version);    TARGET=${TARGET:-0}
    LAST_TS=$(state_get last_restart_ts);  LAST_TS=${LAST_TS:-0}
    NOW=$(date +%s)

    # ── 4a. Already current → idempotent no-op, reset state ──────────────────
    if [ "$UP_TO_DATE" = "1" ]; then
      log "build $CURRENT_VERSION is up to date — no action"
      if [ "$ATTEMPTS" != "0" ] || [ "$TARGET" != "0" ]; then
        log "clearing stale watcher state (was attempts=$ATTEMPTS target=$TARGET)"
        state_set attempts 0
        state_set target_version 0
        state_set last_restart_ts 0
      fi
      exit 0
    fi

    # ── 4b. Behind. Decide whether to restart. ───────────────────────────────
    log "OUT OF DATE: installed=$CURRENT_VERSION required=$REQUIRED_VERSION"

    # New target build? Reset the attempt counter so a fresh Valve update gets a
    # fresh budget of retries (a build that exhausted attempts last week won't
    # block this week's update).
    if [ "$TARGET" != "$REQUIRED_VERSION" ]; then
      log "new target build $REQUIRED_VERSION (was $TARGET) — resetting attempt counter"
      ATTEMPTS=0
      state_set target_version "$REQUIRED_VERSION"
      TARGET="$REQUIRED_VERSION"
    fi

    # Max-attempts guard: stop nudging so a genuinely-unavailable update can't
    # restart the server forever. Logged loudly so it surfaces in any log alert.
    if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
      warn "reached MAX_ATTEMPTS=$MAX_ATTEMPTS for build $REQUIRED_VERSION and still behind"
      warn "giving up automatic restarts — MANUAL INTERVENTION likely needed (check steamcmd logs on the pod)"
      # Exit non-zero ON PURPOSE: the failed Job trips the CS2UpdateWatcherFailing
      # PrometheusRule (alerts.yaml) -> severity=critical -> Alertmanager email.
      # Exiting 0 here would leave a stuck-behind server silent. Every subsequent
      # pass keeps exiting 2 until the server catches up, so the alert stays lit.
      exit 2
    fi

    # Cooldown guard: leave time for steamcmd + reboot + CDN to settle before the
    # next nudge. Without this, back-to-back runs would kill the pod repeatedly
    # mid-download.
    ELAPSED=$(( NOW - LAST_TS ))
    if [ "$LAST_TS" != "0" ] && [ "$ELAPSED" -lt "$COOLDOWN_SECONDS" ]; then
      log "cooldown active (${ELAPSED}s < ${COOLDOWN_SECONDS}s since last restart) — waiting for the in-flight reboot to finish"
      exit 0
    fi

    # Optional player-empty gate (nice-to-have, off by default). Uses A2S_INFO
    # against the Service — same query the surf-web api uses (see a2s.py). Bots
    # are reported separately and excluded.
    if [ "$EMPTY_ONLY" = "true" ]; then
      PLAYERS=$(python3 -c '
    import socket, struct, sys
    host, port = sys.argv[1], int(sys.argv[2])
    HDR = b"\xff\xff\xff\xff\x54Source Engine Query\x00"
    try:
        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.settimeout(2.0)
        s.sendto(HDR, (host, port))
        data, _ = s.recvfrom(4096)
        if len(data) >= 5 and data[4] == 0x41:  # challenge
            s.sendto(HDR + data[5:9], (host, port))
            data, _ = s.recvfrom(4096)
        buf = memoryview(data)[4:]
        off = 2  # header byte + protocol byte
        def cstr(b, o):
            e = o
            while e < len(b) and b[e] != 0: e += 1
            return e + 1
        for _ in range(4):  # name, map, folder, game
            off = cstr(buf, off)
        off += 2            # appid
        players = buf[off]; bots = buf[off+2]
        print(max(players - bots, 0))
    except Exception:
        print(-1)  # unknown -> treat as "do not block" below
    ' "$A2S_HOST" "$A2S_PORT" 2>/dev/null || echo -1)
      if [ "$PLAYERS" -gt 0 ] 2>/dev/null; then
        log "EMPTY_ONLY set and $PLAYERS human player(s) connected — deferring restart"
        exit 0
      fi
      log "EMPTY_ONLY set; player count=$PLAYERS (<=0 or unknown) — clear to restart"
    fi

    # ── Fire the restart ─────────────────────────────────────────────────────
    NEXT=$(( ATTEMPTS + 1 ))
    log "restarting deployment/$DEPLOY to pull build $REQUIRED_VERSION (attempt $NEXT/$MAX_ATTEMPTS)"
    if kubectl rollout restart deploy/"$DEPLOY" -n "$NS"; then
      state_set attempts "$NEXT"
      state_set last_restart_ts "$NOW"
      log "rollout restart issued; entrypoint steamcmd will pull the update on boot."
      log "next pass (post-cooldown) re-checks UpToDateCheck and stops once current."
    else
      warn "kubectl rollout restart failed; will retry next pass (attempt not counted)"
      exit 1
    fi
---
# CS2 update watcher — the CronJob.
#
# Polls every 10 minutes. Each run is one pass of watch.sh. The
# restart-until-updated behaviour emerges from many short passes + the state
# ConfigMap, NOT from one long-running loop — so the blast radius of any single
# run is exactly "at most one rollout restart".
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cs2-update-watcher
  namespace: game-server
  labels:
    app.kubernetes.io/name: cs2-update-watcher
    app.kubernetes.io/part-of: cs2-surf
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid          # never two checks racing the state ConfigMap
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cs2-update-watcher
            app.kubernetes.io/part-of: cs2-surf
        spec:
          serviceAccountName: cs2-update-watcher
          restartPolicy: Never
          containers:
            - name: watcher
              # Stock image: bash + kubectl + python3 + curl. No custom build.
              image: alpine/k8s:1.30.4
              command: ["/bin/bash", "/opt/watcher/watch.sh"]
              env:
                - name: NAMESPACE
                  value: "game-server"
                - name: SERVICE_NAME
                  value: "cs2-modded-service"
                # steam.inf on the shared PVC (mounted read-only below).
                - name: STEAM_INF_PATH
                  value: "/cs2/game/csgo/steam.inf"
                - name: STATE_CONFIGMAP
                  value: "cs2-update-watcher-state"
                - name: APPID
                  value: "730"
                # Safety limits — tune here, no image rebuild needed.
                - name: MAX_ATTEMPTS
                  value: "5"
                - name: COOLDOWN_SECONDS
                  value: "900"      # 15m between nudges: steamcmd + reboot + CDN settle
                # Player-empty gate (nice-to-have). Off by default: a stale
                # server is unjoinable anyway, so waiting for it to empty just
                # prolongs the outage. Flip to "true" to be polite during a
                # partial/optional update.
                - name: EMPTY_ONLY
                  value: "false"
                - name: A2S_HOST
                  value: "cs2-modded-service.game-server.svc.cluster.local"
                - name: A2S_PORT
                  value: "27015"
              volumeMounts:
                - name: script
                  mountPath: /opt/watcher
                # Shared CS2 PVC, READ-ONLY — we only read steam.inf and must
                # never touch game files the live server owns.
                - name: cs2-data
                  mountPath: /cs2
                  readOnly: true
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits:   { cpu: 200m, memory: 128Mi }
          volumes:
            - name: script
              configMap:
                name: cs2-update-watcher-script
                defaultMode: 0755
            - name: cs2-data
              persistentVolumeClaim:
                claimName: cs2-modded-claim
