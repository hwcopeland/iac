---
# Grafana dashboard ConfigMap for cs2-surf-server overview.
#
# Auto-imported by the kube-prometheus-stack Grafana sidecar via the
# `grafana_dashboard: "1"` label. Dashboard shows pod health, CPU,
# memory, network I/O, and container restarts from cadvisor metrics
# that Prometheus already scrapes from kubelet.
#
# Game-level metrics (player count, current map, rotation state, chat
# commands issued) need Loki log scraping to be turned on for the
# game-server namespace — that's queued as a homelab TODO item in
# docs/HOMELAB-TODO.md. When that lands this dashboard can grow
# additional panels that query Loki via the log datasource.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cs2-surf-server-dashboard
  namespace: monitor
  labels:
    grafana_dashboard: "1"
data:
  cs2-surf-server.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red",   "text": "DOWN" } }, "type": "value" },
                { "options": { "1": { "color": "green", "text": "UP"   } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "textMode": "value_and_name" },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "kube_pod_status_ready{namespace=\"game-server\", pod=~\"cs2-surf-server.*\", condition=\"true\"}",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Pod Ready",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 3 }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Container Restarts (all-time)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "s"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "time() - max(kube_pod_start_time{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Pod Uptime",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "cores"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 4,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"game-server\", pod=~\"cs2-surf-server.*\", container=\"cs2-surf-server\"}[5m]))",
              "legendFormat": "cs2-surf-server",
              "refId": "A"
            }
          ],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 5,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(container_memory_working_set_bytes{namespace=\"game-server\", pod=~\"cs2-surf-server.*\", container=\"cs2-surf-server\"})",
              "legendFormat": "working set",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(container_spec_memory_limit_bytes{namespace=\"game-server\", pod=~\"cs2-surf-server.*\", container=\"cs2-surf-server\"})",
              "legendFormat": "limit",
              "refId": "B"
            }
          ],
          "title": "Memory",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 6,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"}[1m])) * 8",
              "legendFormat": "rx",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"}[1m])) * 8",
              "legendFormat": "tx",
              "refId": "B"
            }
          ],
          "title": "Network I/O",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "stepAfter",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "always",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 7,
          "options": { "legend": { "calcs": ["max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"})",
              "legendFormat": "restarts",
              "refId": "A"
            }
          ],
          "title": "Container Restarts Over Time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 20 },
          "id": 100,
          "title": "Game Activity (Loki)",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": {} },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 21 },
          "id": 110,
          "options": { "dedupStrategy": "none", "enableLogDetails": false, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": false },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"SurfMapCommand \\\\| surf_\" | regexp \"\\\\| (?P<map>surf_\\\\w+)\\\\s*$\" | line_format \"{{.map}}\" | decolorize",
              "maxLines": 1,
              "refId": "A"
            }
          ],
          "title": "Current Map",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": {} },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 21 },
          "id": 111,
          "options": { "dedupStrategy": "none", "enableLogDetails": false, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": false },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"Found .* main.*stage\" | line_format \"{{__line__}}\" | decolorize",
              "maxLines": 1,
              "refId": "A"
            }
          ],
          "title": "Current Map Records",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": {} },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 21 },
          "id": 112,
          "options": { "dedupStrategy": "none", "enableLogDetails": false, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": false },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"Pending change executing\" | line_format \"{{__line__}}\" | decolorize",
              "maxLines": 10,
              "refId": "A"
            }
          ],
          "title": "Recent Map Changes",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "id": 101,
          "options": { "legend": { "displayMode": "table", "placement": "right" } },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "sum by (body) (count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"CMD from\" | regexp \"body=(?P<body>\\\\w+)\" [$__interval]))",
              "legendFormat": "{{cmd}}",
              "refId": "A"
            }
          ],
          "title": "Chat Commands",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] }, "unit": "short" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 25 },
          "id": 102,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"RTV threshold|RTV passed\" [$__range])",
              "refId": "A"
            }
          ],
          "title": "RTV Votes (range)",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] }, "unit": "short" } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 25 },
          "id": 103,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"Extend passed\" [$__range])",
              "refId": "A"
            }
          ],
          "title": "Extends (range)",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{"color": "orange", "value": null}] }, "unit": "short" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 29 },
          "id": 104,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"host_workshop_map|Pending change executing|OnServerActivate\" [$__range])",
              "refId": "A"
            }
          ],
          "title": "Map Changes (range)",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{"color": "purple", "value": null}] }, "unit": "short" } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 29 },
          "id": 105,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"CMD from\" [$__range])",
              "refId": "A"
            }
          ],
          "title": "Chat Commands (range)",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 33 },
          "id": 106,
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "{namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"CMD from|CONNECT|DISCONNECT|host_workshop_map|Pending change|RTV|Extend|OnServerActivate|SurfMapCommand loaded\"",
              "refId": "A"
            }
          ],
          "title": "Game Event Log",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisPlacement": "auto", "drawStyle": "bars", "fillOpacity": 50, "gradientMode": "opacity", "lineWidth": 1, "pointSize": 5, "showPoints": "never", "spanNulls": true, "stacking": { "mode": "normal" } },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 43 },
          "id": 107,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["sum"] } },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"CONNECT \\\\d\" [$__interval])",
              "legendFormat": "connects",
              "refId": "A"
            },
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"DISCONNECT\" [$__interval])",
              "legendFormat": "disconnects",
              "refId": "B"
            }
          ],
          "title": "Player Connects / Disconnects",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 43 },
          "id": 108,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "center", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "count_over_time({namespace=\"game-server\", pod=~\"cs2-surf-server.*\"} |~ \"CONNECT \\\\d\" [$__range])",
              "refId": "A"
            }
          ],
          "title": "Player Joins (range)",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["cs2", "surf", "game-server"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CS2 Surf Server Overview",
      "uid": "cs2-surf-overview",
      "version": 1,
      "weekStart": ""
    }
