---
# Service patch: switches the existing cs2-modded-service selector to point
# at the cs2-surf-server deployment instead of the kus cs2-modded-server.
#
# To cutover:  kubectl apply -f service-patch.yaml
# To rollback: change selector back to app: cs2-modded-server and re-apply.
#
# This is a full Service manifest (not a strategic merge patch) so it can be
# applied directly. The only change from the original is the selector value.
apiVersion: v1
kind: Service
metadata:
  name: cs2-modded-service
  namespace: game-server
  annotations:
    io.cilium/lb-ipam-ips: "10.44.0.32"
spec:
  selector:
    app: cs2-surf-server
  # Game traffic is UDP only. TCP 27015 previously exposed CS2's -usercon
  # RCON listener externally; public scanner bots were bruteforcing / reusing
  # leaked rcon_password values and broadcasting scam links via `say`. The
  # entrypoint's internal RCON calls connect to the pod's own IP from inside
  # the pod and do NOT traverse the Service, so they keep working without
  # the external TCP ports. SourceTV TCP 27020 is also dropped for the same
  # reason — we don't use it.
  ports:
    - name: udp-27015
      protocol: UDP
      port: 27015
      targetPort: 27015
    - name: udp-27020
      protocol: UDP
      port: 27020
      targetPort: 27020
  type: LoadBalancer
