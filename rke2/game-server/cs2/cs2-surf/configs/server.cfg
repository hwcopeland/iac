// =============================================================================
// CS2 Surf Server Configuration
// Loaded as server.cfg — sets movement cvars and server settings for surf mode
// =============================================================================

// ---------------------------------------------------------------------------
// Server Identity
// ---------------------------------------------------------------------------
hostname "W4de Surf"
sv_password ""
sv_cheats 0

// ---------------------------------------------------------------------------
// Surf Movement Physics
// ---------------------------------------------------------------------------
sv_airaccelerate 150
sv_accelerate 10
sv_friction 4
sv_gravity 800
sv_maxvelocity 3500
sv_staminamax 0
sv_staminajumpcost 0
sv_staminalandcost 0
sv_enablebunnyhopping 1
sv_autobunnyhopping 1
sv_falldamage_scale 0
sv_wateraccelerate 10

// ---------------------------------------------------------------------------
// Game Rules
// ---------------------------------------------------------------------------
mp_ignore_round_win_conditions true
mp_respawn_on_death_ct true
mp_respawn_on_death_t true
mp_respawnwavetime_ct 3.0
mp_respawnwavetime_t 3.0
mp_timelimit 30
mp_roundtime 60
mp_roundtime_defuse 0
mp_roundtime_hostage 0
mp_freezetime 0
mp_warmuptime 15
mp_maxrounds 0
mp_match_end_changelevel true
mp_endmatch_votenextmap false

// ---------------------------------------------------------------------------
// Team Settings
// ---------------------------------------------------------------------------
mp_autoteambalance 0
mp_limitteams 0
mp_teammates_are_enemies false
mp_friendlyfire false
mp_solid_teammates 0
mp_free_armor 2
mp_weapons_allow_zeus 0

// ---------------------------------------------------------------------------
// Economy / Buy
// ---------------------------------------------------------------------------
mp_buy_anywhere 0
mp_buytime 0
mp_maxmoney 0
mp_startmoney 0
mp_afterroundmoney 0
mp_playercashawards 0
mp_teamcashawards 0

// ---------------------------------------------------------------------------
// Bots
// ---------------------------------------------------------------------------
bot_quota 0
bot_quota_mode fill
bot_join_after_player 0
bot_zombie 1
bot_stop 1

// ---------------------------------------------------------------------------
// Voice & Chat
// ---------------------------------------------------------------------------
sv_full_alltalk 1
sv_alltalk 1
sv_deadtalk 1
sv_talk_enemy_dead 1
sv_talk_enemy_living 1
sv_voiceenable 1

// ---------------------------------------------------------------------------
// Misc Gameplay
// ---------------------------------------------------------------------------
sv_disable_radar 1
mp_drop_knife_enable 1
mp_drop_grenade_enable 0
mp_give_player_c4 0
sv_infinite_ammo 2
mp_ct_default_primary ""
mp_ct_default_secondary "weapon_usp_silencer"
mp_t_default_primary ""
mp_t_default_secondary "weapon_glock"
sv_holiday_mode 0

// ---------------------------------------------------------------------------
// Performance / Network
// ---------------------------------------------------------------------------
sv_mincmdrate 128
sv_minupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_lan 0
mapcyclefile "mapcycle.txt"

// ---------------------------------------------------------------------------
// Hibernation — disable so the server stays at full tickrate when empty.
// Without this, CS2 drops to ~10tps when idle and reconnecting players get a
// stuttery experience until the server wakes back up.
// ---------------------------------------------------------------------------
sv_hibernate_when_empty 0
sv_hibernate_ms 0
sv_hibernate_postgame_delay 0

// ---------------------------------------------------------------------------
// Block map-embedded server commands. Some workshop maps (surf_ace,
// surf_boreas) have point_servercommand entities baked into the BSP
// that fire `say <gambling spam>` on a timer. Referral code "BOREAS"
// for clash.gg. sv_allow_point_servercommand=never prevents any map
// entity from executing server console commands.
// ---------------------------------------------------------------------------
sv_allow_point_servercommand never

// ---------------------------------------------------------------------------
// Timer weapon management. timer_remove_weapons_on_spawn strips all items
// then gives back weapons based on map completion status:
//   - Everyone: knife
//   - Map completers (has a main run PB): + USP-S
//   - SR holder (best main run time): + SSG 08 (scout)
// ---------------------------------------------------------------------------
// DISABLED — GiveNamedItem triggers CCSPlayer_ItemServices::CanAcquire
// which crashes on the Apr 21 CS2 update (ag2 ModSharp can't resolve it).
// Re-enable when ModSharp git-119 ships with the fixed gamedata.
timer_remove_weapons_on_spawn false
timer_remove_dropped_weapons true

// ---------------------------------------------------------------------------
// Logging — enable per-day game logs to csgo/logs/ so chat (including
// Console: say from RCON), connect/disconnect, and admin actions are
// captured for forensics. Added after the 2026-04-14 RCON spam incident.
// ---------------------------------------------------------------------------
log on
mp_logfile 1
mp_logmessages 1
mp_logdetail 3
sv_logfile 1
sv_logbans 1
sv_logflush 1
