// Extra addon settings, this is only executed once on plugin load
// Workshop map VPKs auto-mount from the downloaded content directory.
// Do NOT list workshop map IDs here — doing so requires ALL clients to
// have those maps before connecting, which breaks client connectivity.
// mm_addon_mount_download 1 ensures downloaded VPKs are available for changelevel.
mm_extra_addons_timeout         10
mm_addon_mount_download         1
mm_cache_clients_with_addons    1
mm_cache_clients_duration       21600
mm_block_disconnect_messages    1
mm_addon_debug                  0
mm_add_addon 3461824328
