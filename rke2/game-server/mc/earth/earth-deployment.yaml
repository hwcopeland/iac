# Terra++ 1:1-scale Earth server (Forge 1.12.2). SCALE-TO-ZERO via mc-router.
#
# Converted Deployment -> StatefulSet so mc-router can autoscale it. The name
# trio MUST match for the autoscale mapping: Service.metadata.name ==
# StatefulSet.metadata.name == StatefulSet.spec.serviceName == "mc-earth".
# A StatefulSet with a single replica + RWO volume is inherently "never two pods
# against one world" (ordered, at-most-one), so the old Deployment Recreate
# strategy is no longer needed.
#
# Storage: keeps the EXISTING standalone 200Gi PVC mc-earth-data, mounted as a
# normal volume (NOT a volumeClaimTemplate) so the accumulated Terra++ world is
# preserved byte-for-byte across the Deployment->StatefulSet swap.
#
# image: stamped to the immutable sha tag by .github/workflows/build-mc-earth.yml.
# `latest` here is a bootstrap placeholder only.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mc-earth
  namespace: game-server
  labels:
    app: mc-earth
spec:
  replicas: 0                 # asleep by default; mc-router scales 0<->1
  serviceName: mc-earth       # MUST equal metadata.name (autoscale mapping)
  selector:
    matchLabels:
      app: mc-earth
  template:
    metadata:
      labels:
        app: mc-earth
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: mc-earth-server
          image: zot.hwcopeland.net/game-server/mc-earth:latest
          ports:
            - containerPort: 25565
              name: minecraft
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "FORGE"
            - name: VERSION
              value: "1.12.2"
            - name: FORGE_VERSION
              value: "14.23.5.2847"
            # CRITICAL: Terra++ registers the "EarthCubic" world type. Without
            # this the server silently generates a vanilla world. LEVEL forces a
            # fresh world name so it regenerates as Earth (an existing DEFAULT
            # world dir is NOT converted by changing level-type).
            - name: LEVEL_TYPE
              value: "EarthCubic"
            - name: LEVEL
              value: "earth"
            # Xmx/Xms. Kept below the 12Gi cgroup limit (see header).
            - name: MEMORY
              value: "10G"
            # Terra++ tile fetches can be slow on first gen; give Forge room.
            - name: MAX_TICK_TIME
              value: "-1"
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          volumeMounts:
            - name: mc-earth-data
              mountPath: /data
          # itzg exposes an mc-health helper on tcp/25565; use a TCP probe so we
          # don't depend on the (slow) Terra++ first-gen for readiness.
          startupProbe:
            tcpSocket:
              port: 25565
            failureThreshold: 60      # up to 10 min for Forge + mods to boot
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 0    # gated by startupProbe
            periodSeconds: 30
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: mc-earth-data
          persistentVolumeClaim:
            claimName: mc-earth-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mc-earth-data
  namespace: game-server
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 200Gi
---
# Routing + autoscale Service. Named "mc-earth" to match the StatefulSet.
# externalServerName makes mc-router route earth.mc.hwcopeland.net here. No
# external IP — all WAN ingress goes through the single mc-router LB.
apiVersion: v1
kind: Service
metadata:
  name: mc-earth
  namespace: game-server
  labels:
    app: mc-earth
  annotations:
    "mc-router.itzg.me/externalServerName": "earth.mc.hwcopeland.net"
spec:
  type: ClusterIP
  selector:
    app: mc-earth
  ports:
    - name: minecraft
      protocol: TCP
      port: 25565
      targetPort: 25565
