# zot registry pull credentials for the game-server namespace, so kubelet can
# pull zot.hwcopeland.net/game-server/mc-earth. Same Bitwarden item as every
# other namespace's zot-pull-secret (766ec5c7-...). The earth Deployment
# references this via imagePullSecrets.
#
# NOTE: a `zot-pull-secret` Secret already exists in game-server (created
# manually, ~57d). Applying this ExternalSecret with creationPolicy: Owner
# will adopt and start managing that Secret declaratively. This is a deliberate
# GitOps cleanup — flagged in README.md as a human-review item because it
# changes ownership of an existing live Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-pull-secret
  namespace: game-server
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: zot-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"zot.hwcopeland.net":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: username
    - secretKey: password
      remoteRef:
        key: 766ec5c7-6aa8-419d-bb27-e5982872bc5b
        property: password
