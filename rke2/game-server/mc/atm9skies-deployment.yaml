# ATM9-Sky main server. SCALE-TO-ZERO via mc-router auto-scale.
#
# For autoscale to work, mc-router maps the routed Service to this StatefulSet
# BY NAME, so all three of these MUST match: Service.metadata.name ==
# StatefulSet.metadata.name == StatefulSet.spec.serviceName == "atm9skies".
# replicas starts at 0; mc-router wakes it to 1 on the first connect to
# skies.mc.hwcopeland.net (or any no-SNI/default connect).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atm9skies
  namespace: game-server
spec:
  replicas: 0                 # asleep by default; mc-router scales 0<->1
  serviceName: atm9skies      # MUST equal metadata.name (autoscale mapping)
  selector:
    matchLabels:
      app: atm9skies
  template:
    metadata:
      labels:
        app: atm9skies
    spec:
      containers:
        - name: atm9skies-server
          image: itzg/minecraft-server:java21-alpine
          ports:
            - containerPort: 25565
          env:
            - name: EULA
              value: "true"
            - name: MODPACK_PLATFORM
              value: "AUTO_CURSEFORGE"
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-secret
                  key: CF_API_KEY
            - name: CF_SLUG
              value: "all-the-mods-9-to-the-sky"
            - name: CF_EXCLUDE_MODS
              value: "particle-effects-reforged"
            - name: MEMORY
              value: "10G"
          volumeMounts:
            - name: mc-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: mc-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 50Gi
---
# Routing + autoscale Service. Named "atm9skies" to match the StatefulSet (the
# autoscale mapping is name-based). externalServerName makes mc-router route
# skies.mc.hwcopeland.net here; defaultServer makes this the bare-IP/no-SNI
# fallback. (Renamed from the old "atm9skies-external" — delete that orphan
# Service after applying; see README/runbook.) This is ClusterIP only: mc-router
# (10.44.0.5) is the single ingress, no per-server LBs.
apiVersion: v1
kind: Service
metadata:
  name: atm9skies
  namespace: game-server
  annotations:
    "mc-router.itzg.me/externalServerName": "skies.mc.hwcopeland.net"
    "mc-router.itzg.me/defaultServer": "true"
spec:
  type: ClusterIP
  selector:
    app: atm9skies
  ports:
    - protocol: TCP
      port: 25565
      targetPort: 25565
---
# RBAC for mc-router's auto-scaler. Bound to the mc-router SA by a RoleBinding in
# mc-router/mc-router.yaml. Grants the scale 0<->1 patching on StatefulSets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: serverless-watcher
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["watch", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["watch", "list", "get", "update", "patch"]
