# mc-monitor — itzg/mc-monitor Prometheus exporter for the Minecraft fleet.
#
# Runs the `export-for-prometheus` subcommand, which status-pings each target
# Minecraft server on an interval and exposes the results as Prometheus
# `minecraft_status_*` series on :8080/metrics.
#
# CRITICAL TARGETING DECISION — we point EXPORT_SERVERS at each server's
# INTERNAL ClusterIP Service (atm9skies / atm9skies-island / mc-earth), NOT at
# mc-router's ingress (10.44.0.5):
#   * A status-ping THROUGH mc-router would trigger --auto-scale-up and WAKE a
#     sleeping (replicas:0) server — defeating scale-to-zero and racking up
#     compute for an idle world.
#   * A status-ping straight at the internal Service of a scaled-to-zero server
#     has NO endpoints, so the TCP connect just fails fast. mc-monitor reports
#     that target as unhealthy (minecraft_status_healthy=0) and moves on — NO
#     wake. Exactly what we want: asleep == unhealthy in the exporter, awake
#     servers report real player counts.
#
# The three internal Services all listen on 25565 (verified live). DNS names are
# the in-cluster <svc>.<ns>.svc.cluster.local form.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-monitor
  namespace: game-server
  labels:
    app: mc-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-monitor
  template:
    metadata:
      labels:
        app: mc-monitor
    spec:
      containers:
        - name: mc-monitor
          # Pinned to a release tag (multi-arch: amd64 + arm64, covers the
          # mixed-arch node pool). Bump deliberately, never :latest in prod.
          image: itzg/mc-monitor:0.16.7
          args:
            - "export-for-prometheus"
          env:
            # Comma-separated list of host:port targets to status-ping. These
            # are the INTERNAL ClusterIP Services (see header). Port 25565 each.
            - name: EXPORT_SERVERS
              value: "atm9skies.game-server.svc.cluster.local:25565,atm9skies-island.game-server.svc.cluster.local:25565,mc-earth.game-server.svc.cluster.local:25565"
            # Bind the exporter HTTP listener to :8080 (the Service/SM port).
            - name: EXPORT_LISTEN_ADDRESS
              value: ":8080"
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mc-monitor
  namespace: game-server
  labels:
    app: mc-monitor
spec:
  type: ClusterIP
  selector:
    app: mc-monitor
  ports:
    - name: metrics
      protocol: TCP
      port: 8080
      targetPort: metrics
---
# ServiceMonitor — scraped by the cluster Prometheus. MUST carry
# `release: kube-prometheus-stack` to match the Prometheus CR's
# serviceMonitorSelector (same label the mc-router ServiceMonitor uses, verified
# against mc-router.yaml). namespaceSelector pins it to game-server.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mc-monitor
  namespace: game-server
  labels:
    app: mc-monitor
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - game-server
  selector:
    matchLabels:
      app: mc-monitor
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
