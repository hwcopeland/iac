# ATM9-Sky ISLAND server (skies2). PROMOTED from temp verify -> PERMANENT,
# SCALE-TO-ZERO via mc-router auto-scale.
#
# WORLD VOLUME: uses the verified clone PVC `island-verify-data` (ATM9-Sky 1.1.9,
# walked/verified, matches live + client). The original backup PVC mc-data-pvc /
# PV mc-restored-pv is left pristine/untouched. >>> CONFIRM this is the world you
# want to keep; if you'd rather promote the original backup, point claimName at
# mc-data-pvc instead. <<<
#
# Autoscale name trio MUST match: Service.metadata.name ==
# StatefulSet.metadata.name == StatefulSet.spec.serviceName == "atm9skies-island".
# replicas starts at 0; mc-router wakes it on the first connect to
# skies2.mc.hwcopeland.net.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: island-verify-data
  namespace: game-server
spec:
  storageClassName: longhorn
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  dataSource:
    kind: PersistentVolumeClaim
    name: mc-data-pvc        # CSI clone of the island backup (already provisioned)
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atm9skies-island
  namespace: game-server
spec:
  replicas: 0                      # asleep by default; mc-router scales 0<->1
  serviceName: atm9skies-island    # MUST equal metadata.name (autoscale mapping)
  selector:
    matchLabels:
      app: atm9skies-island
  template:
    metadata:
      labels:
        app: atm9skies-island
    spec:
      containers:
        - name: atm9skies-server
          image: itzg/minecraft-server:java21-alpine
          ports:
            - containerPort: 25565
          env:
            - name: EULA
              value: "true"
            - name: MODPACK_PLATFORM
              value: "AUTO_CURSEFORGE"
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-secret
                  key: CF_API_KEY
            - name: CF_SLUG
              value: "all-the-mods-9-to-the-sky"
            - name: CF_FILENAME_MATCHER       # pinned to the island's pack version
              value: "1.1.9"
            - name: CF_EXCLUDE_MODS
              value: "particle-effects-reforged"
            - name: MEMORY
              value: "6G"
            - name: ALLOW_FLIGHT              # island has legitimate flight; keep
              value: "TRUE"
          resources:
            requests:
              memory: "6Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
          volumeMounts:
            - name: mc-data
              mountPath: /data
      volumes:
        - name: mc-data
          persistentVolumeClaim:
            claimName: island-verify-data
---
# Routing + autoscale Service. Named "atm9skies-island" to match the StatefulSet.
# externalServerName makes mc-router route skies2.mc.hwcopeland.net here.
# (Replaces the old direct-connect LB atm9skies-island-lb / 10.44.0.34 — delete
# that orphan Service after applying; a direct LB can't wake a sleeping server.)
apiVersion: v1
kind: Service
metadata:
  name: atm9skies-island
  namespace: game-server
  annotations:
    "mc-router.itzg.me/externalServerName": "skies2.mc.hwcopeland.net"
spec:
  type: ClusterIP
  selector:
    app: atm9skies-island
  ports:
    - protocol: TCP
      port: 25565
      targetPort: 25565
