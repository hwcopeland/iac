---
# Garage S3-compatible object store — single-node StatefulSet.
# Cluster-wide artifact storage. Internal endpoint:
#   garage.garage-system.svc.cluster.local:3900 (S3)
#   garage.garage-system.svc.cluster.local:3902 (admin)
#
# NOTE: volumeClaimTemplates is intentionally omitted. The PVCs are
# pre-created in garage-pvcs.yaml and pinned to PVs that hold the
# pre-migration object data (formerly bound to chem/data-garage-0 and
# chem/meta-garage-0).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      containers:
        - name: garage
          image: dxflrs/garage:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3900
              name: s3
              protocol: TCP
            - containerPort: 3902
              name: admin
              protocol: TCP
            - containerPort: 3901
              name: rpc
              protocol: TCP
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: rpc-secret
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-admin-token
                  key: admin-token
          volumeMounts:
            - name: data
              mountPath: /var/lib/garage/data
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3900
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3900
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: garage-config
        - name: data
          persistentVolumeClaim:
            claimName: data-garage-0
        - name: meta
          persistentVolumeClaim:
            claimName: meta-garage-0
