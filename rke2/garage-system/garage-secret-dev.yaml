# Garage S3 + cluster RPC credentials — externalized via ESO (Bitwarden).
#
# SECURITY: this manifest previously held a plaintext `kind: Secret` with LIVE
# credentials committed to a public repo. Those values are COMPROMISED and must
# be rotated. Post-rotation wiring (one-time):
#   1. `garage key create` a new S3 key; rotate `rpc_secret` in garage.toml on
#      every node + rolling restart.
#   2. Create ONE Bitwarden item (shared with chem/garage-secret.yaml) with
#      CUSTOM FIELDS named: rpc-secret, access-key-id, secret-access-key
#   3. Replace REPLACE-WITH-BITWARDEN-garage-s3-ITEM-UUID below with its UUID.
# `endpoint` is an in-cluster DNS name (not a secret) → rendered as a literal.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secret
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: garage-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        rpc-secret: "{{ .rpc_secret | trim }}"
        access-key-id: "{{ .access_key_id | trim }}"
        secret-access-key: "{{ .secret_access_key | trim }}"
        endpoint: "http://garage.garage-system.svc.cluster.local:3900"
  data:
    - secretKey: rpc_secret
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-garage-s3-ITEM-UUID
        property: rpc-secret
    - secretKey: access_key_id
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-garage-s3-ITEM-UUID
        property: access-key-id
    - secretKey: secret_access_key
      remoteRef:
        key: REPLACE-WITH-BITWARDEN-garage-s3-ITEM-UUID
        property: secret-access-key
