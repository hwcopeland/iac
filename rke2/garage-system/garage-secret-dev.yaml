---
# DEV-ONLY: Plain Kubernetes Secret standing in for the Bitwarden ExternalSecret.
# Values mirror the original chem/garage-secret so the existing 200 GB of
# Garage data (now mounted in garage-system) keeps working with the same
# cluster RPC, access key, and S3 credentials.
#
# The `endpoint` key still points at the legacy chem service hostname so any
# stale client looking it up notices the wrong target. Real consumers should
# read GARAGE_ENDPOINT from their own env, not from this secret.
apiVersion: v1
kind: Secret
metadata:
  name: garage-secret
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: dev-overlay
type: Opaque
data:
  rpc-secret: YWY2Y2Y0OTU3NTEyM2E2ZDVjNTk4NWZhMTEzNjM5YjdmN2QzMWJiNTU1OWRhNmEzNzc5MmYxZDEwM2VkODhjMA==
  access-key-id: R0s4MDlhNGUyYzFmMzg0Mzc0OGIyMTRkYjc=
  secret-access-key: M2ZkOTAyMjNkOTNmMmRlMTRmYWI2OWUzMmI5ZDBiZDY1ODBkMGM4YzEzZjFlMjdjZjc1YTZhMjYzZjdmNDE1OA==
  endpoint: aHR0cDovL2dhcmFnZS5nYXJhZ2Utc3lzdGVtLnN2Yy5jbHVzdGVyLmxvY2FsOjM5MDA=
