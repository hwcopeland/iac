---
# ClusterIP service for the Garage S3-compatible object store.
# Endpoint: garage.garage-system.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: garage
  ports:
    - port: 3900
      targetPort: 3900
      protocol: TCP
      name: s3
    - port: 3902
      targetPort: 3902
      protocol: TCP
      name: admin
    - port: 3903
      targetPort: 3903
      protocol: TCP
      name: web
