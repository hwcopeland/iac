---
# Garage Web UI (khairul169/garage-webui) — admin web interface for Garage.
# Talks to the Garage admin API (:3902) and S3 API (:3900) via the `garage`
# ClusterIP service. No AUTH_USER_PASS: authentication is fronted by the
# authentik proxy outpost at garage.hwcopeland.net (see garage-webui-route.yaml)
# so the UI itself must NEVER be exposed directly outside the cluster.
#
# The admin token is NOT in git: both this UI and the Garage server read it
# from the ESO-rendered `garage-admin-token` Secret (Bitwarden custody).
# Garage admin-API token — externalized via ESO (Bitwarden), shared by this
# UI (API_ADMIN_KEY) and the Garage server itself (GARAGE_ADMIN_TOKEN in
# garage-statefulset.yaml). Rotate by updating the `admin-token` custom field
# on the Bitwarden garage item; ESO re-renders within refreshInterval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-admin-token
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: garage-admin-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        admin-token: "{{ .admin_token | trim }}"
  data:
    - secretKey: admin_token
      remoteRef:
        key: 92d9ae0b-0af3-4420-9824-12a099c90531
        property: admin-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
    spec:
      containers:
        - name: garage-webui
          # Pinned release tag (Docker Hub) — do not use :latest.
          # 1.0.9 is the last release that speaks the Garage v1 admin API;
          # 1.1.0+ targets the v2 admin API (Garage >= v2.0). Our Garage is
          # v1.0.1, so bump this only alongside a Garage v2 upgrade.
          image: khairul169/garage-webui:1.0.9
          ports:
            - containerPort: 3909
              name: http
          env:
            - name: API_BASE_URL
              value: "http://garage.garage-system.svc.cluster.local:3902"
            - name: API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-admin-token
                  key: admin-token
            - name: S3_ENDPOINT_URL
              value: "http://garage.garage-system.svc.cluster.local:3900"
            - name: S3_REGION
              value: "garage"
          readinessProbe:
            httpGet:
              path: /
              port: 3909
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3909
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: garage-webui
  namespace: garage-system
  labels:
    app.kubernetes.io/name: garage-webui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: garage-webui
  ports:
    - port: 3909
      targetPort: 3909
      protocol: TCP
      name: http
