  scope-mappings.yaml: |
    version: 1
    metadata:
      name: Custom Scope Mappings
    entries:
    - attrs:
        description: ""
        expression: "return {\n    \"groups\": [group.name for group in request.user.ak_groups.all()]\n\
          }"
        managed: null
        name: groups
        scope_name: groups
      conditions: []
      identifiers:
        pk: baa341ea-7363-42f5-8b98-a9bb1e4e3692
      model: authentik_providers_oauth2.scopemapping
      permissions: []
      state: present
    # Override Authentik's MANAGED email scope, which hardcodes email_verified=false.
    # Everyone enrolls via GitHub (which only shares verified emails), so treat a
    # GitHub-sourced user as email-verified. Required by kube-apiserver OIDC, which
    # rejects tokens with email_verified=false when username-claim=email.
    - attrs:
        expression: "return {\n    \"email\": request.user.email,\n    \"email_verified\": \"Github\" in request.user.attributes.get(\"goauthentik.io/user/sources\", []),\n}"
      conditions: []
      identifiers:
        managed: goauthentik.io/providers/oauth2/scope-email
      model: authentik_providers_oauth2.scopemapping
      permissions: []
      state: present
