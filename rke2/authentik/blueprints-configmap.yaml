apiVersion: v1
data:
  flows-enrollment.yaml: |
    version: 1
    metadata:
      name: Enrollment Flows
    entries:
    # --- Stages ---
    - attrs:
        case_insensitive_matching: true
        name: github-identification
        pretend_user_exists: true
        show_matched_user: true
        sources:
        - !Find [authentik_sources_oauth.oauthsource, [slug, github]]
        user_fields:
        - email
        - username
      conditions: []
      identifiers:
        pk: 3b820eaf-e804-4a24-b94d-d4f82f799651
      model: authentik_stages_identification.identificationstage
      permissions: []
      state: present

    - attrs:
        name: create-user
        user_creation_mode: create_when_required
        user_type: external
        create_users_as_inactive: true
      conditions: []
      identifiers:
        pk: fbc63257-e39a-4f97-a49b-111968448306
      model: authentik_stages_user_write.userwritestage
      permissions: []
      state: present

    - attrs:
        deny_message: Your account is pending approval. You will be notified once access is granted.
        name: enrollment-pending-message
      conditions: []
      identifiers:
        name: enrollment-pending-message
      model: authentik_stages_deny.denystage
      permissions: []
      state: present

    # --- Flow ---
    - attrs:
        authentication: require_unauthenticated
        denied_action: message_continue
        designation: enrollment
        layout: content_left
        name: github-invite-enrollment
        policy_engine_mode: any
        slug: github-invite-enrollment
        title: Sign up with GitHub
      conditions: []
      identifiers:
        pk: 1b84309f-7d5b-46b1-9063-a99108484f5b
      model: authentik_flows.flow
      permissions: []
      state: present

    # --- Stage bindings ---
    # Remove github-identification from enrollment flow — GitHub OAuth source already routes
    # new users here; having an IdentificationStage causes an infinite OAuth redirect loop.
    - conditions: []
      identifiers:
        pk: ec3d7f5b-65f2-4a0d-a6cb-821788c398be
      model: authentik_flows.flowstagebinding
      permissions: []
      state: absent

    - attrs:
        invalid_response_action: retry
        order: 10
        policy_engine_mode: any
        re_evaluate_policies: true
        stage: !Find [authentik_stages_user_write.userwritestage, [name, create-user]]
        target: !Find [authentik_flows.flow, [slug, github-invite-enrollment]]
      conditions: []
      identifiers:
        pk: f6ea7df0-48b6-444e-bd0b-e7b3c16a8e72
      model: authentik_flows.flowstagebinding
      permissions: []
      state: present

    - attrs:
        invalid_response_action: retry
        order: 20
        policy_engine_mode: any
        re_evaluate_policies: true
        stage: !Find [authentik_stages_deny.denystage, [name, enrollment-pending-message]]
        target: !Find [authentik_flows.flow, [slug, github-invite-enrollment]]
      conditions: []
      identifiers:
        pk: df6b6d80-c90a-4e1a-a72c-71035d99f7d7
      model: authentik_flows.flowstagebinding
      permissions: []
      state: present

    # Ensure GitHub source is shown on the login page but no "Register" button —
    # new GitHub users are automatically routed to the enrollment flow by the source.
    - attrs:
        name: default-authentication-identification
        sources:
        - !Find [authentik_sources_oauth.oauthsource, [slug, github]]
        user_fields:
        - email
        - username
      conditions: []
      identifiers:
        name: default-authentication-identification
      model: authentik_stages_identification.identificationstage
      permissions: []
      state: present

    # Remove old invitation stage binding
    - conditions: []
      identifiers:
        pk: f34837f2-f91e-4f7a-b272-35636bd73b18
      model: authentik_flows.flowstagebinding
      permissions: []
      state: absent
  groups.yaml: |
    version: 1
    metadata:
      name: Custom Groups
    entries:
    - attrs:
        attributes: {}
        name: Grafana Admins
      conditions: []
      identifiers:
        pk: 6f6183d7-3bbd-450b-93b3-0766899ae762
      model: authentik_core.group
      permissions: []
      state: present
    - attrs:
        attributes: {}
        name: Infrastructure
        users:
        - !Find [authentik_core.user, [username, hwcopeland]]
      conditions: []
      identifiers:
        pk: adaaf0fd-0329-4353-9c55-0e105ab70451
      model: authentik_core.group
      permissions: []
      state: present
    # VG-Admin — content managers for the Valley Growers Garden Center CMS
    # (https://vg.hwcopeland.net/admin). Emitted in the OIDC "groups" claim and
    # gates /admin via the providers-vg.yaml policy binding. MIRROR of
    # blueprints/groups.yaml — keep both in sync (configmap is what is mounted).
    - attrs:
        attributes: {}
        name: VG-Admin
      conditions: []
      identifiers:
        pk: bd39c736-09f0-41ca-85ad-b9c442477036
      model: authentik_core.group
      permissions: []
      state: present
    - attrs:
        attributes: {}
        name: Kubernetes Users
        users:
        - !Find [authentik_core.user, [username, TannerLew]]
      conditions: []
      identifiers:
        pk: 7a8b9c0d-1e2f-3456-7890-abcdef123456
      model: authentik_core.group
      permissions: []
      state: present
    # Florida Man Bioscience (FMB) — genomics collaborators (Curtis, Tom).
    # Grants Grafana Editor org-role (via kube-prometheus-stack role_attribute_path,
    # name-based) + interactive Khemeia web OIDC access. Admin-on-Swamp-folder is a
    # one-time Grafana folder permission, NOT derivable from the OIDC claim — see
    # rke2/chem/khemeia/docs/swamp-management-runbook.md. Per khemeia-genomics-platform TDD §4.1.
    # attributes are forward-looking metadata; Grafana maps on group NAME today (§4.2).
    # MIRROR of blueprints/groups.yaml — keep both in sync (configmap is what is mounted).
    # Members: curtisdearing, jonesnoaht (provided 2026-06-12). !Find requires the
    # user to already exist in Authentik (logged in / enrolled once). MIRROR of
    # blueprints/groups.yaml — keep both in sync (configmap is what is mounted).
    - attrs:
        attributes:
          grafana_role: Editor
          swamp_admin: true
          org: Florida Man Bioscience
        name: Florida Man Bioscience
        users:
        - !Find [authentik_core.user, [username, curtisdearing]]
        - !Find [authentik_core.user, [username, jonesnoaht]]
      conditions: []
      identifiers:
        pk: 5f7efde0-fe9b-48f1-b443-e42947bf7f2e
      model: authentik_core.group
      permissions: []
      state: present
  notifications.yaml: |
    version: 1
    metadata:
      name: Notification Rules
    entries:
    # Email transport using Authentik's configured SMTP
    - attrs:
        host: localhost
        name: email-transport
        use_global_settings: true
      conditions: []
      identifiers:
        name: email-transport
      model: authentik_events.notificationtransport
      permissions: []
      state: present

    # Notify admin when a new user completes enrollment (is created as inactive)
    - attrs:
        actions:
        - model_created
        enabled: true
        name: new-enrollment-notification
        transports:
        - !Find [authentik_events.notificationtransport, [name, email-transport]]
        severity: notice
      conditions: []
      identifiers:
        name: new-enrollment-notification
      model: authentik_events.notificationrule
      permissions: []
      state: present
  outpost.yaml: |
    version: 1
    metadata:
      name: Embedded Outpost
    entries:
    - attrs:
        config:
          authentik_host: https://auth.hwcopeland.net
          authentik_host_browser: ''
          authentik_host_insecure: false
          container_image: null
          docker_labels: null
          docker_map_ports: true
          docker_network: null
          kubernetes_disabled_components: []
          kubernetes_httproute_annotations: {}
          kubernetes_httproute_parent_refs: []
          kubernetes_image_pull_secrets: []
          kubernetes_ingress_annotations: {}
          kubernetes_ingress_class_name: null
          kubernetes_ingress_path_type: null
          kubernetes_ingress_secret_name: authentik-outpost-tls
          kubernetes_json_patches: null
          kubernetes_namespace: authentik
          kubernetes_replicas: 1
          kubernetes_service_type: ClusterIP
          log_level: info
          object_naming_template: ak-outpost-%(name)s
          refresh_interval: minutes=5
        managed: goauthentik.io/outposts/embedded
        name: authentik Embedded Outpost
        providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Hubble]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Homepage]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Longhorn]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Site Tracker]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Garage]]
        type: proxy
      conditions: []
      identifiers:
        pk: 3061d63d-44ae-456e-9239-6c3f999087e3
      model: authentik_outposts.outpost
      permissions: []
      state: present
  providers-grafana.yaml: |
    version: 1
    metadata:
      name: Grafana Provider and Application
    entries:
    - attrs:
        access_code_validity: minutes=1
        access_token_validity: minutes=5
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        client_id: grafana
        client_type: confidential
        include_claims_in_id_token: true
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        issuer_mode: per_provider
        logout_method: backchannel
        name: Grafana
        property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        redirect_uris:
        - matching_mode: strict
          url: https://grafana.hwcopeland.net/login/generic_oauth
        refresh_token_threshold: hours=1
        refresh_token_validity: days=30
        signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
        sub_mode: hashed_user_id
      conditions: []
      identifiers:
        pk: 1
      model: authentik_providers_oauth2.oauth2provider
      permissions: []
      state: present
    - attrs:
        meta_launch_url: https://grafana.hwcopeland.net
        name: Grafana
        policy_engine_mode: any
        provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Grafana]]
        slug: grafana
      conditions: []
      identifiers:
        pk: 5076e58e-bb6b-49c3-9688-15dc96a73951
      model: authentik_core.application
      permissions: []
      state: present
