version: 1
metadata:
  name: Garage Provider and Application
entries:
# Forward-auth (proxy mode) provider for the Garage S3 management UI
# (garage-webui in garage-system). The HTTPRoute for garage.hwcopeland.net
# points at authentik-server; the embedded outpost authenticates then proxies
# to the internal host. MIRROR of blueprints-configmap.yaml
# (providers-garage.yaml key) — keep both in sync (configmap is what is mounted).
- attrs:
    authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
    invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
    external_host: https://garage.hwcopeland.net
    internal_host: http://garage-webui.garage-system.svc.cluster.local:3909
    internal_host_ssl_validation: false
    mode: proxy
    name: Provider for Garage
  conditions: []
  identifiers:
    pk: 13
  model: authentik_providers_proxy.proxyprovider
  permissions: []
  state: present
- attrs:
    meta_launch_url: https://garage.hwcopeland.net
    name: Garage
    policy_engine_mode: any
    provider: !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Garage]]
    slug: garage
  conditions: []
  # Identify by slug, not pk: authentik 2026.2 ignores a supplied pk when creating
  # an Application, so a made-up pk never matches on re-apply and the importer
  # fails with "Application with this slug already exists".
  identifiers:
    slug: garage
  model: authentik_core.application
  permissions: []
  state: present
# Restrict access to the Infrastructure group (same as Longhorn).
- attrs:
    enabled: true
    group: !Find [authentik_core.group, [name, Infrastructure]]
    order: 0
    target: !Find [authentik_core.application, [slug, garage]]
    timeout: 30
  conditions: []
  identifiers:
    pk: 282c4a42-d199-4a84-8360-90ee11a7345a
  model: authentik_policies.policybinding
  permissions: []
  state: present
