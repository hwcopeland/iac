version: 1
metadata:
  name: Site Tracker Provider and Application
entries:
# Forward-auth proxy provider for the internal site-tracker CRM. The app has no
# auth of its own — Authentik guards it and passes X-authentik-* identity headers.
- attrs:
    authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
    invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
    external_host: https://sites.flmanbiosci.net
    internal_host: http://site-tracker.theswamp.svc.cluster.local:8040
    internal_host_ssl_validation: false
    mode: proxy
    name: Provider for Site Tracker
  conditions: []
  identifiers:
    name: Provider for Site Tracker
  model: authentik_providers_proxy.proxyprovider
  permissions: []
  state: present
- attrs:
    meta_launch_url: https://sites.flmanbiosci.net
    name: Site Tracker
    policy_engine_mode: any
    provider: !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Site Tracker]]
    slug: site-tracker
  conditions: []
  identifiers:
    slug: site-tracker
  model: authentik_core.application
  permissions: []
  state: present
# Restrict access to the Florida Man Bioscience group.
- attrs:
    enabled: true
    group: !Find [authentik_core.group, [name, Florida Man Bioscience]]
    order: 0
    target: !Find [authentik_core.application, [slug, site-tracker]]
    timeout: 30
  conditions: []
  identifiers:
    pk: 45816a44-901d-4c24-8b63-ce96f6a49c21
  model: authentik_policies.policybinding
  permissions: []
  state: present
# Also allow the Infrastructure group (owner/admins) — policy_engine_mode 'any'
# means membership in EITHER group grants access.
- attrs:
    enabled: true
    group: !Find [authentik_core.group, [name, Infrastructure]]
    order: 10
    target: !Find [authentik_core.application, [slug, site-tracker]]
    timeout: 30
  conditions: []
  identifiers:
    pk: 7e7366c5-8f1b-47c3-866f-a7ab622bfa68
  model: authentik_policies.policybinding
  permissions: []
  state: present
