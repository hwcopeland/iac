version: 1
metadata:
  name: JupyterHub Provider and Application
entries:
# --- OAuth2 / OIDC provider (confidential client; secret auto-generated by authentik) ---
- attrs:
    access_code_validity: minutes=1
    access_token_validity: hours=12
    authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
    client_id: jupyterhub
    client_type: confidential
    include_claims_in_id_token: true
    invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
    issuer_mode: per_provider
    name: JupyterHub
    property_mappings:
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
    redirect_uris:
    - matching_mode: strict
      url: https://jupyter.hwcopeland.net/hub/oauth_callback
    refresh_token_validity: days=30
    signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
    sub_mode: hashed_user_id
  conditions: []
  identifiers:
    name: JupyterHub
  model: authentik_providers_oauth2.oauth2provider
  permissions: []
  state: present
# --- Application ---
- attrs:
    meta_launch_url: https://jupyter.hwcopeland.net
    name: JupyterHub
    policy_engine_mode: any
    provider: !Find [authentik_providers_oauth2.oauth2provider, [name, JupyterHub]]
    slug: jupyterhub
  conditions: []
  identifiers:
    slug: jupyterhub
  model: authentik_core.application
  permissions: []
  state: present
# --- Restrict access to the Infrastructure group ---
- attrs:
    enabled: true
    group: !Find [authentik_core.group, [name, Infrastructure]]
    order: 0
    target: !Find [authentik_core.application, [slug, jupyterhub]]
    timeout: 30
  conditions: []
  identifiers:
    pk: f1e2d3c4-b5a6-4978-8c9d-0e1f2a3b4c5d
  model: authentik_policies.policybinding
  permissions: []
  state: present
