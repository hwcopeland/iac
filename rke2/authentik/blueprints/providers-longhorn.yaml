    external_host: https://longhorn.hwcopeland.net
    internal_host: http://longhorn-frontend.longhorn-system.svc.cluster.local
    internal_host_ssl_validation: false
    mode: proxy
    name: Provider for Longhorn
  conditions: []
  identifiers:
    pk: 12
  model: authentik_providers_proxy.proxyprovider
  permissions: []
  state: present
- attrs:
    meta_launch_url: https://longhorn.hwcopeland.net
    name: Longhorn
    policy_engine_mode: any
    provider: !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Longhorn]]
    slug: longhorn
