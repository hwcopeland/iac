  identifiers:
    pk: d7e8f9a0-b1c2-4d3e-8f5a-6b7c8d9e0f1a
  model: authentik_core.application
  permissions: []
  state: present
- attrs:
    enabled: true
    group: !Find [authentik_core.group, [name, Infrastructure]]
    order: 0
    target: !Find [authentik_core.application, [slug, longhorn]]
    timeout: 30
  conditions: []
  identifiers:
    pk: e8f9a0b1-c2d3-4e5f-9a0b-1c2d3e4f5a6b
  model: authentik_policies.policybinding
  permissions: []
  state: present
