version: 1
metadata:
  name: Homepage Provider and Application
entries:
- attrs:
    authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
    invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
    external_host: https://home.hwcopeland.net
    internal_host: http://homepage.web-server.svc.cluster.local
    internal_host_ssl_validation: false
    mode: proxy
    name: Provider for Homepage
  conditions: []
  identifiers:
    name: Provider for Homepage
  model: authentik_providers_proxy.proxyprovider
  permissions: []
  state: present
- attrs:
    meta_launch_url: https://home.hwcopeland.net
    name: Homepage
    provider: !Find [authentik_providers_proxy.proxyprovider, [name, Provider for Homepage]]
    slug: homepage
  conditions: []
  identifiers:
    slug: homepage
  model: authentik_core.application
  permissions: []
  state: present
