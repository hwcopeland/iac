version: 1
metadata:
  name: Home Assistant Provider and Application
entries:
  # OAuth2/OIDC provider. PUBLIC client (PKCE, no client_secret) — matches the
  # hass-oidc-auth (auth_oidc) component running in public-client mode.
  - attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: homeassistant
      client_type: public
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: hashed_user_id
      name: Home Assistant
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
      redirect_uris:
        - matching_mode: strict
          url: https://ha.hwcopeland.net/auth/oidc/callback
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
    conditions: []
    identifiers:
      client_id: homeassistant
    model: authentik_providers_oauth2.oauth2provider
    permissions: []
    state: present
  # Application bound to the provider.
  - attrs:
      meta_launch_url: https://ha.hwcopeland.net
      name: Home Assistant
      provider: !Find [authentik_providers_oauth2.oauth2provider, [client_id, homeassistant]]
      slug: homeassistant
    conditions: []
    identifiers:
      slug: homeassistant
    model: authentik_core.application
    permissions: []
    state: present
