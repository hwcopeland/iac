apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Note: values.yaml is a Helm values file, not a K8s manifest — excluded
# Note: blueprints/ directory content is loaded via blueprints-configmap.yaml
resources:
  - external-secret.yaml
  - github-oauth-secret.yaml
  - httproute.yaml
  - reference-grants.yaml
  - synology-nas.yaml
  - blueprints-configmap.yaml
