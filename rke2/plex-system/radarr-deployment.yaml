apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: plex-system
  labels:
    app: radarr
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: radarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: alpine:3.18.0
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/config.xml ]; then
                cp /configmap/config.xml /config/config.xml
                echo "Seeded config.xml from ConfigMap"
              else
                echo "config.xml already exists, skipping"
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: configmap
              mountPath: /configmap
      containers:
        - name: radarr
          image: linuxserver/radarr:latest
          ports:
            - name: http
              containerPort: 7878
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: configmap
          configMap:
            name: radarr-config-xml
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-downloads
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: plex-system
spec:
  selector:
    app: radarr
  ports:
    - name: http
      protocol: TCP
      port: 7878
      targetPort: 7878
  type: LoadBalancer
  loadBalancerIP: 10.44.0.10
