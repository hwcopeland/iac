apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: plex-system
  labels:
    app: sabnzbd
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: sabnzbd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: alpine:3.18.0
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/sabnzbd.ini ]; then
                cp /configmap/sabnzbd.ini /config/sabnzbd.ini
                echo "Seeded sabnzbd.ini from ConfigMap"
              else
                echo "sabnzbd.ini already exists, skipping"
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: configmap
              mountPath: /configmap
      containers:
        - name: sabnzbd
          image: linuxserver/sabnzbd:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: configmap
          configMap:
            name: sabnzbd-config-ini
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: plex-system
spec:
  selector:
    app: sabnzbd
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
  loadBalancerIP: 10.44.0.13
