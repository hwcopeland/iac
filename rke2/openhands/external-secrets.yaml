    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: b58ed186-d740-4e1b-9704-02a1d3e29665
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-password-es
  namespace: openhands
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: postgres-password
    creationPolicy: Owner
    template:
      data:
        username: "postgres"
        password: "{{ .globalSecret }}"
        postgres-password: "{{ .globalSecret }}"
  data:
    - secretKey: globalSecret
      remoteRef:
        key: b58ed186-d740-4e1b-9704-02a1d3e29665
        property: password
---
