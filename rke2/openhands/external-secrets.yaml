# --- LLM credentials ---
# Pulls xAI API key from existing Bitwarden item (same item used by old openhands)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-env-secrets
  namespace: openhands
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: litellm-env-secrets
    creationPolicy: Owner
  data:
    - secretKey: XAI_API_KEY
      remoteRef:
        key: 890152c3-66e4-40d7-a115-291671038ecd
        property: password
---
# --- Platform global secret ---
# All secrets below derive from a single Bitwarden item.
# Create a Bitwarden item with a strong random password and place the UUID below.
# UUID placeholder: b58ed186-d740-4e1b-9704-02a1d3e29665
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: openhands
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: b58ed186-d740-4e1b-9704-02a1d3e29665
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-es
  namespace: openhands
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: keycloak-realm
    creationPolicy: Owner
    template:
      data:
        realm-name: "allhands"
        provider-name: "enterprise_sso"
        server-url: "http://keycloak"
        client-id: "allhands"
        client-secret: "{{ .globalSecret }}"
        smtp-password: ""
  data:
    - secretKey: globalSecret
      remoteRef:
        key: b58ed186-d740-4e1b-9704-02a1d3e29665
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-es
