apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands-runtime-api
  namespace: openhands
spec:
  template:
    spec:
      containers:
      - name: runtime-api
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                python3 -c "
                f='/app/runtimes.py'; c=open(f).read()
                if 'OH_SESSION_API_KEYS_0' not in c:
                    o=\"    environment['SESSION_API_KEY'] = session_api_key\"
                    n=\"    environment['SESSION_API_KEY'] = session_api_key\\n    environment['OH_SESSION_API_KEYS_0'] = session_api_key\"
                    if o in c: open(f,'w').write(c.replace(o,n,1))
                "
