---
# Main OpenHands app
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openhands-app
  namespace: openhands
spec:
  hostnames:
    - ai.hwcopeland.net
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: openhands-service
          port: 3000
---
# Keycloak identity provider
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openhands-auth
  namespace: openhands
spec:
  hostnames:
    - ai-auth.hwcopeland.net
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: openhands-keycloak
          port: 80
---
# Runtime API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openhands-runtimes
  namespace: openhands
spec:
  hostnames:
    - ai-runtimes.hwcopeland.net
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: openhands-runtime-api
          port: 8080
---
# LiteLLM proxy
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openhands-llm
  namespace: openhands
spec:
  hostnames:
    - ai-llm.hwcopeland.net
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: openhands-litellm-helm
          port: 4000
