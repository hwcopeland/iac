apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
spec:
  template:
    spec:
      containers:
      - name: openhands
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                python3 -c "
                f='/app/server/auth/token_manager.py'; c=open(f).read()
                if 'ENTERPRISE_SSO' not in c[c.find('_check_expiration_and_refresh'):c.find('_check_expiration_and_refresh')+500]:
                    o='        if not access_expired:\n            return None'
                    n='        if identity_provider == ProviderType.ENTERPRISE_SSO:\n            return None\n        if not access_expired:\n            return None'
                    if o in c: open(f,'w').write(c.replace(o,n,1))
                "
                python3 -c "
                f='/app/server/auth/token_manager.py'; c=open(f).read()
                o=\"'refresh_token': data['refresh_token'],\"; n=\"'refresh_token': data.get('refresh_token', ''),\"
                if o in c: open(f,'w').write(c.replace(o,n))
                "
                python3 -c "
                f='/app/server/routes/user.py'; c=open(f).read()
                if 'git_tokens' not in c:
                    o=\"@saas_user_router.get('/info', response_model=User)\nasync def saas_get_user(\n    provider_tokens: PROVIDER_TOKEN_TYPE | None = Depends(get_provider_tokens),\n    access_token: SecretStr | None = Depends(get_access_token),\n    user_id: str | None = Depends(get_user_id),\n) -> User | JSONResponse:\n    if not provider_tokens:\"
                    n=\"@saas_user_router.get('/info', response_model=User)\nasync def saas_get_user(\n    provider_tokens: PROVIDER_TOKEN_TYPE | None = Depends(get_provider_tokens),\n    access_token: SecretStr | None = Depends(get_access_token),\n    user_id: str | None = Depends(get_user_id),\n) -> User | JSONResponse:\n    git_tokens = {k: v for k, v in provider_tokens.items() if k != ProviderType.ENTERPRISE_SSO} if provider_tokens else None\n    if not git_tokens:\"
                    c=c.replace(o,n,1)
                    o2=\"        retval = await _check_idp(\n            access_token=access_token,\n            default_value=User(\n                id=sub,\n                login=user_info.preferred_username or '',\n                avatar_url='',\n                email=email,\n                name=resolve_display_name(user_info_dict),\n                company=user_info.company,\n            ),\n            user_info=user_info_dict,\n        )\n        if retval is not None:\n            return retval\n\n    return await get_user(\n        provider_tokens=provider_tokens, access_token=access_token, user_id=user_id\n    )\"
                    n2=\"        return User(\n            id=sub,\n            login=user_info.preferred_username or '',\n            avatar_url='',\n            email=email,\n            name=resolve_display_name(user_info_dict),\n            company=user_info.company,\n        )\n\n    return await get_user(\n        provider_tokens=git_tokens, access_token=access_token, user_id=user_id\n    )\"
                    if o2 in c: open(f,'w').write(c.replace(o2,n2,1))
                "
                python3 -c "
                f='/app/server/routes/user.py'; c=open(f).read()
                if 'selected_provider == ProviderType.ENTERPRISE_SSO' not in c:
                    o=\"@saas_user_router.get('/repositories', response_model=list[Repository])\nasync def saas_get_user_repositories(\n    sort: str = 'pushed',\n    selected_provider: ProviderType | None = None,\n    page: int | None = None,\n    per_page: int | None = None,\n    installation_id: str | None = None,\n    provider_tokens: PROVIDER_TOKEN_TYPE | None = Depends(get_provider_tokens),\n    access_token: SecretStr | None = Depends(get_access_token),\n    user_id: str | None = Depends(get_user_id),\n) -> list[Repository] | JSONResponse:\n    if not provider_tokens:\"
                    n=\"@saas_user_router.get('/repositories', response_model=list[Repository])\nasync def saas_get_user_repositories(\n    sort: str = 'pushed',\n    selected_provider: ProviderType | None = None,\n    page: int | None = None,\n    per_page: int | None = None,\n    installation_id: str | None = None,\n    provider_tokens: PROVIDER_TOKEN_TYPE | None = Depends(get_provider_tokens),\n    access_token: SecretStr | None = Depends(get_access_token),\n    user_id: str | None = Depends(get_user_id),\n) -> list[Repository] | JSONResponse:\n    if selected_provider == ProviderType.ENTERPRISE_SSO:\n        return []\n    git_tokens = {k: v for k, v in provider_tokens.items() if k != ProviderType.ENTERPRISE_SSO} if provider_tokens else None\n    if not git_tokens:\"
                    if o in c:
                        c=c.replace(o,n,1).replace('provider_tokens=provider_tokens,\n        access_token=access_token,\n        user_id=user_id,\n    )','provider_tokens=git_tokens,\n        access_token=access_token,\n        user_id=user_id,\n    )',1)
                        open(f,'w').write(c)
                "
                python3 -c "
                f='/app/openhands/app_server/sandbox/remote_sandbox_service.py'; c=open(f).read()
                if 'runtime_internal_url' not in c:
                    o=\"                    exposed_urls.append(\\n                        ExposedUrl(name=AGENT_SERVER, url=url, port=AGENT_SERVER_PORT)\\n                    )\"
                    n=\"                    runtime_internal_url = f'http://runtime-{runtime_id}.openhands.svc.cluster.local:60000'\\n                    exposed_urls.append(\\n                        ExposedUrl(name=AGENT_SERVER, url=runtime_internal_url, port=AGENT_SERVER_PORT)\\n                    )\"
                    if o in c: open(f,'w').write(c.replace(o,n,1))
                "
                python3 -c "
                f='/app/openhands/app_server/sandbox/remote_sandbox_service.py'; c=open(f).read()
                if 'openhands-service.openhands.svc' not in c:
                    o=\"            environment[WEBHOOK_CALLBACK_VARIABLE] = f'{self.web_url}/api/v1/webhooks'\"
                    n=\"            environment[WEBHOOK_CALLBACK_VARIABLE] = 'http://openhands-service.openhands.svc.cluster.local:3000/api/v1/webhooks'\"
                    if o in c: open(f,'w').write(c.replace(o,n,1))
                "
                sleep 2 && kill -HUP 1
