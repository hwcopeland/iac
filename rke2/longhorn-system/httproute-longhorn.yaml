---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - "longhorn.hwcopeland.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /if/
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /
            statusCode: 302
    - backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  name: longhorn.hwcopeland.net
  type: CNAME
  content: hwcopeland.net
  proxied: true
  ttl: 1
  interval: 5m
