---
# Backblaze B2 backup credentials for Longhorn.
# Synced from Bitwarden via External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: b2-backup-secret
  namespace: longhorn-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: b2-backup-secret
    creationPolicy: Owner
    # The Bitwarden AWS_ACCESS_KEY_ID field has a trailing newline that makes
    # Longhorn reject the S3 creds ("invalid leading white space"). Trim every
    # value on sync so it stays clean regardless of what's in Bitwarden.
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID | trim }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY | trim }}"
        AWS_ENDPOINTS: "{{ .AWS_ENDPOINTS | trim }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: 94709516-f659-4d2f-8b7c-cfe3b352d04d
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: 94709516-f659-4d2f-8b7c-cfe3b352d04d
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_ENDPOINTS
      remoteRef:
        key: 94709516-f659-4d2f-8b7c-cfe3b352d04d
        property: AWS_ENDPOINTS
