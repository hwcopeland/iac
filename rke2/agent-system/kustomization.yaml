apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  # n8n
  - n8n/external-secret.yaml
  - n8n/n8n-deployment.yaml
  - n8n/n8n-dnsrecord.yaml
  - n8n/n8n-oidc-secret.yaml
  - n8n/n8n-pvcs.yaml
