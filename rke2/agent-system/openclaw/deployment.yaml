apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: agent-system
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-tools
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              BIN=/home/node/.openclaw/bin
              mkdir -p "$BIN"
              if [ -f "$BIN/.installed" ]; then
                echo "Tools already installed, skipping"
                exit 0
              fi
              echo "Installing tools..."
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends curl ca-certificates
              # jq - static binary
              curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 -o "$BIN/jq"
              chmod +x "$BIN/jq"
              # ripgrep - static musl build
              curl -fsSL https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz \
                | tar xz -C "$BIN" --strip-components=1 ripgrep-14.1.1-x86_64-unknown-linux-musl/rg
              chmod +x "$BIN/rg"
              # gh - GitHub CLI (Go binary)
              curl -fsSL https://github.com/cli/cli/releases/download/v2.66.1/gh_2.66.1_linux_amd64.tar.gz \
                | tar xz -C "$BIN" --strip-components=2 gh_2.66.1_linux_amd64/bin/gh
              chmod +x "$BIN/gh"
              # copy CA certs for gh TLS
              cp -r /etc/ssl/certs "$BIN/../certs"
              chown -R 1000:1000 "$BIN"
              touch "$BIN/.installed"
              echo "Done: $(ls $BIN)"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace-planner
              mkdir -p /home/node/.openclaw/workspace-coder
              mkdir -p /home/node/.openclaw/workspace-reviewer
              mkdir -p /home/node/.openclaw/agents/planner
              mkdir -p /home/node/.openclaw/agents/coder
              mkdir -p /home/node/.openclaw/agents/reviewer
              cp /config/PLANNER_AGENTS.md /home/node/.openclaw/workspace-planner/AGENTS.md
              cp /config/CODER_AGENTS.md /home/node/.openclaw/workspace-coder/AGENTS.md
              cp /config/REVIEWER_AGENTS.md /home/node/.openclaw/workspace-reviewer/AGENTS.md
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: Always
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          env:
            - name: HOME
              value: /home/node
            - name: PATH
              value: /home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: SSL_CERT_DIR
              value: /home/node/.openclaw/certs
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: XAI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GROQ_API_KEY
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GH_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
            - name: OLLAMA_HOST
              value: http://ollama.agent-system.svc.cluster.local:11434
            - name: OLLAMA_API_BASE
              value: http://ollama.agent-system.svc.cluster.local:11434
            - name: OLLAMA_API_KEY
              value: ollama-local
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitor.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_SERVICE_NAME
              value: openclaw
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home-pvc
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: agent-system
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      automountServiceAccountToken: false
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.hwcopeland.net/application/o/openclaw/
            - --upstream=http://openclaw:18789
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://claw.hwcopeland.net/oauth2/callback
            - --email-domain=*
            - --skip-provider-button=true
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --insecure-oidc-allow-unverified-email=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
