apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw
  namespace: agent-system
rules:
  # Run and manage pods
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Limited PVCs - create/get/list but not delete (protect data)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create"]
  # ConfigMaps for agent config injection
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Read services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw
  namespace: agent-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: agent-system
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: openclaw-storage
  namespace: agent-system
spec:
  hard:
    longhorn.storageclass.storage.k8s.io/requests.storage: 128Gi
