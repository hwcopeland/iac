apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: agent-system
  labels:
    app: openhands
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhands
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openhands
    spec:
      serviceAccountName: openhands
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - host.docker.internal
      containers:
        - name: openhands
          image: ghcr.io/openhands/openhands:1.5.0
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              set -e
              touch /var/run/docker.sock
              # Patch libtmux API breakage in 1.5.0 (multiple APIs removed in 0.30-0.31)
              find /app/openhands/ -name '*.py' -exec grep -l 'attached_pane\|kill_session\|kill_window\|kill_pane\b' {} \; 2>/dev/null | xargs -r sed -i \
                -e 's/\.attached_pane/.active_pane/g' \
                -e 's/\.kill_session()/.kill()/g' \
                -e 's/\.kill_window()/.kill()/g' \
                -e 's/\.kill_pane()/.kill()/g'
              # Pre-create enduser so playwright browser check can write to home dir
              if ! id enduser &>/dev/null; then
                useradd -m -u 1000 -s /bin/bash enduser
              fi
              mkdir -p /home/enduser/.cache/browsergym-downloads /home/enduser/.cache/ms-playwright
              chown -R 1000:1000 /home/enduser

              CACHE=/.openhands/tool-cache
              mkdir -p "$CACHE/bin"
              export PATH="$CACHE/bin:/usr/local/go/bin:$PATH"

              # --- apt packages (idempotent via stamp + binary check) ---
              if [ ! -f "$CACHE/.apt-installed" ] || ! command -v tmux &>/dev/null || ! command -v gh &>/dev/null; then
                rm -f "$CACHE/.apt-installed"
                echo "[setup] Installing apt packages..."
                apt-get update -qq
                # gh CLI repo
                curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                  | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                  > /etc/apt/sources.list.d/github-cli.list
                # nodejs 22 repo
                curl -fsSL https://deb.nodesource.com/setup_22.x | bash - 2>/dev/null
                apt-get install -y -qq \
                  tmux git curl wget jq ripgrep build-essential \
                  python3-pip unzip zip vim tree rsync socat \
                  netcat-openbsd dnsutils ssh-client file \
                  fd-find bat gh nodejs
                touch "$CACHE/.apt-installed"
              else
                echo "[setup] apt packages already installed, skipping"
              fi

              # --- static binaries (cached to PVC) ---
              install_bin() {
                local name=$1 url=$2
                if [ ! -f "$CACHE/bin/$name" ]; then
                  echo "[setup] Downloading $name..."
                  curl -fsSL "$url" -o "$CACHE/bin/$name"
                  chmod +x "$CACHE/bin/$name"
                fi
              }

              # kubectl
              if [ ! -f "$CACHE/bin/kubectl" ]; then
                K8S_VER=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
                curl -fsSL "https://dl.k8s.io/release/${K8S_VER}/bin/linux/amd64/kubectl" -o "$CACHE/bin/kubectl"
                chmod +x "$CACHE/bin/kubectl"
              fi

              # helm
              if [ ! -f "$CACHE/bin/helm" ]; then
                echo "[setup] Downloading helm..."
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | HELM_INSTALL_DIR="$CACHE/bin" USE_SUDO=false bash
              fi

              # yq
              install_bin yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"

              # kustomize
              if [ ! -f "$CACHE/bin/kustomize" ]; then
                echo "[setup] Downloading kustomize..."
                curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
                  | bash -s -- "$CACHE/bin"
              fi

              # go
              if [ ! -f "$CACHE/.go-installed" ]; then
                echo "[setup] Installing Go..."
                GO_VER=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
                curl -fsSL "https://go.dev/dl/${GO_VER}.linux-amd64.tar.gz" | tar -C /usr/local -xz
                touch "$CACHE/.go-installed"
              fi

              # --- npm global tools ---
              if [ ! -f "$CACHE/.npm-installed" ]; then
                echo "[setup] Installing npm globals..."
                npm install -g --quiet yarn typescript ts-node
                touch "$CACHE/.npm-installed"
              fi

              # --- playwright (cached to PVC) ---
              PLAYWRIGHT_BROWSERS_PATH=/.openhands/ms-playwright \
                /app/.venv/bin/playwright install chromium --with-deps
              chmod -R a+rX /.openhands/ms-playwright 2>/dev/null || true

              # --- make cache bins world-accessible ---
              chmod -R a+rX "$CACHE/bin" 2>/dev/null || true

              exec /app/entrypoint.sh uvicorn openhands.server.listen:app --host 0.0.0.0 --port 3000
          env:
            - name: RUNTIME
              value: local
            - name: LLM_MODEL
              value: xai/grok-4.20-multi-agent-0309
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: LLM_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: GITHUB_TOKEN
            - name: WORKSPACE_MOUNT_PATH
              value: /opt/workspace_base
            - name: OH_PERSISTENCE_DIR
              value: /.openhands
            - name: DISABLE_APP_AUTH
              value: "true"
            - name: SANDBOX_USER_ID
              value: "1000"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /.openhands/ms-playwright
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: GITHUB_TOKEN
            - name: GOPATH
              value: /opt/workspace_base/.go
            - name: PATH
              value: /.openhands/tool-cache/bin:/usr/local/go/bin:/opt/workspace_base/.go/bin:/app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: playwright-workspace
              mountPath: /workspace
            - name: openhands-workspace
              mountPath: /opt/workspace_base
            - name: openhands-state
              mountPath: /.openhands
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.hwcopeland.net/application/o/openhands/
            - --upstream=http://localhost:3000
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://ai.hwcopeland.net/oauth2/callback
            - --email-domain=*
            - --skip-provider-button=true
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --insecure-oidc-allow-unverified-email=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - name: proxy
              containerPort: 4180
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: playwright-workspace
          emptyDir: {}
        - name: openhands-workspace
          persistentVolumeClaim:
            claimName: openhands-workspace
        - name: openhands-state
          persistentVolumeClaim:
            claimName: openhands-state
