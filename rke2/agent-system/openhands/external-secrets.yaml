apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openhands-secrets
  namespace: agent-system
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: openhands-secrets
    creationPolicy: Owner
  data:
    - secretKey: LLM_API_KEY
      remoteRef:
        key: 890152c3-66e4-40d7-a115-291671038ecd
        property: password
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: f0e0f3c1-111a-445f-b352-d942257fa7be
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: agent-system
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: 3f9f5b2e-e28b-46f7-b232-3b5af84882c3
        property: username
    - secretKey: client-secret
      remoteRef:
        key: 3f9f5b2e-e28b-46f7-b232-3b5af84882c3
        property: password
    - secretKey: cookie-secret
      remoteRef:
        key: 049e12fd-061e-458e-95c3-0612324f92e4
        property: password
