apiVersion: v1
kind: Service
metadata:
  name: openhands
  namespace: agent-system
  labels:
    app: openhands
spec:
  type: ClusterIP
  selector:
    app: openhands
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: agent-system
  labels:
    app: openhands
spec:
  type: ClusterIP
  selector:
    app: openhands
  ports:
    - name: http
      port: 4180
      targetPort: 4180
      protocol: TCP
