apiVersion: v1
kind: ServiceAccount
metadata:
  name: openhands
  namespace: agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands
  namespace: agent-system
rules:
  # Pods
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Events and endpoints
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Core workload resources
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets - read only
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Deployments, StatefulSets, ReplicaSets, DaemonSets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Jobs and CronJobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC - so agents can create roles for workloads they deploy
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # HTTPRoutes and other networking
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Rollout status
  - apiGroups: ["apps"]
    resources: ["deployments/status", "statefulsets/status"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openhands
  namespace: agent-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openhands
subjects:
  - kind: ServiceAccount
    name: openhands
    namespace: agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openhands-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps",
                "persistentvolumeclaims", "events", "endpoints", "namespaces",
                "nodes", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openhands-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openhands-cluster-reader
subjects:
  - kind: ServiceAccount
    name: openhands
    namespace: agent-system
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: openhands-storage
  namespace: agent-system
spec:
  hard:
    longhorn.storageclass.storage.k8s.io/requests.storage: 128Gi
