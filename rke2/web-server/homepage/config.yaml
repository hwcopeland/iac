---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: web-server
  labels:
    app.kubernetes.io/name: homepage
data:
  bookmarks.yaml: |
    ---
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/hwcopeland
        - Cloudflare:
            - abbr: CF
              href: https://dash.cloudflare.com

  docker.yaml: |
    ---

  kubernetes.yaml: |
    ---
    mode: cluster
    gateway: true
  services.yaml: |
    ---
    - Infrastructure:
        - Grafana:
            icon: grafana.png
            href: https://grafana.hwcopeland.net
            description: Monitoring & Dashboards
            siteMonitor: https://grafana.hwcopeland.net
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.hwcopeland.net
            description: Cloud-Native Storage
            siteMonitor: https://longhorn.hwcopeland.net
        - Hubble:
            icon: cilium.png
            href: https://hubble.hwcopeland.net
            description: Network Observability
            siteMonitor: https://hubble.hwcopeland.net
        - Authentik:
            icon: authentik.png
            href: https://auth.hwcopeland.net
            description: Identity & SSO Provider
            siteMonitor: https://auth.hwcopeland.net
            widget:
              type: authentik
              url: https://auth.hwcopeland.net
              key: "{{HOMEPAGE_VAR_AUTHENTIK_TOKEN}}"
        - Vaultwarden:
            icon: bitwarden.png
            href: https://vault.hwcopeland.net
            description: Password Manager
            siteMonitor: https://vault.hwcopeland.net

    - Automation:
        - n8n:
            icon: n8n.png
            href: https://n8n.hwcopeland.net
            description: Workflow Automation
            siteMonitor: https://n8n.hwcopeland.net
        - OpenHands:
            icon: https://raw.githubusercontent.com/phosphor-icons/core/main/assets/regular/robot.svg
            href: https://ai.hwcopeland.net
            description: AI Agent System
            siteMonitor: https://ai.hwcopeland.net
        - Home Assistant:
            icon: home-assistant.png
            href: https://ha.hwcopeland.net
            description: Home Automation
            siteMonitor: https://ha.hwcopeland.net

    - Media:
        - Plex:
            icon: plex.png
            href: https://plex.hwcopeland.net
            description: Media Server
            siteMonitor: https://plex.hwcopeland.net
        - Overseerr:
            icon: overseerr.png
            href: https://seerr.hwcopeland.net
            description: Media Requests
            siteMonitor: https://seerr.hwcopeland.net
    - Web & Apps:
        - Personal Site:
            icon: globe.png
            href: https://info.hwcopeland.net
            siteMonitor: https://info.hwcopeland.net
        - Excalidraw:
            icon: excalidraw.png
            href: https://draw.hwcopeland.net
            description: Virtual Whiteboard
            siteMonitor: https://draw.hwcopeland.net
        - Jupyter:
            icon: jupyter.png
            href: https://jupyter.hwcopeland.net
            description: Chemistry Notebooks
            siteMonitor: https://jupyter.hwcopeland.net

    - Game Servers:
        - CS2 Server:
            icon: counter-strike-2.png
            href: steam://connect/10.44.0.2:27015
            description: Counter-Strike 2 Modded
        - Minecraft (ATM9 Skies):
            icon: minecraft.png
            description: All The Mods 9 Skies

    - LB Services:
        - Sonarr:
            icon: sonarr.png
            href: http://10.44.0.9:8989
            description: TV Series
            siteMonitor: http://10.44.0.9:8989
        - Radarr:
            icon: radarr.png
            href: http://10.44.0.10:7878
            description: Movies
            siteMonitor: http://10.44.0.10:7878
        - Lidarr:
            icon: lidarr.png
            href: http://10.44.0.11:8686
            description: Music
            siteMonitor: http://10.44.0.11:8686
        - Prowlarr:
            icon: prowlarr.png
            href: http://10.44.0.12:9696
            description: Indexer Manager
            siteMonitor: http://10.44.0.12:9696
        - SABnzbd:
            icon: sabnzbd.png
            href: http://10.44.0.13:8080
            description: Usenet Downloader
            siteMonitor: http://10.44.0.13:8080
        - YTDL:
            icon: ytdl.png
            href: http://10.44.0.14:17442
            description: YouTube Downloader
            siteMonitor: http://10.44.0.14:17442
        - SpotDL:
            icon: spotify.png
            href: http://10.44.0.4:8080
            description: Spotify Downloader
            siteMonitor: http://10.44.0.4:8080

  settings.yaml: |
    ---
    title: hwcopeland Homelab
    favicon: https://raw.githubusercontent.com/gethomepage/homepage/main/public/homepage.png
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 6
      Automation:
        style: row
        columns: 3
      Media:
        style: row
        columns: 3
      Web & Apps:
        style: row
        columns: 3
      Game Servers:
        style: row
        columns: 2
      LB Services:
        style: row
        columns: 4
    showStats: true
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local

  widgets.yaml: |
    ---
    - kubernetes:
        cluster:
          show: false
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - search:
        provider: google
        target: _blank

    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23

  custom.css: |
    /* Custom CSS */

  custom.js: |
    /* Custom JS */
