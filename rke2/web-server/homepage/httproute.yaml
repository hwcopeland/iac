---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: web-server
spec:
  parentRefs:
    - name: hwcopeland-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - "home.hwcopeland.net"
  rules:
    # Redirect Authentik's /if/* user portal back to homepage root — the embedded
    # outpost's post-auth callback lands here but the path isn't served by homepage.
    - matches:
        - path:
            type: PathPrefix
            value: /if/
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /
            statusCode: 302
    - backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
