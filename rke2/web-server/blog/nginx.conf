server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Astro builds a static, multi-page site. Pages live at /path/index.html;
    # try the URI, then a directory index, then a .html sibling, then 404.
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    location ~* \.(js|css|wasm|svg|png|jpg|jpeg|gif|ico|woff2?|webp|avif|xml)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
