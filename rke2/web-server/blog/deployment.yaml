---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: web-server
  labels:
    app.kubernetes.io/name: blog
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: blog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: web-server
  labels:
    app.kubernetes.io/name: blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog
    spec:
      # Reuses the pre-existing web-server/zot-pull-secret (private registry).
      imagePullSecrets:
        - name: zot-pull-secret
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: blog
          image: zot.hwcopeland.net/web-server/blog:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 200m
