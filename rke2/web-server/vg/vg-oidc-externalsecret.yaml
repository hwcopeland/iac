---
# Valley Growers Garden Center CMS — OIDC client credentials for Authentik SSO.
#
# Sourced from Vaultwarden via ESO (ClusterSecretStore bitwarden-login).
# Create a Bitwarden LOGIN item whose:
#   username = OIDC client_id  (must be "vg" — matches the Authentik provider
#              client_id in rke2/authentik/blueprints/providers-vg.yaml)
#   password = OIDC client_secret (copy from the Authentik admin UI after the
#              provider blueprint is applied: Providers > Valley Growers CMS >
#              client secret). Confidential clients have an Authentik-generated
#              secret; this repo stores it in Bitwarden, it is NOT set in the
#              blueprint.
# Item already created in Vaultwarden (UUID 1e47f18e-e688-46e9-af0e-5a351fdd77fb,
# individual vault). Its password field is empty until the Authentik client
# secret is pasted in (see above).
#
# The resulting Kubernetes Secret "vg-oidc" exposes the keys the Astro app
# mounts as env vars: OIDC_CLIENT_ID, OIDC_CLIENT_SECRET, OIDC_ISSUER.
# OIDC_ISSUER is a constant (no secret material) injected via the template.
#
# Owned at the Authentik/provider boundary by @authentik-engineer; the app-side
# wiring (mounting this Secret, implementing /api/auth/callback) is owned by
# @web-server-engineer.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vg-oidc
  namespace: web-server
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: vg-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: "{{ .client_id }}"
        OIDC_CLIENT_SECRET: "{{ .client_secret }}"
        OIDC_ISSUER: "https://auth.hwcopeland.net/application/o/vg/"
        # App-side: signs our own session + OAuth-state cookies. Stored as a
        # custom field "session_secret" on the same Bitwarden item (any long
        # random string, e.g. `openssl rand -base64 48`). Must stay stable —
        # changing it logs everyone out.
        SESSION_SECRET: "{{ .session_secret }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: 1e47f18e-e688-46e9-af0e-5a351fdd77fb
        property: username
    - secretKey: client_secret
      remoteRef:
        key: 1e47f18e-e688-46e9-af0e-5a351fdd77fb
        property: password
    # session_secret is a custom FIELD on the item, so it must resolve through
    # the bitwarden-fields store ($.data.fields[?@.name==...]) rather than the
    # default bitwarden-login store ($.data.login.*). Same item UUID.
    - secretKey: session_secret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 1e47f18e-e688-46e9-af0e-5a351fdd77fb
        property: session_secret
