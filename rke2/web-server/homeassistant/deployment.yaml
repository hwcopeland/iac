apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: web-server
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO Longhorn PVC — never run two pods at once
                            # (RollingUpdate deadlocks on Multi-Attach)
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      # hostNetwork so HA sees LAN/WiFi multicast (Sonos SSDP discovery). The
      # WiFi itself is owned by the NODE (microedge2 netplan, use-routes:false) —
      # HA only passively listens; it never runs wpa/dhcp, so it cannot touch the
      # node's routing. Pinned to microedge2 because that's the node with the radio.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet   # keep cluster DNS under hostNetwork
      nodeSelector:
        kubernetes.io/hostname: microedge2
      securityContext:
          fsGroup: 1000
      # Declarative custom_components — installed on every start, version-pinned.
      # Replaces HACS/manual UI installs entirely and SELF-HEALS after a /config
      # wipe (the failure that started all this). Add a component = one line here.
      #   auth_oidc      -> Authentik OIDC SSO login (public client + PKCE)
      #   flightradar24  -> flights-in-area sensors for the dashboard
      # (Sonos is native; MikroTik stats come from Grafana, so no components.)
      initContainers:
        - name: install-custom-components
          image: alpine:3.20
          command: ["/bin/sh", "-ec"]
          args:
            - |
              apk add --no-cache curl tar >/dev/null
              mkdir -p /config/custom_components
              install() {   # $1=repo  $2=tag  $3=component
                echo "installing $3 @ $2"
                t=$(mktemp -d)
                curl -fsSL "https://github.com/$1/archive/refs/tags/$2.tar.gz" \
                  | tar -xz -C "$t" --strip-components=1
                rm -rf "/config/custom_components/$3"
                cp -r "$t/custom_components/$3" "/config/custom_components/$3"
                rm -rf "$t"
              }
              install christiaangoossens/hass-oidc-auth          v1.1.0   auth_oidc
              install AlexandrErohin/home-assistant-flightradar24 v1.34.1  flightradar24
              echo "installed:"; ls -1 /config/custom_components
          volumeMounts:
            - name: ha-config-volume
              mountPath: /config
      containers:
        - name: home-assistant-container
          image: homeassistant/home-assistant # Using the official image
          ports:
            - name: https
              containerPort: 8123
            - name: sonos
              containerPort: 1400
          volumeMounts:
            - name: ha-config-volume
              mountPath: /config
            # Git-managed config + dashboard overlaid as single files (subPath),
            # so a /config wipe can't lose them. Source: ha-gitconfig.yaml.
            - name: ha-gitconfig
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
            - name: ha-gitconfig
              mountPath: /config/dashboards/main.yaml
              subPath: main.yaml
      volumes:
        - name: ha-config-volume
          persistentVolumeClaim:
            claimName: home-assistant-pvc
        - name: ha-gitconfig
          configMap:
            name: ha-gitconfig
---
apiVersion: v1
kind: Service
metadata:
  name: ha-service
  namespace: web-server
  annotations:
    io.cilium/lb-ipam-ips: "10.44.0.16"
spec:
  selector:
    app: home-assistant
  ports:
    - name: https
      protocol: TCP
      port: 80
      targetPort: 8123
    - name: sonos
      protocol: TCP
      port: 1400
      targetPort: 1400
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-homeassistant
  namespace: web-server
  annotations:
    cert-manager.io/cluster-issuer: "cf-issuer"
    cloudflare-operator.io/type: CNAME
    cloudflare-operator.io/content: hwcopeland.net
spec:
  ingressClassName: nginx
  rules:
    - host: ha.hwcopeland.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ha-service
                port:
                  number: 80
  tls:
    - hosts:
        - "*.hwcopeland.net"
      secretName: cf-wildcard-cert-secret

