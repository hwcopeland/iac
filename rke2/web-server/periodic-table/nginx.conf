server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets for any path that bypasses Cloudflare's edge
    # compression (in-cluster probes, direct service hits).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Single-page app: hashed assets are served directly, everything else
    # falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
