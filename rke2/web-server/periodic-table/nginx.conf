server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Single-page app: hashed assets are served directly, everything else
    # falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
