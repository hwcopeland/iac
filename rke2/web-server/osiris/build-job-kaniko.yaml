# In-cluster Kaniko build for OSIRIS (no GH Actions workflow exists on the fork).
#
# Builds straight from the git context at simplifaisoul/osiris@master and pushes
# zot.hwcopeland.net/osiris:latest. Base images (node:22-alpine) come from Docker
# Hub — the OSIRIS Dockerfile does NOT use the zot mirror, so Kaniko pulls them
# directly. zot serves a Let's Encrypt *.hwcopeland.net cert, so no custom CA
# trust is needed; the kaniko executor's stock CA bundle validates the push.
#
# Push auth: reuses the pre-existing web-server/zot-pull-secret
# (kubernetes.io/dockerconfigjson). Its embedded credential has push rights to
# zot. We remap the secret key (.dockerconfigjson) to the file name Kaniko
# expects (config.json) via volume items.
#
# This is a ONE-SHOT build job. Re-run by deleting + re-applying, or bump the
# generateName. It is NOT part of any continuous deploy — apply by hand when a
# new OSIRIS image is needed, then `kubectl -n web-server rollout restart
# deployment/osiris`.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osiris-build
  namespace: web-server
  labels:
    app.kubernetes.io/name: osiris
    app.kubernetes.io/component: build
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: osiris
        app.kubernetes.io/component: build
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - "--context=git://github.com/simplifaisoul/osiris.git#refs/heads/master"
            - "--dockerfile=Dockerfile"
            - "--destination=zot.hwcopeland.net/osiris:latest"
            - "--cache=false"
            - "--snapshot-mode=redo"
            - "--verbosity=info"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: zot-pull-secret
            items:
              - key: .dockerconfigjson
                path: config.json
