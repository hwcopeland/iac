---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cf-floridamanweb-wildcard-cert
  namespace: kube-system
spec:
  dnsNames:
    - "*.floridamanweb.online"
    - floridamanweb.online
  issuerRef:
    kind: ClusterIssuer
    name: cf-issuer
  secretName: cf-floridamanweb-wildcard-cert-secret
