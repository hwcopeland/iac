# NVIDIA DCGM exporter — Prometheus metrics for GPU utilization, VRAM,
# power, temp, clocks, per-pod attribution via kubelet pod-resources API.
#
# Runs as a DaemonSet on nodes labeled gpu=rtx3070 (currently just
# nixos-gpu). Requests one timesliced GPU slot from the device plugin
# so it gets CUDA/NVML access; sharing is fine since DCGM just reads
# metrics, no actual compute.
---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
    spec:
      # Only schedule on GPU nodes. Label set on nixos-gpu as gpu=rtx3070.
      nodeSelector:
        node.kubernetes.io/accelerator: nvidia
      tolerations:
        # nixos-gpu carries gpu=true:NoSchedule to keep general workloads off.
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostNetwork: false
      # DCGM needs to walk processes on the host to attribute GPU work
      # to specific PIDs. Without this, per-pod attribution panels stay empty.
      hostPID: true
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04
          imagePullPolicy: IfNotPresent
          env:
            # Enable kubelet pod-resources integration → metrics gain
            # `pod`/`namespace`/`container` labels so we can see which
            # pod is using how much VRAM.
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            # Path inside container to the kubelet pod-resources socket.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
            # NixOS quirk: nvidia libs live in /run/opengl-driver.
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib:/usr/local/nvidia/lib64"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              nvidia.com/gpu: "1"
            limits:
              cpu: 500m
              memory: 256Mi
              nvidia.com/gpu: "1"
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          securityContext:
            runAsNonRoot: false
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            # NixOS GPU driver paths (matches nvidia-device-plugin pattern).
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
      volumes:
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: opengl-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    app.kubernetes.io/name: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
      protocol: TCP
---
# ServiceMonitor lives in the same ns as the service since
# kube-prometheus-stack's podMonitorNamespaceSelector is empty (any ns).
# release label matches Prom's serviceMonitorSelector.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
