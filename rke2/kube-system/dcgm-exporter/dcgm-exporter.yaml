# NVIDIA DCGM exporter — Prometheus metrics for GPU utilization, VRAM,
# power, temp, clocks, per-pod attribution via kubelet pod-resources API.
#
# Runs as a DaemonSet on nodes labeled gpu=rtx3070 (currently just
# nixos-gpu). Requests one timesliced GPU slot from the device plugin
# so it gets CUDA/NVML access; sharing is fine since DCGM just reads
# metrics, no actual compute.
---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-system
---
# Custom counters CSV: the image's default-counters.csv does not include
# DCGM_FI_DEV_FAN_SPEED (GPU fan %, NVML field 190). This is the default
# list verbatim plus the fan-speed line, wired in via DCGM_EXPORTER_COLLECTORS.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-exporter-counters
  namespace: gpu-system
data:
  counters.csv: |
    DCGM_FI_DEV_SM_CLOCK,  gauge, SM clock frequency (in MHz).
    DCGM_FI_DEV_MEM_CLOCK, gauge, Memory clock frequency (in MHz).
    DCGM_FI_DEV_MEMORY_TEMP, gauge, Memory temperature (in C).
    DCGM_FI_DEV_GPU_TEMP,    gauge, GPU temperature (in C).
    DCGM_FI_DEV_FAN_SPEED,   gauge, Fan speed for the device (in %).
    DCGM_FI_DEV_POWER_USAGE,              gauge, Power draw (in W).
    DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumption since boot (in mJ).
    DCGM_FI_DEV_PCIE_TX_THROUGHPUT,  counter, Total number of bytes transmitted through PCIe TX (in KB) via NVML.
    DCGM_FI_DEV_PCIE_RX_THROUGHPUT,  counter, Total number of bytes received through PCIe RX (in KB) via NVML.
    DCGM_FI_DEV_PCIE_REPLAY_COUNTER, counter, Total number of PCIe retries.
    DCGM_FI_DEV_GPU_UTIL,      gauge, GPU utilization (in %).
    DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory utilization (in %).
    DCGM_FI_DEV_ENC_UTIL,      gauge, Encoder utilization (in %).
    DCGM_FI_DEV_DEC_UTIL ,     gauge, Decoder utilization (in %).
    DCGM_FI_DEV_XID_ERRORS,              gauge,   Value of the last XID error encountered.
    DCGM_FI_DEV_FB_FREE, gauge, Frame buffer memory free (in MB).
    DCGM_FI_DEV_FB_USED, gauge, Frame buffer memory used (in MB).
    DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL,            counter, Total number of NVLink bandwidth counters for all lanes
    DCGM_FI_DEV_VGPU_LICENSE_STATUS, gauge, vGPU License status
    DCGM_FI_DEV_UNCORRECTABLE_REMAPPED_ROWS, counter, Number of remapped rows for uncorrectable errors
    DCGM_FI_DEV_CORRECTABLE_REMAPPED_ROWS,   counter, Number of remapped rows for correctable errors
    DCGM_FI_DEV_ROW_REMAP_FAILURE,           gauge,   Whether remapping of rows has failed
    DCGM_FI_DRIVER_VERSION,        label, Driver Version
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
    spec:
      # Only schedule on GPU nodes. Label set on nixos-gpu as gpu=rtx3070.
      nodeSelector:
        node.kubernetes.io/accelerator: nvidia
      tolerations:
        # nixos-gpu carries gpu=true:NoSchedule to keep general workloads off.
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostNetwork: false
      # DCGM needs to walk processes on the host to attribute GPU work
      # to specific PIDs. Without this, per-pod attribution panels stay empty.
      hostPID: true
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04
          imagePullPolicy: IfNotPresent
          env:
            # Enable kubelet pod-resources integration → metrics gain
            # `pod`/`namespace`/`container` labels so we can see which
            # pod is using how much VRAM.
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            # Custom field list (default + fan speed) from the ConfigMap above.
            - name: DCGM_EXPORTER_COLLECTORS
              value: "/etc/dcgm-exporter-custom/counters.csv"
            # Path inside container to the kubelet pod-resources socket.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
            # NixOS quirk: nvidia libs live in /run/opengl-driver.
            - name: LD_LIBRARY_PATH
              value: "/run/opengl-driver/lib:/usr/local/nvidia/lib64"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              nvidia.com/gpu: "1"
            limits:
              cpu: 500m
              memory: 256Mi
              nvidia.com/gpu: "1"
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          securityContext:
            runAsNonRoot: false
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            # NixOS GPU driver paths (matches nvidia-device-plugin pattern).
            - name: opengl-driver
              mountPath: /run/opengl-driver
              readOnly: true
            - name: nix-store
              mountPath: /nix/store
              readOnly: true
            - name: counters
              mountPath: /etc/dcgm-exporter-custom
              readOnly: true
      volumes:
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: opengl-driver
          hostPath:
            path: /run/opengl-driver
        - name: nix-store
          hostPath:
            path: /nix/store
        - name: counters
          configMap:
            name: dcgm-exporter-counters
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    app.kubernetes.io/name: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
      protocol: TCP
---
# ServiceMonitor lives in the same ns as the service since
# kube-prometheus-stack's podMonitorNamespaceSelector is empty (any ns).
# release label matches Prom's serviceMonitorSelector.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: gpu-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
