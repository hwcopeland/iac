---
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-root
  namespace: kube-system
spec:
  name: flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# www -> same edge IP as the apex; the gateway redirects www to the apex
# (see rke2/tooling/flux/theswamp/httproute-www-redirect.yaml).
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-www
  namespace: kube-system
spec:
  name: www.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# app -> same edge IP as the apex; the gateway's *.flmanbiosci.net wildcard
# listener serves it and the u4u-engine-app HTTPRoute routes it to the
# frontend (with /api/v1 -> backend, mirroring the apex) so the app is
# fully self-contained on this host.
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-app
  namespace: kube-system
spec:
  name: app.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# api -> same edge IP as the apex; the u4u-engine-api HTTPRoute routes it
# directly to the backend at the root path (no /api/v1 prefix).
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-api
  namespace: kube-system
spec:
  name: api.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# mcp -> same edge IP as the apex; MCP endpoint for AI sales agents
# (rke2/tooling/flux/theswamp/httproute-mcp.yaml).
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-mcp
  namespace: kube-system
spec:
  name: mcp.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# voice -> same edge IP as the apex; Twilio webhooks for the voice sales
# agent (rke2/tooling/flux/theswamp/httproute-voice.yaml).
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-voice
  namespace: kube-system
spec:
  name: voice.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
---
# sites -> internal site-tracker CRM (Authentik-guarded)
# (rke2/tooling/flux/theswamp/httproute-tracker.yaml).
apiVersion: cloudflare-operator.io/v1
kind: DNSRecord
metadata:
  name: flmanbiosci-sites
  namespace: kube-system
spec:
  name: sites.flmanbiosci.net
  type: A
  content: 69.180.240.158
  proxied: true
  ttl: 1
  interval: 5m
