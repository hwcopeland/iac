---
# Per-node Cilium override for the NixOS GPU agent (nixos-gpu, 10.41.0.10).
#
# The NixOS desktop's physical NIC is enp15s0. The cluster-wide pattern
# `enp+` already matches it, so no device override is needed. This
# CiliumNodeConfig pins the direct-routing-device explicitly to avoid
# any ambiguity if additional NICs are added later.
#
# Apply with: kubectl apply -f cilium-node-config-nixos-gpu.yaml
apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nixos-gpu-routing
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nixos-gpu
  defaults:
    devices: "enp15s0"
    direct-routing-device: "enp15s0"
