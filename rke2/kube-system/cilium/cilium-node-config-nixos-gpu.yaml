---
# Per-node Cilium override for the NixOS GPU agent (nixos-gpu, 10.41.0.10).
#
# The cluster-wide cilium-config sets `devices: enp+ eth+ ens+`, matching the
# Ubuntu nodes' interface names. The NixOS desktop's NIC is `eno2`, which none
# of those patterns match, so Cilium fails on this node with:
#   "unable to determine direct routing device"
#
# This CiliumNodeConfig scopes a fix to just nixos-gpu. Other nodes are
# unaffected because the nodeSelector matches by hostname.
#
# Apply with: kubectl apply -f cilium-node-config-nixos-gpu.yaml
apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nixos-gpu-routing
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nixos-gpu
  defaults:
    devices: "eno+"
    direct-routing-device: "eno2"
