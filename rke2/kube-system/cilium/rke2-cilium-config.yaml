---
# Cilium CNI Configuration for RKE2
# This customizes RKE2's bundled Cilium chart (handles bootstrapping properly)
# Place this file in: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    # ========================================
    # Core CNI Settings
    # ========================================
    # Replace kube-proxy with eBPF implementation
    kubeProxyReplacement: true
    # For single-node or accessing via localhost
    k8sServiceHost: "10.41.0.100"
    k8sServicePort: "6443"
    # CNI Configuration
    cni:
      install: true
      chainingMode: none
    # Native routing for better performance
    routingMode: native
    ipv4NativeRoutingCIDR: "10.42.0.0/16"
    # Pin devices to physical NICs (excludes leftover flannel.1 VXLAN interface)
    devices: "enp+ eth+ ens+"
    # Auto-detect MTU
    autoDirectNodeRoutes: true
    # Enable IPv4
    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList:
          - "10.42.0.0/16"
        clusterPoolIPv4MaskSize: 24

    # Enable Gateway API support
    gatewayAPI:
      enabled: true

    # Enable Ingress Controller (for legacy Ingress resources)
    ingressController:
      enabled: false
      default: false

    # ========================================
    # Service Load Balancing
    # ========================================
    # Load balancer mode for services
    loadBalancer:
      algorithm: maglev  # Consistent hashing
      mode: snat         # SNAT mode (can change to dsr for Direct Server Return)

    # ========================================
    # Observability - Hubble
    # ========================================
    hubble:
      enabled: true
      relay:
        enabled: true
        replicas: 1
      ui:
        enabled: true
        replicas: 1
        ingress:
          enabled: false

      metrics:
        enabled:
          - dns:query
          - drop
          - tcp
          - flow
          - icmp
          - http
    # ========================================
    # Local Redirect Policy
    # ========================================
    # Enable for NodeLocal DNS Cache support
    localRedirectPolicy: true
    # ========================================
    # BPF Features
    # ========================================

    # Enable BPF masquerading (better than iptables)
    bpf:
      masquerade: true
      tproxy: true

    # Socket LB - intercepts traffic for service IPs at socket level
    # Required for external traffic to reach LoadBalancer IPs via BGP
    socketLB:
      enabled: true
      hostNamespaceOnly: false

    # Enable host routing
    enableHostPort: true

    # ========================================
    # Operator Settings
    # ========================================

    operator:
      replicas: 1  # Single node cluster

    tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/etcd"
        operator: "Exists"
        effect: "NoExecute"

    # Enable network policies
    policyEnforcementMode: default

    # ========================================
    # MTU Settings
    # ========================================

    # Let Cilium auto-detect MTU
    # Your interface shows MTU 1500, pods will use 1450 with overhead
    mtu: 0  # Auto-detect

    # ========================================
    # BGP Control Plane
    # ========================================
    bgpControlPlane:
      enabled: true

    # ========================================
    # L2 Announcements
    # ========================================
    # Enable to bind LoadBalancer IPs to nodes for BGP
    l2announcements:
      enabled: true
      # Don't actually announce via L2, just bind IPs
      leaseDuration: 3s
      leaseRenewDeadline: 1s
      leaseRetryPeriod: 200ms
    
    # ========================================
    # Debug & Monitoring
    # ========================================
    
    # Enable Prometheus metrics
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false  # Enable once Prometheus Operator CRDs are installed
    
    # Debug mode (set to false in production)
    debug:
      enabled: false
