---
# Cilium CNI Configuration for RKE2
# This customizes RKE2's bundled Cilium chart (handles bootstrapping properly)
# Place this file in: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    # ========================================
    # Core CNI Settings
    # ========================================
    # Replace kube-proxy with eBPF implementation
    kubeProxyReplacement: true
    # For single-node or accessing via localhost
    k8sServiceHost: "10.41.0.100"
    k8sServicePort: "6443"
    # CNI Configuration
    cni:
      install: true
      chainingMode: none
    # Native routing for better performance
    routingMode: native
    ipv4NativeRoutingCIDR: "10.42.0.0/16"
    # Pin devices to physical NICs (excludes leftover flannel.1 VXLAN interface)
    devices: "enp+ eth+ ens+"
    # Auto-detect MTU
    autoDirectNodeRoutes: true
    # Enable IPv4
    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList:
          - "10.42.0.0/16"
        clusterPoolIPv4MaskSize: 24

    # Enable Gateway API support
    gatewayAPI:
      enabled: true

    # Enable Ingress Controller (for legacy Ingress resources)
    ingressController:
      enabled: false
      default: false

    # ========================================
    # Service Load Balancing
    # ========================================
    # Load balancer mode for services
    loadBalancer:
      algorithm: maglev  # Consistent hashing
      mode: snat         # SNAT mode (can change to dsr for Direct Server Return)

    # ========================================
    # Observability - Hubble
    # ========================================
    hubble:
      enabled: true
      relay:
        enabled: true
        replicas: 1
      ui:
        enabled: true
        replicas: 1
        ingress:
          enabled: false

      metrics:
        enabled:
          - dns:query
          - drop
          - tcp
          - flow
          - icmp
          - http

      # ----------------------------------------
      # SECURITY: redact credential-bearing data from ALL Hubble L7 flows
      # ----------------------------------------
      # MUST be enabled before export — without it, Authorization/Cookie
      # values appear UNREDACTED in flows and would be shipped to Loki.
      # Cilium applies redact to the flow BEFORE it is written to the
      # export file, so the file never contains the raw secrets.
      #
      # We use an ALLOW list (fail-closed): ONLY these 7 headers survive into
      # the export; EVERY other header (authorization, cookie, set-cookie,
      # x-api-key, proxy-authorization, anything new) is redacted by default.
      # This is the correct posture because the export ships off-box to Loki —
      # a deny list would leak any credential header we forgot to enumerate.
      # NOTE: header matching is case-insensitive; list lowercase canonical
      # names. headers.allow and headers.deny are MUTUALLY EXCLUSIVE — set
      # only allow here.
      redact:
        enabled: true
        http:
          # Redact the URL query string (tokens/session ids often ride here)
          # NOTE: chart key is camelCase urlQuery — lowercase is silently ignored.
          urlQuery: true
          # Redact userinfo in URLs (user:pass@host) — chart key is userInfo.
          userInfo: true
          headers:
            allow:
              - cf-connecting-ip
              - cf-ipcountry
              - cf-ray
              - user-agent
              - x-forwarded-for
              - host
              # request-correlation UUID (Cloudflare/Envoy); NOT a credential.
              # Needed to join REQUEST<->RESPONSE Hubble flow records.
              - x-request-id

      # ----------------------------------------
      # Static flow export -> per-node rotated JSONL file (Alloy tails it)
      # ----------------------------------------
      # Writes one JSON object per line to filePath on EACH node where a
      # cilium-agent runs. Bounded disk via size + backups + compression.
      # allowList limits the file to L7/HTTP flows only (no L3/L4 noise).
      # fieldMask trims each record to only the fields the parser needs.
      export:
        static:
          enabled: true
          filePath: "/var/run/cilium/hubble/events.log"
          fileMaxSizeMb: 50
          fileMaxBackups: 5
          fileCompress: true
          # L7/HTTP-only: protocol l7 AND a populated http block.
          # event_type 129 == EventTypeL7 (Hubble flow event type for L7).
          allowList:
            - '{"protocol":["http"],"event_type":[{"type":129}]}'
          # Keep ONLY these fields in the exported record. Drops the chatty
          # source.labels / *.labels / node_labels arrays. Field paths use
          # the flow proto field names.
          fieldMask:
            - time
            - node_name
            - l7.type
            - l7.http.method
            - l7.http.url
            - l7.http.code
            # latency_ns lives directly under l7, NOT under l7.http (verified
            # against flow.Flow proto on v1.19.3 — l7.http.latency_ns is invalid
            # and the agent FATALS on it).
            - l7.latency_ns
            - l7.http.headers
            - destination.namespace
    # ========================================
    # Local Redirect Policy
    # ========================================
    # Enable for NodeLocal DNS Cache support
    localRedirectPolicy: true
    # ========================================
    # BPF Features
    # ========================================

    # Enable BPF masquerading (better than iptables)
    bpf:
      masquerade: true
      tproxy: true

    # Socket LB - intercepts traffic for service IPs at socket level
    # Required for external traffic to reach LoadBalancer IPs via BGP
    socketLB:
      enabled: true
      hostNamespaceOnly: false

    # Enable host routing
    enableHostPort: true

    # ========================================
    # Operator Settings
    # ========================================

    operator:
      replicas: 1  # Single node cluster

    tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/etcd"
        operator: "Exists"
        effect: "NoExecute"

    # Enable network policies
    policyEnforcementMode: default

    # ========================================
    # MTU Settings
    # ========================================

    # Let Cilium auto-detect MTU
    # Your interface shows MTU 1500, pods will use 1450 with overhead
    mtu: 0  # Auto-detect

    # ========================================
    # BGP Control Plane
    # ========================================
    bgpControlPlane:
      enabled: true

    # ========================================
    # L2 Announcements
    # ========================================
    # Enable to bind LoadBalancer IPs to nodes for BGP
    l2announcements:
      enabled: true
      # Don't actually announce via L2, just bind IPs
      leaseDuration: 3s
      leaseRenewDeadline: 1s
      leaseRetryPeriod: 200ms
    
    # ========================================
    # Debug & Monitoring
    # ========================================
    
    # Enable Prometheus metrics
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false  # Enable once Prometheus Operator CRDs are installed
    
    # Debug mode (set to false in production)
    debug:
      enabled: false
