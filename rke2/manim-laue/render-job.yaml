---
# Kubernetes Job: render the Laue diffraction animation on nixos-gpu
# and upload the resulting MP4 to Garage S3 (khemeia-results bucket).
#
# Manim default Cairo renderer is CPU-bound; we target nixos-gpu only for
# its CPU/RAM headroom. No GPU resource is requested, and no NixOS /run/opengl-driver
# or /nix/store hostPath mounts are needed.
apiVersion: batch/v1
kind: Job
metadata:
  name: manim-laue
  namespace: chem
  labels:
    app: manim-laue
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: manim-laue
    spec:
      restartPolicy: Never
      nodeSelector:
        gpu: "rtx3070"
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: render
          image: zot.hwcopeland.net/sci/manim-laue:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              echo ">>> Self-check"
              python /work/laue.py --self-check
              echo ">>> Render"
              cd /work
              manim -qh laue.py LaueDiffraction -o laue.mp4
              MP4=$(find media -name 'laue.mp4' -print -quit)
              if [ -z "$MP4" ]; then
                echo "ERROR: no laue.mp4 produced" >&2
                exit 1
              fi
              KEY="manim/laue-$(date -u +%Y%m%dT%H%M%SZ).mp4"
              echo ">>> Uploading $MP4 -> s3://khemeia-results/$KEY"
              aws --endpoint-url "$GARAGE_ENDPOINT" \
                  --region "$GARAGE_REGION" \
                  s3 cp "$MP4" "s3://khemeia-results/$KEY"
              echo "DONE: s3://khemeia-results/$KEY"
          env:
            - name: GARAGE_ENDPOINT
              value: "http://garage.garage-system.svc.cluster.local:3900"
            - name: GARAGE_REGION
              value: "garage"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secret
                  key: secret-access-key
            - name: AWS_DEFAULT_REGION
              value: "garage"
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 12Gi
